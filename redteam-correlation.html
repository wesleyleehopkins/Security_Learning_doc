<template id="tpl-overview">

<h1>01 &middot; Attack Summary</h1>
<hr class="divider">

<h2>Kill Chain Overview</h2>
<p>The red team engagement executed 118 steps across 8 lab modules on a VirtualBox host-only network (192.168.56.0/24). The attack progressed from passive OSINT through active scanning, web exploitation, password attacks, Metasploit payloads, privilege escalation on both Linux and Windows, and finally post-exploitation persistence, lateral movement, and exfiltration.</p>

<div class="table-wrap">
<table>
<thead><tr><th>Phase</th><th>Lab</th><th>Steps</th><th>Primary Tools</th><th>Source &rarr; Target</th><th>Detection Difficulty</th></tr></thead>
<tbody>
<tr><td>OSINT &amp; Passive Recon</td><td>Lab 1</td><td>1-11</td><td>whois, dig, theHarvester, Shodan, Google Dorks</td><td>Kali (.103) &rarr; External</td><td><strong>Hard</strong></td></tr>
<tr><td>Active Recon &amp; Scanning</td><td>Lab 2</td><td>12-29</td><td>nmap, Nessus, enum4linux, nikto, gobuster</td><td>Kali (.103) &rarr; Ubuntu (.102), Windows (.101)</td><td><strong>Easy</strong></td></tr>
<tr><td>Web Exploitation</td><td>Lab 3</td><td>30-44</td><td>sqlmap, Burp Suite, curl, manual injection</td><td>Kali (.103) &rarr; Ubuntu (.102) DVWA</td><td><strong>Medium</strong></td></tr>
<tr><td>Password Attacks</td><td>Lab 4</td><td>45-57</td><td>hydra, john, hashcat, crackmapexec, medusa</td><td>Kali (.103) &rarr; Ubuntu (.102), Windows (.101)</td><td><strong>Easy</strong></td></tr>
<tr><td>Metasploit Framework</td><td>Lab 5</td><td>58-78</td><td>msfconsole, msfvenom, meterpreter</td><td>Kali (.103) &rarr; Both targets</td><td><strong>Medium</strong></td></tr>

<li><strong>Sysmon on Windows:</strong> Install Sysmon with SwiftOnSecurity config on .101. Install Winlogbeat to forward events to Elasticsearch.</li>
<li><strong>Splunk (optional):</strong> Install Splunk on .110 or a dedicated VM. Deploy Universal Forwarders to .101 and .102.</li>
<li><strong>Zeek integration:</strong> Security Onion runs Zeek natively. Forward Zeek JSON logs to the ELK stack or Splunk.</li>
<li><strong>Validate:</strong> Run a test nmap scan from .103 to verify Snort alerts, Zeek conn.log entries, and OSSEC FIM detections all appear.</li>

<h2>Custom Zeek Script: Port Scan Detector</h2>
<pre><code>@load base/frameworks/notice
module PortScanDetector;
export {
    redef enum Notice::Type += { PortScan::Detected };
    const scan_threshold = 50 &amp;redef;
    const scan_interval = 5min &amp;redef;
}
global scan_tracker: table[addr, addr] of set[port] &amp;create_expire=5min;
event connection_attempt(c: connection) {
    local src = c$id$orig_h;
    local dst = c$id$resp_h;
    if ([src, dst] !in scan_tracker)
        scan_tracker[src, dst] = set();
    add scan_tracker[src, dst][c$id$resp_p];
    if (|scan_tracker[src, dst]| &gt;= scan_threshold) {
        NOTICE([$note=PortScan::Detected,
                $src=src, $dst=dst,
                $msg=fmt("Port scan: %s -&gt; %s (%d ports)",
                         src, dst, |scan_tracker[src, dst]|),
                $n=|scan_tracker[src, dst]|]);
        delete scan_tracker[src, dst];
    }
}</code></pre>

<h2>Custom Zeek Script: DNS Tunnel Detector</h2>
<pre><code>@load base/frameworks/notice
module DNSTunnelDetector;
export {
    redef enum Notice::Type += { DNSTunnel::Detected };
    const label_len_threshold = 30 &amp;redef;
    const query_count_threshold = 50 &amp;redef;
}
global dns_tracker: table[addr] of count &amp;default=0 &amp;create_expire=10min;
event dns_request(c: connection, msg: dns_msg, query: string, qtype: count, qclass: count) {
    local parts = split_string(query, /\./);
    if (|parts| &gt; 0 &amp;&amp; |parts[0]| &gt; label_len_threshold) {
        ++dns_tracker[c$id$orig_h];
        if (dns_tracker[c$id$orig_h] &gt;= query_count_threshold) {
            NOTICE([$note=DNSTunnel::Detected,
                    $src=c$id$orig_h,
                    $msg=fmt("DNS tunneling suspected from %s (%d queries with long labels)",
                             c$id$orig_h, dns_tracker[c$id$orig_h])]);
            dns_tracker[c$id$orig_h] = 0;
        }
    }
}</code></pre>

<h2>Custom Signatures</h2>

<h3>Signature 1: Reverse Shell Connection</h3>
<pre><code>class ReverseShellConnection(Signature):
    name = "reverse_shell_outbound_tcp"
    description = "Establishes outbound TCP connection consistent with a reverse shell"
    severity = 3
    categories = ["network", "c2"]
    ttps = ["T1059", "T1071.001"]

    def on_complete(self):
        suspicious_ports = [4444, 4445, 4446, 4447, 1234, 5555, 8080, 8443]
        attacker_ip = "192.168.56.103"
        for conn in self.results.get("network", {}).get("tcp", []):
            if conn.get("dst") == attacker_ip and conn.get("dport") in suspicious_ports:
                self.data.append({"destination": f"{conn['dst']}:{conn['dport']}"})
                return True
        return False</code></pre>

<h3>Signature 2: Privilege Escalation Attempt</h3>
<pre><code>class PrivilegeEscalationAttempt(Signature):
    name = "privilege_escalation_attempt"
    description = "Attempts privilege escalation via setuid or token manipulation"
    severity = 3
    ttps = ["T1548.001", "T1134"]

    def on_complete(self):
        linux_calls = ["setuid", "setgid", "seteuid", "setregid"]
        win_apis = ["AdjustTokenPrivileges", "ImpersonateLoggedOnUser",
                    "DuplicateTokenEx", "CreateProcessWithTokenW"]
        for call in self.results.get("behavior", {}).get("summary", {}).get("api_calls", []):
            if call in linux_calls + win_apis:
                self.data.append({"api_call": call})
                return True
        return False</code></pre>

<h3>Signature 3: Credential Dumping (SAM)</h3>
<pre><code>class CredentialDumpingSAM(Signature):
    name = "credential_dumping_sam"
    description = "Accesses SAM/SYSTEM registry hives for credential extraction"
    severity = 3
    ttps = ["T1003.002"]

    def on_complete(self):
        sam_patterns = ["\\SAM", "\\SYSTEM", "\\SECURITY",
                        "reg save", "reg.exe save"]
        for process in self.results.get("behavior", {}).get("processes", []):
            cmdline = process.get("command_line", "")
            if any(p.lower() in cmdline.lower() for p in sam_patterns):
                self.data.append({"command": cmdline})
                return True
        return False</code></pre>

<h3>Signature 5: Reconnaissance Commands</h3>
<pre><code>class ReconnaissanceCommands(Signature):
    name = "reconnaissance_commands"
    description = "Executes system enumeration commands"
    severity = 2
    ttps = ["T1082", "T1016", "T1049"]

    def on_complete(self):
        recon_cmds = ["whoami", "systeminfo", "ipconfig", "net user",
                      "net localgroup", "netstat", "tasklist", "uname -a",
                      "id", "cat /etc/passwd"]
        found = 0
        for process in self.results.get("behavior", {}).get("processes", []):
            cmdline = process.get("command_line", "")
            if any(cmd in cmdline.lower() for cmd in recon_cmds):
                found += 1
        if found &gt;= 3:
            return True
        return False</code></pre>

<h3>Signature 7: UAC Bypass Attempt</h3>
<pre><code>class UACBypassAttempt(Signature):
    name = "uac_bypass_attempt"
    description = "Modifies registry keys associated with UAC bypass techniques"
    severity = 3
    ttps = ["T1548.002"]

    def on_complete(self):
        bypass_keys = ["ms-settings\\Shell\\Open\\command",
                       "mscfile\\Shell\\Open\\command"]
        for regkey in self.results.get("behavior", {}).get("summary", {}).get("regkey_written", []):
            if any(k.lower() in regkey.lower() for k in bypass_keys):
                self.data.append({"registry_key": regkey})
                return True
        return False</code></pre>

<template id="tpl-psaa">
<article class="topic">
<h1>17 &middot; PowerShell Auditing</h1>
<hr class="divider">

<p>PowerShell logging setup, 16 detection queries for Windows privesc and post-exploitation, Windows Event ID reference, and AMSI detection guidance.</p>

<h2>Enabling PowerShell Logging</h2>

<h3>Script Block Logging (Event ID 4104)</h3>
<p>Records the content of all PowerShell script blocks as they execute. This is the single most important logging source for PowerShell attacks.</p>
<pre><code># Enable Script Block Logging
New-Item -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ScriptBlockLogging" -Force
Set-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ScriptBlockLogging" -Name "EnableScriptBlockLogging" -Value 1
Set-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ScriptBlockLogging" -Name "EnableScriptBlockInvocationLogging" -Value 1</code></pre>

<h3>Module Logging (Event ID 4103)</h3>
<pre><code># Enable Module Logging
New-Item -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ModuleLogging" -Force
Set-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ModuleLogging" -Name "EnableModuleLogging" -Value 1
New-Item -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ModuleLogging\ModuleNames" -Force
Set-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ModuleLogging\ModuleNames" -Name "*" -Value "*"</code></pre>

<h3>Transcription Logging</h3>
<pre><code># Enable Transcription
New-Item -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\PowerShell\Transcription" -Force
Set-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\PowerShell\Transcription" -Name "EnableTranscripting" -Value 1
Set-ItemProperty -Path "HKLM:\SOFTWARE\Policies\Microsoft\Windows\PowerShell\Transcription" -Name "OutputDirectory" -Value "C:\PSTranscripts"
New-Item -ItemType Directory -Path "C:\PSTranscripts" -Force</code></pre>

<h3>Constrained Language Mode</h3>
<pre><code># System-wide CLM enforcement
[System.Environment]::SetEnvironmentVariable('__PSLockdownPolicy', '4', 'Machine')

# Verify
$ExecutionContext.SessionState.LanguageMode
# Should return "ConstrainedLanguage"</code></pre>

<h2>Detection Queries &mdash; Phase 7: Windows PrivEsc</h2>

<h3>PowerUp Invoke-AllChecks</h3>
<pre><code>Get-WinEvent -FilterHashtable @{
    LogName = 'Microsoft-Windows-PowerShell/Operational'
    Id = 4104
} | Where-Object {
    $_.Message -match 'Invoke-AllChecks|Get-ServiceUnquoted|Get-ModifiableServiceFile'
} | Select-Object TimeCreated, @{N='ScriptBlock';E={$_.Properties[2].Value}}</code></pre>

<h3>winPEAS Execution</h3>
<pre><code>Get-WinEvent -FilterHashtable @{
    LogName = 'Security'
    Id = 4688
} | Where-Object {
    $_.Message -match 'winpeas|winPEAS|winPEASx64'
} | Select-Object TimeCreated, @{N='CommandLine';E={$_.Properties[8].Value}}</code></pre>

<h3>AlwaysInstallElevated / msiexec Abuse</h3>
<pre><code>Get-WinEvent -FilterHashtable @{
    LogName = 'Security'
    Id = 4688
} | Where-Object {
    $_.Message -match 'msiexec.*\/quiet|msiexec.*\/qn|msiexec.*\/i.*\.msi'
} | Select-Object TimeCreated, @{N='CommandLine';E={$_.Properties[8].Value}}</code></pre>

<h3>UAC Bypass via fodhelper</h3>
<pre><code>Get-WinEvent -FilterHashtable @{
    LogName = 'Microsoft-Windows-PowerShell/Operational'
    Id = 4104
} | Where-Object {
    $_.Message -match 'ms-settings\\Shell\\Open\\command|fodhelper|eventvwr'
} | Select-Object TimeCreated, @{N='ScriptBlock';E={$_.Properties[2].Value}}</code></pre>

<h3>Service Binary Replacement</h3>
<pre><code># New service installations
Get-WinEvent -FilterHashtable @{
    LogName = 'System'
    Id = 7045
} | Select-Object TimeCreated, @{N='ServiceName';E={$_.Properties[0].Value}}, @{N='ImagePath';E={$_.Properties[1].Value}}

# sc.exe config commands
Get-WinEvent -FilterHashtable @{
    LogName = 'Security'
    Id = 4688
} | Where-Object {
    $_.Message -match 'sc\.exe.*config.*binpath|sc\.exe.*create'
} | Select-Object TimeCreated, @{N='CommandLine';E={$_.Properties[8].Value}}</code></pre>

<h2>Detection Queries &mdash; Phase 8: Post-Exploitation</h2>

<h3>File Download Cradles</h3>
<pre><code>Get-WinEvent -FilterHashtable @{
    LogName = 'Microsoft-Windows-PowerShell/Operational'
    Id = 4104
} | Where-Object {
    $_.Message -match 'DownloadString|DownloadFile|Invoke-WebRequest|wget|curl|certutil.*urlcache|bitsadmin.*transfer'
} | Select-Object TimeCreated, @{N='ScriptBlock';E={$_.Properties[2].Value}}</code></pre>

<h3>Base64 Encoded Commands</h3>
<pre><code>Get-WinEvent -FilterHashtable @{
    LogName = 'Security'
    Id = 4688
} | Where-Object {
    $_.Message -match 'powershell.*-enc|powershell.*-EncodedCommand|powershell.*-e\s+[A-Za-z0-9+/=]{20,}'
} | Select-Object TimeCreated, @{N='CommandLine';E={$_.Properties[8].Value}}</code></pre>

<h3>WMI Persistence</h3>
<pre><code>Get-WinEvent -FilterHashtable @{
    LogName = 'Microsoft-Windows-PowerShell/Operational'
    Id = 4104
} | Where-Object {
    $_.Message -match '__EventFilter|CommandLineEventConsumer|__FilterToConsumerBinding|Register-WmiEvent|Set-WmiInstance'
} | Select-Object TimeCreated, @{N='ScriptBlock';E={$_.Properties[2].Value}}</code></pre>

<h2>IR Playbook Stubs</h2>

<h3>1. Reverse Shell Detected</h3>
<p><strong>Trigger:</strong> Snort alert or Zeek conn showing persistent outbound TCP from internal host to .103 on port 4444-4447.</p>
<ol>
<li><strong>Isolate</strong> the affected host (disable NIC, do not power off)</li>
<li><strong>Identify the process</strong> holding the connection (<code>netstat</code> / <code>ss</code>)</li>
<li><strong>Capture volatile evidence</strong> (memory, process list, connections)</li>
<li><strong>Kill and contain</strong> &mdash; terminate process, check for persistence</li>
<li><strong>Scope</strong> &mdash; search all logs for other hosts talking to same C2</li>
</ol>

<h3>2. Brute Force + Successful Login</h3>
<ol>
<li><strong>Confirm</strong> the successful login is real</li>
<li><strong>Lock the account</strong> immediately</li>
<li><strong>Trace post-auth activity</strong> (commands, processes, connections)</li>
<li><strong>Identify scope</strong> (other brute-forced accounts?)</li>
<li><strong>Remediate</strong> &mdash; force password reset, implement lockout policy</li>
</ol>

<h3>3. Privilege Escalation Detected</h3>
<ol>
<li><strong>Determine current access level</strong></li>
<li><strong>Capture escalation artifacts</strong> (malicious binary, registry key, MSI)</li>
<li><strong>Contain</strong> &mdash; isolate host; assume full compromise if SYSTEM achieved</li>
<li><strong>Check for credential theft</strong> (Mimikatz, LSASS access, SAM dump)</li>
<li><strong>Fix the vulnerability</strong> (unquoted path, weak perms, missing patch)</li>
</ol>

<h3>4. Pass-the-Hash Lateral Movement</h3>
<ol>
<li><strong>Map the movement path</strong> (Zeek smb, Win 4624/4648)</li>
<li><strong>Isolate both endpoints</strong></li>
<li><strong>Identify the credential</strong> used (account name, SID)</li>
<li><strong>Check for further pivoting</strong> from destination host</li>
<li><strong>Reset credentials</strong> (all compromised accounts; krbtgt if domain admin)</li>
</ol>

<h3>5. Data Exfiltration Detected</h3>
<ol>
<li><strong>Quantify</strong> total bytes transferred (Zeek conn orig_bytes/resp_bytes)</li>
<li><strong>Identify what was taken</strong> (staging artifacts, file access logs)</li>
<li><strong>Block the channel</strong> (firewall, process termination)</li>
<li><strong>Assess data sensitivity</strong></li>
<li><strong>Notify and document</strong> (breach notification if PII involved)</li>
</ol>

<h2>Common Pitfalls</h2>
<ol>
<li><strong>Focusing only on the alert, not the chain.</strong> A single brute-force alert is rarely the full story. Always pivot backward and forward in time.</li>
<li><strong>Ignoring Zeek conn logs for baselining.</strong> Conn.log is the single best source for identifying anomalous connections, even when Snort misses them.</li>
<li><strong>Not correlating across Linux and Windows.</strong> Lateral movement bridges both OSes. A compromise on Ubuntu means you must immediately check Windows logs for auth from .102.</li>
<li><strong>Missing encoded PowerShell.</strong> Use <code>-EncodedCommand</code> to bypass string matching. Script Block Logging (4104) records decoded content automatically.</li>
<li><strong>Overlooking legitimate tool abuse.</strong> Tools like certutil, msiexec, rundll32 are used for living-off-the-land attacks. Flag network connections from these processes.</li>
<li><strong>Log gaps from insufficient retention.</strong> Default Windows Security log is 20 MB. Ensure log forwarding to SIEM. Check Event 1102 (log cleared) as anti-forensics indicator.</li>
<li><strong>Tunnel vision on signatures.</strong> Supplement Snort with behavioral analysis: connection durations, data volume anomalies, process parent-child relationships.</li>
<li><strong>Not checking for persistence after remediation.</strong> Always sweep for scheduled tasks, services, Run keys, WMI subscriptions, cron jobs, SSH keys, and web shells.</li>
</ol>
