<template id="tpl-sv-overview">
<article class="topic">
<h1>01 · How -sV Works — Service Version Detection</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l4">L4 Transport</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">Service version detection first opens a L4 TCP connection to each open port, then sends and reads L7 application-layer probe strings — matching banner responses against the nmap-service-probes database to identify product name and version.</span>
</div>
<hr class="divider">

<div class="callout"><code>-sV</code> probes open ports to determine the service name, version number, and sometimes additional metadata (hostname, device type, OS). This information is used to identify vulnerable software versions without running a separate vulnerability scanner.</div>

<h2>Command</h2>
<pre><code><span class="cm"># Basic version detection</span>
nmap -sV 192.168.1.10

<span class="cm"># Version detection + SYN scan (root required)</span>
nmap -sS -sV 192.168.1.10

<span class="cm"># Specific ports only</span>
nmap -sV -p 22,80,443,3306,5432 192.168.1.10

<span class="cm"># All ports + version detection</span>
nmap -sS -sV -p- 192.168.1.10</code></pre>

<h2>How Nmap Identifies Versions</h2>
<pre><code><span class="cm">── Step 1: Port scan identifies open ports ────────────────────</span>
22/tcp open
80/tcp open
3306/tcp open

<span class="cm">── Step 2: -sV sends version probes to each open port ─────────</span>
Nmap connects to port → sends probe string(s)
→ reads banner / response
→ matches against nmap-service-probes database

<span class="cm">── nmap-service-probes probe example for SSH ──────────────────</span>
Probe TCP NULL q||           ← send empty string; many services banner on connect
match ssh m|^SSH-([\d.]+)-(.+)\n|  ← regex against response banner
  p|OpenSSH| v|$2| i|protocol $1|  ← extract product, version, info</code></pre>

<h2>Version Detection Output Fields</h2>
<pre><code>PORT     STATE  SERVICE      VERSION
22/tcp   open   ssh          OpenSSH 8.9p1 Ubuntu 3ubuntu0.6 (Ubuntu Linux; protocol 2.0)
80/tcp   open   http         Apache httpd 2.4.52 ((Ubuntu))
443/tcp  open   ssl/http     Apache httpd 2.4.52 ((Ubuntu))
3306/tcp open   mysql        MySQL 8.0.36 (unauthorized)
5432/tcp open   postgresql   PostgreSQL DB 9.6.0 or later

<span class="cm"># Field breakdown:</span>
<span class="cm"># SERVICE    = matched service name (from nmap-services)</span>
<span class="cm"># VERSION    = product name + version from nmap-service-probes match</span>
<span class="cm"># Extra info = parenthetical OS, protocol version, etc.</span></code></pre>

<h2>Service Detection Fields in Detail</h2>
<div class="table-wrap">
<table>
  <thead><tr><th>Field</th><th>Description</th><th>Example</th></tr></thead>
  <tbody>
    <tr><td>Product name (p)</td><td>Software product name</td><td>OpenSSH, Apache httpd, nginx</td></tr>
    <tr><td>Version (v)</td><td>Version string</td><td>8.9p1, 2.4.52, 1.24.0</td></tr>
    <tr><td>Info (i)</td><td>Additional information</td><td>protocol 2.0, Ubuntu</td></tr>
    <tr><td>Hostname (h)</td><td>Hostname from banner</td><td>mail.example.com</td></tr>
    <tr><td>OS (o)</td><td>OS from service banner</td><td>Linux, Windows</td></tr>
    <tr><td>Device type (d)</td><td>Device category</td><td>router, printer, phone</td></tr>
    <tr><td>CPE</td><td>Common Platform Enumeration URI</td><td>cpe:/a:openbsd:openssh:8.9p1</td></tr>
  </tbody>
</table>
</div>

<h2>When -sV Fails or Returns ?</h2>
<pre><code>PORT     STATE  SERVICE  VERSION
8443/tcp open   ssl/http?

<span class="cm"># ? means Nmap couldn't determine the service</span>
<span class="cm"># Common causes:</span>
<span class="cm">#  - Custom/proprietary protocol with no matching probe</span>
<span class="cm">#  - Application sends nothing until client speaks first</span>
<span class="cm">#  - Encrypted protocol (SSL without standard handshake)</span>
<span class="cm">#  - Service rate-limits or closes connection too fast</span>
<span class="cm"># Fix: try --version-intensity 9 or use NSE scripts</span></code></pre>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Core Concepts</summary>
  <div class="tier-body">
    <h4>Understanding what -sV actually does</h4>
    <ul>
      <li>-sV completes a port scan at L4 first, then connects to each open port and sends L7 application-layer probe strings from the nmap-service-probes database</li>
      <li>Nmap matches each L7 response against regex patterns — a match returns product name, version, and CPE identifier</li>
      <li>CPE URIs (e.g., <code>cpe:/a:openbsd:openssh:8.9p1</code>) are directly searchable in the NVD and Vulners to find matching CVEs</li>
    </ul>
    <pre><code>nmap -sS -sV -p 22,80,443,3306 192.168.56.30  <span class="cm"># SYN scan + version detection on Windows victim</span></code></pre>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — Deeper Skills</summary>
  <div class="tier-body">
    <h4>Combining -sV with scan flags for practical recon</h4>
    <ul>
      <li>Pair <code>-sS -sV</code> together — SYN discovers open L4 ports, -sV then probes each for L7 service identity in one Nmap run</li>
      <li>Add <code>--open</code> to suppress closed/filtered output — essential when scanning large port ranges or subnets</li>
      <li>Use <code>-oA scan_name</code> to save in all three formats (normal, XML, grepable) for later vulnerability correlation</li>
    </ul>
    <pre><code>nmap -sS -sV -p 1-1000 --open -oA initial_scan 192.168.56.30
<span class="cm"># Port scan + version on top 1000 ports, save all output formats</span></code></pre>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Expert Techniques</summary>
  <div class="tier-body">
    <h4>Diagnosing missed detections and automating CVE correlation</h4>
    <ul>
      <li>When -sV returns <code>?</code>, use <code>--version-intensity 9</code> to exhaust all L7 probes — custom/non-standard services need full probe coverage</li>
      <li>Use <code>--version-trace</code> to see every probe/response pair in real time — diagnose exactly why a service isn't matching</li>
      <li>Pipe <code>-oX</code> XML output into <code>--script=vulners</code> or OpenVAS for automated CVE lookups against every identified version</li>
    </ul>
    <pre><code>nmap -sV --version-trace -p 8443 192.168.56.30 2>&amp;1 | head -30
<span class="cm"># Trace all L7 probe/response pairs — debug why a custom port isn't matching</span></code></pre>
  </div>
</details>
</article>
</template>

<template id="tpl-sv-intensity">
<article class="topic">
<h1>02 · Version Intensity Levels</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l4">L4 Transport</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">Version intensity controls how many L7 application-layer probe strings Nmap sends against each open L4 TCP port — higher intensity exhausts more probe variants to identify unusual or non-standard services that common probes would miss.</span>
</div>
<hr class="divider">

<p>Version intensity controls how many probe strings Nmap tries against each open port. Higher intensity = more probes = better accuracy but slower scans. The nmap-service-probes file assigns each probe a rarity value (0-9); intensity sets the threshold.</p>

<h2>Intensity Levels</h2>
<div class="table-wrap">
<table>
  <thead><tr><th>Flag</th><th>Intensity</th><th>Probes Used</th><th>Speed</th><th>Use When</th></tr></thead>
  <tbody>
    <tr><td><code>--version-light</code></td><td>2</td><td>Only most common (rarity ≤ 2)</td><td>Fastest</td><td>Quick broad scans; common services only</td></tr>
    <tr><td><code>--version-intensity 3</code></td><td>3</td><td>Moderate subset</td><td>Fast</td><td>Slightly better than light</td></tr>
    <tr><td><code>--version-intensity 5</code></td><td>5</td><td>Moderate</td><td>Moderate</td><td></td></tr>
    <tr><td>(default)</td><td>7</td><td>Most probes (rarity ≤ 7)</td><td>Normal</td><td>Default; good balance</td></tr>
    <tr><td><code>--version-intensity 9</code></td><td>9</td><td>All probes in database</td><td>Slow</td><td>Obscure services; comprehensive audit</td></tr>
    <tr><td><code>--version-all</code></td><td>9</td><td>All probes (alias for intensity 9)</td><td>Slowest</td><td>Same as intensity 9</td></tr>
  </tbody>
</table>
</div>

<h2>Commands</h2>
<pre><code><span class="cm"># Light — fastest, catches only common services</span>
nmap -sV --version-light 192.168.1.0/24

<span class="cm"># Default (intensity 7) — best balance</span>
nmap -sV 192.168.1.10

<span class="cm"># All probes — use on individual hosts when identity is important</span>
nmap -sV --version-all 192.168.1.10

<span class="cm"># Explicit intensity value</span>
nmap -sV --version-intensity 5 192.168.1.10</code></pre>

<h2>Version Trace (Debug)</h2>
<pre><code><span class="cm"># Show every probe sent and response received during version detection</span>
nmap -sV --version-trace 192.168.1.10 2>&amp;1 | head -50

<span class="cm"># Sample trace output:</span>
NSOCK INFO: TCP connection to 192.168.1.10:22 completed successfully.
NSOCK INFO: Write request for 0 bytes queued against IOD #1
NSOCK INFO: Read request from IOD #1
NSOCK INFO: READ [IOD #1 #2] SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6
<span class="cm"># → Nmap read the SSH banner and matched it against probes database</span></code></pre>

<h2>Intensity vs Scan Coverage</h2>
<div class="table-wrap">
<table>
  <thead><tr><th>Scenario</th><th>Recommended Intensity</th><th>Command</th></tr></thead>
  <tbody>
    <tr><td>Large subnet — quick inventory</td><td>Light (2)</td><td><code>nmap -sV --version-light -T4 10.0.0.0/16</code></td></tr>
    <tr><td>Standard pentest engagement</td><td>Default (7)</td><td><code>nmap -sS -sV -p- target</code></td></tr>
    <tr><td>Deep audit of single host</td><td>All (9)</td><td><code>nmap -sV --version-all -p- target</code></td></tr>
    <tr><td>Unknown service on custom port</td><td>All (9)</td><td><code>nmap -sV --version-all -p 9999 target</code></td></tr>
    <tr><td>Version baseline for change detection</td><td>Default (7)</td><td><code>nmap -sV -oX baseline.xml subnet</code></td></tr>
  </tbody>
</table>
</div>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Core Concepts</summary>
  <div class="tier-body">
    <h4>Choosing the right intensity for your situation</h4>
    <ul>
      <li>Default intensity 7 covers 90%+ of standard services — use this for everyday scans; no flag needed</li>
      <li><code>--version-light</code> (intensity 2) sends only the most common L7 probes — use for large subnet sweeps where speed matters more than completeness</li>
      <li><code>--version-all</code> (intensity 9) tries every probe in the database — use only on individual hosts when you need maximum accuracy</li>
    </ul>
    <pre><code>nmap -sV --version-light -T4 192.168.56.0/24  <span class="cm"># Quick version sweep of the whole lab subnet</span></code></pre>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — Deeper Skills</summary>
  <div class="tier-body">
    <h4>Two-pass intensity strategy for efficient recon</h4>
    <ul>
      <li>Use <code>--version-light</code> on a full subnet first, then <code>--version-all</code> on interesting individual hosts — best speed/accuracy trade-off</li>
      <li>Use intensity 9 on non-standard ports (8080, 8443, 9000+) where the default often misses custom or internal services</li>
      <li>Save results with <code>-oX</code> and compare against previous baseline scans to detect version changes and newly exposed services</li>
    </ul>
    <pre><code>nmap -sS -sV --version-intensity 9 -p- 192.168.56.20  <span class="cm"># Max intensity all ports on Security Onion</span></code></pre>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Expert Techniques</summary>
  <div class="tier-body">
    <h4>Probe trace analysis and automated vulnerability pipeline</h4>
    <ul>
      <li>Use <code>--version-trace</code> with high intensity to identify exactly which L7 probe string triggered the match — useful for writing custom probes for proprietary internal services</li>
      <li>Pair <code>--version-all -oX</code> with CVE scanning tools that consume Nmap XML (OpenVAS, Metasploit db_import, Vulners)</li>
      <li>Keep <code>/usr/share/nmap/nmap-service-probes</code> updated — outdated probe files miss version strings for modern service releases</li>
    </ul>
    <pre><code>nmap -sV --version-all --version-trace 192.168.56.30 2>&amp;1 | grep "Matched\|NSOCK"
<span class="cm"># Show matched probe strings — identifies which L7 probe triggered each version match</span></code></pre>
  </div>
</details>
</article>
</template>

<template id="tpl-os-detection">
<article class="topic">
<h1>03 · OS Detection (-O)</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l3">L3 Network</span>
  <span class="osi-chip l4">L4 Transport</span>
  <span class="osi-note">OS detection sends 16 targeted L3 ICMP and L4 TCP probe packets — analyzing TCP/IP stack behavior including ISN generation patterns, window sizes, options ordering, and ICMP response formatting to build a fingerprint matched against nmap-os-db.</span>
</div>
<hr class="divider">

<div class="callout note"><strong>OS detection requires:</strong> root/admin privileges AND at least one open TCP port AND at least one closed TCP port on the target. Without both states, Nmap cannot generate the full fingerprint.</div>

<h2>Command</h2>
<pre><code><span class="cm"># OS detection only</span>
sudo nmap -O 192.168.1.10

<span class="cm"># Combined with service detection (common pairing)</span>
sudo nmap -sS -sV -O 192.168.1.10

<span class="cm"># Aggressive guess even when confidence is low</span>
sudo nmap -O --osscan-guess 192.168.1.10

<span class="cm"># Limit to hosts with ideal conditions (1 open + 1 closed)</span>
sudo nmap -O --osscan-limit 192.168.1.0/24</code></pre>

<h2>How OS Detection Works (TCP/IP Stack Fingerprinting)</h2>
<pre><code><span class="cm"># Nmap sends 16 different probe packets and analyzes responses:</span>
T1-T7   TCP probes to open + closed ports
         → ISN (Initial Sequence Number) generation pattern
         → TCP options (window size, order, timestamps)
         → RST response behavior

U1      UDP probe to closed port
         → ICMP unreachable message format

IE1-IE2 ICMP echo probes
         → Response to varying DF bit, TOS, code fields

<span class="cm"># Each target's responses create a fingerprint</span>
<span class="cm"># Fingerprint is compared against nmap-os-db (5,000+ entries)</span>
<span class="cm"># Best match = OS guess with confidence percentage</span></code></pre>

<h2>Reading OS Detection Output</h2>
<pre><code>$ sudo nmap -O 192.168.1.10

Device type: general purpose
Running: Linux 5.X
OS CPE: cpe:/o:linux:linux_kernel:5
OS details: Linux 5.4 - 5.11
Network Distance: 1 hop

<span class="cm"># Multiple candidates shown when confidence is split:</span>
Aggressive OS guesses: Linux 5.4 (97%), Linux 4.15 (94%)
No exact OS matches for host (If you know what OS it is,
  see https://nmap.org/submit/ )

<span class="cm"># CPE = Common Platform Enumeration — standard identifier</span>
<span class="cm"># cpe:/o: = operating system</span>
<span class="cm"># cpe:/a: = application</span>
<span class="cm"># cpe:/h: = hardware</span></code></pre>

<h2>OS Detection Limitations</h2>
<div class="table-wrap">
<table>
  <thead><tr><th>Limitation</th><th>Detail</th></tr></thead>
  <tbody>
    <tr><td>Requires open + closed port</td><td>If all ports filtered or all open, fingerprint is incomplete</td></tr>
    <tr><td>Firewalls alter probes</td><td>Stateful firewall may modify TCP options, breaking fingerprint</td></tr>
    <tr><td>NAT/load balancer</td><td>Fingerprints the NAT device or LB, not the backend host</td></tr>
    <tr><td>Virtualization</td><td>VMs may expose hypervisor TCP stack instead of guest OS</td></tr>
    <tr><td>OS hardening</td><td>Modified TCP stack parameters can confuse fingerprinting</td></tr>
    <tr><td>Low confidence</td><td>Unknown/unusual OS → broad range guess ("Linux 2.6.32 - 4.6")</td></tr>
  </tbody>
</table>
</div>

<h2>OS Detection Options</h2>
<div class="table-wrap">
<table>
  <thead><tr><th>Flag</th><th>Effect</th><th>When to Use</th></tr></thead>
  <tbody>
    <tr><td><code>--osscan-limit</code></td><td>Only OS-detect hosts with ideal conditions</td><td>Subnet scans — skip hosts likely to give bad results</td></tr>
    <tr><td><code>--osscan-guess</code></td><td>Print best guess even with low confidence</td><td>When any OS info is better than none</td></tr>
    <tr><td><code>--max-os-tries 1</code></td><td>Don't retry when conditions aren't ideal</td><td>Faster scans where OS accuracy is secondary</td></tr>
  </tbody>
</table>
</div>

<h2>OS Fingerprints — Common Results</h2>
<div class="table-wrap">
<table>
  <thead><tr><th>OS Details Output</th><th>Typical Indicator</th></tr></thead>
  <tbody>
    <tr><td>Linux 5.4 - 5.15</td><td>Ubuntu 20.04/22.04, Debian 11, modern distros</td></tr>
    <tr><td>Linux 4.15</td><td>Ubuntu 18.04</td></tr>
    <tr><td>Windows 10 1703 - 21H2</td><td>Modern Windows 10/11 workstation</td></tr>
    <tr><td>Windows Server 2019</td><td>Server 2019 / Windows 10 1809</td></tr>
    <tr><td>Cisco IOS 15.x</td><td>Cisco router or switch</td></tr>
    <tr><td>FreeBSD 12.x</td><td>pfSense firewall, FreeBSD server</td></tr>
    <tr><td>ESXi 6.x - 7.x</td><td>VMware hypervisor (management port)</td></tr>
  </tbody>
</table>
</div>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Core Concepts</summary>
  <div class="tier-body">
    <h4>Requirements and reading OS detection output</h4>
    <ul>
      <li>-O requires root/admin, at least one open TCP port, AND at least one closed TCP port — missing either means an incomplete L3/L4 fingerprint</li>
      <li>Confidence percentage matters: 95%+ is reliable; 85–95% is a reasonable guess; below 85% treat as an estimate only</li>
      <li>OS detection analyzes how the L3/L4 TCP/IP stack responds to unusual probes — each OS has a unique combination of ISN patterns, window behavior, and ICMP responses</li>
    </ul>
    <pre><code>sudo nmap -O 192.168.56.30  <span class="cm"># OS fingerprint the Windows 10 victim</span></code></pre>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — Deeper Skills</summary>
  <div class="tier-body">
    <h4>Combining -O with version detection for full host profiling</h4>
    <ul>
      <li>Pair <code>-sS -sV -O</code> for the most complete host profile: open ports + service versions + OS in a single scan</li>
      <li>Use <code>--osscan-limit</code> on subnets to skip hosts where OS detection conditions aren't met — saves significant scan time</li>
      <li>OS + service versions together reveal patch level: "Windows 10 1803 + SMBv1 open = potential EternalBlue exposure"</li>
    </ul>
    <pre><code>sudo nmap -sS -sV -O --osscan-limit 192.168.56.0/24
<span class="cm"># Full host profile on the lab subnet — skip hosts where OS detection won't work</span></code></pre>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Expert Techniques</summary>
  <div class="tier-body">
    <h4>NAT handling, low-confidence results, and topology inference</h4>
    <ul>
      <li>NAT devices and load balancers return their own OS fingerprint — always verify backend host OS through another channel (banner, SMB signing)</li>
      <li>Use <code>--osscan-guess</code> behind firewalls that alter TCP options — forces the best-available match even with a degraded fingerprint</li>
      <li>Combine with <code>--traceroute</code> to infer OS at each network hop — useful for mapping infrastructure topology from a single scan</li>
    </ul>
    <pre><code>sudo nmap -sS -sV -O --osscan-guess --traceroute -oA host_profile 192.168.56.30
<span class="cm"># Full host profile: ports + versions + best-effort OS + traceroute hops</span></code></pre>
  </div>
</details>
</article>
</template>

<template id="tpl-banner-grab">
<article class="topic">
<h1>04 · Banner Grabbing</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l4">L4 Transport</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">Banner grabbing establishes a L4 TCP connection then reads the initial L7 application-layer greeting string — this response text often contains product name, version number, and OS details without requiring authentication or further interaction.</span>
</div>
<hr class="divider">

<p>Service banners are text strings that many services send immediately upon connection, containing version information, hostname, and other identifying data. Banner grabbing is a quick way to confirm service identity and version without full version detection probes.</p>

<h2>Nmap Banner Grabbing with -sV</h2>
<pre><code><span class="cm"># -sV reads banners as part of version detection</span>
nmap -sV -p 21,22,25,110,143,3306 192.168.1.10

<span class="cm"># Use --script=banner for explicit banner reading</span>
nmap --script=banner 192.168.1.10

<span class="cm"># Banner script on specific ports</span>
nmap --script=banner -p 21,22,25,80,110 192.168.1.10</code></pre>

<h2>NSE Banner Script Output</h2>
<pre><code>$ nmap --script=banner -p 21,22,25,110,143 192.168.1.10

PORT    STATE SERVICE
21/tcp  open  ftp
| banner: 220 ProFTPD 1.3.5 Server (Debian) [::ffff:192.168.1.10]
22/tcp  open  ssh
| banner: SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6
25/tcp  open  smtp
| banner: 220 mail.corp.local ESMTP Postfix (Ubuntu)
110/tcp open  pop3
| banner: +OK Dovecot ready.
143/tcp open  imap
| banner: * OK [CAPABILITY IMAP4rev1 LITERAL+] Dovecot ready.

<span class="cm"># Banners reveal:  product name, version, OS, hostname</span>
<span class="cm"># ProFTPD 1.3.5 → check CVE database for known vulnerabilities</span></code></pre>

<h2>Manual Banner Grabbing — nc / telnet / openssl</h2>
<pre><code><span class="cm"># nc (netcat) — raw TCP banner grab</span>
nc -v 192.168.1.10 21          <span class="cm"># FTP</span>
nc -v 192.168.1.10 25          <span class="cm"># SMTP</span>
nc -v 192.168.1.10 110         <span class="cm"># POP3</span>

<span class="cm"># HTTP banner via nc</span>
echo -e "HEAD / HTTP/1.0\r\n\r\n" | nc 192.168.1.10 80

<span class="cm"># HTTPS / SSL banner via openssl</span>
openssl s_client -connect 192.168.1.10:443 2>/dev/null | head -20

<span class="cm"># SSH version fingerprint</span>
nc 192.168.1.10 22   <span class="cm"># reads banner then Ctrl+C</span>
<span class="cm"># Output: SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6</span>

<span class="cm"># SMTP EHLO command</span>
nc 192.168.1.10 25
EHLO test.local
<span class="cm"># Reveals: Postfix version, supported extensions, hostname</span></code></pre>

<h2>HTTP Server Headers</h2>
<pre><code><span class="cm"># Nmap http-server-header script</span>
nmap --script=http-server-header -p 80,443,8080,8443 192.168.1.10

<span class="cm"># Combined with title grab</span>
nmap --script=http-title,http-server-header -p 80,443 192.168.1.10

<span class="cm"># Sample output:</span>
80/tcp open  http
| http-server-header: Apache/2.4.52 (Ubuntu)
| http-title: Corporate Intranet — Login

443/tcp open  ssl/http
| http-server-header: nginx/1.18.0 (Ubuntu)
| http-title: Company VPN Portal</code></pre>

<h2>Identifying Vulnerable Versions from Banners</h2>
<div class="table-wrap">
<table>
  <thead><tr><th>Banner</th><th>Notable Vulnerability</th><th>CVE</th></tr></thead>
  <tbody>
    <tr><td>vsftpd 2.3.4</td><td>Backdoor — PASS :) triggers shell on port 6200</td><td>CVE-2011-2523</td></tr>
    <tr><td>OpenSSH &lt; 7.2p2</td><td>Username enumeration</td><td>CVE-2016-6210</td></tr>
    <tr><td>ProFTPD 1.3.3c</td><td>Backdoor in downloaded source</td><td>N/A</td></tr>
    <tr><td>Apache 2.4.49</td><td>Path traversal / RCE</td><td>CVE-2021-41773</td></tr>
    <tr><td>Apache 2.4.50</td><td>Path traversal bypass (incomplete fix)</td><td>CVE-2021-42013</td></tr>
    <tr><td>nginx &lt; 1.1.17</td><td>Chunked encoding memory corruption</td><td>CVE-2012-1180</td></tr>
    <tr><td>Postfix &lt; 3.6.14</td><td>SMTP smuggling</td><td>CVE-2023-51764</td></tr>
  </tbody>
</table>
</div>

<div class="callout note">Always cross-reference identified versions against the NVD (nvd.nist.gov), Exploit-DB (exploit-db.com), and the vendor's security advisories. Banner versions may be modified/suppressed by security-hardened deployments.</div>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Core Concepts</summary>
  <div class="tier-body">
    <h4>Reading service banners with Nmap and nc</h4>
    <ul>
      <li>Many services send a L7 greeting banner on connect — FTP, SSH, SMTP, POP3, and IMAP all do this automatically without authentication</li>
      <li><code>--script=banner</code> captures these L7 greetings and displays them next to the port — often faster than full -sV for quick version identification</li>
      <li>Match banner version strings directly against CVE databases — specific version numbers in banners map to searchable CVE entries</li>
    </ul>
    <pre><code>nmap --script=banner -p 21,22,25,80 192.168.56.20  <span class="cm"># Grab banners from Security Onion services</span></code></pre>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — Deeper Skills</summary>
  <div class="tier-body">
    <h4>HTTP headers and interactive L7 protocol probing</h4>
    <ul>
      <li>HTTP HEAD via nc retrieves L7 server headers without a full page request — reveals Server, X-Powered-By, and framework version headers</li>
      <li>SMTP EHLO response lists all supported extensions — reveals auth methods, relay config, and size limits for email security assessment</li>
      <li>Pair <code>--script=http-title,http-server-header,banner</code> for complete L7 web server profiling in one pass</li>
    </ul>
    <pre><code>echo -e "HEAD / HTTP/1.0\r\n\r\n" | nc 192.168.56.20 80
<span class="cm"># Manual L7 HTTP probe — reveals Server header and X-Powered-By</span>
nmap --script=http-title,http-server-header,banner -p 80,443 192.168.56.20</code></pre>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Expert Techniques</summary>
  <div class="tier-body">
    <h4>TLS certificate analysis and automated CVE correlation</h4>
    <ul>
      <li>openssl s_client reveals the full TLS certificate chain at L7 — CN and SAN fields often expose internal hostnames and service architecture</li>
      <li>Combine <code>--script=banner,vulners</code> to auto-lookup CVEs for every version string identified in a single Nmap pass</li>
      <li>Non-standard port banners are often unmodified — internal tools and custom apps frequently expose exact framework and library versions</li>
    </ul>
    <pre><code>openssl s_client -connect 192.168.56.20:443 2>/dev/null | openssl x509 -noout -text | grep -E "Subject:|DNS:"
nmap -sV --script=banner,vulners -p 22,80,443 192.168.56.20  <span class="cm"># Banner grab + auto CVE lookup</span></code></pre>
  </div>
</details>
</article>
</template>

<template id="tpl-aggressive">
<article class="topic">
<h1>05 · Aggressive Flag (-A)</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l3">L3 Network</span>
  <span class="osi-chip l4">L4 Transport</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">-A spans all three layers simultaneously: L3 OS fingerprinting via ICMP/TCP stack probes, L4 SYN port scanning, and L7 NSE script execution plus version banner reading — the most comprehensive single-flag option Nmap provides.</span>
</div>
<hr class="divider">

<div class="callout warn"><strong>-A is loud</strong> — it runs multiple scan types simultaneously and generates significantly more traffic than a simple port scan. Use only on networks/hosts where you have authorization and where IDS noise is acceptable.</div>

<h2>What -A Enables</h2>
<div class="table-wrap">
<table>
  <thead><tr><th>Component</th><th>Flag</th><th>Description</th></tr></thead>
  <tbody>
    <tr><td>Version detection</td><td><code>-sV</code></td><td>Probe open ports to identify service and version</td></tr>
    <tr><td>Default scripts</td><td><code>-sC</code></td><td>Run all NSE scripts in the "default" category</td></tr>
    <tr><td>OS detection</td><td><code>-O</code></td><td>TCP/IP stack fingerprinting</td></tr>
    <tr><td>Traceroute</td><td><code>--traceroute</code></td><td>Trace network path to target after scan</td></tr>
  </tbody>
</table>
</div>

<h2>Command</h2>
<pre><code><span class="cm"># Aggressive scan — equivalent to -sV -sC -O --traceroute</span>
sudo nmap -A 192.168.1.10

<span class="cm"># Common combination: specific ports + aggressive</span>
sudo nmap -A -p 22,80,443,3306,8080 192.168.1.10

<span class="cm"># All ports + aggressive (very comprehensive, very slow)</span>
sudo nmap -A -p- 192.168.1.10

<span class="cm"># Aggressive with timing (fast network)</span>
sudo nmap -A -T4 192.168.1.10</code></pre>

<h2>Example -A Output</h2>
<pre><code>$ sudo nmap -A -p 22,80,3306 192.168.1.10

PORT     STATE SERVICE VERSION
22/tcp   open  ssh     OpenSSH 8.9p1 Ubuntu 3ubuntu0.6
| ssh-hostkey:
|   3072 4e:c8:...:... (RSA)
|   256 7f:ab:...:... (ECDSA)
|_  256 5e:cd:...:... (ED25519)
80/tcp   open  http    Apache httpd 2.4.52 ((Ubuntu))
|_http-title: Login — Corporate Intranet
|_http-server-header: Apache/2.4.52 (Ubuntu)
| http-methods:
|_  Supported Methods: GET HEAD POST OPTIONS
3306/tcp open  mysql   MySQL 8.0.36
| mysql-info:
|   Protocol: 10
|   Version: 8.0.36
|   Thread ID: 48
|_  Status: Autocommit

Running: Linux 5.X
OS details: Linux 5.4 - 5.11

TRACEROUTE
HOP RTT     ADDRESS
1   1.02 ms 192.168.1.1
2   1.88 ms 192.168.1.10

<span class="cm"># NSE scripts auto-ran: ssh-hostkey, http-title, http-methods, mysql-info</span></code></pre>

<h2>-A vs Manual Combination</h2>
<pre><code><span class="cm"># These two commands are equivalent:</span>
sudo nmap -A 192.168.1.10

sudo nmap -sV -sC -O --traceroute 192.168.1.10

<span class="cm"># Advantage of explicit flags: can tune each component</span>
sudo nmap -sV --version-intensity 9 -sC -O --osscan-guess --traceroute 192.168.1.10
<span class="cm"># -A doesn't let you set version intensity or osscan-guess directly</span></code></pre>

<h2>When to Use -A</h2>
<div class="table-wrap">
<table>
  <thead><tr><th>Situation</th><th>Use -A?</th><th>Reason</th></tr></thead>
  <tbody>
    <tr><td>CTF enumeration</td><td>Yes</td><td>Fast comprehensive info on single target</td></tr>
    <tr><td>Pentest initial recon (single host)</td><td>Yes</td><td>Gets OS + services + scripts in one shot</td></tr>
    <tr><td>Pentest — need stealth</td><td>No</td><td>Use -sS -sV separately; skip -sC and -O</td></tr>
    <tr><td>Large subnet scan</td><td>No</td><td>Too slow and noisy; run -sn first then -sV on targets</td></tr>
    <tr><td>SOC: verify firewall exposure</td><td>No</td><td>Use -sA or targeted -sS -p; no need for full -A</td></tr>
    <tr><td>Vulnerability assessment (single server)</td><td>Yes with --script=vuln</td><td>Add vuln scripts: <code>nmap -A --script=vuln target</code></td></tr>
  </tbody>
</table>
</div>

<h2>Reducing -A Noise</h2>
<pre><code><span class="cm"># Skip OS detection if not needed (reduces probes)</span>
nmap -sV -sC --traceroute 192.168.1.10   <span class="cm"># no -O</span>

<span class="cm"># Skip traceroute (removes ICMP TTL probes)</span>
nmap -sV -sC -O 192.168.1.10

<span class="cm"># Lower version intensity for faster scan</span>
nmap -sV --version-light -sC 192.168.1.10

<span class="cm"># Run only specific default scripts instead of all</span>
nmap -sV --script=http-title,ssh-hostkey,banner 192.168.1.10</code></pre>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Core Concepts</summary>
  <div class="tier-body">
    <h4>When to use -A and when to avoid it</h4>
    <ul>
      <li>-A enables four scan types at once: <code>-sV</code> (version), <code>-sC</code> (default scripts), <code>-O</code> (OS fingerprint), <code>--traceroute</code></li>
      <li>Perfect for CTF and lab environments — gives a complete L3/L4/L7 picture of a single target in one command</li>
      <li>Never use on production networks without authorization — NSE scripts actively interact with services and generate significant additional traffic</li>
    </ul>
    <pre><code>sudo nmap -A 192.168.56.30  <span class="cm"># Full aggressive scan on Windows victim — lab use only</span></code></pre>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — Deeper Skills</summary>
  <div class="tier-body">
    <h4>-A vs explicit flags — knowing when to separate components</h4>
    <ul>
      <li>-A doesn't expose individual tuning options — use explicit <code>-sV --version-intensity 9</code> when default version coverage misses a service</li>
      <li>Add <code>-T4</code> with -A on lab or fast local networks — speeds timing without missing results on low-latency segments</li>
      <li>Run -A on confirmed interesting hosts after an initial sweep — never run -A across an entire subnet</li>
    </ul>
    <pre><code>sudo nmap -A -T4 -p 22,80,443,3389,445 192.168.56.30  <span class="cm"># Aggressive on key Windows ports</span>
sudo nmap -sV --version-intensity 9 -sC -O --osscan-guess 192.168.56.30  <span class="cm"># Same but fully tunable</span></code></pre>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Expert Techniques</summary>
  <div class="tier-body">
    <h4>Extending -A with vulnerability scripts and output integration</h4>
    <ul>
      <li>Extend -A with <code>--script=vuln</code> to run all vulnerability-checking NSE scripts alongside the default set — adds active CVE probing per service</li>
      <li>For quiet authorized engagements: split -A into components — run <code>-sV</code> first to identify services, then only relevant named scripts</li>
      <li>Combine with <code>-oX</code> for import into vulnerability management platforms — Metasploit db_import, OpenVAS, and Nessus all accept Nmap XML</li>
    </ul>
    <pre><code>sudo nmap -A --script=vuln -p 80,443,445,3389 -oA aggressive_vuln 192.168.56.30
<span class="cm"># -A + all vuln scripts on key Windows attack surface — active CVE checks per service</span></code></pre>
  </div>
</details>
</article>
