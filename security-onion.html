    <tr><td><code>so-elastic-info</code></td><td>Show index sizes and document counts</td></tr>
  </tbody>
</table>
</div>

<h2>Status &amp; Health Checks</h2>
<pre><code><span class="cm"># Full status — start here at the beginning of every shift</span>
sudo so-status

<span class="cm"># Show only non-running services (highlight problems)</span>
sudo so-status | grep -v running

<span class="cm"># Check disk — PCAP ring buffer can fill up quickly</span>
df -h /nsm &amp;&amp; du -sh /nsm/stenographer/ &amp;&amp; du -sh /nsm/zeek/

<span class="cm"># Tail Suricata container logs (real-time alert stream)</span>
sudo docker logs so-suricata --tail 50 -f

<span class="cm"># Verify traffic IS being captured on monitoring interface</span>
sudo so-tcpdump -i eth1 -n -c 5              <span class="cm"># 5 packets then stop</span>
sudo so-tcpdump -i eth1 -n "host 192.168.56.10" -c 10  <span class="cm"># Filter to Kali only</span>
sudo so-tcpdump -i eth1 -n "port 80" -c 20   <span class="cm"># HTTP traffic only</span></code></pre>

<h2>Rule Management Workflow</h2>
<pre><code><span class="cm"># Full pipeline: update → test syntax → reload (all in one)</span>
sudo so-rule-update &amp;&amp; \
  sudo suricata -T -c /opt/so/conf/suricata/suricata.yaml &amp;&amp; \
  sudo so-suricata-reload

<span class="cm"># Add a quick custom rule inline and immediately apply</span>
echo 'alert tcp 192.168.56.10 any -&gt; $HOME_NET any (msg:"LOCAL Test"; flags:S,12; sid:9000099; rev:1;)' | \
  sudo tee -a /opt/so/conf/suricata/rules/local.rules &amp;&amp; \
  sudo suricata -T -c /opt/so/conf/suricata/suricata.yaml &amp;&amp; \
  sudo so-suricata-reload

<span class="cm"># Find a specific rule by SID</span>
grep -r "sid:2010937" /opt/so/rules/

<span class="cm"># Count total loaded rules</span>
sudo docker exec so-suricata cat /var/log/suricata/suricata.log | grep "rules loaded"</code></pre>

<h2>PCAP &amp; Offline Analysis</h2>
<pre><code><span class="cm"># Import a PCAP → SO processes it → alerts appear in /alerts within 1–2 min</span>
sudo so-import-pcap /tmp/suspicious_capture.pcap

<span class="cm"># Watch Suricata process the imported PCAP in real time</span>
sudo so-import-pcap /tmp/malware.pcap &amp;
sleep 5 &amp;&amp; sudo docker logs so-suricata --tail 20

<span class="cm"># Retrieve PCAP from Stenographer by source IP + time</span>
sudo so-pcap \
  --src-ip 192.168.56.10 \
  --dst-ip 192.168.56.30 \
  --start-time "2024-01-15 14:00:00" \
  --end-time "2024-01-15 14:15:00" \
  --output /tmp/incident.pcap

<span class="cm"># Confirm PCAP content before opening in Wireshark</span>
sudo tcpdump -r /tmp/incident.pcap -nn -q | wc -l    <span class="cm"># Packet count</span>
sudo tcpdump -r /tmp/incident.pcap -nn | head -20    <span class="cm"># First 20 packets</span></code></pre>

<h2>Useful Command Combinations</h2>
<pre><code"><span class="cm"># Quick-start: status + show any problems + disk check</span>
sudo so-status &amp;&amp; echo "=== Disk ===" &amp;&amp; df -h /nsm

<span class="cm"># Top 10 talkers from today's conn.log (who's sending the most data?)</span>
zeek-cut id.orig_h id.resp_h id.resp_p orig_bytes resp_bytes \
  &lt; /nsm/zeek/logs/current/conn.log | \
  awk '{sum[$1" "$2" "$3] += $4+$5} END {for(k in sum) print sum[k],k}' | \
  sort -rn | head -10

<span class="cm"># Count port scan activity: how many S0 connections from Kali today?</span>
zeek-cut id.orig_h conn_state \
  &lt; /nsm/zeek/logs/current/conn.log | \
  awk '$1=="192.168.56.10" &amp;&amp; $2=="S0"' | wc -l

<span class="cm"># Find all alerts from the last hour in Suricata fast.log</span>
sudo docker exec so-suricata grep "$(date -d '1 hour ago' '+%m/%d/%Y-%H')" \
  /var/log/suricata/fast.log | tail -30

<span class="cm"># Docker status overview</span>
sudo docker ps --format "table {{.Names}}\t{{.Status}}"</code></pre>

<article class="topic">
<h1>11 · Security Onion — Investigation Lab</h1>
<hr class="divider">

<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l3">L3 Network</span>
  <span class="osi-chip l4">L4 Transport</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">This lab exercises all three analyst-relevant OSI layers: L3 (IP addresses in alerts), L4 (port scanning at transport layer), and L7 (HTTP requests, DNS queries, application protocol detection).</span>
</div>

<h2>Lab Environment</h2>
<div class="table-wrap">
<table>
  <thead><tr><th>VM</th><th>Role</th><th>IP</th><th>Notes</th></tr></thead>
  <tbody>
    <tr><td><strong>Security Onion</strong></td><td>Monitor / SOC</td><td>192.168.56.20 (eth0)</td><td>eth1 = monitoring, no IP, promiscuous, same network as Kali &amp; Windows</td></tr>
    <tr><td><strong>Kali Linux</strong></td><td>Attacker</td><td>192.168.56.10</td><td>Runs nmap, curl, smbclient to generate detectable attack traffic</td></tr>
    <tr><td><strong>Windows 10</strong></td><td>Victim / Target</td><td>192.168.56.30</td><td>Web server (IIS/Apache) on port 80; SMB enabled</td></tr>
  </tbody>
</table>
</div>
<div class="callout lab"><strong>Goal:</strong> Generate realistic attacker traffic from Kali, observe SO detecting it in real time, triage alerts, pivot to Hunt + PCAP, and document the full incident in a Case.</div>

<h2>Phase 1 — Generate Attack Traffic (from Kali)</h2>
<pre><code><span class="cm">## Run on Kali (192.168.56.10) ##</span>

<span class="cm"># Step 1: Host discovery — confirm which IPs are live</span>
nmap -sn 192.168.56.0/24
<span class="cm"># Expected live: .1 (host), .20 (SO), .30 (Windows)</span>

<span class="cm"># Step 2: SYN port scan of Windows — fast, stealthier than full connect</span>
nmap -sS -p 1-1024 --open 192.168.56.30
<span class="cm"># -sS = SYN scan (half-open, doesn't complete handshake)</span>
<span class="cm"># -p 1-1024 = first 1024 ports</span>
<span class="cm"># --open = only show open (responding) ports</span>

<span class="cm"># Step 3: Service + version detection on found ports (more noise)</span>
nmap -sV -sC -p 80,139,445,3389 192.168.56.30
<span class="cm"># -sV = detect service versions (banner grabbing)</span>
<span class="cm"># -sC = run default NSE scripts (http-title, smb-os-discovery, etc.)</span>
<span class="cm"># Combines version detection + scripting in one scan</span>

<span class="cm"># Step 4: Aggressive scan — OS + version + scripts + traceroute</span>
nmap -A -p 80,445 192.168.56.30
<span class="cm"># -A = everything: OS detection, version, scripts, traceroute</span>
<span class="cm"># More noisy but most comprehensive output</span>

<span class="cm"># Step 5: HTTP web requests (simulating attacker browsing the target)</span>
curl -v http://192.168.56.30/
curl -A "python-requests/2.28.0" http://192.168.56.30/admin

<span class="cm"># Step 6: Directory brute force simulation</span>
for path in admin login wp-admin backup config shell cmd.php .env; do
  code=$(curl -o /dev/null -s -w "%{http_code}" http://192.168.56.30/$path)
  echo "$code  http://192.168.56.30/$path"
done

<span class="cm"># Step 7: SMB enumeration probe</span>
smbclient -L //192.168.56.30 -N
enum4linux -a 192.168.56.30   <span class="cm"># More thorough SMB/RPC enumeration</span>

<span class="cm"># Step 8: Efficient combined workflow (discover → scan found hosts)</span>
nmap -sn 192.168.56.0/24 -oG - | \
  awk '/Up$/{print $2}' | \
  xargs -I {} nmap -sS -sV -p 22,80,443,445,3389 --open {}</code></pre>

<h2>Phase 2 — Triage Alerts in SO (/alerts)</h2>
<pre><code><span class="cm">## Browser → https://192.168.56.20/alerts ##</span>

Alerts you should see firing:
  - ET SCAN Nmap Scripting Engine User-Agent Detected
  - ET SCAN Suspicious inbound to MSSQL port (or similar scan rules)
  - ET SCAN Nmap -sV scan detected
  - ET POLICY SMB Traffic Detected
  - ET SCAN Aggressive Web Scan Detected

Triage steps:
  1. Filter: status: new
  2. Sort: @timestamp ascending (see the attack timeline unfold)
  3. Click the first Nmap scan alert
     - Note: source.ip = 192.168.56.10 (Kali)
     - Note: destination.ip = 192.168.56.30 (Windows)
     - Copy the network.community_id value
  4. Click "Hunt" button on the alert</code></pre>

<h2>Phase 3 — Hunt Queries</h2>
<pre><code><span class="cm">## https://192.168.56.20/hunt ##</span>

<span class="cm"># Q1: All traffic from Kali — see attack scope</span>
source.ip: "192.168.56.10" AND destination.ip: "192.168.56.30"

<span class="cm"># Q2: Scan evidence — S0 = no reply (closed/filtered ports)</span>
source.ip: "192.168.56.10" AND zeek.conn.conn_state: "S0"
<span class="cm"># → High count = confirmed port scan</span>

<span class="cm"># Q3: Open ports — SF = connection completed</span>
source.ip: "192.168.56.10" AND destination.ip: "192.168.56.30" AND zeek.conn.conn_state: "SF"
<span class="cm"># → Look at zeek.conn.service field — http? smb? microsoft-ds?</span>

<span class="cm"># Q4: HTTP requests — web attack evidence</span>
source.ip: "192.168.56.10" AND event.dataset: "zeek.http"
<span class="cm"># → Expand entries → see zeek.http.uri and zeek.http.user_agent</span>
<span class="cm"># → Should see python-requests UA and /admin /cmd paths</span>

<span class="cm"># Q5: 404 responses — dir brute force confirmation</span>
source.ip: "192.168.56.10" AND zeek.http.status_code: 404

<span class="cm"># Q6: SMB activity</span>
source.ip: "192.168.56.10" AND event.dataset: "zeek.smb_mapping"

<span class="cm"># Q7: Pivot from community_id to see same connection in all log types</span>
network.community_id: "&lt;paste the ID from the alert&gt;"</code></pre>

<h2>Phase 4 — Retrieve &amp; Analyze PCAP</h2>
<pre><code><span class="cm">## https://192.168.56.20/pcap ##</span>

Fill in:
  Source IP:   192.168.56.10
  Dest IP:     192.168.56.30
  Time range:  [window when you ran the attack]
Click "Get PCAP" → download investigation.pcap

<span class="cm">## Open in Wireshark ##</span>

<span class="cm"># 1. Protocol Hierarchy (Statistics menu)</span>
<span class="cm">#    See how much is TCP, HTTP, SMB, ICMP</span>

<span class="cm"># 2. Confirm port scan — many SYNs, mostly RSTs back</span>
tcp.flags == 0x002
<span class="cm">#    Many different destination ports = SYN scan confirmed</span>

<span class="cm"># 3. Find open ports — these ports answered with SYN-ACK</span>
tcp.flags.syn == 1 &amp;&amp; tcp.flags.ack == 1
<span class="cm">#    Note destination ports — these are the open ones</span>

<span class="cm"># 4. HTTP — right-click any HTTP packet → Follow → TCP Stream</span>
http &amp;&amp; ip.src == 192.168.56.10
<span class="cm">#    See GET requests, python-requests user agent, server responses</span>

<span class="cm"># 5. Conversations (Statistics menu) → TCP</span>
<span class="cm">#    Sort by Bytes → biggest transfers</span>
<span class="cm">#    Sort by Packets → most active connections</span>

<span class="cm"># tshark quick-analysis from command line</span>
tshark -r investigation.pcap -q -z "conv,tcp" 2&gt;/dev/null | head -20
tshark -r investigation.pcap -T fields -e ip.dst -e tcp.dstport \
  -Y "tcp.flags.syn==1 &amp;&amp; tcp.flags.ack==0" 2&gt;/dev/null | \
  sort -t$'\t' -k2 -n | uniq                     <span class="cm"># All scanned ports</span></code></pre>
