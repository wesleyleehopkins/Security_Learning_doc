<template id="tpl-containment-decision">
<article class="topic">
<h1>08 · Containment Decision</h1>
<hr class="divider">

<p>Containment is the most time-sensitive phase of incident response. The decision to isolate must balance evidence preservation, business continuity, and stopping the attack. Getting containment wrong — either too slow or too reckless — can be the difference between a contained incident and a catastrophic breach.</p>

<h3>Escalation Triggers Requiring Immediate Containment</h3>
<p>If ANY of the following are confirmed, containment is mandatory — do not wait for full scope before acting:</p>

<div class="table-wrap"><table>
  <thead><tr><th>Trigger</th><th>Why It Is Critical</th><th>Risk If Delayed</th><th>Detection Query</th></tr></thead>
  <tbody>
    <tr>
      <td><strong>Domain Controller compromised</strong></td>
      <td>DC controls all authentication — attacker with DC access owns the entire domain</td>
      <td>Golden Ticket creation, mass credential theft, GPO weaponization, domain-wide ransomware deployment</td>
      <td><code>event.dataset: zeek.kerberos AND source.ip: [compromised_host] AND destination.ip: [DC_IP]</code></td>
    </tr>
    <tr>
      <td><strong>Kerberos TGT obtained</strong></td>
      <td>TGT = the attacker can request service tickets for any service as the compromised user</td>
      <td>Lateral movement to any system the user has access to; if the user is a domain admin, full domain compromise</td>
      <td><code>event.dataset: zeek.kerberos AND zeek.kerberos.request_type: AS AND source.ip: [compromised_host]</code></td>
    </tr>
    <tr>
      <td><strong>Multi-host C2</strong></td>
      <td>Multiple hosts beaconing to the same C2 = attacker has established redundant access</td>
      <td>Isolating one host while others remain active gives the attacker time to pivot further and establish new persistence</td>
      <td><code>destination.ip: [C2_IP] | stats dc(source.ip) as affected_hosts</code></td>
    </tr>
    <tr>
      <td><strong>Credential/hash exfiltration</strong></td>
      <td>NTLM hashes, SAM database, or LSASS dumps being sent externally</td>
      <td>Pass-the-hash, offline cracking, credential stuffing against other systems</td>
      <td><code>event.code: 10 AND winlog.event_data.TargetImage: *\\lsass.exe</code></td>
    </tr>
    <tr>
      <td><strong>Self-propagating malware</strong></td>
      <td>Worm-like behavior — malware spreading without human operator involvement</td>
      <td>Exponential spread through the network — minutes matter</td>
      <td><code>event.dataset: zeek.dce_rpc AND zeek.dce_rpc.endpoint: svcctl AND source.ip: [compromised_host]</code></td>
    </tr>
    <tr>
      <td><strong>Human operator present</strong></td>
      <td>Interactive commands (not automated) = attacker is actively working in the environment</td>
      <td>Operator can respond to your containment actions in real-time, escalate, deploy ransomware, or destroy evidence</td>
      <td>Look for: interactive cmd/powershell, varying command timing, exploratory commands (whoami, net user, ipconfig)</td>
    </tr>
  </tbody>
</table></div>

<h3>Isolation Priority Order</h3>
<p>When multiple hosts need containment, isolate in this order:</p>

<div class="table-wrap"><table>
  <thead><tr><th>Priority</th><th>Target</th><th>Reason</th></tr></thead>
  <tbody>
    <tr><td><strong>1 — HIGHEST</strong></td><td>Domain Controller</td><td>Prevents Golden Ticket creation, GPO abuse, and domain-wide credential access. Every minute a compromised DC is online increases blast radius exponentially.</td></tr>
    <tr><td><strong>2</strong></td><td>Hosts with active C2</td><td>Cut the attacker's communication channel — they cannot issue commands or exfiltrate data without C2 connectivity.</td></tr>
    <tr><td><strong>3</strong></td><td>Hosts with lateral movement evidence</td><td>Hosts that have been used to access other systems may still have active sessions or cached credentials.</td></tr>
    <tr><td><strong>4</strong></td><td>Hosts with persistence mechanisms</td><td>Even after C2 is cut, persistence ensures the attacker can return. Isolate these before cleanup to prevent re-infection.</td></tr>
    <tr><td><strong>5</strong></td><td>Hosts at risk (accessible by compromised accounts)</td><td>Systems the compromised user account has access to — preemptive isolation or enhanced monitoring.</td></tr>
  </tbody>
</table></div>

<h3>Pre-Isolation Evidence Capture</h3>
<div class="callout warn"><strong>CRITICAL: Capture volatile evidence BEFORE isolation.</strong> Once a host is isolated or powered off, you lose RAM contents, active network connections, running processes, and logged-in sessions. These are often the most valuable forensic artifacts.</div>

<p>Capture these artifacts in order (fastest to capture first, most volatile first):</p>

<div class="table-wrap"><table>
  <thead><tr><th>Order</th><th>Artifact</th><th>Tool / Command</th><th>Why</th><th>Time to Capture</th></tr></thead>
  <tbody>
    <tr>
      <td><strong>1</strong></td>
      <td>Network connections</td>
      <td><code>netstat -anob > C:\evidence\netstat_%COMPUTERNAME%.txt</code></td>
      <td>Active C2 connections, listening ports, associated PIDs</td>
      <td>~5 seconds</td>
    </tr>
    <tr>
      <td><strong>2</strong></td>
      <td>Running processes</td>
      <td><code>tasklist /v /fo csv > C:\evidence\processes_%COMPUTERNAME%.csv</code></td>
      <td>Full process list with PIDs, memory usage, user context</td>
      <td>~5 seconds</td>
    </tr>
    <tr>
      <td><strong>3</strong></td>
      <td>DNS cache</td>
      <td><code>ipconfig /displaydns > C:\evidence\dns_%COMPUTERNAME%.txt</code></td>
      <td>Recently resolved domains — may reveal C2 or staging infrastructure</td>
      <td>~3 seconds</td>
    </tr>
    <tr>
      <td><strong>4</strong></td>
      <td>Logged-in users</td>
      <td><code>query user > C:\evidence\users_%COMPUTERNAME%.txt</code></td>
      <td>Who is logged in — identifies compromised sessions</td>
      <td>~2 seconds</td>
    </tr>
    <tr>
      <td><strong>5</strong></td>
      <td>Scheduled tasks</td>
      <td><code>schtasks /query /fo csv /v > C:\evidence\tasks_%COMPUTERNAME%.csv</code></td>
      <td>Persistence mechanisms — malware often uses scheduled tasks</td>
      <td>~10 seconds</td>
    </tr>
    <tr>
      <td><strong>6</strong></td>
      <td>Registry Run keys</td>
      <td><code>reg query HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Run > C:\evidence\run_%COMPUTERNAME%.txt</code></td>
      <td>Persistence mechanisms — auto-start entries</td>
      <td>~5 seconds</td>
    </tr>
    <tr>
      <td><strong>7</strong></td>
      <td>RAM dump</td>
      <td><code>winpmem_mini_x64.exe C:\evidence\memdump_%COMPUTERNAME%.raw</code><br>or Velociraptor: <code>Windows.Memory.Acquisition</code></td>
      <td>In-memory malware, decrypted C2 configs, credentials, process hollowing evidence</td>
      <td>5-30 minutes depending on RAM size</td>
    </tr>
    <tr>
      <td><strong>8</strong></td>
      <td>Event log export</td>
      <td><code>wevtutil epl Security C:\evidence\security.evtx</code><br><code>wevtutil epl System C:\evidence\system.evtx</code><br><code>wevtutil epl "Microsoft-Windows-Sysmon/Operational" C:\evidence\sysmon.evtx</code></td>
      <td>Historical log data that may not be in SIEM — covers gaps in log forwarding</td>
      <td>1-5 minutes</td>
    </tr>
    <tr>
      <td><strong>9</strong></td>
      <td>VM snapshot (if virtual)</td>
      <td><code>VBoxManage snapshot "VM_NAME" take "pre-isolation"</code></td>
      <td>Complete system state for later forensic analysis — can be restored and re-examined</td>
      <td>1-5 minutes</td>
    </tr>
  </tbody>
</table></div>

<h3>Rapid Capture Script</h3>
<pre><code><span class="cm">:: Pre-Isolation Evidence Capture Script</span>
<span class="cm">:: Run as Administrator BEFORE isolating the host</span>

@echo off
set EVIDENCE=C:\evidence\%COMPUTERNAME%_%DATE:~-4%%DATE:~4,2%%DATE:~7,2%
mkdir %EVIDENCE% 2>nul

echo [*] Capturing network connections...
netstat -anob > %EVIDENCE%\netstat.txt

echo [*] Capturing process list...
tasklist /v /fo csv > %EVIDENCE%\processes.csv

echo [*] Capturing DNS cache...
ipconfig /displaydns > %EVIDENCE%\dnscache.txt

echo [*] Capturing logged-in users...
query user > %EVIDENCE%\users.txt 2>nul

echo [*] Capturing scheduled tasks...
schtasks /query /fo csv /v > %EVIDENCE%\tasks.csv

echo [*] Capturing Run keys...
reg query HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Run > %EVIDENCE%\runkeys.txt
reg query HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Run >> %EVIDENCE%\runkeys.txt 2>nul

echo [*] Capturing Autoruns...
reg query HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\RunOnce >> %EVIDENCE%\runkeys.txt 2>nul
reg query "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon" /v Shell >> %EVIDENCE%\runkeys.txt 2>nul
reg query "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon" /v Userinit >> %EVIDENCE%\runkeys.txt 2>nul

echo [*] Exporting event logs...
wevtutil epl Security %EVIDENCE%\security.evtx
wevtutil epl System %EVIDENCE%\system.evtx
wevtutil epl "Microsoft-Windows-Sysmon/Operational" %EVIDENCE%\sysmon.evtx 2>nul

echo [*] Capturing ARP table...
arp -a > %EVIDENCE%\arp.txt

echo [*] Capturing routing table...
route print > %EVIDENCE%\routes.txt

echo [*] Done. Evidence saved to %EVIDENCE%
echo [!] Proceed with network isolation.</code></pre>

<h3>Business Justification Framework</h3>
<p>Containment disrupts business operations. Use this framework to justify the decision to management:</p>

<div class="table-wrap"><table>
  <thead><tr><th>Factor</th><th>Question to Answer</th><th>How to Document</th></tr></thead>
  <tbody>
    <tr><td><strong>Threat severity</strong></td><td>What is the worst-case outcome if we do NOT contain?</td><td>"If the DC remains online, the attacker can create Golden Tickets providing permanent, undetectable domain access."</td></tr>
    <tr><td><strong>Blast radius</strong></td><td>How many systems and users are at risk?</td><td>"Currently 2 hosts confirmed compromised. Domain Controller at risk = all 500 domain-joined systems potentially affected."</td></tr>
    <tr><td><strong>Data at risk</strong></td><td>What sensitive data could be exfiltrated or destroyed?</td><td>"Active Directory database contains all user credentials. Financial share on FILE01 accessible by compromised account."</td></tr>
    <tr><td><strong>Business impact of containment</strong></td><td>What services will be disrupted by isolation?</td><td>"DC isolation: all authentication pauses for ~30 minutes during failover to backup DC. Host isolation: 2 users lose workstation access."</td></tr>
    <tr><td><strong>Business impact of NOT containing</strong></td><td>What services will be disrupted if the attack continues?</td><td>"Ransomware deployment would take down all 500 systems. Recovery time: 2-4 weeks. Estimated cost: $2M+ in downtime and recovery."</td></tr>
    <tr><td><strong>Recommended action</strong></td><td>Clear, specific containment plan with timeline</td><td>"Isolate DC immediately (risk exceeds business disruption). Fail over to backup DC. Isolate .129 and .130. Begin eradication within 2 hours."</td></tr>
  </tbody>
</table></div>

<div class="callout lab"><strong>Worked Example — ACMEONIONS Containment Decision (IR-2026-0309-001)</strong>

<p><strong>Situation Assessment:</strong></p>
<ul>
  <li>192.168.56.129 — confirmed Revenge-RAT C2 to 166.184.36.101:4334</li>
  <li>192.168.56.130 — confirmed Revenge-RAT C2 to same C2 server</li>
  <li>Domain SID <strong>S-1-5-21-869875619-656814776-2141018233</strong> exposed via LDAP enumeration from .130</li>
  <li>Kerberos TGT for <strong>jaya.kearney</strong> obtained from .130 → DC</li>
  <li>Active C2 beaconing ongoing — attacker can issue commands at any time</li>
</ul>

<p><strong>Escalation triggers present:</strong></p>
<div class="table-wrap"><table>
  <thead><tr><th>Trigger</th><th>Status</th><th>Evidence</th></tr></thead>
  <tbody>
    <tr><td>DC compromised</td><td>AT RISK</td><td>Attacker has domain user credentials + domain SID = prerequisites for Golden Ticket</td></tr>
    <tr><td>Kerberos TGT obtained</td><td>CONFIRMED</td><td>zeek.kerberos shows AS request from .130 for jaya.kearney</td></tr>
    <tr><td>Multi-host C2</td><td>CONFIRMED</td><td>Both .129 and .130 beaconing to 166.184.36.101</td></tr>
    <tr><td>Human operator present</td><td>POSSIBLE</td><td>LDAP enumeration suggests reconnaissance beyond automated malware</td></tr>
  </tbody>
</table></div>

<p><strong>Isolation priority executed:</strong></p>
<ol>
  <li><strong>Priority 1 — Domain Controller:</strong> Isolate DC first — KRBTGT double reset required. Evidence captured: RAM dump, AD database backup, event logs exported</li>
  <li><strong>Priority 2 — 192.168.56.129:</strong> Active C2 host. Pre-isolation: netstat confirmed 166.184.36.101:4334 active, process list captured svchost.exe PID 4892 from Temp directory</li>
  <li><strong>Priority 3 — 192.168.56.130:</strong> Second C2 host + Kerberos abuse source. Pre-isolation: captured same evidence set, confirmed Revenge-RAT in same path</li>
</ol>

<p><strong>Business justification provided to management:</strong></p>
<pre><code>INCIDENT: IR-2026-0309-001 — Active Revenge-RAT compromise with domain credential theft
THREAT: Attacker has obtained domain user TGT and domain SID — Golden Ticket attack imminent
RISK:   If DC is not isolated, attacker can forge authentication tickets for ANY domain account
        including Domain Admin — total domain compromise within minutes
ACTION: Isolate DC immediately (risk exceeds business disruption)
        Fail over to backup DC (est. 30min auth disruption)
        Isolate .129 and .130 (2 users lose workstation access)
COST OF INACTION: Full domain compromise, potential ransomware deployment affecting all 500 systems
APPROVED BY: [SOC Manager] at 17:10 UTC</code></pre>
</div>
