<!-- 01 PICERL FRAMEWORK -->

<template id="tpl-picerl-overview">
<article class="topic">
<h1>01 · PICERL Framework</h1>
<hr class="divider">

<p>PICERL is the six-phase incident response lifecycle defined by NIST SP 800-61. Every SOC investigation maps to these phases — knowing where you are in the cycle determines what actions are appropriate and what documentation is required.</p>

<div class="callout note"><strong>PICERL is not linear.</strong> Containment frequently loops back to Identification when new compromised hosts are discovered. Eradication may reveal artifacts that restart the Identification cycle. Treat PICERL as a spiral, not a waterfall.</div>

<h3>The Six Phases</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Phase</th><th>What It Means</th><th>What the Analyst Does</th><th>Tools Used</th><th>Documentation Produced</th><th>Common Mistakes</th></tr></thead>
  <tbody>
    <tr>
      <td><strong>1. Preparation</strong></td>
      <td>Build capability to detect and respond before incidents occur</td>
      <td>Deploy sensors, tune rules, build playbooks, verify log ingestion, test alert pipelines, maintain asset inventory</td>
      <td>Security Onion, Splunk/ELK, Suricata, Sigma, YARA, Velociraptor, MISP</td>
      <td>Runbooks, escalation matrices, contact lists, network diagrams, baseline configurations</td>
      <td>Skipping tabletop exercises; not testing detection rules against real TTPs; stale contact lists; no fetch limit policy</td>
    </tr>
    <tr>
      <td><strong>2. Identification</strong></td>
      <td>Detect that an incident is occurring and determine its scope</td>
      <td>Triage alerts, validate true/false positives, pivot on IOCs, hunt for lateral movement, establish timeline, identify all affected hosts</td>
      <td>Hunt queries, Zeek logs, Sysmon, PCAP analysis, VirusTotal, Community ID pivots</td>
      <td>Alert triage notes, IOC list, affected host inventory, initial timeline, severity classification</td>
      <td>Low fetch limits hiding scope; not pivoting to related hosts; declaring scope too early; missing C2 on secondary hosts</td>
    </tr>
    <tr>
      <td><strong>3. Containment</strong></td>
      <td>Stop the bleeding — prevent further damage while preserving evidence</td>
      <td>Network isolation, firewall blocks, disable compromised accounts, DNS sinkhole C2 domains, snapshot VMs before changes</td>
      <td>Firewall/ACLs, EDR isolation, AD account disable, DNS sinkhole, VM snapshots</td>
      <td>Containment actions log (what, when, who approved), evidence preservation chain, business impact assessment</td>
      <td>Isolating before capturing volatile evidence; alerting the attacker by partial containment; not isolating the DC when domain credentials are compromised</td>
    </tr>
    <tr>
      <td><strong>4. Eradication</strong></td>
      <td>Remove the threat actor's presence from the environment completely</td>
      <td>Delete malware, remove persistence mechanisms (scheduled tasks, registry keys, services), reset compromised credentials, KRBTGT double reset if domain compromised, patch exploited vulnerabilities</td>
      <td>Autoruns, Velociraptor, PowerShell, Group Policy, LAPS, patch management</td>
      <td>Eradication checklist per host, credential reset log, persistence mechanism inventory, patch verification</td>
      <td>Missing persistence mechanisms; single KRBTGT reset instead of double; not checking all hosts for the same malware; not auditing scheduled tasks across domain</td>
    </tr>
    <tr>
      <td><strong>5. Recovery</strong></td>
      <td>Restore systems to normal operation and verify the threat is eliminated</td>
      <td>Reconnect isolated hosts, restore from clean backups, monitor for re-infection 24-48 hours, validate business services, increase logging temporarily</td>
      <td>Monitoring dashboards, enhanced Suricata rules, Zeek connection logs, Sysmon process creation alerts</td>
      <td>Recovery timeline, monitoring plan, sign-off from system owners, service validation checklist</td>
      <td>Rushing reconnection without monitoring period; not creating enhanced detection rules for the specific threat; declaring recovery before 24-48hr observation window</td>
    </tr>
    <tr>
      <td><strong>6. Lessons Learned</strong></td>
      <td>Improve defenses and processes based on what happened</td>
      <td>Conduct post-incident review within 2 weeks, identify detection gaps, update playbooks, create new detection rules, share IOCs with community</td>
      <td>MISP (IOC sharing), Sigma (new rules), documentation tools</td>
      <td>Post-incident report, updated playbooks, new detection rules, MISP event with IOCs, gap analysis, training recommendations</td>
      <td>Skipping the meeting; blame-focused instead of improvement-focused; not actually implementing recommended changes; not sharing IOCs</td>
    </tr>
  </tbody>
</table></div>

<h3>PICERL Phase Flow</h3>
<pre><code>                    ┌──────────────────────────────────────────────┐
                    │           PICERL Incident Response            │
                    └──────────────────────────────────────────────┘

  ┌─────────────┐    ┌────────────────┐    ┌──────────────┐
  │ Preparation │───▶│ Identification │───▶│ Containment  │
  └─────────────┘    └───────┬────────┘    └──────┬───────┘
                             │    ▲                │
                             │    │ new hosts       │
                             │    │ discovered      │
                             │    │                ▼
                    ┌────────┴────┴───┐    ┌──────────────┐
                    │ Lessons Learned │◀───│  Eradication │
                    └────────▲───────┘    └──────┬───────┘
                             │                   │
                             │            ┌──────▼───────┐
                             └────────────│   Recovery   │
                                          └──────────────┘</code></pre>

<div class="callout lab"><strong>Worked Example — ACMEONIONS Domain Compromise (IR-2026-0309-001)</strong>

<p>This walkthrough shows how a real investigation progressed through PICERL phases, including loops back to Identification as scope expanded.</p>

<div class="table-wrap"><table>
  <thead><tr><th>Time</th><th>Phase</th><th>Action</th><th>Finding</th></tr></thead>
  <tbody>
    <tr><td>16:25</td><td><strong>Identification</strong></td><td>Analyst logs in, reviews Alerts queue</td><td>ET MALWARE MSIL/Revenge-RAT CnC Keep-Alive — 33 alerts, HIGH severity — source 192.168.56.129 → 166.184.36.101:4334</td></tr>
    <tr><td>16:30</td><td><strong>Identification</strong></td><td>Increase fetch limit to 500, pivot on C2 IP</td><td>Second host discovered: 192.168.56.130 also beaconing to same C2 — scope doubles</td></tr>
    <tr><td>16:45</td><td><strong>Identification</strong></td><td>Query zeek.kerberos + zeek.ldap_search for .130</td><td>Kerberos TGT issued for jaya.kearney from .130 — Domain SID S-1-5-21-869875619-656814776-2141018233 exposed via LDAP</td></tr>
    <tr><td>17:00</td><td><strong>Identification → Containment decision</strong></td><td>Assess risk to Domain Controller</td><td>DC at risk — attacker has domain credentials + domain SID = potential Golden Ticket attack vector</td></tr>
    <tr><td>17:15</td><td><strong>Containment</strong></td><td>Isolate DC first, then .129, then .130 — capture RAM + netstat before each isolation</td><td>Evidence preserved: memory dumps, process lists, network connections for all 3 hosts</td></tr>
    <tr><td>17:45</td><td><strong>Eradication</strong></td><td>KRBTGT double reset (reset → wait 12hrs → reset again), remove Revenge-RAT binary from both hosts, audit all scheduled tasks domain-wide</td><td>Malware found at C:\Users\jaya.kearney\AppData\Local\Temp\svchost.exe on both hosts; scheduled task "WindowsUpdate" found as persistence on .129</td></tr>
    <tr><td>D+1 06:00</td><td><strong>Recovery</strong></td><td>Reconnect hosts with enhanced monitoring — new Suricata rule for 166.184.36.101, Sysmon alert for svchost.exe outside System32</td><td>24-48 hour monitoring period begins</td></tr>
    <tr><td>D+3</td><td><strong>Recovery complete</strong></td><td>No re-infection detected in 48 hours</td><td>Systems cleared for normal operation</td></tr>
    <tr><td>D+7</td><td><strong>Lessons Learned</strong></td><td>Post-incident review meeting</td><td>Root cause: default fetch limit of 10 caused 6-hour detection gap — .130 compromise was visible in data but not displayed. New policy: minimum fetch limit 500 for all investigations</td></tr>
  </tbody>
</table></div>
</div>

</article>
</template>

<!-- 02 SHIFT START CHECKLIST -->
<!-- ============================================================ -->
<template id="tpl-shift-start">
<article class="topic">
<h1>02 · Shift Start Checklist</h1>
<hr class="divider">

<p>The first five minutes of a SOC shift determine whether you catch or miss critical threats. This checklist ensures consistent situational awareness from the moment you log in.</p>

<div class="callout warn"><strong>Critical First Action:</strong> Set your fetch limit to 500 or 1000 BEFORE doing anything else. The default fetch limit of 10 will hide 90%+ of your data and has directly caused missed compromises in real investigations.</div>

<h3>Pre-Investigation Checklist</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Step</th><th>Action</th><th>Why It Matters</th><th>How to Verify</th></tr></thead>
  <tbody>
    <tr><td><strong>1</strong></td><td>Set fetch limit to 500 (minimum) or 1000</td><td>Default limit of 10 hides scope — multi-host compromises invisible at low limits</td><td>Check the fetch limit indicator in Hunt/Alerts UI before running any query</td></tr>
    <tr><td><strong>2</strong></td><td>Open Alerts queue — note count, severity breakdown</td><td>Establishes baseline — is this queue normal (5-10 alerts) or flooded (100+)?</td><td>Record: total count, HIGH count, MEDIUM count, LOW count</td></tr>
    <tr><td><strong>3</strong></td><td>Check time range — confirm correct window</td><td>Wrong time range = stale data or missed recent events</td><td>Verify start/end timestamps match your shift coverage period</td></tr>
    <tr><td><strong>4</strong></td><td>Review previous shift handoff notes</td><td>Ongoing investigations, known issues, pending escalations</td><td>Check ticketing system for open incidents and analyst notes</td></tr>
    <tr><td><strong>5</strong></td><td>Scan source IP distribution in alerts</td><td>Single IP with many alerts = possible compromise; many IPs with same alert = possible campaign or scanning</td><td>Group alerts by source IP — look for outliers</td></tr>
    <tr><td><strong>6</strong></td><td>Check sensor health</td><td>Silent sensors mean blind spots, not "all clear"</td><td>Verify Suricata, Zeek, Sysmon, and Beats are actively generating events</td></tr>
    <tr><td><strong>7</strong></td><td>Document starting state</td><td>Establishes what was present when you started vs what you found</td><td>Screenshot or note the alert queue state, open incidents count</td></tr>
  </tbody>
</table></div>

<h3>Fetch Limit Impact</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Fetch Limit</th><th>Alerts Returned</th><th>Investigation Quality</th><th>Risk</th></tr></thead>
  <tbody>
    <tr><td>10 (default)</td><td>10 of potentially 500+</td><td>Severely limited — only see tip of iceberg</td><td><strong>HIGH</strong> — will miss multi-host compromises, lateral movement, full C2 scope</td></tr>
    <tr><td>100</td><td>Better coverage</td><td>Adequate for single-host incidents</td><td>MEDIUM — may still miss long-duration campaigns</td></tr>
    <tr><td>500</td><td>Good coverage</td><td>Recommended minimum — catches most multi-host scenarios</td><td>LOW — performance may slow on large datasets</td></tr>
    <tr><td>1000</td><td>Comprehensive</td><td>Full scope visibility for complex investigations</td><td>MINIMAL — use when investigating active compromises</td></tr>
  </tbody>
</table></div>

<h3>Quick Health Check Queries</h3>

<p><strong>Verify Suricata is generating alerts (Hunt):</strong></p>
<pre><code>event.module: suricata AND event.type: alert
<span class="cm"># Should return results within last 15 minutes if sensor is healthy</span></code></pre>

<p><strong>Verify Zeek is generating connection logs:</strong></p>
<pre><code>event.module: zeek AND event.dataset: zeek.conn
<span class="cm"># Should show continuous connection data — gaps indicate sensor issues</span></code></pre>

<p><strong>Verify Sysmon is reporting from endpoints:</strong></p>
<pre><code>event.module: sysmon AND event.code: 1
<span class="cm"># Process creation events — should be constant on active workstations</span></code></pre>

<p><strong>Check for sensor silence (potential blind spot):</strong></p>
<pre><code>event.module: zeek AND event.dataset: zeek.conn | stats count by agent.hostname
<span class="cm"># Any host with 0 events in last hour = potential sensor failure</span></code></pre>

<div class="callout lab"><strong>Worked Example — ACMEONIONS Shift Start (IR-2026-0309-001)</strong>

<p>Analyst logged in at <strong>16:25</strong>. Here is exactly what happened at each checklist step:</p>

<div class="table-wrap"><table>
  <thead><tr><th>Step</th><th>Action Taken</th><th>Result</th></tr></thead>
  <tbody>
    <tr><td>1</td><td>Checked fetch limit — found it at default 10</td><td>Increased to 500 immediately</td></tr>
    <tr><td>2</td><td>Opened Alerts queue</td><td><strong>Revenge-RAT alert active</strong> — 33 count, HIGH severity, source 192.168.56.129</td></tr>
    <tr><td>3</td><td>Confirmed time range: last 24 hours</td><td>Alerts spanning 6+ hours — the low default fetch limit on the previous shift had hidden the full scope</td></tr>
    <tr><td>4</td><td>Checked handoff notes</td><td>No mention of Revenge-RAT — previous analyst only saw 10 events due to default fetch limit and classified as isolated</td></tr>
    <tr><td>5</td><td>Grouped alerts by source IP</td><td>After fetch limit increase: <strong>192.168.56.130 appeared</strong> — second compromised host visible only at fetch limit 500</td></tr>
    <tr><td>6</td><td>Verified sensor health</td><td>All sensors active — data was present, just not displayed due to low fetch limit</td></tr>
    <tr><td>7</td><td>Documented starting state</td><td>2 compromised hosts, 33+ C2 beacons, 6-hour undetected dwell time</td></tr>
  </tbody>
</table></div>

<p><strong>Key lesson:</strong> The fetch limit increase from 10 to 500 was the single action that revealed the true scope of the compromise. Without it, 192.168.56.130 would have remained undetected.</p>
</div>

</article>
</template>

<!-- 03 ALERT TRIAGE WORKFLOW -->
<!-- ============================================================ -->
<template id="tpl-alert-triage">
<article class="topic">
<h1>03 · Alert Triage Workflow</h1>
<hr class="divider">

<p>Alert triage is the core SOC analyst skill — rapidly determining whether an alert represents a real threat or background noise. This six-step workflow provides a repeatable process for every alert you encounter.</p>

<h3>Step 1: Identify Alert Metadata</h3>
<p>Before touching any data, record these fields from the alert:</p>
<div class="table-wrap"><table>
  <thead><tr><th>Field</th><th>What to Record</th><th>Why</th></tr></thead>
  <tbody>
    <tr><td>Alert Name</td><td>Full signature name (e.g., ET MALWARE MSIL/Revenge-RAT CnC Keep-Alive)</td><td>Tells you the detection logic and threat category</td></tr>
    <tr><td>Severity</td><td>HIGH / MEDIUM / LOW / INFO</td><td>Drives prioritization and SLA timelines</td></tr>
    <tr><td>Count</td><td>How many times this alert fired</td><td>1 alert = maybe scan; 33 alerts = persistent activity</td></tr>
    <tr><td>Source IP</td><td>Internal IP generating the traffic</td><td>Identifies the potentially compromised host</td></tr>
    <tr><td>Destination IP</td><td>External IP being contacted</td><td>C2 server, exfil target, or legitimate service</td></tr>
    <tr><td>Destination Port</td><td>Port number and protocol</td><td>Standard ports (80/443) vs unusual ports (4334, 8888) — unusual ports are more suspicious</td></tr>
    <tr><td>Timestamp</td><td>First seen and last seen</td><td>Duration of activity determines severity and urgency</td></tr>
  </tbody>
</table></div>

<h3>Step 2: Determine Alert Source</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Alert Source</th><th>Detection Type</th><th>Confidence Level</th><th>What It Tells You</th></tr></thead>
  <tbody>
    <tr><td><strong>Suricata (ET rules)</strong></td><td>Network signature — pattern match on packet content</td><td>HIGH for specific malware signatures; MEDIUM for generic patterns</td><td>Known malware C2 protocol, exploit attempt, or suspicious traffic pattern detected in network data</td></tr>
    <tr><td><strong>Sigma rules</strong></td><td>Log-based behavioral detection — matches patterns in Sysmon/Windows Event Logs</td><td>VARIES — high for specific techniques, medium for generic behaviors</td><td>Suspicious process behavior, registry modification, or credential access detected on endpoint</td></tr>
    <tr><td><strong>zeek.notice</strong></td><td>Zeek protocol analysis — anomaly or policy violation in network metadata</td><td>MEDIUM — behavioral, not signature-based</td><td>Unusual protocol behavior, self-signed certs, DNS anomalies, lateral movement patterns</td></tr>
    <tr><td><strong>OSSEC</strong></td><td>Host-based integrity and log monitoring</td><td>HIGH for FIM alerts; MEDIUM for log-based rules</td><td>File changes, failed logins, privilege escalation attempts detected on the host</td></tr>
  </tbody>
</table></div>

<h3>Step 3: Pivot on Community ID</h3>
<p>The Community ID is a hash that uniquely identifies a network flow across all sensors. It lets you correlate the same connection across Suricata, Zeek, and PCAP.</p>

<pre><code><span class="cm"># Find the Community ID from the alert, then pivot to see the full flow</span>
network.community_id: "1:XYZ123abc456..."

<span class="cm"># This single query returns ALL data about that connection:</span>
<span class="cm"># - Suricata alert details (what triggered)</span>
<span class="cm"># - Zeek conn log (duration, bytes, protocol)</span>
<span class="cm"># - Zeek DNS/HTTP/SSL logs (application layer details)</span>
<span class="cm"># - Zeek file log (any files transferred)</span></code></pre>

<h3>Step 4: True Positive vs False Positive</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Indicator</th><th>True Positive (Likely Malicious)</th><th>False Positive (Likely Benign)</th></tr></thead>
  <tbody>
    <tr><td><strong>Alert count</strong></td><td>Repeating pattern (beaconing) — 33 alerts at regular intervals</td><td>Single occurrence, no repeat</td></tr>
    <tr><td><strong>Destination IP</strong></td><td>Unknown IP, VPS hosting, Tor exit, or known-bad on VirusTotal</td><td>Known CDN (Akamai, Cloudflare), Microsoft, Google</td></tr>
    <tr><td><strong>Port</strong></td><td>Non-standard port (4334, 8888, 1337)</td><td>Standard service port (80, 443, 53)</td></tr>
    <tr><td><strong>Timing</strong></td><td>Regular intervals (beaconing: every 30s, 60s, 5min)</td><td>Irregular, user-driven patterns</td></tr>
    <tr><td><strong>Process</strong></td><td>Unexpected process making connection (notepad.exe → internet)</td><td>Browser, Windows Update, AV update</td></tr>
    <tr><td><strong>Destination geo</strong></td><td>Unusual country for the organization's business</td><td>Expected regions for services used</td></tr>
    <tr><td><strong>Bytes transferred</strong></td><td>Large outbound transfer (exfil) or small regular beacons (C2)</td><td>Normal web browsing patterns</td></tr>
    <tr><td><strong>Zeek SSL</strong></td><td>Self-signed cert, missing SNI, cert CN mismatch</td><td>Valid cert from trusted CA, matching SNI</td></tr>
  </tbody>
</table></div>

<h3>Step 5: Expand with Hunt Queries</h3>
<p>Once you have a confirmed true positive, expand the investigation to find related activity:</p>

<pre><code><span class="cm"># Hunt for all connections from the compromised host</span>
source.ip: 192.168.56.129 AND event.dataset: zeek.conn

<span class="cm"># Hunt for the C2 IP across ALL internal hosts (find other victims)</span>
destination.ip: 166.184.36.101

<span class="cm"># Hunt for the malware process name across Sysmon data</span>
event.code: 1 AND process.name: "svchost.exe" AND NOT process.executable: "C:\\Windows\\System32\\svchost.exe"

<span class="cm"># Hunt for DNS queries to suspicious domains</span>
event.dataset: zeek.dns AND dns.question.name: *suspicious-domain*

<span class="cm"># Hunt for all activity from the same source during the alert window</span>
source.ip: 192.168.56.129 AND @timestamp >= "2026-03-09T10:00:00" AND @timestamp <= "2026-03-09T18:00:00"</code></pre>

<h3>Step 6: Document Verdict</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Verdict</th><th>Criteria</th><th>Next Action</th></tr></thead>
  <tbody>
    <tr><td><strong>True Positive — Critical</strong></td><td>Confirmed malware C2, active compromise, credential theft, data exfiltration</td><td>Escalate immediately → Containment phase</td></tr>
    <tr><td><strong>True Positive — Standard</strong></td><td>Malicious activity confirmed but limited scope (single host, no lateral movement)</td><td>Create incident ticket → begin structured investigation</td></tr>
    <tr><td><strong>Suspicious — Needs Investigation</strong></td><td>Cannot confirm or deny with available data</td><td>Expand queries, request additional log sources, continue hunting</td></tr>
    <tr><td><strong>False Positive — Tuning Needed</strong></td><td>Benign activity triggering alert due to overly broad rule</td><td>Document false positive, submit rule tuning request</td></tr>
    <tr><td><strong>False Positive — Known Good</strong></td><td>Alert on legitimate, expected activity already documented</td><td>Close alert with reference to known-good documentation</td></tr>
  </tbody>
</table></div>

<div class="callout lab"><strong>Worked Example — ACMEONIONS Alert Triage (IR-2026-0309-001)</strong>

<p><strong>Step 1 — Metadata:</strong></p>
<pre><code>Alert Name:     ET MALWARE MSIL/Revenge-RAT CnC Keep-Alive
Severity:       HIGH
Count:          33
Source IP:      192.168.56.129
Destination IP: 166.184.36.101
Dest Port:      4334/tcp
First Seen:     2026-03-09 10:12:00
Last Seen:      2026-03-09 16:25:00</code></pre>

<p><strong>Step 2 — Source:</strong> Suricata ET MALWARE rule — high-confidence signature match for known RAT C2 protocol.</p>

<p><strong>Step 3 — Community ID pivot:</strong></p>
<pre><code>network.community_id: "1:abc123..."
<span class="cm"># Revealed: persistent TCP connection, 6+ hours duration</span>
<span class="cm"># Zeek conn: 33 separate connections, regular 10-minute intervals (beaconing)</span>
<span class="cm"># Zeek SSL: self-signed certificate on port 4334</span></code></pre>

<p><strong>Step 4 — Verdict:</strong> TRUE POSITIVE — CRITICAL</p>
<ul>
  <li>33 alerts = persistent beaconing (not a one-off)</li>
  <li>Port 4334 = non-standard (not a legitimate service)</li>
  <li>10-minute intervals = automated C2 keep-alive</li>
  <li>Self-signed cert = not a legitimate service</li>
  <li>VirusTotal: 166.184.36.101 flagged by 12/90 vendors as Revenge-RAT C2</li>
</ul>

<p><strong>Step 5 — Expansion:</strong></p>
<pre><code><span class="cm"># Hunt for C2 IP across all hosts</span>
destination.ip: 166.184.36.101
<span class="cm"># RESULT: 192.168.56.130 ALSO contacting same C2 — second compromised host!</span></code></pre>

<p><strong>Step 6 — Documented:</strong> True Positive Critical — two compromised hosts — escalate to Containment immediately.</p>
</div>

</article>
</template>

<!-- 04 PROCESS VALIDATION -->
<!-- ============================================================ -->
<template id="tpl-process-validation">
<article class="topic">
<h1>04 · Process Validation (3 Checks)</h1>
<hr class="divider">

<p>Every suspicious process must pass three validation checks before you can clear it as benign or escalate it as malicious. This framework prevents both false positives (wasting time on legitimate processes) and false negatives (missing malware disguised as system processes).</p>

<h3>Check 1: Path Validation</h3>
<p>Is the executable running from the expected location?</p>
<div class="table-wrap"><table>
  <thead><tr><th>Process</th><th>Expected Path</th><th>Red Flag Path</th></tr></thead>
  <tbody>
    <tr><td>svchost.exe</td><td>C:\Windows\System32\svchost.exe</td><td>C:\Users\*\AppData\Local\Temp\svchost.exe</td></tr>
    <tr><td>csrss.exe</td><td>C:\Windows\System32\csrss.exe</td><td>C:\Windows\Temp\csrss.exe</td></tr>
    <tr><td>lsass.exe</td><td>C:\Windows\System32\lsass.exe</td><td>C:\ProgramData\lsass.exe</td></tr>
    <tr><td>explorer.exe</td><td>C:\Windows\explorer.exe</td><td>C:\Users\Public\explorer.exe</td></tr>
    <tr><td>taskhostw.exe</td><td>C:\Windows\System32\taskhostw.exe</td><td>Any other location</td></tr>
    <tr><td>RuntimeBroker.exe</td><td>C:\Windows\System32\RuntimeBroker.exe</td><td>Any other location</td></tr>
  </tbody>
</table></div>

<pre><code><span class="cm"># Hunt query: Find svchost.exe running from non-standard paths</span>
event.code: 1 AND process.name: "svchost.exe" AND NOT process.executable: "C:\\Windows\\System32\\svchost.exe"

<span class="cm"># Hunt query: Find any process running from user Temp directories</span>
event.code: 1 AND process.executable: *\\AppData\\Local\\Temp\\*

<span class="cm"># Hunt query: Find executables running from ProgramData</span>
event.code: 1 AND process.executable: *\\ProgramData\\*.exe</code></pre>

<h3>Check 2: Parent Process Validation</h3>
<p>Every process has an expected parent. An unexpected parent-child relationship is a strong indicator of malicious activity.</p>
<div class="table-wrap"><table>
  <thead><tr><th>Process</th><th>Expected Parent</th><th>Suspicious Parent</th></tr></thead>
  <tbody>
    <tr><td>svchost.exe</td><td>services.exe</td><td>cmd.exe, powershell.exe, explorer.exe, any user process</td></tr>
    <tr><td>csrss.exe</td><td>smss.exe (Session Manager)</td><td>Any other parent</td></tr>
    <tr><td>lsass.exe</td><td>wininit.exe</td><td>Any other parent</td></tr>
    <tr><td>services.exe</td><td>wininit.exe</td><td>Any other parent</td></tr>
    <tr><td>taskhostw.exe</td><td>svchost.exe</td><td>cmd.exe, powershell.exe</td></tr>
    <tr><td>cmd.exe / powershell.exe</td><td>explorer.exe (user-launched) or svchost.exe (scheduled task)</td><td>winword.exe, excel.exe (macro execution)</td></tr>
    <tr><td>rundll32.exe</td><td>Varies — often svchost.exe or explorer.exe</td><td>cmd.exe spawned by Office application</td></tr>
  </tbody>
</table></div>

<pre><code><span class="cm"># Hunt query: svchost.exe with unexpected parent</span>
event.code: 1 AND process.name: "svchost.exe" AND NOT process.parent.name: "services.exe"

<span class="cm"># Hunt query: cmd/powershell spawned by Office apps (macro execution)</span>
event.code: 1 AND process.parent.name: ("winword.exe" OR "excel.exe" OR "powerpnt.exe") AND process.name: ("cmd.exe" OR "powershell.exe")

<span class="cm"># Hunt query: lsass with unexpected parent</span>
event.code: 1 AND process.name: "lsass.exe" AND NOT process.parent.name: "wininit.exe"</code></pre>

<h3>Check 3: Hash Verification</h3>
<p>Validate the file hash against known-good databases and threat intelligence.</p>
<div class="table-wrap"><table>
  <thead><tr><th>Source</th><th>What It Tells You</th><th>How to Use</th></tr></thead>
  <tbody>
    <tr><td><strong>VirusTotal</strong></td><td>Multi-engine AV scan results — detection ratio (e.g., 42/70 = malicious, 0/70 = likely clean)</td><td>Search the SHA256 hash — check detection count, first/last seen dates, behavioral tags</td></tr>
    <tr><td><strong>Winbindex</strong></td><td>Index of all legitimate Windows binaries with their hashes by OS build version</td><td>Search the hash — if found, it is a legitimate Microsoft binary for that specific Windows build</td></tr>
    <tr><td><strong>NSRL (NIST)</strong></td><td>National Software Reference Library — hashes of known legitimate software</td><td>If hash matches NSRL, it is a known legitimate file</td></tr>
  </tbody>
</table></div>

<pre><code><span class="cm"># Extract hash from Sysmon Event ID 1 (Process Creation)</span>
<span class="cm"># Sysmon logs MD5, SHA1, and SHA256 in the Hashes field</span>
event.code: 1 AND process.name: "svchost.exe" | table process.hash.sha256, process.executable, process.parent.name

<span class="cm"># Extract hash from Sysmon Event ID 11 (FileCreate) for dropped files</span>
event.code: 11 AND file.path: *\\AppData\\Local\\Temp\\*.exe | table file.hash.sha256, file.path</code></pre>

<h3>Known-Good Patterns (Safe to Clear)</h3>
<p>These process executions frequently trigger alerts but are legitimate Windows operations:</p>
<div class="table-wrap"><table>
  <thead><tr><th>Process</th><th>Parent</th><th>Command Line</th><th>Context</th><th>Verdict</th></tr></thead>
  <tbody>
    <tr><td>SDXHelper.exe</td><td>svchost.exe (Schedule)</td><td>SDXHelper.exe /onlogon</td><td>Microsoft Office telemetry helper — runs via Task Scheduler on user logon</td><td>Benign — legitimate Office component</td></tr>
    <tr><td>DismHost.exe</td><td>cleanmgr.exe</td><td>DismHost.exe {GUID}</td><td>Windows Deployment Image Servicing — launched by Disk Cleanup to service components</td><td>Benign — legitimate Windows cleanup</td></tr>
    <tr><td>rundll32.exe</td><td>svchost.exe</td><td>rundll32.exe AppXDeploymentExtensions.onecore.dll,ShellRefresh</td><td>Windows App Store package deployment — updates Start Menu tiles</td><td>Benign — legitimate AppX maintenance</td></tr>
    <tr><td>rundll32.exe</td><td>svchost.exe</td><td>rundll32.exe shell32.dll,SHCreateLocalServerRunDll {GUID}</td><td>COM server activation — Windows uses this to start COM objects for Explorer shell extensions</td><td>Benign — legitimate COM activation</td></tr>
    <tr><td>rundll32.exe</td><td>svchost.exe</td><td>rundll32.exe Windows.StateRepositoryClient.dll,StateRepoCleanup</td><td>Windows State Repository maintenance — cleans up app state database</td><td>Benign — legitimate state cleanup</td></tr>
    <tr><td>backgroundTaskHost.exe</td><td>svchost.exe</td><td>backgroundTaskHost.exe -ServerName:*</td><td>UWP background task host — runs scheduled background tasks for Windows Store apps</td><td>Benign — legitimate UWP hosting</td></tr>
    <tr><td>MpCmdRun.exe</td><td>MsMpEng.exe</td><td>MpCmdRun.exe -SignatureUpdate</td><td>Windows Defender signature update</td><td>Benign — legitimate AV update</td></tr>
  </tbody>
</table></div>

<div class="callout warn"><strong>Red Flags That Override Known-Good Patterns:</strong>
<ul>
  <li>Executable path in AppData\Local\Temp, ProgramData, or Public folders</li>
  <li>Unexpected parent process (e.g., svchost.exe spawned by cmd.exe)</li>
  <li>Hash not found in Winbindex or NSRL but process name matches a system binary</li>
  <li>Process making outbound network connections to non-Microsoft IPs</li>
  <li>Process command line contains Base64-encoded strings or -enc flags</li>
  <li>Process running at unusual hours (3 AM on a workstation)</li>
</ul>
</div>

<h3>Three-Check Decision Tree</h3>
<pre><code>                        ┌─────────────────────┐
                        │   Suspicious Process │
                        └──────────┬──────────┘
                                   │
                        ┌──────────▼──────────┐
                        │  Check 1: Path OK?   │
                        └──────────┬──────────┘
                              ╱          ╲
                           YES            NO ──▶ SUSPICIOUS
                            │                    (escalate)
                 ┌──────────▼──────────┐
                 │ Check 2: Parent OK? │
                 └──────────┬──────────┘
                       ╱          ╲
                    YES            NO ──▶ SUSPICIOUS
                     │                    (escalate)
          ┌──────────▼──────────┐
          │ Check 3: Hash OK?   │
          └──────────┬──────────┘
                ╱          ╲
             YES            NO ──▶ MALICIOUS
              │                    (escalate + contain)
              ▼
           BENIGN
          (clear)</code></pre>

</article>
</template>

<!-- 05 ZEEK DATASET REFERENCE -->
<!-- ============================================================ -->
<template id="tpl-zeek-reference">
<article class="topic">
<h1>05 · Zeek Dataset Reference</h1>
<hr class="divider">

<p>Zeek generates structured logs for every protocol it observes on the network. Each dataset provides a different view of network activity. Knowing which dataset to query — and what malicious vs benign looks like in each — is essential for efficient hunting.</p>

<h3>zeek.conn — Connection Log</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Aspect</th><th>Detail</th></tr></thead>
  <tbody>
    <tr><td><strong>Primary Fields</strong></td><td>source.ip, destination.ip, destination.port, network.transport, zeek.conn.duration, source.bytes, destination.bytes, zeek.conn.conn_state, network.community_id</td></tr>
    <tr><td><strong>Malicious Indicators</strong></td><td>Regular short-duration connections at fixed intervals (C2 beaconing); very long connections to a single IP (persistent backdoor); large source.bytes with small destination.bytes (exfiltration); connections to unusual ports (4334, 8888, 1337)</td></tr>
    <tr><td><strong>Benign Indicators</strong></td><td>Connections to known CDNs/cloud services on standard ports; irregular timing matching user activity; balanced byte ratios for web browsing</td></tr>
  </tbody>
</table></div>
<pre><code><span class="cm"># Hunt: Find beaconing — connections from same source to same dest, sorted by time</span>
event.dataset: zeek.conn AND source.ip: 192.168.56.129 AND destination.ip: 166.184.36.101 | sort @timestamp

<span class="cm"># Hunt: Large outbound transfers (possible exfiltration)</span>
event.dataset: zeek.conn AND source.bytes > 10000000 AND NOT destination.ip: 10.0.0.0/8

<span class="cm"># Hunt: Connections to non-standard ports</span>
event.dataset: zeek.conn AND destination.port > 1024 AND NOT destination.port: (8080 OR 8443 OR 3389 OR 5985)</code></pre>

<h3>zeek.dns — DNS Query Log</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Aspect</th><th>Detail</th></tr></thead>
  <tbody>
    <tr><td><strong>Primary Fields</strong></td><td>dns.question.name, dns.question.type, dns.response_code, dns.answers.data, source.ip</td></tr>
    <tr><td><strong>Malicious Indicators</strong></td><td>Queries for DGA-generated domains (long random strings like xk3jf9a2m.com); high query volume to a single domain (DNS tunneling); TXT record queries with encoded data; NXDOMAIN responses for many unique domains</td></tr>
    <tr><td><strong>Benign Indicators</strong></td><td>Queries to known domains (microsoft.com, google.com); A/AAAA record types; normal query volume per host</td></tr>
  </tbody>
</table></div>
<pre><code><span class="cm"># Hunt: DNS queries from compromised host</span>
event.dataset: zeek.dns AND source.ip: 192.168.56.129 | table dns.question.name, dns.question.type, dns.response_code

<span class="cm"># Hunt: TXT record queries (possible DNS tunneling or C2)</span>
event.dataset: zeek.dns AND dns.question.type: TXT

<span class="cm"># Hunt: High NXDOMAIN rate (possible DGA malware)</span>
event.dataset: zeek.dns AND dns.response_code: NXDOMAIN | stats count by source.ip | sort -count</code></pre>

<h3>zeek.http — HTTP Request Log</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Aspect</th><th>Detail</th></tr></thead>
  <tbody>
    <tr><td><strong>Primary Fields</strong></td><td>url.full, http.request.method, http.response.status_code, http.request.body.bytes, http.response.body.bytes, user_agent.original, url.domain</td></tr>
    <tr><td><strong>Malicious Indicators</strong></td><td>POST requests to suspicious URLs; unusual User-Agent strings (empty, single word, known malware UA); long Base64 strings in URL parameters; repeated requests to same path at regular intervals; HTTP to IP address instead of domain</td></tr>
    <tr><td><strong>Benign Indicators</strong></td><td>Standard browser User-Agents; GET requests to known sites; normal status codes (200, 301, 304)</td></tr>
  </tbody>
</table></div>
<pre><code><span class="cm"># Hunt: HTTP POST requests from compromised host (C2 check-in or data exfil)</span>
event.dataset: zeek.http AND source.ip: 192.168.56.129 AND http.request.method: POST

<span class="cm"># Hunt: Unusual or empty User-Agent strings</span>
event.dataset: zeek.http AND (user_agent.original: "" OR NOT user_agent.original: *)

<span class="cm"># Hunt: HTTP connections to IP addresses (no domain — suspicious)</span>
event.dataset: zeek.http AND NOT url.domain: *.*</code></pre>

<h3>zeek.files — File Transfer Log</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Aspect</th><th>Detail</th></tr></thead>
  <tbody>
    <tr><td><strong>Primary Fields</strong></td><td>zeek.files.fuid, file.mime_type, file.size, zeek.files.source, file.hash.md5, file.hash.sha1, zeek.files.filename, zeek.files.tx_hosts, zeek.files.rx_hosts</td></tr>
    <tr><td><strong>Malicious Indicators</strong></td><td>PE executables (application/x-dosexec) downloaded from external IPs; mismatched extension and MIME type (invoice.pdf.exe); files from C2 IPs; large files sent outbound</td></tr>
    <tr><td><strong>Benign Indicators</strong></td><td>Known MIME types from known update servers; standard web assets (images, CSS, JS) from CDNs</td></tr>
  </tbody>
</table></div>
<pre><code><span class="cm"># Hunt: Executable files transferred over the network</span>
event.dataset: zeek.files AND file.mime_type: ("application/x-dosexec" OR "application/x-executable")

<span class="cm"># Hunt: Files from the C2 server</span>
event.dataset: zeek.files AND zeek.files.tx_hosts: 166.184.36.101

<span class="cm"># Hunt: Get file hash for VirusTotal lookup</span>
event.dataset: zeek.files AND zeek.files.rx_hosts: 192.168.56.129 | table file.hash.sha256, file.mime_type, file.size, zeek.files.filename</code></pre>

<h3>zeek.ssl — SSL/TLS Log</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Aspect</th><th>Detail</th></tr></thead>
  <tbody>
    <tr><td><strong>Primary Fields</strong></td><td>tls.server.subject, tls.server.issuer, tls.version, tls.server.ja3s, zeek.ssl.server_name (SNI), tls.cipher, zeek.ssl.validation_status</td></tr>
    <tr><td><strong>Malicious Indicators</strong></td><td>Self-signed certificates (issuer = subject); missing or mismatched SNI; expired certificates; known-bad JA3/JA3S hashes; certificate CN that looks auto-generated or random</td></tr>
    <tr><td><strong>Benign Indicators</strong></td><td>Valid certificates from trusted CAs (DigiCert, Let's Encrypt); matching SNI and certificate CN; current TLS versions (1.2, 1.3)</td></tr>
  </tbody>
</table></div>
<pre><code><span class="cm"># Hunt: Self-signed certificates (issuer matches subject)</span>
event.dataset: zeek.ssl AND zeek.ssl.validation_status: "self signed certificate"

<span class="cm"># Hunt: SSL connections to the C2 server</span>
event.dataset: zeek.ssl AND destination.ip: 166.184.36.101 | table tls.server.subject, tls.server.issuer, zeek.ssl.server_name

<span class="cm"># Hunt: Missing SNI (common in malware C2 that uses raw IP)</span>
event.dataset: zeek.ssl AND NOT zeek.ssl.server_name: *</code></pre>

<h3>zeek.rdp — Remote Desktop Log</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Aspect</th><th>Detail</th></tr></thead>
  <tbody>
    <tr><td><strong>Primary Fields</strong></td><td>source.ip, destination.ip, zeek.rdp.cookie, zeek.rdp.result, zeek.rdp.security_protocol</td></tr>
    <tr><td><strong>Malicious Indicators</strong></td><td>RDP from external IPs; RDP between workstations (lateral movement); RDP from compromised hosts; rapid succession of RDP attempts (brute force); RDP at unusual hours</td></tr>
    <tr><td><strong>Benign Indicators</strong></td><td>RDP from known admin jump boxes; RDP to designated servers during business hours</td></tr>
  </tbody>
</table></div>
<pre><code><span class="cm"># Hunt: RDP sessions from compromised host (lateral movement)</span>
event.dataset: zeek.rdp AND source.ip: 192.168.56.129

<span class="cm"># Hunt: RDP between workstations (should only be to servers)</span>
event.dataset: zeek.rdp AND source.ip: 192.168.56.0/24 AND destination.ip: 192.168.56.0/24

<span class="cm"># Hunt: Failed RDP attempts (brute force)</span>
event.dataset: zeek.rdp AND zeek.rdp.result: "failed" | stats count by source.ip, destination.ip | sort -count</code></pre>

<h3>zeek.smb_files — SMB File Access Log</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Aspect</th><th>Detail</th></tr></thead>
  <tbody>
    <tr><td><strong>Primary Fields</strong></td><td>source.ip, destination.ip, zeek.smb_files.name, zeek.smb_files.path, zeek.smb_files.action, zeek.smb_files.size</td></tr>
    <tr><td><strong>Malicious Indicators</strong></td><td>Mass file access (ransomware enumeration); access to sensitive shares (ADMIN$, C$, IPC$); file writes to remote shares from compromised host; access to SYSVOL for GPP password harvesting</td></tr>
    <tr><td><strong>Benign Indicators</strong></td><td>Normal file server access patterns; scheduled backup jobs; software deployment shares</td></tr>
  </tbody>
</table></div>
<pre><code><span class="cm"># Hunt: Admin share access (lateral movement / remote execution)</span>
event.dataset: zeek.smb_files AND (zeek.smb_files.path: *ADMIN$* OR zeek.smb_files.path: *C$* OR zeek.smb_files.path: *IPC$*)

<span class="cm"># Hunt: SMB file activity from compromised host</span>
event.dataset: zeek.smb_files AND source.ip: 192.168.56.129 | table zeek.smb_files.name, zeek.smb_files.path, zeek.smb_files.action</code></pre>

<h3>zeek.ftp — FTP Log</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Aspect</th><th>Detail</th></tr></thead>
  <tbody>
    <tr><td><strong>Primary Fields</strong></td><td>source.ip, destination.ip, zeek.ftp.command, zeek.ftp.arg, zeek.ftp.reply_code, zeek.ftp.user, zeek.ftp.data_channel.passive</td></tr>
    <tr><td><strong>Malicious Indicators</strong></td><td>FTP to external IPs (data exfiltration); anonymous FTP to internal servers; STOR commands (file upload) to unknown destinations; FTP from compromised hosts</td></tr>
    <tr><td><strong>Benign Indicators</strong></td><td>FTP to known backup servers; scheduled FTP jobs to known partners</td></tr>
  </tbody>
</table></div>
<pre><code><span class="cm"># Hunt: FTP uploads to external servers (exfiltration)</span>
event.dataset: zeek.ftp AND zeek.ftp.command: STOR AND NOT destination.ip: (10.0.0.0/8 OR 172.16.0.0/12 OR 192.168.0.0/16)

<span class="cm"># Hunt: All FTP activity from compromised host</span>
event.dataset: zeek.ftp AND source.ip: 192.168.56.129 | table zeek.ftp.command, zeek.ftp.arg, zeek.ftp.user, destination.ip</code></pre>

<h3>zeek.kerberos — Kerberos Authentication Log</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Aspect</th><th>Detail</th></tr></thead>
  <tbody>
    <tr><td><strong>Primary Fields</strong></td><td>source.ip, destination.ip, zeek.kerberos.request_type, zeek.kerberos.client, zeek.kerberos.service, zeek.kerberos.success, zeek.kerberos.error_msg, zeek.kerberos.cipher</td></tr>
    <tr><td><strong>Malicious Indicators</strong></td><td>TGT requests from compromised hosts; Kerberoasting (TGS requests for many service accounts); AS-REP roasting (pre-auth disabled accounts); RC4 cipher usage (downgrade attack); TGT requests for privileged accounts from workstations</td></tr>
    <tr><td><strong>Benign Indicators</strong></td><td>Normal TGT/TGS flow from domain-joined workstations; AES256 cipher; requests for standard services (HTTP, CIFS, LDAP)</td></tr>
  </tbody>
</table></div>
<pre><code><span class="cm"># Hunt: Kerberos activity from compromised host</span>
event.dataset: zeek.kerberos AND source.ip: 192.168.56.130 | table zeek.kerberos.request_type, zeek.kerberos.client, zeek.kerberos.service, zeek.kerberos.success

<span class="cm"># Hunt: Kerberoasting — many TGS requests from a single host</span>
event.dataset: zeek.kerberos AND zeek.kerberos.request_type: TGS | stats dc(zeek.kerberos.service) as unique_services by source.ip | where unique_services > 10

<span class="cm"># Hunt: RC4 cipher usage (possible downgrade attack)</span>
event.dataset: zeek.kerberos AND zeek.kerberos.cipher: *RC4*</code></pre>

<h3>zeek.ldap_search — LDAP Query Log</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Aspect</th><th>Detail</th></tr></thead>
  <tbody>
    <tr><td><strong>Primary Fields</strong></td><td>source.ip, destination.ip, zeek.ldap_search.filter, zeek.ldap_search.scope, zeek.ldap_search.base_object, zeek.ldap_search.result_count</td></tr>
    <tr><td><strong>Malicious Indicators</strong></td><td>LDAP queries enumerating all users/groups/computers; queries for domain SID; queries for adminCount=1 (privileged accounts); queries for servicePrincipalName (Kerberoasting recon); LDAP from non-AD-tool hosts</td></tr>
    <tr><td><strong>Benign Indicators</strong></td><td>LDAP from domain controllers, Exchange, SCCM; standard application bind operations</td></tr>
  </tbody>
</table></div>
<pre><code><span class="cm"># Hunt: LDAP enumeration from compromised host</span>
event.dataset: zeek.ldap_search AND source.ip: 192.168.56.130 | table zeek.ldap_search.filter, zeek.ldap_search.scope, zeek.ldap_search.result_count

<span class="cm"># Hunt: Queries for privileged accounts (adminCount attribute)</span>
event.dataset: zeek.ldap_search AND zeek.ldap_search.filter: *adminCount*

<span class="cm"># Hunt: Domain SID enumeration</span>
event.dataset: zeek.ldap_search AND zeek.ldap_search.filter: *objectSid*</code></pre>

<h3>zeek.dce_rpc — DCE/RPC Log</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Aspect</th><th>Detail</th></tr></thead>
  <tbody>
    <tr><td><strong>Primary Fields</strong></td><td>source.ip, destination.ip, zeek.dce_rpc.endpoint, zeek.dce_rpc.operation, zeek.dce_rpc.named_pipe</td></tr>
    <tr><td><strong>Malicious Indicators</strong></td><td>PsExec-style execution (svcctl operations); remote service creation; remote registry access; SAM database queries (credential dumping); unusual endpoint/operation combinations from workstations</td></tr>
    <tr><td><strong>Benign Indicators</strong></td><td>DCE/RPC between domain controllers; SCCM/WSUS management operations; Group Policy processing</td></tr>
  </tbody>
</table></div>
<pre><code><span class="cm"># Hunt: Remote service creation (PsExec, lateral movement)</span>
event.dataset: zeek.dce_rpc AND zeek.dce_rpc.endpoint: svcctl AND zeek.dce_rpc.operation: CreateServiceW

<span class="cm"># Hunt: Remote registry access</span>
event.dataset: zeek.dce_rpc AND zeek.dce_rpc.endpoint: winreg

<span class="cm"># Hunt: All DCE/RPC from compromised host</span>
event.dataset: zeek.dce_rpc AND source.ip: 192.168.56.129 | table zeek.dce_rpc.endpoint, zeek.dce_rpc.operation, destination.ip</code></pre>

<h3>zeek.notice — Zeek Notice Log</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Aspect</th><th>Detail</th></tr></thead>
  <tbody>
    <tr><td><strong>Primary Fields</strong></td><td>zeek.notice.note, zeek.notice.msg, source.ip, destination.ip, zeek.notice.sub, zeek.notice.actions</td></tr>
    <tr><td><strong>Malicious Indicators</strong></td><td>SSL::Invalid_Server_Cert with C2 IPs; Scan::Port_Scan from internal hosts; DNS::External_Name with DGA-like domains; HTTP::URI_Squid (proxy abuse)</td></tr>
    <tr><td><strong>Benign Indicators</strong></td><td>Certificate expiration notices for internal servers; planned scan activity from security team IPs</td></tr>
  </tbody>
</table></div>
<pre><code><span class="cm"># Hunt: All Zeek notices (anomaly-based detections)</span>
event.dataset: zeek.notice | table zeek.notice.note, zeek.notice.msg, source.ip, destination.ip

<span class="cm"># Hunt: SSL certificate issues (common for C2 servers)</span>
event.dataset: zeek.notice AND zeek.notice.note: SSL::Invalid_Server_Cert

<span class="cm"># Hunt: Port scanning detected by Zeek</span>
event.dataset: zeek.notice AND zeek.notice.note: Scan::Port_Scan</code></pre>

</article>
</template>

<!-- 06 SYSMON EVENT ID REFERENCE -->
<!-- ============================================================ -->
<template id="tpl-sysmon-reference">
<article class="topic">
<h1>06 · Sysmon Event ID Reference</h1>
<hr class="divider">

<p>Sysmon (System Monitor) is the most important endpoint telemetry source for SOC investigations. It logs process creation, network connections, file creation, registry changes, and more — providing the host-level visibility that network sensors cannot.</p>

<div class="callout note"><strong>Sysmon EIDs in Hunt queries:</strong> Use <code>event.code</code> to filter by Sysmon Event ID. Sysmon data appears under the <code>event.module: sysmon</code> dataset. Combine EIDs with process name, path, and parent process filters for precise hunting.</div>

<h3>EID 1 — Process Creation</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Aspect</th><th>Detail</th></tr></thead>
  <tbody>
    <tr><td><strong>What It Logs</strong></td><td>Every process start — executable path, command line arguments, parent process, user, process GUID, hashes (MD5/SHA256/IMPHASH)</td></tr>
    <tr><td><strong>Investigation Value</strong></td><td>The single most important Sysmon event — reveals what ran, who ran it, how it was launched, and its full command line</td></tr>
    <tr><td><strong>Malicious Indicators</strong></td><td>Encoded PowerShell (-enc flag); LOLBins with suspicious arguments (certutil -urlcache, mshta http://); process masquerading (svchost.exe from wrong path); Office spawning cmd/powershell</td></tr>
    <tr><td><strong>Legitimate Examples</strong></td><td>Standard Windows processes from System32; browser launches from explorer.exe; scheduled tasks from svchost.exe (Schedule service)</td></tr>
  </tbody>
</table></div>
<pre><code><span class="cm"># Hunt: All process creation on compromised host</span>
event.code: 1 AND host.ip: 192.168.56.129 | table @timestamp, process.name, process.executable, process.command_line, process.parent.name, user.name

<span class="cm"># Hunt: Encoded PowerShell execution</span>
event.code: 1 AND process.name: "powershell.exe" AND process.command_line: (*-enc* OR *-encoded* OR *FromBase64*)

<span class="cm"># Hunt: LOLBin abuse — certutil downloading files</span>
event.code: 1 AND process.name: "certutil.exe" AND process.command_line: (*-urlcache* OR *-split* OR *-decode*)

<span class="cm"># Hunt: Process execution from Temp directories</span>
event.code: 1 AND process.executable: (*\\Temp\\* OR *\\tmp\\* OR *\\AppData\\Local\\Temp\\*)</code></pre>

<h3>EID 3 — Network Connection</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Aspect</th><th>Detail</th></tr></thead>
  <tbody>
    <tr><td><strong>What It Logs</strong></td><td>TCP/UDP connections initiated by a process — source/dest IP:port, process name, process GUID, user</td></tr>
    <tr><td><strong>Investigation Value</strong></td><td>Links network connections to specific processes — answers "which process is talking to the C2 server?"</td></tr>
    <tr><td><strong>Malicious Indicators</strong></td><td>Non-browser processes making outbound connections (notepad.exe, rundll32.exe → internet); connections to known-bad IPs; connections on non-standard ports; process connecting to many different IPs rapidly (scanning)</td></tr>
    <tr><td><strong>Legitimate Examples</strong></td><td>Browser processes connecting to web servers; Windows Update (svchost.exe → Microsoft IPs); AV updates</td></tr>
  </tbody>
</table></div>
<pre><code><span class="cm"># Hunt: Which process on .129 is connecting to the C2?</span>
event.code: 3 AND host.ip: 192.168.56.129 AND destination.ip: 166.184.36.101 | table process.name, process.executable, destination.ip, destination.port

<span class="cm"># Hunt: Non-browser processes making external connections</span>
event.code: 3 AND NOT process.name: ("chrome.exe" OR "firefox.exe" OR "msedge.exe" OR "iexplore.exe" OR "svchost.exe") AND NOT destination.ip: (10.0.0.0/8 OR 172.16.0.0/12 OR 192.168.0.0/16)

<span class="cm"># Hunt: Process connecting to many unique IPs (scanning behavior)</span>
event.code: 3 AND source.ip: 192.168.56.129 | stats dc(destination.ip) as unique_dests by process.name | where unique_dests > 20</code></pre>

<h3>EID 8 — CreateRemoteThread</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Aspect</th><th>Detail</th></tr></thead>
  <tbody>
    <tr><td><strong>What It Logs</strong></td><td>A process creating a thread in another process — source process, target process, thread start address</td></tr>
    <tr><td><strong>Investigation Value</strong></td><td>Detects process injection — a core technique for malware to execute code inside legitimate processes to evade detection</td></tr>
    <tr><td><strong>Malicious Indicators</strong></td><td>Unknown process injecting into svchost.exe, explorer.exe, or lsass.exe; any process injecting into a browser; cross-session thread creation</td></tr>
    <tr><td><strong>Legitimate Examples</strong></td><td>AV/EDR products injecting for monitoring; debugging tools; some legitimate software updaters (rare — always verify)</td></tr>
  </tbody>
</table></div>
<pre><code><span class="cm"># Hunt: All remote thread creation (small dataset — usually few events)</span>
event.code: 8 | table @timestamp, process.name, process.executable, winlog.event_data.TargetImage, user.name

<span class="cm"># Hunt: Thread injection into lsass.exe (credential theft technique)</span>
event.code: 8 AND winlog.event_data.TargetImage: *\\lsass.exe

<span class="cm"># Hunt: Remote thread creation on compromised host</span>
event.code: 8 AND host.ip: 192.168.56.129</code></pre>

<h3>EID 10 — ProcessAccess</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Aspect</th><th>Detail</th></tr></thead>
  <tbody>
    <tr><td><strong>What It Logs</strong></td><td>A process opening another process — source process, target process, access mask (what permissions were requested)</td></tr>
    <tr><td><strong>Investigation Value</strong></td><td>Detects credential dumping (Mimikatz opening lsass.exe), process hollowing, and other memory manipulation techniques</td></tr>
    <tr><td><strong>Malicious Indicators</strong></td><td>Any non-system process accessing lsass.exe with PROCESS_VM_READ (0x0010); unknown process accessing lsass.exe with full access (0x1F0FFF); access to lsass from PowerShell or scripting engines</td></tr>
    <tr><td><strong>Legitimate Examples</strong></td><td>AV/EDR accessing lsass for monitoring; WerFault.exe (crash reporting); taskmgr.exe reading process memory</td></tr>
  </tbody>
</table></div>
<pre><code><span class="cm"># Hunt: Processes accessing lsass.exe (credential dumping detection)</span>
event.code: 10 AND winlog.event_data.TargetImage: *\\lsass.exe AND NOT process.name: ("MsMpEng.exe" OR "csrss.exe" OR "WerFault.exe" OR "taskmgr.exe" OR "svchost.exe")

<span class="cm"># Hunt: lsass access with suspicious access mask</span>
event.code: 10 AND winlog.event_data.TargetImage: *\\lsass.exe AND winlog.event_data.GrantedAccess: ("0x1F0FFF" OR "0x1010" OR "0x0810")</code></pre>

<h3>EID 11 — FileCreate</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Aspect</th><th>Detail</th></tr></thead>
  <tbody>
    <tr><td><strong>What It Logs</strong></td><td>File creation events — path, filename, creating process, timestamp</td></tr>
    <tr><td><strong>Investigation Value</strong></td><td>Detects malware dropping payloads, staging files, creating persistence scripts, or writing to startup folders</td></tr>
    <tr><td><strong>Malicious Indicators</strong></td><td>Executables created in Temp/AppData; files dropped in Startup folder; .bat/.ps1/.vbs files created by Office processes; DLLs dropped in System32 by non-installer processes</td></tr>
    <tr><td><strong>Legitimate Examples</strong></td><td>Windows Update dropping files; installer programs creating files in Program Files; browser download cache</td></tr>
  </tbody>
</table></div>
<pre><code><span class="cm"># Hunt: Executables created in Temp directories</span>
event.code: 11 AND file.path: (*\\Temp\\*.exe OR *\\Temp\\*.dll OR *\\Temp\\*.bat OR *\\Temp\\*.ps1)

<span class="cm"># Hunt: Files dropped in Startup folder (persistence)</span>
event.code: 11 AND file.path: *\\Start Menu\\Programs\\Startup\\*

<span class="cm"># Hunt: Files created on compromised host</span>
event.code: 11 AND host.ip: 192.168.56.129 | table @timestamp, file.path, process.name, process.executable</code></pre>

<h3>EID 12/13 — Registry Event (Create/Delete &amp; Value Set)</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Aspect</th><th>Detail</th></tr></thead>
  <tbody>
    <tr><td><strong>What It Logs</strong></td><td>EID 12: Registry key/value creation or deletion. EID 13: Registry value modification — key path, value name, value data, modifying process</td></tr>
    <tr><td><strong>Investigation Value</strong></td><td>Detects persistence mechanisms (Run keys, services), security tool tampering, and configuration changes</td></tr>
    <tr><td><strong>Malicious Indicators</strong></td><td>New Run/RunOnce entries by non-installer processes; changes to Image File Execution Options (IFEO); disabling Windows Defender via registry; adding entries to AppInit_DLLs; Winlogon Shell/Userinit modifications</td></tr>
    <tr><td><strong>Legitimate Examples</strong></td><td>Software installers adding Run keys; Group Policy updates; Windows Update registry changes</td></tr>
  </tbody>
</table></div>
<pre><code><span class="cm"># Hunt: New Run key entries (persistence)</span>
(event.code: 12 OR event.code: 13) AND registry.path: (*\\CurrentVersion\\Run\\* OR *\\CurrentVersion\\RunOnce\\*)

<span class="cm"># Hunt: Image File Execution Options modification (debugger hijack)</span>
(event.code: 12 OR event.code: 13) AND registry.path: *\\Image File Execution Options\\*

<span class="cm"># Hunt: Windows Defender tampering via registry</span>
event.code: 13 AND registry.path: *\\Windows Defender\\* AND registry.value: ("DisableAntiSpyware" OR "DisableRealtimeMonitoring")

<span class="cm"># Hunt: All registry changes on compromised host</span>
(event.code: 12 OR event.code: 13) AND host.ip: 192.168.56.129 | table @timestamp, registry.path, registry.value, process.name</code></pre>

<h3>EID 22 — DNSEvent (DNS Query)</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Aspect</th><th>Detail</th></tr></thead>
  <tbody>
    <tr><td><strong>What It Logs</strong></td><td>DNS queries made by processes on the endpoint — query name, query result, querying process</td></tr>
    <tr><td><strong>Investigation Value</strong></td><td>Links DNS queries to specific processes — while Zeek DNS shows network-level DNS, Sysmon EID 22 shows which process on the host made each query</td></tr>
    <tr><td><strong>Malicious Indicators</strong></td><td>Non-browser processes resolving external domains; DNS queries for known-bad domains; high volume of unique domain queries from a single process (DGA); DNS queries from processes that should not need network access</td></tr>
    <tr><td><strong>Legitimate Examples</strong></td><td>Browser DNS lookups; svchost.exe resolving Microsoft domains; AV checking update servers</td></tr>
  </tbody>
</table></div>
<pre><code><span class="cm"># Hunt: DNS queries from the malware process</span>
event.code: 22 AND process.name: "svchost.exe" AND process.executable: *\\Temp\\* | table dns.question.name, process.executable

<span class="cm"># Hunt: Non-browser DNS queries to external domains</span>
event.code: 22 AND NOT process.name: ("chrome.exe" OR "firefox.exe" OR "msedge.exe" OR "svchost.exe") AND NOT dns.question.name: (*.microsoft.com OR *.windows.com OR *.windowsupdate.com)

<span class="cm"># Hunt: Process making many unique DNS queries (DGA behavior)</span>
event.code: 22 | stats dc(dns.question.name) as unique_domains by process.name | where unique_domains > 50</code></pre>

<h3>Quick Reference Table</h3>
<div class="table-wrap"><table>
  <thead><tr><th>EID</th><th>Name</th><th>Primary Use Case</th><th>Key Query Field</th></tr></thead>
  <tbody>
    <tr><td>1</td><td>Process Creation</td><td>What ran? Who ran it? What command line?</td><td>process.command_line, process.parent.name</td></tr>
    <tr><td>3</td><td>Network Connection</td><td>Which process is making network connections?</td><td>process.name + destination.ip</td></tr>
    <tr><td>8</td><td>CreateRemoteThread</td><td>Process injection detection</td><td>winlog.event_data.TargetImage</td></tr>
    <tr><td>10</td><td>ProcessAccess</td><td>Credential dumping (lsass access)</td><td>winlog.event_data.TargetImage + GrantedAccess</td></tr>
    <tr><td>11</td><td>FileCreate</td><td>Malware dropping payloads, persistence scripts</td><td>file.path + process.name</td></tr>
    <tr><td>12/13</td><td>Registry Event</td><td>Persistence mechanisms, security tool tampering</td><td>registry.path + registry.value</td></tr>
    <tr><td>22</td><td>DNSEvent</td><td>Process-level DNS resolution</td><td>dns.question.name + process.name</td></tr>
  </tbody>
</table></div>

</article>
</template>

<!-- 07 IOC COLLECTION STANDARD -->

<template id="tpl-ioc-collection">
<article class="topic">
<h1>07 · IOC Collection Standard</h1>
<hr class="divider">

<p>Indicators of Compromise (IOCs) are the forensic artifacts that prove malicious activity occurred. Consistent, thorough IOC collection is what separates a useful investigation from one that cannot support remediation or legal action.</p>

<h3>IOC Types and Collection Methods</h3>
<div class="table-wrap"><table>
  <thead><tr><th>IOC Type</th><th>Examples</th><th>Where to Find It</th><th>Hunt Query</th><th>Documentation Format</th></tr></thead>
  <tbody>
    <tr>
      <td><strong>IP Address</strong></td>
      <td>C2 server: 166.184.36.101<br>Scanning source: 45.33.32.156</td>
      <td>Zeek conn logs, Suricata alerts, Sysmon EID 3, firewall logs</td>
      <td><code>destination.ip: 166.184.36.101</code></td>
      <td>IP | Direction (inbound/outbound) | Port | Protocol | Context (C2/scan/exfil) | First seen | Last seen</td>
    </tr>
    <tr>
      <td><strong>Domain</strong></td>
      <td>evil-update.com<br>c2.attacker-infra.net</td>
      <td>Zeek DNS logs, Sysmon EID 22, HTTP host headers, SSL SNI</td>
      <td><code>event.dataset: zeek.dns AND dns.question.name: *evil-update*</code></td>
      <td>Domain | Resolved IP(s) | Querying host(s) | Query count | Context</td>
    </tr>
    <tr>
      <td><strong>File Hash</strong></td>
      <td>SHA256: a1b2c3d4...<br>MD5: deadbeef...</td>
      <td>Sysmon EID 1 (process hash), Sysmon EID 11 (file hash), Zeek file log</td>
      <td><code>event.code: 1 AND process.hash.sha256: "a1b2c3d4..."</code></td>
      <td>Hash (SHA256 preferred) | Algorithm | Filename | Path | VT detection ratio | First seen</td>
    </tr>
    <tr>
      <td><strong>Filename</strong></td>
      <td>svchost.exe (in wrong path)<br>WindowsUpdate.bat</td>
      <td>Sysmon EID 1, Sysmon EID 11, Zeek file log, SMB file log</td>
      <td><code>event.code: 11 AND file.name: "WindowsUpdate.bat"</code></td>
      <td>Filename | Full path | Creating process | Host(s) found on | Timestamps</td>
    </tr>
    <tr>
      <td><strong>User Account</strong></td>
      <td>jaya.kearney (compromised)<br>svc_backup (abused service account)</td>
      <td>Sysmon EID 1 (user field), Kerberos logs, Windows Security Event Log (4624/4625)</td>
      <td><code>user.name: "jaya.kearney" AND event.code: 1</code></td>
      <td>Username | Domain | Account type (user/service/admin) | Compromised how | Credential reset status</td>
    </tr>
    <tr>
      <td><strong>Registry Key</strong></td>
      <td>HKLM\...\Run\WindowsUpdate<br>HKCU\...\RunOnce\Updater</td>
      <td>Sysmon EID 12/13, live registry export, Autoruns output</td>
      <td><code>event.code: 13 AND registry.path: *\\Run\\WindowsUpdate</code></td>
      <td>Full registry path | Value name | Value data | Modifying process | Timestamp</td>
    </tr>
    <tr>
      <td><strong>Network String</strong></td>
      <td>User-Agent: "RevengeRAT"<br>JA3: abc123...<br>SNI: empty</td>
      <td>Zeek HTTP (User-Agent), Zeek SSL (JA3/JA3S, SNI), Suricata payload</td>
      <td><code>event.dataset: zeek.http AND user_agent.original: *Revenge*</code></td>
      <td>String type (UA/JA3/SNI/payload) | Exact value | Where observed | Associated IP/host</td>
    </tr>
  </tbody>
</table></div>

<h3>Pivoting with Correlation IDs</h3>
<p>Three critical IDs link data across different log sources:</p>

<div class="table-wrap"><table>
  <thead><tr><th>ID Type</th><th>What It Is</th><th>Where It Appears</th><th>How to Pivot</th></tr></thead>
  <tbody>
    <tr>
      <td><strong>Community ID</strong></td>
      <td>A hash that uniquely identifies a network flow (src IP + dst IP + src port + dst port + protocol)</td>
      <td>Suricata alerts, Zeek conn, Zeek DNS/HTTP/SSL/files</td>
      <td>Copy Community ID from alert → search across all datasets: <code>network.community_id: "1:xyz..."</code> — returns the Suricata alert, Zeek connection record, and all application-layer logs for that flow</td>
    </tr>
    <tr>
      <td><strong>FUID (Zeek File UID)</strong></td>
      <td>Unique identifier for a file transfer observed by Zeek</td>
      <td>Zeek files log, linked to connection that transferred it</td>
      <td>Find suspicious file in zeek.files → use FUID to find the connection: <code>zeek.files.fuid: "FxZw123..."</code> — then pivot to connection via the conn UID from the files log</td>
    </tr>
    <tr>
      <td><strong>Entity ID (Sysmon Process GUID)</strong></td>
      <td>Unique identifier for a process instance on an endpoint</td>
      <td>All Sysmon events for that process (EID 1, 3, 11, etc.)</td>
      <td>Find malicious process in EID 1 → use Entity ID to find all its activity: <code>process.entity_id: "{abc-123-def}"</code> — returns network connections (EID 3), files created (EID 11), registry changes (EID 12/13), DNS queries (EID 22)</td>
    </tr>
  </tbody>
</table></div>

<h3>VirusTotal Workflow</h3>
<p>VirusTotal is the primary external enrichment source for IOC validation. Follow this workflow for every IOC:</p>

<div class="table-wrap"><table>
  <thead><tr><th>Step</th><th>Action</th><th>What to Record</th></tr></thead>
  <tbody>
    <tr><td>1</td><td>Search the hash (SHA256 preferred) on virustotal.com</td><td>Detection ratio (e.g., 42/70), malware family name, first submission date</td></tr>
    <tr><td>2</td><td>Check the "Details" tab</td><td>File type, file size, PE compilation timestamp, import table (packed = suspicious)</td></tr>
    <tr><td>3</td><td>Check the "Behavior" tab</td><td>Processes spawned, files dropped, registry keys modified, network connections</td></tr>
    <tr><td>4</td><td>Check the "Relations" tab</td><td>Related domains, IPs contacted, files bundled with, parent/child samples</td></tr>
    <tr><td>5</td><td>Search the C2 IP on virustotal.com</td><td>How many samples contact this IP, domain history, whois data, ASN</td></tr>
    <tr><td>6</td><td>Search the domain on virustotal.com</td><td>Resolution history (IP changes), subdomains, associated samples, creation date</td></tr>
  </tbody>
</table></div>

<div class="callout warn"><strong>VirusTotal Caveats:</strong>
<ul>
  <li>0/70 detection does NOT mean the file is safe — it could be a new/custom sample not yet signatured</li>
  <li>Low detection ratios (2-5/70) may indicate a new variant or targeted malware</li>
  <li>Check first submission date — if very recent, AV signatures may not exist yet</li>
  <li>Do NOT upload files from your environment to VT — this alerts the attacker via VT Intelligence. Search by hash only.</li>
</ul>
</div>

<h3>Evidence Documentation Format</h3>
<p>Every IOC entry in your investigation notes should follow this format:</p>

<pre><code>═══════════════════════════════════════════════════════
IOC ENTRY
═══════════════════════════════════════════════════════
Type:           [IP | Domain | Hash | File | Account | Registry | Network String]
Value:          [The actual indicator]
Context:        [C2 | Exfil | Persistence | Lateral Movement | Initial Access]
Source:         [Which log/dataset it was found in]
First Seen:     [Timestamp — UTC]
Last Seen:      [Timestamp — UTC]
Affected Hosts: [List of internal IPs/hostnames]
VT Result:      [Detection ratio or "Not found"]
Confidence:     [High | Medium | Low]
Notes:          [Any additional context]
═══════════════════════════════════════════════════════</code></pre>
