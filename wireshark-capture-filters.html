<!-- ══════════════════════════════ BPF Syntax ══════════════════════════════ -->
<template id="tpl-bpf-syntax">
<article class="topic">
  <h2>BPF Syntax</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l2">L2 Data Link</span>
    <span class="osi-chip l3">L3 Network</span>
    <span class="osi-chip l4">L4 Transport</span>
    <span class="osi-note">BPF executes in-kernel at packet arrival, examining Ethernet (L2) frames, IP (L3) headers, and TCP/UDP (L4) port and flag fields via byte offsets.</span>
  </div>
  <p>Capture filters use <strong>Berkeley Packet Filter (BPF)</strong> syntax — compiled to bytecode and executed in the kernel before packets reach Wireshark. Non-matching packets are discarded immediately and never written to the PCAP.</p>

  <div class="callout warn">
    <strong>Capture vs. Display Filters:</strong> These are completely different languages. <code>tcp.flags.syn==1</code> is a display filter. <code>tcp[13]&amp;2!=0</code> is the BPF equivalent. You cannot mix them.
  </div>

  <h3>BPF Qualifiers</h3>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Qualifier Type</th><th>Keywords</th><th>Example</th><th>Meaning</th></tr></thead>
      <tbody>
        <tr><td><strong>Type</strong></td><td>host, net, port, portrange</td><td><code>host 10.0.0.1</code></td><td>Match host/network/port</td></tr>
        <tr><td><strong>Direction</strong></td><td>src, dst, src or dst, src and dst</td><td><code>src host 10.0.0.1</code></td><td>Apply qualifier to source/destination</td></tr>
        <tr><td><strong>Protocol</strong></td><td>ether, ip, ip6, tcp, udp, icmp, arp</td><td><code>tcp</code></td><td>Filter by protocol</td></tr>
      </tbody>
    </table>
  </div>

  <h3>Logical Operators</h3>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Operator</th><th>Symbols</th><th>Example</th></tr></thead>
      <tbody>
        <tr><td>AND</td><td><code>and</code> / <code>&amp;&amp;</code></td><td><code>host 10.0.0.1 and tcp</code></td></tr>
        <tr><td>OR</td><td><code>or</code> / <code>||</code></td><td><code>port 80 or port 443</code></td></tr>
        <tr><td>NOT</td><td><code>not</code> / <code>!</code></td><td><code>not port 22</code></td></tr>
        <tr><td>Grouping</td><td><code>( )</code></td><td><code>(port 80 or port 8080) and tcp</code></td></tr>
      </tbody>
    </table>
  </div>

  <h3>Byte-Offset Filters</h3>
  <p>BPF allows raw byte access using <code>proto[offset:size]</code> when no named field exists:</p>
  <pre><code>proto[offset:size] &amp; mask operator value

<span class="cm"># TCP flags byte (byte 13 of TCP header)</span>
tcp[13]                      <span class="cm"># Raw TCP flags byte</span>
tcp[13] &amp; 0x02 != 0          <span class="cm"># SYN flag set</span>
tcp[13] &amp; 0x10 != 0          <span class="cm"># ACK flag set</span>
tcp[13] &amp; 0x04 != 0          <span class="cm"># RST flag set</span>
tcp[13] &amp; 0x01 != 0          <span class="cm"># FIN flag set</span>
tcp[13] &amp; 0x12 == 0x12       <span class="cm"># SYN+ACK (0x02 | 0x10)</span>
tcp[13] == 0x02              <span class="cm"># Pure SYN (no ACK)</span>

<span class="cm"># IP header byte access</span>
ip[8]                        <span class="cm"># TTL field</span>
ip[9] == 6                   <span class="cm"># Protocol = TCP</span>
ip[9] == 17                  <span class="cm"># Protocol = UDP</span>
ip[9] == 1                   <span class="cm"># Protocol = ICMP</span>

<span class="cm"># Match HTTP GET in TCP payload</span>
tcp[((tcp[12:1]&gt;&gt;4)*4):4] == 0x47455420  <span class="cm"># "GET " ASCII</span></code></pre>

  <h3>TCP Flags Quick Reference</h3>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Flag</th><th>Bit</th><th>Hex Mask</th><th>BPF Expression</th></tr></thead>
      <tbody>
        <tr><td>FIN</td><td>0</td><td>0x01</td><td><code>tcp[13] &amp; 1 != 0</code></td></tr>
        <tr><td>SYN</td><td>1</td><td>0x02</td><td><code>tcp[13] &amp; 2 != 0</code></td></tr>
        <tr><td>RST</td><td>2</td><td>0x04</td><td><code>tcp[13] &amp; 4 != 0</code></td></tr>
        <tr><td>PSH</td><td>3</td><td>0x08</td><td><code>tcp[13] &amp; 8 != 0</code></td></tr>
        <tr><td>ACK</td><td>4</td><td>0x10</td><td><code>tcp[13] &amp; 16 != 0</code></td></tr>
        <tr><td>URG</td><td>5</td><td>0x20</td><td><code>tcp[13] &amp; 32 != 0</code></td></tr>
        <tr><td>SYN+ACK</td><td>1+4</td><td>0x12</td><td><code>tcp[13] == 18</code></td></tr>
        <tr><td>Null scan</td><td>none</td><td>0x00</td><td><code>tcp[13] == 0</code></td></tr>
        <tr><td>Xmas scan</td><td>FIN+PSH+URG</td><td>0x29</td><td><code>tcp[13] == 41</code></td></tr>
      </tbody>
    </table>
  </div>

  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Core Concepts</summary>
    <div class="tier-body"><ul>
      <li>Know the 3 BPF qualifier types: <strong>type</strong> (host/net/port), <strong>direction</strong> (src/dst), and <strong>protocol</strong> (tcp/udp/icmp/arp)</li>
      <li>Write simple single-host filters: <code>host 192.168.56.30</code> on Security Onion's eth1 monitoring interface</li>
      <li>Combine with AND/OR/NOT: <code>host 192.168.56.30 and tcp port 445</code></li>
      <li>Understand that BPF filters are applied at capture time — excluded packets are permanently gone from the PCAP</li>
      <li>Know that <code>tcp.flags.syn==1</code> is a display filter, NOT a BPF filter — different languages entirely</li>
    </ul></div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Deeper Skills</summary>
    <div class="tier-body"><ul>
      <li>Use TCP flag byte offsets: <code>tcp[13] &amp; 0x02 != 0</code> (SYN), <code>tcp[13] &amp; 0x04 != 0</code> (RST), <code>tcp[13] == 0x02</code> (pure SYN)</li>
      <li>Access IP header fields directly: <code>ip[9] == 6</code> (protocol = TCP), <code>ip[8]</code> (TTL field)</li>
      <li>Group expressions with parentheses: <code>(tcp port 80 or tcp port 443) and host 10.0.0.5</code></li>
      <li>Identify Xmas scan packets with <code>tcp[13] == 41</code> (FIN+PSH+URG = 0x29) and Null scans with <code>tcp[13] == 0</code></li>
    </ul></div>
  </details>
  <details class="tier advanced">
    <summary>🔴 Advanced — Expert Techniques</summary>
    <div class="tier-body"><ul>
      <li>Use <code>proto[offset:size] &amp; mask op value</code> for arbitrary header byte extraction at any depth</li>
      <li>Match L7 payload start bytes: <code>tcp[((tcp[12:1]&gt;&gt;4)*4):4] == 0x47455420</code> captures "GET " in TCP data</li>
      <li>Combine multiple byte-level conditions to detect specific attack patterns (e.g., fragmented IP + specific TTL range)</li>
      <li>Understand BPF bytecode compilation: minimize branching for high-throughput kernel-level filtering on 10Gbps+ taps</li>
    </ul></div>
  </details>
</article>
</template>

<!-- ══════════════════════════ Display vs. Capture ══════════════════════════ -->
<template id="tpl-display-vs-capture">
<article class="topic">
  <h2>Display vs. Capture Filters</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l2">L2 Data Link</span>
    <span class="osi-chip l3">L3 Network</span>
    <span class="osi-chip l4">L4 Transport</span>
    <span class="osi-note">Capture filters (BPF) work at L2–L4 in the kernel; display filters add L7 field-level awareness after Wireshark's protocol dissectors run.</span>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr><th>Property</th><th>Capture Filter (BPF)</th><th>Display Filter</th></tr></thead>
      <tbody>
        <tr><td><strong>When applied</strong></td><td>During capture (kernel level)</td><td>After capture (UI/post-processing)</td></tr>
        <tr><td><strong>Syntax</strong></td><td>Berkeley Packet Filter (BPF)</td><td>Wireshark display filter language</td></tr>
        <tr><td><strong>Location in UI</strong></td><td>Capture → Options → BPF filter box</td><td>Filter toolbar above packet list</td></tr>
        <tr><td><strong>tshark flag</strong></td><td><code>-f "bpf expr"</code></td><td><code>-Y "display filter"</code></td></tr>
        <tr><td><strong>Performance</strong></td><td>Maximum — non-matching packets never stored</td><td>All packets buffered, then filtered in RAM</td></tr>
        <tr><td><strong>Can change</strong></td><td>No — must restart capture</td><td>Yes — any time, non-destructive</td></tr>
        <tr><td><strong>Packet loss risk</strong></td><td>Yes — excluded packets permanently gone</td><td>No — remove filter to see everything</td></tr>
        <tr><td><strong>Named fields</strong></td><td>No — primitives and byte offsets only</td><td>Yes — full protocol dissector fields</td></tr>
        <tr><td><strong>Typical use</strong></td><td>High-traffic environments, PCAP size control</td><td>Triage, hunting, detailed analysis</td></tr>
      </tbody>
    </table>
  </div>

  <h3>Equivalent Filter Comparison</h3>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Goal</th><th>Capture Filter (BPF)</th><th>Display Filter</th></tr></thead>
      <tbody>
        <tr><td>Traffic to/from host</td><td><code>host 10.0.0.5</code></td><td><code>ip.addr == 10.0.0.5</code></td></tr>
        <tr><td>Traffic from host</td><td><code>src host 10.0.0.5</code></td><td><code>ip.src == 10.0.0.5</code></td></tr>
        <tr><td>TCP port 80</td><td><code>tcp port 80</code></td><td><code>tcp.port == 80</code></td></tr>
        <tr><td>Exclude SSH</td><td><code>not port 22</code></td><td><code>!tcp.port == 22</code></td></tr>
        <tr><td>HTTP only</td><td><code>tcp port 80</code></td><td><code>http</code></td></tr>
        <tr><td>DNS only</td><td><code>udp port 53</code></td><td><code>dns</code></td></tr>
        <tr><td>SYN packets</td><td><code>tcp[13] == 2</code></td><td><code>tcp.flags.syn==1 and tcp.flags.ack==0</code></td></tr>
        <tr><td>Subnet traffic</td><td><code>net 192.168.1.0/24</code></td><td><code>ip.addr == 192.168.1.0/24</code></td></tr>
        <tr><td>Port range</td><td><code>tcp portrange 1024-65535</code></td><td><code>tcp.port &gt;= 1024</code></td></tr>
        <tr><td>ICMP</td><td><code>icmp</code></td><td><code>icmp</code></td></tr>
        <tr><td>ARP</td><td><code>arp</code></td><td><code>arp</code></td></tr>
        <tr><td>No broadcast</td><td><code>not broadcast and not multicast</code></td><td><code>eth.dst != ff:ff:ff:ff:ff:ff</code></td></tr>
        <tr><td>RST packets</td><td><code>tcp[13] &amp; 4 != 0</code></td><td><code>tcp.flags.reset == 1</code></td></tr>
      </tbody>
    </table>
  </div>

  <h3>Setting a Capture Filter</h3>
  <pre><code><span class="cm"># Wireshark GUI:</span>
Capture → Options (Ctrl+K)
Select interface → enter BPF in "Capture filter" box → Start

<span class="cm"># tshark command line (-f = capture filter, -Y = display filter):</span>
tshark -i eth0 -f "tcp port 80 or tcp port 443"
tshark -i eth0 -f "host 10.0.0.5 and not port 22"

<span class="cm"># Write filtered capture to PCAP:</span>
tshark -i eth0 -f "tcp port 443" -w /tmp/tls.pcap</code></pre>

  <div class="callout note">
    <strong>When to use capture filters:</strong> Use them on high-traffic span/tap ports where capturing everything would fill disk within minutes. Start narrow, then widen the display filter for analysis. Never use a capture filter when you're unsure what you're looking for — you might exclude the malicious traffic.
  </div>

  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Core Concepts</summary>
    <div class="tier-body"><ul>
      <li>Know the fundamental difference: BPF = kernel-level, capture-time; Display = post-capture, UI-level, non-destructive</li>
      <li>Set a BPF filter before starting a capture in Wireshark: Capture → Options → enter BPF in "Capture filter" box</li>
      <li>Understand you <strong>cannot change</strong> a capture filter mid-capture without restarting — excluded packets are permanently lost</li>
      <li>Use display filters freely during analysis — they are reversible and don't discard packets from the PCAP</li>
    </ul></div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Deeper Skills</summary>
    <div class="tier-body"><ul>
      <li>Use both <code>-f</code> (BPF) and <code>-Y</code> (display) simultaneously in tshark: <code>tshark -i eth0 -f "tcp port 80" -Y "http.request.method == \"POST\""</code></li>
      <li>Convert between equivalent expressions: <code>tcp port 80</code> (BPF) ↔ <code>tcp.port == 80</code> (display); <code>tcp[13] == 2</code> ↔ <code>tcp.flags.syn==1 and tcp.flags.ack==0</code></li>
      <li>On Security Onion, apply a BPF to eth1 (monitor interface) to reduce PCAP volume before Zeek/Suricata processing</li>
    </ul></div>
  </details>
  <details class="tier advanced">
    <summary>🔴 Advanced — Expert Techniques</summary>
    <div class="tier-body"><ul>
      <li>Design layered filter strategies for high-volume SPAN ports: broad BPF to discard irrelevant traffic + targeted display filter for analysis</li>
      <li>Quantify the performance trade-off: BPF drops packets before ring buffer write; display filters consume RAM proportional to total captured volume</li>
      <li>Avoid over-filtering with BPF in incident response — unknown attack traffic may use unexpected ports; start with minimal BPF and aggressive display filters instead</li>
      <li>Use <code>tshark -f "host 192.168.56.30" -Y "http or dns or smb2" -T fields</code> to extract only relevant L7 fields while capturing a full host's traffic</li>
    </ul></div>
  </details>
</article>
</template>

<!-- ══════════════════════════ Common BPF Filters ═══════════════════════════ -->
<template id="tpl-common-bpf">
<article class="topic">
  <h2>Common Capture Filters</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l2">L2 Data Link</span>
    <span class="osi-chip l3">L3 Network</span>
    <span class="osi-chip l4">L4 Transport</span>
    <span class="osi-note">ARP primitives target L2 frames; host/net/ICMP filters address L3 IP traffic; port/TCP flag filters inspect L4 transport headers.</span>
  </div>

  <h3>Host and Network</h3>
  <pre><code><span class="cm"># All traffic to/from a specific host</span>
host 192.168.1.100

<span class="cm"># Source host only</span>
src host 192.168.1.100

<span class="cm"># Destination host only</span>
dst host 192.168.1.100

<span class="cm"># Exclude your own management station</span>
not host 192.168.1.1

<span class="cm"># Entire subnet</span>
net 10.0.0.0/8
net 192.168.1.0/24

<span class="cm"># Traffic between two specific hosts</span>
host 10.0.0.1 and host 10.0.0.2

<span class="cm"># Outbound from internal subnet</span>
src net 192.168.0.0/16

<span class="cm"># Inbound to internal subnet only</span>
dst net 10.0.0.0/8</code></pre>

  <h3>Port and Protocol</h3>
  <pre><code><span class="cm"># Single port (either direction)</span>
tcp port 80
udp port 53

<span class="cm"># Multiple ports</span>
port 80 or port 443 or port 8080
tcp port 80 or tcp port 443

<span class="cm"># Port range</span>
tcp portrange 8000-8999

<span class="cm"># Protocol primitives</span>
tcp          <span class="cm"># All TCP</span>
udp          <span class="cm"># All UDP</span>
icmp         <span class="cm"># All ICMP</span>
arp          <span class="cm"># All ARP</span>
ip6          <span class="cm"># All IPv6</span>

<span class="cm"># Exclude common noise to reduce PCAP size</span>
not arp and not udp port 5353 and not broadcast</code></pre>

  <h3>SOC-Specific Capture Filters</h3>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Use Case</th><th>Capture Filter</th></tr></thead>
      <tbody>
        <tr><td>Web traffic</td><td><code>tcp port 80 or tcp port 443 or tcp port 8080 or tcp port 8443</code></td></tr>
        <tr><td>DNS monitoring</td><td><code>udp port 53 or tcp port 53</code></td></tr>
        <tr><td>SMB / lateral movement</td><td><code>tcp port 445 or tcp port 139</code></td></tr>
        <tr><td>Email protocols</td><td><code>tcp port 25 or tcp port 587 or tcp port 993 or tcp port 995</code></td></tr>
        <tr><td>RDP</td><td><code>tcp port 3389</code></td></tr>
        <tr><td>WinRM / PSRemoting</td><td><code>tcp port 5985 or tcp port 5986</code></td></tr>
        <tr><td>Non-standard ports only</td><td><code>not (tcp port 80 or port 443 or port 22 or port 53 or port 25)</code></td></tr>
        <tr><td>Exclude management traffic</td><td><code>not host 192.168.1.1 and not port 22</code></td></tr>
        <tr><td>ICMP only</td><td><code>icmp</code></td></tr>
        <tr><td>SYN scan detection</td><td><code>tcp[13] == 2</code></td></tr>
        <tr><td>C2 common ports</td><td><code>tcp port 4444 or tcp port 1337 or tcp port 8888 or tcp port 9001</code></td></tr>
        <tr><td>Kerberos</td><td><code>tcp port 88 or udp port 88</code></td></tr>
        <tr><td>LDAP / AD</td><td><code>tcp port 389 or tcp port 636 or tcp port 3268</code></td></tr>
      </tbody>
    </table>
  </div>

  <h3>Noise Reduction Patterns</h3>
  <pre><code><span class="cm"># Strip common multicast/broadcast noise</span>
not broadcast and not multicast

<span class="cm"># Strip ARP, mDNS, SSDP</span>
not arp and not udp port 5353 and not udp port 1900

<span class="cm"># Strip DHCP</span>
not (udp port 67 or udp port 68)

<span class="cm"># Production traffic only (remove management protocols)</span>
not (arp or udp port 5353 or udp port 1900 or broadcast or udp port 67)</code></pre>

  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Core Concepts</summary>
    <div class="tier-body"><ul>
      <li>Use <code>host 192.168.56.30</code> to isolate the Windows 10 target VM; <code>host 192.168.56.10</code> for Kali attacker traffic</li>
      <li>Filter by protocol: <code>tcp</code>, <code>udp</code>, <code>icmp</code>, <code>arp</code> — use these alone to triage traffic types on a segment</li>
      <li>Reduce background noise with <code>not arp and not udp port 5353</code> before investigating specific hosts</li>
      <li>Use <code>tcp port 445</code> to capture SMB traffic for lateral movement detection between lab hosts</li>
    </ul></div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Deeper Skills</summary>
    <div class="tier-body"><ul>
      <li>Combine subnet and port: <code>src net 192.168.56.0/24 and tcp port 445</code> to catch internal SMB connections</li>
      <li>Apply SOC-specific filter combos: <code>tcp port 4444 or tcp port 1337 or tcp port 8888</code> for common C2 callback ports</li>
      <li>Strip management noise while keeping threats: <code>not (host 192.168.56.1 or port 22) and tcp</code></li>
      <li>Capture full AD authentication traffic: <code>tcp port 88 or udp port 88 or tcp port 389 or tcp port 445</code></li>
    </ul></div>
  </details>
  <details class="tier advanced">
    <summary>🔴 Advanced — Expert Techniques</summary>
    <div class="tier-body"><ul>
      <li>Design production noise-reduction suites for span port captures: strip ARP, mDNS, SSDP, DHCP, broadcast in a single BPF before ring buffer write</li>
      <li>Use <code>tcp[13] == 2</code> exclusively for SYN-only captures during active scanning detection to minimise PCAP volume</li>
      <li>Combine C2 port list with non-standard high-port catch-all: <code>(tcp portrange 4000-9999) and not (port 5432 or port 8080)</code> for unknown C2 beacon hunting</li>
      <li>Integrate BPF filter design with Security Onion's sensor tuning to reduce sensor load while preserving forensic fidelity</li>
    </ul></div>
  </details>
</article>
</template>

<!-- ══════════════════════════ tshark Integration ═══════════════════════════ -->
<template id="tpl-tshark-capture">
<article class="topic">
  <h2>tshark Capture Integration</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l3">L3 Network</span>
    <span class="osi-chip l4">L4 Transport</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">tshark bridges BPF capture filters (L3/L4 kernel-level) with display filter field extraction and protocol dissectors that reach L7 application data.</span>
  </div>
  <p>tshark is the command-line version of Wireshark. Use <code>-f</code> for BPF capture filters during live capture, and <code>-Y</code> for display filters when reading or live-printing.</p>

  <h3>Basic tshark Syntax</h3>
  <pre><code><span class="cm"># List available interfaces</span>
tshark -D

<span class="cm"># Basic live capture to stdout</span>
tshark -i eth0

<span class="cm"># Apply BPF capture filter</span>
tshark -i eth0 -f "tcp port 80"

<span class="cm"># Write to PCAP file</span>
tshark -i eth0 -f "tcp port 443" -w /tmp/tls.pcap

<span class="cm"># Capture filter + display filter (both layers)</span>
tshark -i eth0 \
  -f "tcp port 80" \
  -Y "http.request.method == \"GET\""

<span class="cm"># Read existing PCAP with display filter</span>
tshark -r capture.pcap -Y "ip.addr == 10.0.0.5"

<span class="cm"># No name resolution (-n) for speed</span>
tshark -i eth0 -n -f "tcp port 445"</code></pre>

  <h3>Ring Buffer and Rotation</h3>
  <p>For long-running captures on high-traffic networks where a single large file is impractical:</p>
  <pre><code><span class="cm"># Ring buffer: 10 files × 100 MB each, overwrite oldest</span>
tshark -i eth0 -b filesize:102400 -b files:10 -w /captures/ring.pcap

<span class="cm"># Rotate every 5 minutes, keep last 12 (1 hour window)</span>
tshark -i eth0 -b duration:300 -b files:12 -w /captures/rotate.pcap

<span class="cm"># Stop after N packets</span>
tshark -i eth0 -c 1000 -w output.pcap

<span class="cm"># Auto-stop after 60 seconds</span>
tshark -i eth0 -a duration:60 -w output.pcap

<span class="cm"># Auto-stop when file reaches 50 MB</span>
tshark -i eth0 -a filesize:51200 -w output.pcap

<span class="cm"># Combine ring + auto-stop: rotate every 5 min, max 12 files</span>
tshark -i eth0 -b duration:300 -b files:12 -a files:12 -w /captures/hourly.pcap</code></pre>

  <h3>Field Extraction During Capture</h3>
  <pre><code><span class="cm"># Capture HTTP, live-print method + URI to CSV</span>
tshark -i eth0 -f "tcp port 80" -Y "http.request" \
  -T fields -e http.request.method -e http.host -e http.request.uri \
  -E header=y -E separator=,

<span class="cm"># Capture DNS queries live</span>
tshark -i eth0 -f "udp port 53" -Y "dns.flags.response == 0" \
  -T fields -e frame.time_epoch -e ip.src -e dns.qry.name

<span class="cm"># Show TLS SNI from Client Hello packets</span>
tshark -i eth0 -f "tcp port 443" \
  -Y "tls.handshake.type == 1" \
  -T fields -e ip.src -e ip.dst -e tls.handshake.extensions_server_name

<span class="cm"># Statistics summary after capture (-q suppresses per-packet output)</span>
tshark -i eth0 -f "tcp port 445" -a duration:60 -q -z conv,tcp</code></pre>

  <h3>Key tshark Flags</h3>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Flag</th><th>Purpose</th><th>Example</th></tr></thead>
      <tbody>
        <tr><td><code>-i</code></td><td>Interface</td><td><code>-i eth0</code></td></tr>
        <tr><td><code>-f</code></td><td>BPF capture filter</td><td><code>-f "tcp port 80"</code></td></tr>
        <tr><td><code>-w</code></td><td>Write PCAP</td><td><code>-w out.pcap</code></td></tr>
        <tr><td><code>-r</code></td><td>Read PCAP</td><td><code>-r in.pcap</code></td></tr>
        <tr><td><code>-Y</code></td><td>Display filter</td><td><code>-Y "http"</code></td></tr>
        <tr><td><code>-c</code></td><td>Packet count stop</td><td><code>-c 500</code></td></tr>
        <tr><td><code>-a</code></td><td>Auto-stop condition</td><td><code>-a duration:60</code></td></tr>
        <tr><td><code>-b</code></td><td>Ring buffer condition</td><td><code>-b filesize:10240</code></td></tr>
        <tr><td><code>-s</code></td><td>Snap length (bytes per packet)</td><td><code>-s 96</code></td></tr>
        <tr><td><code>-q</code></td><td>Quiet — suppress per-packet lines</td><td><code>-q</code></td></tr>
        <tr><td><code>-T fields</code></td><td>Output specific fields only</td><td><code>-T fields -e ip.src</code></td></tr>
        <tr><td><code>-e</code></td><td>Field to extract (with -T fields)</td><td><code>-e dns.qry.name</code></td></tr>
        <tr><td><code>-z</code></td><td>Statistics module</td><td><code>-z conv,tcp</code></td></tr>
        <tr><td><code>-D</code></td><td>List interfaces</td><td><code>-D</code></td></tr>
        <tr><td><code>-n</code></td><td>Disable name resolution</td><td><code>-n</code></td></tr>
      </tbody>
    </table>
  </div>

  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Core Concepts</summary>
    <div class="tier-body"><ul>
      <li>List interfaces on Security Onion with <code>tshark -D</code>; identify eth1 as the monitoring (promiscuous) interface</li>
      <li>Capture to file: <code>tshark -i eth1 -f "tcp port 445" -w /tmp/smb.pcap</code></li>
      <li>Read an existing PCAP: <code>tshark -r /tmp/smb.pcap -Y "smb2.cmd == 5"</code></li>
      <li>Use <code>-n</code> to disable reverse DNS lookups and speed up live captures in the lab</li>
    </ul></div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Deeper Skills</summary>
    <div class="tier-body"><ul>
      <li>Rotate captures with ring buffer: <code>tshark -i eth1 -b duration:300 -b files:12 -w /captures/lab.pcap</code> keeps a rolling 1-hour window</li>
      <li>Extract DNS query names live: <code>tshark -i eth1 -f "udp port 53" -Y "dns.flags.response==0" -T fields -e frame.time_epoch -e ip.src -e dns.qry.name</code></li>
      <li>Extract TLS SNI for C2 hunting: <code>tshark -i eth1 -f "tcp port 443" -Y "tls.handshake.type==1" -T fields -e ip.src -e tls.handshake.extensions_server_name</code></li>
      <li>Run stats after capture with <code>-q -z conv,tcp</code> to see top TCP conversations without per-packet output</li>
    </ul></div>
  </details>
  <details class="tier advanced">
    <summary>🔴 Advanced — Expert Techniques</summary>
    <div class="tier-body"><ul>
      <li>Pipeline tshark into grep/awk for real-time alerting: <code>tshark -i eth1 -f "tcp port 53" -Y "dns" -T fields -e dns.qry.name -l | grep -E "\.(tk|pw|cc|ga)$"</code></li>
      <li>Combine snap length (<code>-s 96</code>) with BPF to capture only headers at wire speed — reduces PCAP size while preserving metadata for flow analysis</li>
      <li>Use <code>-z http,stat,</code> or <code>-z io,stat,1</code> to produce traffic summary tables from multi-hour PCAPs without loading them in the GUI</li>
      <li>Integrate tshark ring buffer output paths directly into Security Onion's filebeat/Zeek log pipeline for automated PCAP-to-alert correlation</li>
    </ul></div>
  </details>
</article>
</template>

<template id="tpl-bpf-cheatsheet">
<article class="topic">
  <h2>BPF Cheat Sheet</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l2">L2 Data Link</span>
    <span class="osi-chip l3">L3 Network</span>
    <span class="osi-chip l4">L4 Transport</span>
    <span class="osi-note">Quick reference spanning all BPF-accessible layers: ARP/broadcast primitives (L2), IP/ICMP/subnet (L3), TCP/UDP ports and flag bytes (L4).</span>
  </div>

  <h3>Core Primitives</h3>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Filter</th><th>Description</th></tr></thead>
      <tbody>
        <tr><td><code>host X.X.X.X</code></td><td>Any traffic to or from IP</td></tr>
        <tr><td><code>src host X.X.X.X</code></td><td>Traffic from source IP</td></tr>
        <tr><td><code>dst host X.X.X.X</code></td><td>Traffic to destination IP</td></tr>
        <tr><td><code>net X.X.X.X/M</code></td><td>Entire subnet (CIDR notation)</td></tr>
        <tr><td><code>port N</code></td><td>Either direction on port N</td></tr>
        <tr><td><code>tcp port N</code></td><td>TCP on port N</td></tr>
        <tr><td><code>udp port N</code></td><td>UDP on port N</td></tr>
        <tr><td><code>portrange N-M</code></td><td>Port range (inclusive)</td></tr>
        <tr><td><code>tcp</code></td><td>All TCP traffic</td></tr>
        <tr><td><code>udp</code></td><td>All UDP traffic</td></tr>
        <tr><td><code>icmp</code></td><td>All ICMP traffic</td></tr>
        <tr><td><code>arp</code></td><td>All ARP frames</td></tr>
        <tr><td><code>ip6</code></td><td>All IPv6 traffic</td></tr>
        <tr><td><code>broadcast</code></td><td>Broadcast frames</td></tr>
        <tr><td><code>multicast</code></td><td>Multicast frames</td></tr>
      </tbody>
    </table>
  </div>

  <h3>TCP Flag Byte Filters</h3>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Goal</th><th>BPF Expression</th><th>Notes</th></tr></thead>
      <tbody>
        <tr><td>Pure SYN (no ACK)</td><td><code>tcp[13] == 2</code></td><td>Connection initiations only</td></tr>
        <tr><td>SYN+ACK</td><td><code>tcp[13] == 18</code></td><td>Server replies to SYN</td></tr>
        <tr><td>RST set</td><td><code>tcp[13] &amp; 4 != 0</code></td><td>Resets (refused/aborted)</td></tr>
        <tr><td>FIN set</td><td><code>tcp[13] &amp; 1 != 0</code></td><td>Connection teardowns</td></tr>
        <tr><td>PSH+ACK (data)</td><td><code>tcp[13] == 24</code></td><td>Data transfer packets</td></tr>
        <tr><td>No flags (Null scan)</td><td><code>tcp[13] == 0</code></td><td>Stealth scan detection</td></tr>
        <tr><td>Xmas scan</td><td><code>tcp[13] == 41</code></td><td>FIN+PSH+URG = 0x29 = 41</td></tr>
      </tbody>
    </table>
  </div>

  <h3>Compound Examples</h3>
  <pre><code><span class="cm"># Web + DNS only</span>
(tcp port 80 or tcp port 443) or udp port 53

<span class="cm"># Strip common noise, keep interesting traffic</span>
not (arp or broadcast or multicast or udp port 5353 or udp port 1900)

<span class="cm"># Specific host on any web port</span>
host 203.0.113.50 and (tcp port 80 or tcp port 443)

<span class="cm"># SYN scan detection (SYN, no ACK)</span>
tcp[13] == 2

<span class="cm"># Large ICMP (ping flood / ICMP tunnel)</span>
icmp[icmptype] == icmp-echo and greater 100

<span class="cm"># Non-standard high ports only</span>
tcp and not (port 80 or port 443 or port 22 or port 25 or port 53)

<span class="cm"># SMB + RDP for lateral movement monitoring</span>
tcp port 445 or tcp port 139 or tcp port 3389

<span class="cm"># Everything from a suspect host except ping</span>
host 10.0.0.99 and not icmp</code></pre>

  <div class="callout lab">
    <strong>Saving BPF Filters:</strong> In Wireshark, go to <strong>Capture → Capture Filters → +</strong> to save BPF strings with a name. They persist across sessions and appear in the dropdown when starting a new capture.
  </div>

  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Core Concepts</summary>
    <div class="tier-body"><ul>
      <li>Use this sheet as a quick lookup during active captures — bookmark the core primitives table for reference</li>
      <li>Start with <code>host 192.168.56.30</code> or <code>tcp port 445</code> when you have a specific target or protocol to investigate</li>
      <li>Use <code>tcp</code>, <code>udp</code>, <code>icmp</code>, <code>arp</code> alone to get a feel for traffic composition on a network segment</li>
      <li>Save your most-used BPF filters in Wireshark via Capture → Capture Filters so you don't retype them each session</li>
    </ul></div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Deeper Skills</summary>
    <div class="tier-body"><ul>
      <li>Detect SYN scans in real time with <code>tcp[13] == 2</code>; spot Null scans with <code>tcp[13] == 0</code> and Xmas scans with <code>tcp[13] == 41</code></li>
      <li>Use compound expressions for SOC workflows: web + DNS = <code>(tcp port 80 or tcp port 443) or udp port 53</code></li>
      <li>Chain host + protocol + port: <code>host 192.168.56.10 and (tcp port 4444 or tcp port 1337)</code> to monitor Kali C2 listeners in the lab</li>
      <li>Combine portrange with exclusions: <code>tcp portrange 1024-65535 and not (port 5353 or port 5985)</code> for high-port anomaly hunting</li>
    </ul></div>
  </details>
  <details class="tier advanced">
    <summary>🔴 Advanced — Expert Techniques</summary>
    <div class="tier-body"><ul>
      <li>Detect ICMP tunnelling with size threshold: <code>icmp[icmptype] == icmp-echo and greater 100</code> catches abnormally large echo requests used for data exfiltration</li>
      <li>Monitor full lateral movement surface: <code>tcp port 445 or tcp port 139 or tcp port 3389 or tcp port 5985 or tcp port 5986</code> covers SMB, RDP, and WinRM in one filter</li>
      <li>Combine the cheat sheet patterns into tiered PCAP strategies: narrow BPF for collection + broad display filter for hunting, tuned per investigation phase</li>
      <li>Automate BPF filter deployment across multiple Security Onion sensor nodes using the <code>/etc/sensor.conf</code> BPF override directive</li>
    </ul></div>
  </details>
</article>
