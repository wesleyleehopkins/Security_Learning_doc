<template id="tpl-overview">
<article class="topic">
<h1>Overview &amp; Architecture</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">ELK is an application-layer platform — it ingests, stores, and searches log data produced by applications, hosts, and network devices. All data enters at L7 (APIs, syslog, Beats protocols).</span>
</div>
<hr class="divider">
<p>The <strong>Elastic Stack</strong> (formerly ELK) is the industry-standard open-source log aggregation and search platform. It ingests data from any source, stores it in a distributed search engine, and surfaces it through interactive dashboards — making it the go-to platform for SOC log analysis, threat hunting, and SIEM workflows.</p>

<h3>Stack Components</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Component</th><th>Role</th><th>Default Port</th></tr></thead>
  <tbody>
    <tr><td><strong>Elasticsearch</strong></td><td>Distributed search &amp; analytics engine — stores and indexes all data as JSON documents</td><td>9200 (HTTP), 9300 (transport)</td></tr>
    <tr><td><strong>Logstash</strong></td><td>Data processing pipeline — ingest, parse, transform, enrich, and route events</td><td>5044 (Beats input), 5000 (syslog)</td></tr>
    <tr><td><strong>Kibana</strong></td><td>Web UI — Discover, dashboards, SIEM app, alerting, Dev Tools console</td><td>5601</td></tr>
    <tr><td><strong>Beats</strong></td><td>Lightweight single-purpose shippers: Filebeat, Winlogbeat, Packetbeat, Metricbeat, Auditbeat</td><td>varies</td></tr>
    <tr><td><strong>Elastic Agent</strong></td><td>Unified agent replacing individual Beats; managed centrally via Fleet in Kibana</td><td>8220 (Fleet server)</td></tr>
  </tbody>
</table></div>

<h3>Data Flow</h3>
<pre><code>┌─────────────┐    ┌──────────────┐    ┌───────────────┐    ┌──────────────────┐
│  Log Sources │───▶│ Beats/Agent  │───▶│   Logstash    │───▶│  Elasticsearch   │
│ (OS · Apps  │    │ (lightweight │    │ (parse/enrich │    │  (index/store)   │
│  · Network) │    │  shippers)   │    │  /transform)  │    │                  │
└─────────────┘    └──────────────┘    └───────────────┘    └────────┬─────────┘
                                                                       │
                         ┌─────────────────────────────────────────────▼──────┐
                         │                      Kibana                         │
                         │   Discover · Dashboards · SIEM · Alerting · Lens   │
                         └────────────────────────────────────────────────────┘</code></pre>

<div class="callout note">
  <strong>Lightweight path:</strong> Beats can ship <em>directly</em> to Elasticsearch, bypassing Logstash entirely. Use Logstash only when you need transformation, grok parsing, GeoIP enrichment, or fan-out routing to multiple outputs.
</div>

<h3>SOC Use Cases</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Use Case</th><th>Components</th><th>Details</th></tr></thead>
  <tbody>
    <tr><td>Log aggregation</td><td>Beats + ES + Kibana</td><td>Centralize Windows Events, syslog, firewall, and app logs into one search interface</td></tr>
    <tr><td>SIEM / Detection</td><td>Elastic Security app</td><td>Built-in detection rules, EQL behavioral queries, ML anomaly jobs</td></tr>
    <tr><td>Threat hunting</td><td>Kibana Discover + KQL</td><td>Ad-hoc queries across all log sources in one timeline</td></tr>
    <tr><td>PCAP / flow analysis</td><td>Packetbeat + ES</td><td>Layer-7 protocol flows — HTTP, DNS, TLS, SMB parsed automatically</td></tr>
    <tr><td>Endpoint telemetry</td><td>Elastic Agent + EDR</td><td>Process, file, network, registry events in ECS format</td></tr>
    <tr><td>Compliance reporting</td><td>Kibana dashboards</td><td>PCI-DSS, HIPAA, CIS benchmark visualization</td></tr>
  </tbody>
</table></div>

<h3>Deployment Architectures</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Mode</th><th>Nodes</th><th>Best For</th><th>Min RAM</th></tr></thead>
  <tbody>
    <tr><td>Single-node</td><td>1 (all-in-one)</td><td>Lab / dev / small SOC (&lt;10 GB/day)</td><td>8 GB</td></tr>
    <tr><td>Small cluster</td><td>3 master-eligible</td><td>Medium SOC with HA requirement</td><td>16 GB/node</td></tr>
    <tr><td>Hot-warm-cold</td><td>3+ tiers</td><td>High-volume, long-retention enterprise</td><td>32 GB hot nodes</td></tr>
    <tr><td>Elastic Cloud</td><td>Managed SaaS</td><td>No infrastructure management needed</td><td>N/A</td></tr>
  </tbody>
</table></div>

<h3>ECS — Elastic Common Schema</h3>
<p>All Beats and Elastic Agent ship events in <strong>ECS</strong> format — consistent field names across every data source:</p>
<pre><code><span class="cm"># Key ECS fields used throughout this notebook</span>
@timestamp              <span class="cm"># event time (ISO-8601)</span>
event.kind              <span class="cm"># alert | event | metric | state</span>
event.category          <span class="cm"># authentication | network | process | file | dns</span>
event.action            <span class="cm"># logged-in | process-started | dns-query</span>
event.outcome           <span class="cm"># success | failure | unknown</span>
event.code              <span class="cm"># Windows Event ID (4624, 4625, 4688…)</span>

source.ip / destination.ip
source.port / destination.port
host.name / host.ip / host.os.type
user.name / user.domain
process.name / process.pid / process.command_line / process.parent.name
network.protocol / network.transport / network.bytes
file.path / file.hash.sha256
dns.question.name / dns.answers.data</code></pre>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Understanding ELK</summary>
  <div class="tier-body">
    <h4>What each component does</h4>
    <ul>
      <li><strong>Elasticsearch</strong> = the database — stores all logs and makes them searchable</li>
      <li><strong>Logstash</strong> = the pipeline — receives, parses, and enriches logs before indexing</li>
      <li><strong>Kibana</strong> = the UI — query, visualize, and build dashboards from Elasticsearch data</li>
      <li><strong>Beats</strong> = lightweight agents — installed on systems to ship logs to the stack</li>
    </ul>
    <h4>ECS — why field names are standardized</h4>
    <ul>
      <li>ECS ensures all log sources use the same field names: <code>source.ip</code>, <code>destination.port</code>, <code>event.action</code></li>
      <li>One KQL query works across Windows events, Linux syslog, and network logs simultaneously</li>
    </ul>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — Data Flow Awareness</summary>
  <div class="tier-body">
    <h4>Trace a log through the stack</h4>
    <ul>
      <li>Winlogbeat ships Windows Event Log → Logstash parses with grok → Elasticsearch index <code>winlogbeat-YYYY.MM.DD</code> → Kibana queries it</li>
      <li>Each day a new index is created — use wildcard <code>winlogbeat-*</code> to search all days</li>
    </ul>
    <h4>Key ECS fields for SOC work</h4>
    <pre><code>source.ip / destination.ip          <span class="cm"># Network endpoints (L3)</span>
source.port / destination.port      <span class="cm"># Service identification (L4)</span>
event.action / event.category       <span class="cm"># What happened</span>
user.name / host.name               <span class="cm"># Who and where</span>
process.name / process.command_line <span class="cm"># What ran</span></code></pre>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Cluster Architecture</summary>
  <div class="tier-body">
    <h4>Production ELK sizing</h4>
    <ul>
      <li><strong>Hot nodes</strong>: fast SSDs for recent data; <strong>Warm/Cold</strong>: cheaper storage for older indices</li>
      <li><strong>Dedicated master nodes</strong>: 3 nodes minimum for HA — no data, just cluster coordination</li>
      <li>Heap: set to 50% of RAM, never exceed 30 GB (JVM GC limit)</li>
    </ul>
  </div>
</details>
</article>
</template>

<template id="tpl-elasticsearch">
<article class="topic">
<h1>Elasticsearch</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">Elasticsearch operates entirely at L7 — all interaction is via REST HTTP API (JSON). It stores structured log data extracted from every OSI layer by Beats and Logstash.</span>
</div>
<hr class="divider">
<p>Elasticsearch is a distributed, RESTful search engine built on Apache Lucene. Everything you store is a <strong>JSON document</strong> saved into an <strong>index</strong>. All operations use the HTTP REST API — no special client required.</p>

<h3>Core Concepts</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Concept</th><th>Definition</th><th>SQL Analogy</th></tr></thead>
  <tbody>
    <tr><td><strong>Cluster</strong></td><td>One or more nodes sharing a cluster name and state</td><td>Database server</td></tr>
    <tr><td><strong>Node</strong></td><td>Single ES instance — can be master, data, ingest, or coordinating</td><td>Server</td></tr>
    <tr><td><strong>Index</strong></td><td>Collection of related JSON documents</td><td>Table</td></tr>
    <tr><td><strong>Document</strong></td><td>A single JSON record stored in an index</td><td>Row</td></tr>
    <tr><td><strong>Field</strong></td><td>Key-value pair within a document</td><td>Column</td></tr>
    <tr><td><strong>Shard</strong></td><td>Horizontal slice of an index (an independent Lucene index)</td><td>Partition</td></tr>
    <tr><td><strong>Replica</strong></td><td>Copy of a shard for high availability and read scaling</td><td>Standby replica</td></tr>
    <tr><td><strong>Mapping</strong></td><td>Schema definition — field data types (keyword, text, ip, date, long)</td><td>CREATE TABLE DDL</td></tr>
  </tbody>
</table></div>

<h3>REST API Quick Reference</h3>
<pre><code><span class="cm"># Cluster health — green/yellow/red</span>
curl -u elastic:PASSWORD "http://localhost:9200/_cluster/health?pretty"

<span class="cm"># List all indices with size, doc count, status</span>
curl -u elastic:PASSWORD "http://localhost:9200/_cat/indices?v&s=store.size:desc"

<span class="cm"># List nodes with heap and disk usage</span>
curl -u elastic:PASSWORD "http://localhost:9200/_cat/nodes?v&h=name,heap.percent,disk.used_percent,cpu"

<span class="cm"># Index a document (POST = auto-generated ID)</span>
curl -X POST "http://localhost:9200/logs-test/_doc" \
  -H 'Content-Type: application/json' -u elastic:PASSWORD \
  -d '{"@timestamp":"2024-01-15T10:00:00Z","event.action":"logon","user.name":"alice","source.ip":"192.168.56.10"}'

<span class="cm"># Get document by ID</span>
curl "http://localhost:9200/logs-test/_doc/1?pretty" -u elastic:PASSWORD

<span class="cm"># Delete an index</span>
curl -X DELETE "http://localhost:9200/logs-test" -u elastic:PASSWORD</code></pre>

<h3>Query DSL — Most-Used Patterns</h3>
<pre><code><span class="cm"># Match query — full-text (analyzed/tokenized)</span>
GET /winlogbeat-*/_search
{
  "query": { "match": { "message": "failed password" } }
}

<span class="cm"># Term query — exact keyword match (IPs, hostnames, event codes)</span>
GET /winlogbeat-*/_search
{
  "query": { "term": { "event.code": "4625" } }
}

<span class="cm"># Range query — time window</span>
GET /winlogbeat-*/_search
{
  "query": { "range": { "@timestamp": { "gte": "now-1h", "lte": "now" } } }
}

<span class="cm"># Bool — combine must/should/must_not/filter</span>
GET /winlogbeat-*/_search
{
  "query": {
    "bool": {
      "must":     [ { "term": { "event.code": "4625" } } ],
      "filter":   [ { "range": { "@timestamp": { "gte": "now-24h" } } } ],
      "must_not": [ { "term": { "source.ip": "127.0.0.1" } } ]
    }
  }
}

<span class="cm"># Aggregation — top source IPs for failed logins with count</span>
GET /winlogbeat-*/_search
{
  "size": 0,
  "query": { "bool": { "must": [ { "term": { "event.code": "4625" } },
                                  { "range": { "@timestamp": { "gte": "now-1h" } } } ] } },
  "aggs": {
    "top_sources": { "terms": { "field": "source.ip", "size": 10 } }
  }
}</code></pre>

<h3>cat APIs — Cluster Health Combos</h3>
<pre><code><span class="cm"># Find yellow/red indices (unhealthy)</span>
curl -u elastic:PASSWORD "http://localhost:9200/_cat/indices?v&health=yellow"
curl -u elastic:PASSWORD "http://localhost:9200/_cat/indices?v&health=red"

<span class="cm"># Find unassigned shards (common cause of yellow status)</span>
curl -u elastic:PASSWORD "http://localhost:9200/_cat/shards?v&s=state" | grep UNASSIGNED

<span class="cm"># Heap usage per node</span>
curl -u elastic:PASSWORD "http://localhost:9200/_cat/nodes?v&h=name,heap.current,heap.max,heap.percent"

<span class="cm"># Check pending cluster tasks</span>
curl -u elastic:PASSWORD "http://localhost:9200/_cat/pending_tasks?v"

<span class="cm"># List ILM-managed index status</span>
curl -u elastic:PASSWORD "http://localhost:9200/winlogbeat-*/_ilm/explain?pretty" | grep -E '"phase"|"action"|"step"'</code></pre>

<h3>Field Types Quick Reference</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Type</th><th>Use For</th><th>Notes</th></tr></thead>
  <tbody>
    <tr><td><code>keyword</code></td><td>Exact match, aggregations, sorting</td><td>IPs, hostnames, event codes, usernames — always keyword</td></tr>
    <tr><td><code>text</code></td><td>Full-text search (tokenized)</td><td>Log messages, free-text descriptions</td></tr>
    <tr><td><code>ip</code></td><td>IP addresses (v4 and v6)</td><td>Supports CIDR range queries: <code>source.ip: 10.0.0.0/8</code></td></tr>
    <tr><td><code>date</code></td><td>@timestamp and any time field</td><td>ISO-8601 or epoch milliseconds</td></tr>
    <tr><td><code>long / integer</code></td><td>Event IDs, port numbers, byte counts</td><td>Supports range queries</td></tr>
    <tr><td><code>boolean</code></td><td>True/false flags</td><td></td></tr>
    <tr><td><code>nested</code></td><td>Arrays of objects needing preserved relationships</td><td>DNS answers array, process args</td></tr>
  </tbody>
</table></div>

<div class="callout warn">
  <strong>keyword vs text:</strong> Map IPs, hostnames, and event codes as <code>keyword</code>. Text fields are tokenized and break exact matching. ECS index templates handle this automatically for standard fields.
</div>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Basic Elasticsearch Search</summary>
  <div class="tier-body">
    <pre><code>GET winlogbeat-*/_search?q=event.code:4625   <span class="cm"># Failed logons</span>
GET _cat/indices?v                             <span class="cm"># List indices with health</span>
GET _cluster/health                            <span class="cm"># Green/yellow/red status</span></code></pre>
    <h4>Cluster health colors</h4>
    <ul>
      <li><strong>Green</strong>: all shards assigned — healthy</li>
      <li><strong>Yellow</strong>: replicas missing — data safe, reduced redundancy</li>
      <li><strong>Red</strong>: primary shards missing — potential data loss</li>
    </ul>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — Query DSL</summary>
  <div class="tier-body">
    <pre><code>GET winlogbeat-*/_search
{
  "query": {
    "bool": {
      "must": [
        { "term":  { "event.code": "4625" }},
        { "range": { "@timestamp": { "gte": "now-1h" }}}
      ]
    }
  },
  "aggs": { "by_user": { "terms": { "field": "user.name" }}}
}</code></pre>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Index Templates &amp; Mappings</summary>
  <div class="tier-body">
    <pre><code>PUT _index_template/soc-custom-logs
{
  "index_patterns": ["soc-custom-*"],
  "template": {
    "mappings": {
      "properties": {
        "src_ip":   { "type": "ip" },
        "event_id": { "type": "keyword" },
        "message":  { "type": "text" }
      }
    }
  }
}</code></pre>
  </div>
</details>
</article>
</template>

<template id="tpl-logstash">
<article class="topic">
<h1>Logstash Pipelines</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">Logstash processes log data at L7 — it receives structured and unstructured text from applications and network devices, parses fields, and enriches with GeoIP/threat intel before forwarding to Elasticsearch.</span>
</div>
<hr class="divider">
<p>Logstash processes data through a three-stage <strong>pipeline: input → filter → output</strong>. Config files live in <code>/etc/logstash/conf.d/</code>. Multiple pipelines run in parallel and each stage runs in its own thread pool.</p>

<h3>Pipeline Structure</h3>
<pre><code>input {
  beats { port => 5044 }          <span class="cm"># receive from Filebeat / Winlogbeat</span>
}

filter {
  <span class="cm"># parse, enrich, transform — runs on every event</span>
}

output {
  elasticsearch {
    hosts    => ["http://192.168.56.20:9200"]
    index    => "logs-%{+YYYY.MM.dd}"
    user     => "elastic"
    password => "PASSWORD"
  }
  stdout { codec => rubydebug }   <span class="cm"># debug only — remove in production</span>
}</code></pre>

<h3>Input Plugins</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Plugin</th><th>Use Case</th><th>Key Options</th></tr></thead>
  <tbody>
    <tr><td><code>beats</code></td><td>Receive from Filebeat / Winlogbeat / Metricbeat</td><td><code>port</code>, <code>ssl</code>, <code>ssl_certificate</code></td></tr>
    <tr><td><code>file</code></td><td>Tail local log files directly</td><td><code>path</code>, <code>start_position => "beginning"</code>, <code>sincedb_path</code></td></tr>
    <tr><td><code>syslog</code></td><td>UDP/TCP syslog receiver (port 514)</td><td><code>port</code>, <code>type</code>, <code>use_labels</code></td></tr>
    <tr><td><code>http</code></td><td>Webhook ingest endpoint</td><td><code>port</code>, <code>user</code>, <code>password</code></td></tr>
    <tr><td><code>jdbc</code></td><td>Poll a SQL database on a schedule</td><td><code>jdbc_connection_string</code>, <code>statement</code>, <code>schedule</code></td></tr>
    <tr><td><code>kafka</code></td><td>Consume from Kafka topic (high-volume pipelines)</td><td><code>bootstrap_servers</code>, <code>topics</code>, <code>group_id</code></td></tr>
  </tbody>
</table></div>

<h3>Filter Plugins — Core Toolkit</h3>
<pre><code><span class="cm"># GROK — parse unstructured log text with named regex patterns</span>
filter {
  grok {
    match => { "message" => "%{TIMESTAMP_ISO8601:ts} %{LOGLEVEL:level} %{IP:src_ip} %{GREEDYDATA:msg}" }
    tag_on_failure => ["_grokparsefailure"]
  }

  <span class="cm"># DATE — parse a timestamp string into @timestamp</span>
  date {
    match  => ["ts", "ISO8601"]
    target => "@timestamp"
    remove_field => ["ts"]
  }

  <span class="cm"># MUTATE — rename, convert, add, remove fields in one pass</span>
  mutate {
    rename    => { "src_ip" => "source.ip" }
    convert   => { "source.port" => "integer" }
    add_field => { "event.dataset" => "custom.apache" }
    add_tag   => ["parsed"]
    remove_field => ["host", "agent.ephemeral_id"]
  }

  <span class="cm"># GEOIP — enrich source IP with country/city/lat-lon</span>
  geoip {
    source => "source.ip"
    target => "source.geo"
  }

  <span class="cm"># JSON — parse an embedded JSON string into a sub-object</span>
  json {
    source => "message"
    target => "event_data"
    skip_on_invalid_json => true
  }

  <span class="cm"># USERAGENT — parse browser user-agent string</span>
  useragent {
    source => "http.request.headers.user-agent"
    target => "user_agent"
  }
}</code></pre>

<h3>Common Grok Patterns</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Pattern</th><th>Matches</th><th>Example Match</th></tr></thead>
  <tbody>
    <tr><td><code>%{IP:field}</code></td><td>IPv4 or IPv6 address</td><td>192.168.56.10</td></tr>
    <tr><td><code>%{NUMBER:field}</code></td><td>Integer or decimal number</td><td>4096 / 3.14</td></tr>
    <tr><td><code>%{WORD:field}</code></td><td>Single non-whitespace word</td><td>GET / POST</td></tr>
    <tr><td><code>%{URIPATH:field}</code></td><td>URI path component</td><td>/admin/login.php</td></tr>
    <tr><td><code>%{QS:field}</code></td><td>Quoted string</td><td>"Mozilla/5.0..."</td></tr>
    <tr><td><code>%{COMBINEDAPACHELOG}</code></td><td>Full Apache/Nginx access log line</td><td>Built-in compound pattern</td></tr>
    <tr><td><code>%{TIMESTAMP_ISO8601:ts}</code></td><td>ISO-8601 timestamp</td><td>2024-01-15T10:00:00Z</td></tr>
    <tr><td><code>%{GREEDYDATA:msg}</code></td><td>Everything remaining on the line</td><td>Use as a catch-all at end</td></tr>
  </tbody>
</table></div>

<h3>Conditional Routing + Multi-Output</h3>
<pre><code>filter {
  <span class="cm"># Tag Windows events for routing</span>
  if [type] == "winlogbeat" {
    mutate { add_field => { "event.module" => "windows" } }
  }

  <span class="cm"># Drop noisy health-check events</span>
  if [http.request.path] == "/health" {
    drop { }
  }
}

output {
  <span class="cm"># Route Windows logs to dedicated index</span>
  if [event.module] == "windows" {
    elasticsearch {
      hosts => ["http://192.168.56.20:9200"]
      index => "winlogbeat-%{+YYYY.MM.dd}"
    }
  } else {
    elasticsearch {
      hosts => ["http://192.168.56.20:9200"]
      index => "logs-%{+YYYY.MM.dd}"
    }
  }

  <span class="cm"># Send high-severity events to file for backup</span>
  if [log.level] in ["error", "critical"] {
    file { path => "/var/log/logstash/critical-events.log" }
  }
}</code></pre>

<h3>Pipeline Management</h3>
<pre><code><span class="cm"># Test config syntax before deploying</span>
sudo /usr/share/logstash/bin/logstash --config.test_and_exit -f /etc/logstash/conf.d/

<span class="cm"># Run single pipeline with debug output</span>
sudo /usr/share/logstash/bin/logstash -f /etc/logstash/conf.d/beats.conf --log.level=debug

<span class="cm"># Check pipeline stats via monitoring API</span>
curl "http://localhost:9600/_node/stats/pipelines?pretty"

<span class="cm"># Reload pipelines without restart (if config.reload.automatic: true)</span>
sudo kill -HUP $(cat /var/run/logstash.pid)

<span class="cm"># Service management + logs</span>
sudo systemctl status logstash
sudo journalctl -u logstash -f --since "10 minutes ago"</code></pre>

   Useful columns: @timestamp, host.name, user.name, event.code, source.ip
5. Expand a document: click "▶" for full JSON or table view

<h3>Dev Tools Console</h3>

  "size": 20,
  "query": {
    "bool": {
      "must": [
        { "term": { "event.code": "4625" } },

      ]
    }
  },

}

    "processors": [{ "grok": { "field": "message",
      "patterns": ["%{IP:src} %{WORD:method} %{URIPATH:path}"] } }]

}</code></pre>

<template id="tpl-beats">
<article class="topic">
<h1>Beats Agents</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l2">L2 Data Link</span>
  <span class="osi-chip l3">L3 Network</span>
  <span class="osi-chip l4">L4 Transport</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">Beat type determines which OSI layers are captured: Packetbeat = L2-L7 (network frames), Filebeat = L7 (log files), Winlogbeat = L7 (Windows events), Auditbeat = L7 (host syscall audit).</span>
</div>
<hr class="divider">
<p>Beats are lightweight, single-purpose data shippers written in Go. Install them on the source system and they forward logs directly to Elasticsearch (or through Logstash for enrichment). <strong>Elastic Agent</strong> is the modern unified approach that replaces individual Beats and is managed centrally via Fleet.</p>

<h3>Beat Types</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Beat</th><th>Collects</th><th>Primary SOC Use</th></tr></thead>
  <tbody>
    <tr><td><strong>Filebeat</strong></td><td>Log files (syslog, auth.log, application logs)</td><td>Linux server log shipping with built-in modules</td></tr>
    <tr><td><strong>Winlogbeat</strong></td><td>Windows Event Log channels</td><td>Windows security events: 4624/4625/4688/7045/Sysmon</td></tr>
    <tr><td><strong>Packetbeat</strong></td><td>Network packets — Layer-7 protocol decoding</td><td>HTTP, DNS, TLS, SMB, MySQL flow analysis</td></tr>
    <tr><td><strong>Metricbeat</strong></td><td>System and service metrics</td><td>CPU/mem/disk trends, Docker stats, process inventory</td></tr>
    <tr><td><strong>Auditbeat</strong></td><td>Linux audit framework + file integrity</td><td>syscall monitoring, sudo activity, file changes</td></tr>
    <tr><td><strong>Heartbeat</strong></td><td>Endpoint availability (HTTP/TCP/ICMP)</td><td>Service uptime and latency monitoring</td></tr>
  </tbody>
</table></div>

<h3>Filebeat — Config</h3>
<pre><code><span class="cm"># /etc/filebeat/filebeat.yml</span>

filebeat.inputs:
  - type: filestream
    id: auth-logs
    enabled: true
    paths:
      - /var/log/auth.log
      - /var/log/syslog
    tags: ["linux", "syslog"]

  - type: filestream
    id: apache-access
    enabled: true
    paths: [/var/log/apache2/access.log]

<span class="cm"># Enable built-in modules (pre-built grok + Kibana dashboards)</span>
filebeat.modules:
  - module: system
    syslog: { enabled: true }
    auth:   { enabled: true }
  - module: apache
    access: { enabled: true }
    error:  { enabled: true }
  - module: nginx
    access: { enabled: true }

output.elasticsearch:
  hosts:    ["192.168.56.20:9200"]
  username: "elastic"
  password: "PASSWORD"

setup.kibana:
  host: "192.168.56.20:5601"

<span class="cm"># Module management CLI</span>
filebeat modules enable system apache nginx auditd
filebeat modules list
filebeat setup --dashboards --index-management -e
filebeat test config -e && filebeat test output
sudo systemctl enable --now filebeat</code></pre>

<h3>Winlogbeat — Config</h3>
<pre><code><span class="cm"># C:\Program Files\Winlogbeat\winlogbeat.yml</span>

winlogbeat.event_logs:
  - name: Security
    event_id: 4624, 4625, 4634, 4647, 4648, 4656, 4663, 4672, 4688,
              4697, 4698, 4702, 4720, 4726, 4732, 4740, 7034, 7045, 1102
    ignore_older: 72h

  - name: System
    level: critical, error, warning
    ignore_older: 72h

  - name: Microsoft-Windows-Sysmon/Operational
    ignore_older: 168h

  - name: Microsoft-Windows-PowerShell/Operational
    event_id: 4103, 4104, 4105
    ignore_older: 72h

output.elasticsearch:
  hosts:    ["192.168.56.20:9200"]
  username: "elastic"
  password: "PASSWORD"

<span class="cm"># Install, test, start (PowerShell as Admin)</span>
cd "C:\Program Files\Winlogbeat"
.\install-service-winlogbeat.ps1
.\winlogbeat.exe test config -e
.\winlogbeat.exe test output
Start-Service winlogbeat
Get-Service winlogbeat</code></pre>

<h3>Critical Windows Event IDs to Collect</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Event ID</th><th>Description</th><th>Threat Relevance</th></tr></thead>
  <tbody>
    <tr><td>4624</td><td>Successful logon</td><td>Lateral movement, pass-the-hash (LogonType 3/10)</td></tr>
    <tr><td>4625</td><td>Failed logon</td><td>Brute force — look for volume from single source IP</td></tr>
    <tr><td>4648</td><td>Logon with explicit credentials (RunAs)</td><td>Pass-the-hash, credential stuffing</td></tr>
    <tr><td>4672</td><td>Special privileges assigned at logon</td><td>Privilege escalation, admin token abuse</td></tr>
    <tr><td>4688</td><td>Process creation (requires audit policy enabled)</td><td>Malware execution, LOLBin abuse</td></tr>
    <tr><td>4698 / 4702</td><td>Scheduled task created / modified</td><td>Persistence mechanism</td></tr>
    <tr><td>4720 / 4726</td><td>User account created / deleted</td><td>Backdoor account creation</td></tr>
    <tr><td>4732</td><td>Member added to security-enabled local group</td><td>Privilege escalation (Admins group SID -544)</td></tr>
    <tr><td>7045</td><td>New Windows service installed</td><td>Malware persistence, mimikatz driver</td></tr>
    <tr><td>1102</td><td>Security audit log was cleared</td><td>Evidence tampering — critical alert</td></tr>
    <tr><td>Sysmon 1</td><td>Process creation with full CLI + parent + hash</td><td>Gold-standard process telemetry</td></tr>
    <tr><td>Sysmon 3</td><td>Network connection from a process</td><td>C2 beaconing, lateral movement</td></tr>
    <tr><td>Sysmon 11</td><td>File creation</td><td>Malware dropped to disk, temp folder writes</td></tr>
    <tr><td>Sysmon 22</td><td>DNS query by process</td><td>C2 domain lookups, DNS exfiltration</td></tr>
  </tbody>
</table></div>

<h3>Packetbeat — Network Protocol Capture</h3>
<pre><code><span class="cm"># /etc/packetbeat/packetbeat.yml</span>
packetbeat.interfaces:

  type: af_packet

packetbeat.protocols:
  - type: http

  - type: dns

  - type: tls
    ports: [443, 8443]
  - type: smb
    ports: [445]

output.elasticsearch:
  hosts: ["192.168.56.20:9200"]

<span class="cm"># Start</span>
sudo systemctl enable --now packetbeat</code></pre>

<!-- 06 KQL -->
<!-- ============================================================ -->
<template id="tpl-kql">
<article class="topic">
<h1>KQL &amp; Lucene Queries</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l3">L3 Network</span>
  <span class="osi-chip l4">L4 Transport</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">KQL queries span all OSI layers depending on the field — <code>source.ip</code> queries L3, <code>destination.port</code> queries L4, <code>http.request.uri</code> queries L7. EQL sequence detection correlates events across layers.</span>
</div>
<hr class="divider">
<p><strong>KQL (Kibana Query Language)</strong> is used in the Kibana filter bar across Discover, Security, and Dashboards. It's designed for field:value filtering with simple boolean logic. Toggle to <strong>Lucene</strong> for regex, fuzzy, and proximity searches. <strong>EQL (Event Query Language)</strong> is used in Elastic Security for behavioral/sequence detection.</p>

<h3>KQL Syntax Reference</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Pattern</th><th>Syntax</th><th>Example</th></tr></thead>
  <tbody>
    <tr><td>Exact match</td><td><code>field : "value"</code></td><td><code>event.code : "4625"</code></td></tr>
    <tr><td>Unquoted word</td><td><code>field : value</code></td><td><code>host.name : DESKTOP-WIN10</code></td></tr>
    <tr><td>Wildcard</td><td><code>field : val*</code></td><td><code>process.name : power*</code></td></tr>
    <tr><td>Field exists</td><td><code>field : *</code></td><td><code>process.parent.name : *</code></td></tr>
    <tr><td>Numeric range</td><td><code>field >= value</code></td><td><code>destination.port >= 1024</code></td></tr>
    <tr><td>NOT</td><td><code>NOT field : value</code></td><td><code>NOT user.name : "SYSTEM"</code></td></tr>
    <tr><td>AND</td><td><code>expr AND expr</code></td><td><code>event.code : "4625" AND source.ip : "192.168.56.10"</code></td></tr>
    <tr><td>OR (in list)</td><td><code>field : (val1 OR val2)</code></td><td><code>event.code : ("4624" OR "4625")</code></td></tr>
    <tr><td>Grouped</td><td><code>(expr OR expr) AND expr</code></td><td><code>(event.code : "4624" OR "4648") AND NOT user.name : "SYSTEM"</code></td></tr>
  </tbody>
</table></div>

<h3>SOC Hunt Query Cookbook</h3>
<pre><code><span class="cm">## --- AUTHENTICATION HUNTING ---</span>

<span class="cm"># Brute force: failed logons over network (LogonType 3)</span>
event.code : "4625" AND winlog.event_data.LogonType : "3"

<span class="cm"># Successful network logon (potential brute force success)</span>
event.code : "4624" AND winlog.event_data.LogonType : "3" AND NOT user.name : ("SYSTEM" OR "*$")

<span class="cm"># Explicit credential use / pass-the-hash</span>
event.code : "4648" AND NOT winlog.event_data.SubjectUserName : "*$"

<span class="cm"># Account lockout</span>
event.code : "4740"

<span class="cm"># New local admin created</span>
event.code : "4720" OR (event.code : "4732" AND winlog.event_data.TargetSid : "*-544")

<span class="cm">## --- PROCESS EXECUTION ---</span>

<span class="cm"># Living-off-the-land binaries (LOLBins)</span>
process.name : ("certutil.exe" OR "mshta.exe" OR "regsvr32.exe" OR "rundll32.exe" OR "wscript.exe" OR "cscript.exe" OR "msiexec.exe")

<span class="cm"># PowerShell with encoded command (obfuscated execution)</span>
process.name : "powershell.exe" AND process.command_line : (*-enc* OR *-EncodedCommand* OR *-ec *)

<span class="cm"># cmd.exe spawned by Office (macro execution)</span>
process.name : "cmd.exe" AND process.parent.name : ("winword.exe" OR "excel.exe" OR "outlook.exe" OR "powerpnt.exe")

<span class="cm"># Suspicious process spawning cmd/powershell</span>
process.name : ("cmd.exe" OR "powershell.exe") AND process.parent.name : ("mshta.exe" OR "wscript.exe" OR "cscript.exe" OR "regsvr32.exe")

<span class="cm">## --- PERSISTENCE ---</span>

<span class="cm"># New scheduled task (common persistence)</span>
event.code : ("4698" OR "4702")

<span class="cm"># New service installed</span>
event.code : "7045"

<span class="cm"># Audit log cleared (evidence tampering)</span>
event.code : "1102"

<span class="cm">## --- NETWORK ---</span>

<span class="cm"># Suspicious process making network connections</span>
event.category : "network" AND process.name : ("powershell.exe" OR "wscript.exe" OR "mshta.exe" OR "certutil.exe")

<span class="cm"># DNS queries to suspicious TLDs</span>
dns.question.name : (*.xyz OR *.top OR *.pw OR *.tk OR *.cc OR *.ru)

<span class="cm"># Large data transfer outbound</span>
network.bytes > 10000000 AND network.direction : "egress"</code></pre>

<h3>Lucene Syntax (Toggle in Filter Bar)</h3>
<pre><code><span class="cm"># Regex match (Lucene only — use when KQL wildcards aren't enough)</span>
process.command_line: /.*-[Ee][Nn][Cc].*/

<span class="cm"># Fuzzy match (handles 1-character typos)</span>
user.name: administartor~1

<span class="cm"># Proximity search (words within N positions of each other)</span>
message: "failed password"~3</code></pre>

<h3>EQL — Event Query Language</h3>
<p>EQL is used in Elastic Security detection rules and Timeline. It excels at <strong>sequence and behavioral detection</strong> across multiple related events.</p>
<pre><code><span class="cm"># Sequence: cmd spawned by Word → then makes network connection (macro dropper)</span>
sequence by host.id with maxspan=60s
  [process where process.name == "cmd.exe" and process.parent.name == "WINWORD.EXE"]
  [network where process.name == "cmd.exe"]

<span class="cm"># Count: 5+ failed logins from same IP in 10 minutes</span>
sequence by winlog.event_data.IpAddress with maxspan=10m
  [authentication where event.code == "4625"] with runs=5

<span class="cm"># Process tree: PowerShell downloads then spawns a child</span>
sequence by host.id with maxspan=120s
  [process where process.name == "powershell.exe" and
   process.command_line like~ "*Invoke-WebRequest*"]
  [process where process.parent.name == "powershell.exe"]

<span class="cm"># Any: detect new service that isn't in a known-good list</span>
any where event.code == "7045" and
  not winlog.event_data.ServiceName in ("WinDefend", "MpsSvc", "wuauserv")</code></pre>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — KQL Fundamentals</summary>
  <div class="tier-body">
    <pre><code>event.code: "4625"                          <span class="cm"># Failed logons</span>
source.ip: "192.168.56.10"                  <span class="cm"># Traffic from Kali (L3)</span>
destination.port: 445                        <span class="cm"># SMB traffic (L4)</span>
user.name: "administrator"                   <span class="cm"># Admin account activity</span>
event.category: "authentication"            <span class="cm"># All auth events</span>
process.name: "powershell.exe"              <span class="cm"># PowerShell execution</span></code></pre>
    <ul>
      <li>Use <code>*</code> wildcard: <code>process.name: "cmd*"</code></li>
      <li>Combine: <code>source.ip: "10.0.*" AND destination.port: 22</code></li>
    </ul>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — Advanced KQL &amp; EQL</summary>
  <div class="tier-body">
    <h4>Range and negation</h4>
    <pre><code>destination.port >= 1 and destination.port <= 1024    <span class="cm"># Well-known ports</span>
NOT source.ip: "192.168.56.20"                        <span class="cm"># Exclude SO</span>
event.code: ("4624" or "4625" or "4648")             <span class="cm"># Multiple values</span></code></pre>
    <h4>EQL sequence (Elastic Security only)</h4>
    <pre><code><span class="cm"># Detect macro → PowerShell chain</span>
sequence by host.name
  [process where process.name == "WINWORD.EXE"]
  [process where process.name == "powershell.exe"]</code></pre>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Lucene Regex &amp; Runtime Fields</summary>
  <div class="tier-body">
    <pre><code><span class="cm"># Lucene regex query (raw ES, not KQL)</span>
GET winlogbeat-*/_search
{ "query": { "regexp": { "process.command_line": ".*[Ee]nc.*[A-Za-z0-9+/]{20,}.*" }}}

<span class="cm"># Runtime field — extract data on the fly without reindexing</span>
GET winlogbeat-*/_search
{
  "runtime_mappings": {
    "domain_from_url": {
      "type": "keyword",
      "script": "emit(params._source.url?.domain ?: '')"
    }
  }
}</code></pre>
  </div>
</details>
</article>

<template id="tpl-ilm">
<article class="topic">
<h1>Index Management &amp; ILM</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">ILM manages how log data (extracted from all network layers) is stored, aged, and deleted over time. All administration happens via REST API or Kibana UI — entirely at L7.</span>
</div>
<hr class="divider">
<p><strong>Index Lifecycle Management (ILM)</strong> automatically transitions indices through phases as they age or grow — reducing storage costs and keeping hot nodes performant.</p>

<h3>Lifecycle Phases</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Phase</th><th>Trigger</th><th>Storage Tier</th><th>Typical Actions</th></tr></thead>
  <tbody>
    <tr><td><strong>Hot</strong></td><td>Active write target</td><td>Fast NVMe SSD</td><td>Rollover when &gt;50 GB or &gt;7 days old</td></tr>
    <tr><td><strong>Warm</strong></td><td>After rollover</td><td>SSD or HDD</td><td>Shrink to 1 shard, force-merge to 1 segment</td></tr>
    <tr><td><strong>Cold</strong></td><td>After 30 days</td><td>Cheap HDD / object store</td><td>Freeze (read-only), compress</td></tr>
    <tr><td><strong>Frozen</strong></td><td>After 90 days</td><td>S3 / GCS / Azure</td><td>Searchable snapshots — minimal memory overhead</td></tr>
    <tr><td><strong>Delete</strong></td><td>After retention window</td><td>—</td><td>Permanently remove index</td></tr>
  </tbody>
</table></div>

<h3>Create an ILM Policy</h3>
<pre><code><span class="cm"># Dev Tools — 90-day SOC log retention policy</span>
PUT _ilm/policy/soc-logs-90d
{
  "policy": {
    "phases": {
      "hot": {
        "actions": {
          "rollover":     { "max_primary_shard_size": "50gb", "max_age": "7d" },
          "set_priority": { "priority": 100 }
        }
      },
      "warm": {
        "min_age": "7d",
        "actions": {
          "shrink":       { "number_of_shards": 1 },
          "forcemerge":   { "max_num_segments": 1 },
          "set_priority": { "priority": 50 }
        }
      },
      "cold": {
        "min_age": "30d",
        "actions": {
          "freeze":       {},
          "set_priority": { "priority": 0 }
        }
      },
      "delete": {
        "min_age": "90d",
        "actions": { "delete": {} }
      }
    }
  }
}</code></pre>

<h3>Index Templates</h3>
<pre><code><span class="cm"># Apply ILM policy + field mappings to all matching new indices</span>
PUT _index_template/soc-winlogbeat
{
  "index_patterns": ["winlogbeat-*"],
  "priority": 200,
  "template": {
    "settings": {
      "number_of_shards":               1,
      "number_of_replicas":             1,
      "index.lifecycle.name":           "soc-logs-90d",
      "index.lifecycle.rollover_alias": "winlogbeat"
    },
    "mappings": {
      "properties": {
        "@timestamp":       { "type": "date" },
        "source.ip":        { "type": "ip" },
        "destination.ip":   { "type": "ip" },
        "event.code":       { "type": "keyword" },
        "host.name":        { "type": "keyword" },
        "user.name":        { "type": "keyword" },
        "process.name":     { "type": "keyword" },
        "process.command_line": { "type": "wildcard" }
      }
    }
  }
}</code></pre>

<h3>Data Streams (Modern Approach)</h3>
<pre><code><span class="cm"># Data streams are the preferred approach for time-series logs</span>
<span class="cm"># Backing indices named .ds-logs-custom-YYYY.MM.DD-000001</span>

PUT _index_template/logs-custom
{
  "index_patterns": ["logs-custom-*"],
  "data_stream":    {},
  "template": {
    "settings": { "index.lifecycle.name": "soc-logs-90d" }
  }
}

<span class="cm"># Write to data stream</span>
POST logs-custom-soc/_doc
{ "@timestamp": "2024-01-15T10:00:00Z", "message": "test event" }

<span class="cm"># List data streams and their backing indices</span>
GET _data_stream/logs-custom-*

<span class="cm"># Force manual rollover (e.g., before applying mapping changes)</span>
POST logs-custom-soc/_rollover</code></pre>

<h3>ILM Troubleshooting</h3>
<pre><code><span class="cm"># Check ILM status for a specific index</span>
GET winlogbeat-000001/_ilm/explain

<span class="cm"># Retry a stuck ILM step</span>
POST winlogbeat-000001/_ilm/retry

<span class="cm"># Move index to specific phase manually (for testing)</span>
POST _ilm/move/winlogbeat-000001
{ "current_step": { "phase": "hot", "action": "rollover", "name": "check-rollover-ready" },
  "next_step":    { "phase": "warm", "action": "shrink", "name": "shrink" } }

<span class="cm"># Kibana shortcuts</span>
Stack Management → Index Management → Indices      (view index health, shards)
Stack Management → Index Lifecycle Policies        (manage policies visually)</code></pre>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Understanding Indices</summary>
  <div class="tier-body">
    <ul>
      <li>Elasticsearch creates a new index each day for time-series data: <code>winlogbeat-2024.01.15</code></li>
      <li>Check indices: <code>GET _cat/indices?v&amp;s=index</code> — see health, doc count, storage size</li>
      <li><strong>Red</strong> index = data problem; <strong>Yellow</strong> = redundancy issue; <strong>Green</strong> = healthy</li>
    </ul>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — ILM Policy</summary>
  <div class="tier-body">
    <pre><code>PUT _ilm/policy/soc-30day
{
  "policy": {
    "phases": {
      "hot":    { "min_age": "0ms",  "actions": {} },
      "warm":   { "min_age": "7d",   "actions": { "shrink": { "number_of_shards": 1 }}},
      "delete": { "min_age": "30d",  "actions": { "delete": {} }}
    }
  }
}</code></pre>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Snapshots &amp; Cross-Cluster</summary>
  <div class="tier-body">
    <pre><code><span class="cm"># Register snapshot repository</span>
PUT _snapshot/soc-backup
{ "type": "fs", "settings": { "location": "/mnt/es-snapshots" }}

<span class="cm"># Take snapshot</span>
PUT _snapshot/soc-backup/daily-snapshot-2024-01-15
{ "indices": "winlogbeat-2024.01.15" }

<span class="cm"># Restore</span>
POST _snapshot/soc-backup/daily-snapshot-2024-01-15/_restore</code></pre>
  </div>
</details>
</article>

<p><strong>Elastic Security</strong> is the SIEM and XDR app built into Kibana. Navigate to <strong>Security</strong> in the left nav. It provides prebuilt detection rules, ML anomaly jobs, Timeline for investigation, and Cases for incident tracking.</p>

<h3>Detection Rule Types</h3>
<pre><code><span class="cm"># Rule types — choose based on what you need to detect:</span>

Query      → KQL/Lucene filter — simplest, runs on schedule
EQL        → sequence and behavioral correlation (most powerful)
Threshold  → alert when event count exceeds N in a time window
ML         → anomaly detection via Elastic ML jobs
Indicator  → match events against threat intel IoC list
New terms  → alert when a never-before-seen value appears in a field

<span class="cm"># Enable prebuilt rules (recommended: enable all matching your data)</span>
Security → Rules → Add Elastic rules
Filter by tag: "Windows" | "Linux" | "Network" | "Credential Access" | "Persistence"

<span class="cm"># Bulk enable by MITRE ATT&CK tactic</span>
Security → Rules → filter by tactic → select all → Bulk actions → Enable</code></pre>

<h3>Creating a Custom Detection Rule</h3>
<pre><code><span class="cm">Security → Rules → Create new rule → Query rule</span>

Name:         Windows - Scheduled Task Created by Non-Admin
Severity:     Medium
Risk score:   47
Index:        winlogbeat-*
KQL:          event.code : "4698" AND NOT user.name : ("SYSTEM" OR "*$")
Schedule:     Every 5 minutes, look-back 6 minutes
Actions:      Slack connector → "#soc-alerts" channel

<span class="cm">--- Custom EQL Rule (macro dropper detection) ---</span>
Rule type: EQL

sequence by host.id with maxspan=60s
  [process where event.action == "start" and
   process.name == "WINWORD.EXE"]
  [process where event.action == "start" and
   process.parent.name == "WINWORD.EXE" and
   process.name in ("cmd.exe", "powershell.exe", "wscript.exe", "mshta.exe")]

<span class="cm">--- Threshold Rule (brute force) ---</span>
Rule type:  Threshold
KQL:        event.code : "4625"
Threshold:  group by source.ip, count >= 10 in 5 minutes</code></pre>

<h3>Alert Triage Workflow</h3>
<pre><code>1. Security → Alerts → sort: Severity DESC, filter Status = Open
2. Click alert → review rule name, affected host, user, process
3. "Investigate in Timeline" → stitch surrounding events within ±15 min
4. Add columns: process.parent.name, network.destination.ip, file.path
5. Set alert status:
     Open         → new, unreviewed
     Acknowledged → actively investigating
     Closed       → FP confirmed or resolved
6. Add investigation note with findings
7. Create Case if escalating to Tier 2 / incident</code></pre>

<h3>Exceptions — Suppressing False Positives</h3>
<pre><code><span class="cm"># From an alert → "Add exception"</span>
<span class="cm"># Add conditions that, when ALL match, suppress the alert:</span>

process.name    = "svchost.exe"      AND
user.name       = "SYSTEM"           AND
destination.ip  CIDR 192.168.0.0/16  <span class="cm"># suppress internal traffic only</span>

<span class="cm"># Shared exception lists — reuse across multiple rules</span>
Security → Rules → Exception lists → Create exception list
Security → Rules → {rule} → Exceptions tab → Link existing list

<span class="cm"># Rule-level exception vs shared list:</span>
<span class="cm"># Rule-level: only suppresses for that specific rule</span>
<span class="cm"># Shared list: suppressess across all rules that link to it</span></code></pre>

<template id="tpl-alerting">
<article class="topic">
<h1>Alerting &amp; Watcher</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">Kibana Alerting and Watcher fire on L7 application-layer log data — Windows Event IDs, syslog messages, and API-level metrics. Connectors deliver notifications to external L7 systems (Slack, email, SOAR webhooks).</span>
</div>
<hr class="divider">
<p>Elastic Stack has two alerting mechanisms: <strong>Kibana Alerting</strong> (Stack Management → Rules) for infrastructure and log-based threshold alerts, and <strong>Watcher</strong> for advanced JSON-based alert logic. Elastic Security detection rules have their own dedicated engine (Section 08).</p>

<h3>Kibana Alerting Rule Types</h3>
<div class="table-wrap"><table>
  <thead><tr><th>Rule Type</th><th>Use Case</th></tr></thead>
  <tbody>
    <tr><td>Elasticsearch query</td><td>Alert when a KQL or Query DSL query returns &gt; N results</td></tr>
    <tr><td>Index threshold</td><td>Alert on metric thresholds: count, average, sum, min, max of a numeric field</td></tr>
    <tr><td>Anomaly detection</td><td>ML anomaly score crosses threshold — requires Platinum license</td></tr>
    <tr><td>Log threshold</td><td>Alert on log message patterns (Logs app in Observability)</td></tr>
    <tr><td>Tracking containment</td><td>Geo-fence alert when entity enters or exits a boundary (Maps app)</td></tr>
  </tbody>
</table></div>

<h3>Creating a Rule in Kibana</h3>
<pre><code><span class="cm">Stack Management → Rules → Create rule</span>

Example — Alert: 10+ failed logins from same IP in 5 minutes

Rule type:    Elasticsearch query
Index:        winlogbeat-*
KQL filter:   event.code : "4625"
Group by:     winlog.event_data.IpAddress
Threshold:    count IS ABOVE 10
Time range:   5 minutes
Check every:  1 minute

Actions:
  Connector:  Slack → "#soc-alerts"
  Message:    "Brute force from {{context.group.0}} — {{context.value}} failures"</code></pre>

<h3>Connectors Setup</h3>
<pre><code><span class="cm"># Stack Management → Connectors → Create connector</span>

<span class="cm"># Slack (Incoming Webhook)</span>
Type:    Slack
API URL: https://hooks.slack.com/services/T.../B.../...
Test:    Send "ELK alert test" → verify in Slack channel

<span class="cm"># Email (SMTP)</span>
Type:    Email
Host:    smtp.gmail.com:587
Sender:  soc-alerts@company.com
Auth:    user + app-specific password

<span class="cm"># Generic Webhook (SOAR integration)</span>
Type:    Webhook
URL:     https://soar-platform.internal/api/elastic-webhook
Method:  POST
Headers: Content-Type: application/json
Body:    { "alert": "{{context.message}}", "host": "{{context.host.name}}" }

<span class="cm"># PagerDuty</span>
Type:          PagerDuty
API Key:       (from PagerDuty service integration)
Integration:   https://events.pagerduty.com/integration/...</code></pre>

<h3>Watcher — Advanced JSON Alert Engine</h3>
<pre><code><span class="cm"># Watcher is X-Pack's native alerting — more powerful than Kibana Rules</span>
<span class="cm"># Run via Dev Tools → PUT _watcher/watch/{id}</span>

PUT _watcher/watch/brute-force-watch
{
  "trigger": { "schedule": { "interval": "5m" } },

  "input": {
    "search": {
      "request": {
        "indices": ["winlogbeat-*"],
        "body": {
          "query": {
            "bool": {
              "must": [
                { "term":  { "event.code": "4625" } },
                { "range": { "@timestamp": { "gte": "now-5m" } } }
              ]
            }
          },
          "aggs": {
            "by_ip": {
              "terms": { "field": "source.ip", "size": 5 },
              "aggs":  { "count": { "value_count": { "field": "_id" } } }
            }
          }
        }
      }
    }
  },

  "condition": {
    "script": {
      "source": "return ctx.payload.aggregations.by_ip.buckets.stream().anyMatch(b -> b.count.value >= 10);"
    }
  },

  "actions": {
    "log_it": {
      "logging": {
        "text": "BRUTE FORCE ALERT: {{ctx.payload.aggregations.by_ip.buckets}}"
      }
    }
  }
}

<span class="cm"># List, activate, deactivate, delete watches</span>
GET  _watcher/watch/_query
PUT  _watcher/watch/brute-force-watch/_activate
PUT  _watcher/watch/brute-force-watch/_deactivate
DELETE _watcher/watch/brute-force-watch</code></pre>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Understanding Alert Rules</summary>
  <div class="tier-body">
    <h4>Two Alerting Mechanisms</h4>
    <ul>
      <li><strong>Kibana Alerting</strong> (Stack Management → Rules) — UI-driven, good for threshold alerts on L7 log patterns</li>
      <li><strong>Watcher</strong> — JSON-based, full programmatic control, runs as an Elasticsearch job</li>
      <li><strong>Elastic Security rules</strong> (Section 08) — separate engine; dedicated to SIEM detection</li>
    </ul>
    <pre><code><span class="cm"># Simplest alert: more than N events in time window</span>
Stack Management → Rules → Create rule
Rule type: Elasticsearch query
Index: winlogbeat-*
KQL: event.code : "4625"
Threshold: count IS ABOVE 10 in 5m
Check every: 1 minute</code></pre>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — Connectors &amp; Rule Tuning</summary>
  <div class="tier-body">
    <h4>Setting Up Notification Channels</h4>
    <ul>
      <li>Connectors deliver L7 alerts to external systems over L7 (HTTPS webhooks, SMTP, Slack API)</li>
      <li>Test connectors before relying on them — verify the message appears in your channel</li>
      <li>Group-by fields let you correlate by L3 source.ip or L7 user.name</li>
    </ul>
    <pre><code><span class="cm"># Slack webhook connector</span>
Stack Management → Connectors → Create → Slack
API URL: https://hooks.slack.com/services/T.../B.../...

<span class="cm"># Email (SMTP over L4 port 587)</span>
Type: Email
Host: smtp.gmail.com:587
Auth: app-specific password

<span class="cm"># SOAR generic webhook (L7 POST)</span>
Type: Webhook
URL:  https://soar.internal/api/elastic-webhook
Body: { "alert": "{{context.message}}", "host": "{{context.host.name}}" }</code></pre>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Watcher Aggregation Logic</summary>
  <div class="tier-body">
    <h4>Watcher: Full Control over L7 Alert Logic</h4>
    <ul>
      <li>Watcher runs aggregations (group by L3 source.ip, count failures) and fires only when a script condition is met</li>
      <li>Supports chained actions: log + email + webhook simultaneously</li>
      <li>Execute context variables expose aggregation results in action templates</li>
    </ul>
    <pre><code><span class="cm"># Watcher: brute force by source IP (L3 grouping)</span>
PUT _watcher/watch/brute-force-watch
{
  "trigger": { "schedule": { "interval": "5m" } },
  "input": {
    "search": { "request": {
      "indices": ["winlogbeat-*"],
      "body": {
        "query": { "bool": { "must": [
          { "term": { "event.code": "4625" } },
          { "range": { "@timestamp": { "gte": "now-5m" } } }
        ]}},
        "aggs": { "by_ip": {
          "terms": { "field": "source.ip", "size": 5 },  <span class="cm">// L3 grouping</span>
          "aggs":  { "count": { "value_count": { "field": "_id" } } }
        }}
      }
    }}
  },
  "condition": {
    "script": { "source":
      "return ctx.payload.aggregations.by_ip.buckets.stream().anyMatch(b -> b.count.value >= 10);"
    }
  },
  "actions": { "log_it": { "logging": {
    "text": "BRUTE FORCE: {{ctx.payload.aggregations.by_ip.buckets}}"
  }}}
}

<span class="cm"># Manage watches</span>
GET _watcher/watch/_query
PUT  _watcher/watch/brute-force-watch/_activate
PUT  _watcher/watch/brute-force-watch/_deactivate</code></pre>
  </div>
</details>

    <tr><td>Max shards per GB heap</td><td>~20 shards per GB</td><td>Too many shards causes memory pressure</td></tr>

-Xmx4g

      <li>After Winlogbeat starts, check Kibana Discover for <code>winlogbeat-*</code> events — you should see Windows Security logs within 30 seconds</li>
      <li>L4 ports 4625/4624 don't appear in logs directly — those numbers are Windows <strong>Event IDs</strong> at L7, not network ports</li>
      <li>The RDP brute force runs over <strong>TCP port 3389 (L4)</strong> but generates <strong>L7 Windows Event 4625</strong> records</li>
    </ul>
    <pre><code><span class="cm"># Discover: confirm logs flowing</span>
Index: winlogbeat-*   Time: Last 1 hour
KQL: host.name : "DESKTOP-WIN10"

<span class="cm"># Hunt: brute force events (L7 Windows auth log)</span>
KQL: event.code : "4625" AND winlog.event_data.LogonType : "3"
Add columns: @timestamp, source.ip, user.name
<span class="cm"># source.ip = L3 attacker address (192.168.56.10)</span></code></pre>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — Visualize &amp; Enable Detection Rules</summary>
  <div class="tier-body">
    <h4>Build Attack Visibility</h4>
    <ul>
      <li>Lens bar chart shows the L3 source IP that generated most L7 failure events — instantly identifies the attacker</li>
      <li>Timeline stitches L7 auth events (4625 → 4624 → 4720 → 4698 → 1102) into a chronological attack story</li>
      <li>Enable prebuilt rules that fire on common L7 patterns: brute force, privilege escalation, log clearing</li>
    </ul>
    <pre><code><span class="cm"># Lens: brute force timeline (L7 events grouped by L3 source)</span>
X: @timestamp (5-min intervals)
Y: Count
Break down: source.ip (top 5)   <span class="cm"># L3 attacker IP rises to top</span>
Filter: event.code : "4625"
Save as: "Brute Force Timeline"

<span class="cm"># Enable prebuilt detection rules</span>
Security → Rules → Add Elastic rules
Enable: "Windows - Multiple Failed Logon Events"
Enable: "Windows - User Account Added to Privileged Group"
Enable: "Security Log Was Cleared"

<span class="cm"># Check alerts fired</span>
Security → Alerts → filter: Status = Open</code></pre>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Custom EQL Rule &amp; Packetbeat Correlation</summary>
  <div class="tier-body">
    <h4>Full-Stack Detection: L2–L7</h4>
    <ul>
      <li>EQL sequence rule correlates L7 auth success (4624) followed by L7 account creation (4720) within 5 minutes — classic post-exploitation pattern</li>
      <li>Packetbeat on eth1 captures raw L2/L3/L4 RDP/SMB frames and ships them to ELK — adds actual network flow evidence to the L7 log story</li>
      <li>In Kibana Timeline, drag both network flow events and Windows auth events onto the same canvas to see L3 IP → L4 port → L7 event chain</li>
    </ul>
    <pre><code><span class="cm"># Custom EQL: access followed by backdoor account (L7 sequence)</span>
Security → Rules → Create rule → EQL
Index: winlogbeat-*

sequence by host.id with maxspan=5m
  [authentication where event.code == "4624"
   and winlog.event_data.LogonType == "10"]   <span class="cm">// RDP logon (L4 → L7)</span>
  [iam where event.code == "4720"]             <span class="cm">// account created (L7)</span>

<span class="cm"># Packetbeat on Ubuntu eth1 (captures L2/L3/L4 flows)</span>
sudo apt install packetbeat
sudo tee /etc/packetbeat/packetbeat.yml > /dev/null &lt;&lt;'EOF'
packetbeat.interfaces.device: eth1
packetbeat.protocols:
  - type: dns
    ports: [53]
  - type: http
    ports: [80, 443, 8080]
  - type: tls
    ports: [443, 3389]     # includes RDP (L4 port 3389)
output.elasticsearch:
  hosts: ["192.168.56.20:9200"]
EOF
sudo systemctl enable --now packetbeat

<span class="cm"># Correlate in Timeline</span>
Security → Timeline → New
Filter: host.name : "DESKTOP-WIN10" OR source.ip : "192.168.56.10"
Add: packetbeat-* and winlogbeat-* events
<span class="cm"># Drag L3 flow event + L7 auth event side by side</span></code></pre>
  </div>
</details>
