<template id="tpl-scenario">
<article class="topic">
  <h2>Lab Scenario</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l3">L3 Network</span>
    <span class="osi-chip l4">L4 Transport</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">This lab covers L3 IP reconnaissance, L4 TCP SYN scanning, and L7 HTTP SQL injection attack detection — a full kill chain scenario.</span>
  </div>

  <div class="callout lab">
    <strong>Lab: Port Scan + SQL Injection Detection</strong><br>
    You are configuring Snort on a network segment protecting a web server. During a 15-minute window, an attacker performs a TCP SYN port scan against the web server, then launches a SQL injection attack via HTTP. Your task: write the detection rules, run Snort against a described traffic scenario, and interpret the resulting alerts.
  </div>

  <h3>Network Environment</h3>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Asset</th><th>IP</th><th>Role</th></tr></thead>
      <tbody>
        <tr><td>Snort sensor</td><td>192.168.1.1</td><td>Monitoring port on the LAN segment</td></tr>
        <tr><td>Web server</td><td>192.168.1.10</td><td>Apache 2.4 — HTTP on port 80, HTTPS on 443</td></tr>
        <tr><td>Database server</td><td>192.168.1.20</td><td>MySQL — port 3306 (internal only)</td></tr>
        <tr><td>Attacker</td><td>203.0.113.50</td><td>External — simulated attacker IP</td></tr>
      </tbody>
    </table>
  </div>

  <h3>Attack Timeline</h3>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Time</th><th>Activity</th><th>Traffic Pattern</th></tr></thead>
      <tbody>
        <tr><td>14:20:00</td><td>TCP SYN scan begins</td><td>203.0.113.50 → 192.168.1.10 — SYN packets to ports 1–65535</td></tr>
        <tr><td>14:20:45</td><td>Scan completes — found ports 22, 80, 443 open</td><td>RST/ACK responses from closed ports</td></tr>
        <tr><td>14:22:10</td><td>HTTP reconnaissance</td><td>GET /robots.txt, GET /admin/, GET /login.php</td></tr>
        <tr><td>14:22:45</td><td>SQL injection attempt 1 — error-based</td><td>GET /search.php?id=1' — HTTP 500 response with SQL error</td></tr>
        <tr><td>14:23:01</td><td>SQL injection attempt 2 — UNION-based</td><td>GET /search.php?id=1 UNION SELECT 1,2,3,username,password FROM users--</td></tr>
        <tr><td>14:23:15</td><td>Database dump success</td><td>HTTP 200 with user table data in response body</td></tr>
      </tbody>
    </table>
  </div>

  <h3>Lab Objectives</h3>
  <ol>
    <li>Write Snort rules to detect the TCP SYN port scan</li>
    <li>Write Snort rules to detect SQL injection in HTTP traffic</li>
    <li>Set correct snort.conf variables for the environment</li>
    <li>Run Snort against the described traffic scenario</li>
    <li>Read and interpret realistic alert output</li>
    <li>Tune the port scan rule to reduce false positives with <code>detection_filter</code></li>
  </ol>

  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Core Concepts</summary>
    <div class="tier-body"><ul>
      <li>Understand the two-phase attack: reconnaissance (port scan) followed by exploitation (SQL injection)</li>
      <li>Know the lab network: Snort sensor at 192.168.1.1, web server at 192.168.1.10, attacker at 203.0.113.50</li>
      <li>Recognize that the SYN scan is preparation — the real damage is the SQL injection at 14:22:45</li>
      <li>Know that a HTTP 500 SQL error response confirms the injection worked and the application is vulnerable</li>
    </ul></div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Deeper Skills</summary>
    <div class="tier-body"><ul>
      <li>Correlate the scan-to-exploit timeline: attacker confirmed port 80 open at 14:20:45, then hit it with SQL injection at 14:22:45</li>
      <li>Recognize the escalation: error-based injection (confirms vulnerability) → UNION SELECT (extracts data)</li>
      <li>Understand that a 200 response with 3847 bytes at 14:23:01 means data was successfully exfiltrated</li>
      <li>Consider what additional rules could add coverage: HTTP recon paths, user-agent anomalies, response size thresholds</li>
    </ul></div>
  </details>
  <details class="tier advanced">
    <summary>🔴 Advanced — Expert Techniques</summary>
    <div class="tier-body"><ul>
      <li>Model this attack as a kill chain: Reconnaissance → Delivery (GET /search.php) → Exploitation (SQL injection) → Exfiltration</li>
      <li>Design detection rules for each kill chain phase — don't rely only on the final exploitation stage</li>
      <li>Consider blind SQL injection variants (time-based, boolean-based) that wouldn't trigger the SQL error response rule</li>
      <li>Design defense-in-depth: WAF → Snort IPS → parameterized queries — no single layer should be the last line of defense</li>
    </ul></div>
  </details>
</article>
</template>

<!-- ════════════════════════ Write Rules ════════════════════════════════════ -->
<template id="tpl-write-rules">
<article class="topic">
  <h2>Step 1 — Write the Rules</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l3">L3 Network</span>
    <span class="osi-chip l4">L4 Transport</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">Detection rules match on L3 IP variables, L4 port/flag conditions (TCP flags, flow state), and L7 HTTP URI content patterns.</span>
  </div>

  <h3>Set Environment Variables in snort.conf</h3>
  <pre><code><span class="cm"># snort.conf — network variables for this lab</span>
var HOME_NET 192.168.1.0/24
var EXTERNAL_NET !$HOME_NET

var HTTP_SERVERS [192.168.1.10]
var SQL_SERVERS [192.168.1.20]
portvar HTTP_PORTS [80,443]

var RULE_PATH /etc/snort/rules</code></pre>

  <h3>/etc/snort/rules/local.rules</h3>
  <pre><code><span class="cm">######################################</span>
<span class="cm"># Lab Detection Rules — local.rules</span>
<span class="cm">######################################</span>

<span class="cm">## ---- Port Scan Rules ---- ##</span>

<span class="cm"># Rule 1: TCP Null Scan — stealth scan indicator (no flags = invalid TCP)</span>
alert tcp $EXTERNAL_NET any -> $HOME_NET any (
  msg:"SCAN TCP Null Scan";
  flags:0;
  flow:stateless;
  classtype:network-scan;
  priority:2;
  sid:1000001; rev:1;
)

<span class="cm"># Rule 2: TCP Xmas Scan — FIN+PSH+URG = invalid combination</span>
alert tcp $EXTERNAL_NET any -> $HOME_NET any (
  msg:"SCAN TCP Xmas Scan";
  flags:FPU;
  flow:stateless;
  classtype:network-scan;
  priority:2;
  sid:1000002; rev:1;
)

<span class="cm"># Rule 3: TCP SYN Scan — detect rapid SYN to multiple ports from same source</span>
<span class="cm"># detection_filter fires only after 20 SYN packets from same src in 10 seconds</span>
alert tcp $EXTERNAL_NET any -> $HOME_NET any (
  msg:"SCAN TCP SYN Port Scan - Multiple Ports";
  flags:S,12;
  flow:stateless;
  detection_filter:track by_src, count 20, seconds 10;
  classtype:network-scan;
  priority:2;
  sid:1000003; rev:1;
)

<span class="cm">## ---- SQL Injection Rules ---- ##</span>

<span class="cm"># Rule 4: SQL error response from web server</span>
<span class="cm"># Fires when server reveals SQL syntax errors (confirms injection worked)</span>
alert tcp $HTTP_SERVERS $HTTP_PORTS -> $EXTERNAL_NET any (
  msg:"SQL INJECTION Error Response - SQL Syntax Exposed";
  flow:established,to_client;
  content:"You have an error in your SQL syntax";
  nocase;
  fast_pattern;
  classtype:web-application-attack;
  priority:1;
  sid:1000010; rev:1;
)

<span class="cm"># Rule 5: UNION SELECT injection in HTTP URI</span>
alert tcp $EXTERNAL_NET any -> $HTTP_SERVERS $HTTP_PORTS (
  msg:"SQL INJECTION UNION SELECT in URI";
  flow:established,to_server;
  content:"UNION"; http_uri; nocase; fast_pattern;
  content:"SELECT"; http_uri; nocase; distance:0; within:20;
  classtype:web-application-attack;
  priority:1;
  reference:url,owasp.org/www-community/attacks/SQL_Injection;
  sid:1000011; rev:1;
)

<span class="cm"># Rule 6: SQL injection quote + comment sequence in URI</span>
<span class="cm"># Matches: id=1' OR 1=1-- (common injection pattern)</span>
alert tcp $EXTERNAL_NET any -> $HTTP_SERVERS $HTTP_PORTS (
  msg:"SQL INJECTION Quote + Comment in URI";
  flow:established,to_server;
  pcre:"/(\%27|%2527|\')\s*(or|and|union)\s+/Ui"; http_uri;
  classtype:web-application-attack;
  priority:1;
  sid:1000012; rev:1;
)

<span class="cm"># Rule 7: Stacked queries / comment sequences in URI</span>
alert tcp $EXTERNAL_NET any -> $HTTP_SERVERS $HTTP_PORTS (
  msg:"SQL INJECTION Comment Sequence in URI";
  flow:established,to_server;
  pcre:"/(--|#|%23|%2D%2D)\s*$/Ui"; http_uri;
  classtype:web-application-attack;
  priority:1;
  sid:1000013; rev:1;
)</code></pre>

  <h3>Rule Design Notes</h3>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Rule</th><th>Design Choice</th><th>Rationale</th></tr></thead>
      <tbody>
        <tr><td>1000001 (Null)</td><td><code>flow:stateless</code></td><td>Null scan packets have no state — don't require established connection</td></tr>
        <tr><td>1000003 (SYN scan)</td><td><code>detection_filter count 20 seconds 10</code></td><td>Prevents alerting on single SYN packets (normal web traffic); only fires on rapid scan behavior</td></tr>
        <tr><td>1000010 (SQL error)</td><td><code>flow:established,to_client</code></td><td>Matches server response, not request — confirms injection succeeded</td></tr>
        <tr><td>1000011 (UNION)</td><td><code>fast_pattern</code> on UNION</td><td>UNION is less common than SELECT — use as primary fast-pattern match for performance</td></tr>
        <tr><td>1000012 (PCRE)</td><td>Case-insensitive PCRE with URL decode</td><td>Catches both <code>'OR</code> and <code>%27OR</code> (URL-encoded quote)</td></tr>
      </tbody>
    </table>
  </div>

  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Core Concepts</summary>
    <div class="tier-body"><ul>
      <li>Always scope rules to specific variables: use <code>$HTTP_SERVERS $HTTP_PORTS</code> not <code>any any</code> for web attack rules</li>
      <li>Know the difference: <code>flow:stateless</code> (port scans — no state needed) vs. <code>flow:established,to_server</code> (app attacks)</li>
      <li>Understand that <code>detection_filter count 20 seconds 10</code> prevents the rule from firing on a single SYN packet</li>
      <li>SIDs must be unique — start custom rules at 1000001, increment for each new rule, never reuse SIDs</li>
    </ul></div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Deeper Skills</summary>
    <div class="tier-body"><ul>
      <li>Use <code>fast_pattern</code> on the least common content keyword to optimize Snort's multi-pattern matching</li>
      <li>Chain content keywords with <code>distance:0; within:20</code> to require UNION and SELECT close together (reduces false positives)</li>
      <li>Use <code>http_uri</code> modifier to match only on the URI portion of HTTP requests — not headers or body</li>
      <li>Use PCRE with the <code>U</code> flag for <code>http_uri</code> and <code>i</code> for case-insensitive matching</li>
    </ul></div>
  </details>
  <details class="tier advanced">
    <summary>🔴 Advanced — Expert Techniques</summary>
    <div class="tier-body"><ul>
      <li>Add <code>reference:url,owasp.org/...</code> to rules — gives analysts immediate context when investigating alerts</li>
      <li>Use both request rules (1000011/1000012) AND response rules (1000010) — response confirms exploitation success</li>
      <li>Combine <code>detection_filter</code> (fires after N events) with <code>threshold</code> (limits total alerts) for layered scan detection</li>
      <li>Test each rule individually against a known-good PCAP to verify no false positives before adding to production</li>
    </ul></div>
  </details>
</article>
</template>

<template id="tpl-run-snort">
<article class="topic">
  <h2>Step 2 — Validate &amp; Run Snort</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l3">L3 Network</span>
    <span class="osi-chip l4">L4 Transport</span>
    <span class="osi-note">Running Snort processes captured L3/L4 packet headers against the detection engine, validating rule syntax and startup configuration.</span>
  </div>

  <h3>Validate the Config and Rules</h3>
  <pre><code><span class="cm"># Step 1: Validate snort.conf syntax and all included rule files</span>
sudo snort -T -c /etc/snort/snort.conf
<span class="cm"># Expected output (at the end):</span>
<span class="cm">#   Snort successfully validated the configuration!</span>
<span class="cm">#   Snort exiting</span>

<span class="cm"># If there are rule syntax errors you'll see:</span>
<span class="cm">#   ERROR: /etc/snort/rules/local.rules(7) Unknown rule option: 'nocase'.</span>
<span class="cm"># (nocase must follow a content option — not standalone)</span></code></pre>

  <h3>Run Against a PCAP File</h3>
  <pre><code><span class="cm"># In a real lab, you'd capture the traffic first:</span>
sudo tcpdump -i eth0 -w /tmp/lab_traffic.pcap host 203.0.113.50

<span class="cm"># Then run Snort against the captured PCAP:</span>
sudo snort \
  -c /etc/snort/snort.conf \
  -r /tmp/lab_traffic.pcap \
  -A console \
  -q \
  -l /var/log/snort/

<span class="cm"># Flags explained:</span>
<span class="cm"># -c snort.conf  — load configuration (NIDS mode)</span>
<span class="cm"># -r lab.pcap    — read from PCAP (not live interface)</span>
<span class="cm"># -A console     — print alerts to terminal</span>
<span class="cm"># -q             — quiet — suppress banner and statistics</span>
<span class="cm"># -l /var/log/   — also write alert to fast file</span>

<span class="cm"># For live capture instead:</span>
sudo snort -c /etc/snort/snort.conf -i eth0 -A fast -l /var/log/snort/ -D</code></pre>

  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Core Concepts</summary>
    <div class="tier-body"><ul>
      <li>Always validate syntax before running: <code>sudo snort -T -c /etc/snort/snort.conf</code></li>
      <li>Capture traffic first with tcpdump, then replay against Snort: <code>snort -r lab_traffic.pcap</code></li>
      <li>Use <code>-A console -q</code> for testing — console output plus quiet mode hides the startup banner</li>

  <details class="tier intermediate">
    <summary>🟡 Intermediate — Deeper Skills</summary>

    </ul></div>

  <details class="tier advanced">
    <summary>🔴 Advanced — Expert Techniques</summary>
    <div class="tier-body"><ul>
      <li>In Snort 3: <code>snort --daq-list</code> to see available DAQ modules — use <code>afpacket</code> for inline IPS mode</li>
      <li>Benchmark rule performance: <code>snort --enable-profiling-rules -r large.pcap -c snort.conf</code> to find slowest rules</li>
      <li>Use Snort 3's <code>--lua 'HOME_NET="10.0.0.0/8"'</code> to override variables from CLI without editing snort.lua</li>
      <li>Build a CI pipeline: on rule commit, automatically run <code>snort -T</code> to catch syntax errors before deployment</li>
    </ul></div>
  </details>
</article>

<template id="tpl-port-scan-alerts">
<article class="topic">
  <h2>Step 3 — Port Scan Alert Output</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l3">L3 Network</span>
    <span class="osi-chip l4">L4 Transport</span>
    <span class="osi-note">Port scan alerts expose L3 attacker IPs and L4 destination port ranges, with sfportscan summarizing connection counts and scanned port ranges.</span>
  </div>
  <p>Running Snort against the lab traffic with <code>-A console</code> produces the following alerts during the SYN scan phase (14:20:00 – 14:20:45):</p>

  <h3>Console Alert Output — Port Scan Phase</h3>
  <pre><code><span class="cm"># Alert stream — SYN scan (203.0.113.50 scanning 192.168.1.10)</span>
<span class="cm"># Note: no alerts fire for first 10 seconds (detection_filter threshold not met)</span>
<span class="cm"># After 20 SYN packets within 10 seconds, the rule fires:</span>

03/07-14:20:10.118923 [**] [1:1000003:1] SCAN TCP SYN Port Scan - Multiple Ports [**] [Classification: Network Scan] [Priority: 2] {TCP} 203.0.113.50:47821 -> 192.168.1.10:22

03/07-14:20:10.119044 [**] [1:1000003:1] SCAN TCP SYN Port Scan - Multiple Ports [**] [Classification: Network Scan] [Priority: 2] {TCP} 203.0.113.50:47821 -> 192.168.1.10:80

03/07-14:20:10.119178 [**] [1:1000003:1] SCAN TCP SYN Port Scan - Multiple Ports [**] [Classification: Network Scan] [Priority: 2] {TCP} 203.0.113.50:47821 -> 192.168.1.10:443

03/07-14:20:10.120001 [**] [1:1000003:1] SCAN TCP SYN Port Scan - Multiple Ports [**] [Classification: Network Scan] [Priority: 2] {TCP} 203.0.113.50:47821 -> 192.168.1.10:3306

<span class="cm">... approximately 200 more port scan alerts ...</span></code></pre>

  <div class="callout warn">
    <strong>Alert storm:</strong> The SYN scan generates approximately 200 alerts in 45 seconds. Even with <code>detection_filter</code> set to 20 packets per 10 seconds, a scan of all 65535 ports still generates hundreds of alerts. This is by design — each alert represents a new batch of ports being scanned. In production, you would add a <code>threshold</code> to limit to 1 alert per 60 seconds per source.
  </div>

  <h3>sfportscan Preprocessor Alert</h3>
  <pre><code><span class="cm"># With sfportscan preprocessor enabled, you also get a dedicated scan summary alert:</span>
03/07-14:20:45.998441 [**] [106:1:1] (portscan) TCP Portscan [**] [Classification: Network Scan] [Priority: 3] {PROTO:255} 203.0.113.50 -> 192.168.1.10
<span class="cm"># GID 106 = sfportscan preprocessor</span>
<span class="cm"># SID 1 = TCP portscan</span>
<span class="cm"># sfportscan includes additional detail in the packet data section (full format):</span>
<span class="cm">#   Priority Count: 1</span>
<span class="cm">#   Connection Count: 65535</span>
<span class="cm">#   IP Count: 1</span>
<span class="cm">#   Scanned IP Range: 192.168.1.10:1 - 192.168.1.10:65535</span>
<span class="cm">#   Port/Proto Count: 65535</span>
<span class="cm">#   Port/Proto Range: 1:65535</span></code></pre>

  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Core Concepts</summary>
    <div class="tier-body"><ul>
      <li>Know that port scan alerts don't fire immediately — <code>detection_filter count 20 seconds 10</code> requires 20 SYNs first</li>
      <li>Recognize GID 106 = sfportscan preprocessor — generates a summary alert separate from the rule-based alerts</li>
      <li>Understand that ~200 alerts from one scan is expected — each represents another batch of scanned ports</li>
      <li>The sfportscan "Connection Count: 65535" confirms a full port scan, not a targeted connection</li>
    </ul></div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Deeper Skills</summary>
    <div class="tier-body"><ul>
      <li>Add <code>threshold type limit, track by_src, count 1, seconds 300</code> to reduce 200 scan alerts to 1 per 5-minute window</li>
      <li>Correlate the sfportscan alert's port range with the attacker's found open ports — predict next attack targets</li>
      <li>Note the 2-minute gap between scan (14:20) and exploitation (14:22) — this is your detection-to-block opportunity</li>

<!-- ════════════════════════ Tuning ═════════════════════════════════════════ -->
<template id="tpl-tuning">
<article class="topic">
  <h2>Step 5 — Tuning Rules</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l3">L3 Network</span>
    <span class="osi-chip l4">L4 Transport</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">Rule tuning applies thresholds and suppressions at L3 (IP-based suppression), L4 (flag/flow tightening), and L7 (PCRE refinement) levels.</span>
  </div>

  <h3>Problem: Port Scan Rule Too Noisy</h3>
  <p>Rule 1000003 generated ~200 alerts during the 45-second SYN scan. In production, this would fill the alert file and make it hard to see other events. We need to rate-limit it without missing the scan.</p>

  <h3>Solution 1: Add threshold to local.rules</h3>
  <pre><code><span class="cm"># Modify rule 1000003 to alert at most once per source per 5 minutes</span>
alert tcp $EXTERNAL_NET any -> $HOME_NET any (
  msg:"SCAN TCP SYN Port Scan - Multiple Ports";
  flags:S,12;
  flow:stateless;
  detection_filter:track by_src, count 20, seconds 10;
  threshold:type limit, track by_src, count 1, seconds 300;
  classtype:network-scan;
  priority:2;
  sid:1000003; rev:2;   <span class="cm"># ← increment rev on rule changes</span>
)</code></pre>

  <h3>Solution 2: Suppress in threshold.conf (preferred for tuning)</h3>
  <pre><code><span class="cm"># /etc/snort/threshold.conf</span>

<span class="cm"># Rate-limit SYN scan rule — alert at most 3 times per source per 5 minutes</span>
event_filter gen_id 1, sig_id 1000003, type limit, track by_src, count 3, seconds 300

<span class="cm"># If your internal vulnerability scanner (192.168.1.200) triggers the scan rule:</span>
suppress gen_id 1, sig_id 1000003, track by_src, ip 192.168.1.200

<span class="cm"># Suppress sfportscan preprocessor from internal security tools</span>
suppress gen_id 106, sig_id 1, track by_src, ip 192.168.1.200</code></pre>

  <h3>Problem: SQL Injection Rule — High False Positives</h3>
  <p>Rule 1000013 (comment sequence) may fire on legitimate web requests that happen to end with a comment-like pattern (e.g., some REST APIs). Let's tighten it.</p>
  <pre><code><span class="cm"># Original (too broad):</span>
pcre:"/(--|#|%23|%2D%2D)\s*$/Ui";

<span class="cm"># Improved — require a quote or digit before the comment (more specific):</span>
alert tcp $EXTERNAL_NET any -> $HTTP_SERVERS $HTTP_PORTS (
  msg:"SQL INJECTION Comment After Quote in URI";
  flow:established,to_server;
  pcre:"/(\%27|\').*?(--|#|%23)/Ui"; http_uri;
  classtype:web-application-attack;
  priority:1;
  sid:1000013; rev:2;
)</code></pre>

  <h3>Testing the Tuned Rules</h3>
  <pre><code><span class="cm"># After editing rules, always re-validate:</span>
sudo snort -T -c /etc/snort/snort.conf
<span class="cm"># Look for: Snort successfully validated the configuration!</span>

<span class="cm"># Re-run against the lab PCAP to confirm alerts still fire correctly:</span>
sudo snort -c /etc/snort/snort.conf -r /tmp/lab_traffic.pcap \
  -A console -q

<span class="cm"># Count total alerts after tuning (should be fewer scan alerts):</span>
sudo snort -c /etc/snort/snort.conf -r /tmp/lab_traffic.pcap \
  -A fast -q -l /tmp/ 2&gt;/dev/null
wc -l /tmp/alert
<span class="cm"># Before tuning: ~210 alerts</span>
<span class="cm"># After tuning:   ~7 alerts (1-3 scan + 4 SQL injection)</span></code></pre>

  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Core Concepts</summary>
    <div class="tier-body"><ul>
      <li>Know the two tuning locations: edit the rule itself (local.rules) vs. threshold.conf (preferred — avoids modifying upstream rules)</li>
      <li>Understand that <code>threshold:type limit, count 1, seconds 300</code> limits a rule to 1 alert per 5 minutes per source</li>
      <li>Use threshold.conf for suppressions — avoids modifying rule files that may be overwritten on update</li>
      <li>Always re-validate after changes: <code>snort -T -c snort.conf</code></li>
    </ul></div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Deeper Skills</summary>
    <div class="tier-body"><ul>
      <li>Distinguish <code>event_filter type limit</code> (fire N times then stop per window) from <code>type threshold</code> (fire every Nth occurrence)</li>
      <li>Tighten broad PCRE rules by adding required surrounding context: <code>(\%27|\').*?(--)</code> is more specific than <code>(--)</code> alone</li>
      <li>Increment the rule's <code>rev</code> number on every change: <code>rev:1</code> → <code>rev:2</code> — enables version tracking in your SIEM</li>
      <li>After tuning, re-run the original test PCAP and verify tuned rules still fire on known-bad traffic</li>
    </ul></div>
  </details>
  <details class="tier advanced">
    <summary>🔴 Advanced — Expert Techniques</summary>
    <div class="tier-body"><ul>
      <li>Maintain a tuning log: record every threshold.conf change with date, analyst, original alert count, and post-tuning count</li>
      <li>Use <code>event_filter type both</code> — fires only after N events, then every Nth occurrence (sliding window approach)</li>
      <li>Build a regression test suite: known-bad PCAPs that must generate specific alerts after any rule change</li>
      <li>Periodically review all suppressions — remove entries where the FP source (IP, service) no longer exists in your environment</li>
    </ul></div>
  </details>
</article>
</template>
