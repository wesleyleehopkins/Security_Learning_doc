<template id="tpl-nse-overview">
<article class="topic">
<h1>01 · NSE Overview &amp; Categories</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">NSE scripts operate at L7 by probing and interrogating application-layer services — SSH, HTTP, SMB, FTP, DNS. L4 TCP connections are used only as the transport vehicle to reach those services.</span>
</div>
<hr class="divider">

<p>The Nmap Scripting Engine (NSE) allows users to write and run Lua scripts against discovered hosts and services. Scripts extend Nmap's capabilities from simple port scanning into service enumeration, vulnerability detection, exploitation, and more. Scripts ship with Nmap in <code>/usr/share/nmap/scripts/</code>.</p>

<h2>Script Categories</h2>
<div class="table-wrap">
<table>
  <thead><tr><th>Category</th><th>Description</th><th>Risk Level</th></tr></thead>
  <tbody>
    <tr><td><code>default</code></td><td>Run with -sC; considered safe and useful for most users</td><td>Low</td></tr>
    <tr><td><code>safe</code></td><td>Safe to run — won't crash services or consume excessive resources</td><td>Low</td></tr>
    <tr><td><code>discovery</code></td><td>Enumerate services, users, directories, and other network info</td><td>Low</td></tr>
    <tr><td><code>auth</code></td><td>Check for default credentials or authentication bypass</td><td>Low-Medium</td></tr>
    <tr><td><code>version</code></td><td>Used automatically by -sV for enhanced version detection</td><td>Low</td></tr>
    <tr><td><code>vuln</code></td><td>Test for specific known vulnerabilities (non-exploiting)</td><td>Medium</td></tr>
    <tr><td><code>exploit</code></td><td>Attempt to exploit vulnerabilities</td><td>High</td></tr>
    <tr><td><code>brute</code></td><td>Brute force authentication on services</td><td>Medium-High</td></tr>
    <tr><td><code>intrusive</code></td><td>May crash services, consume excessive resources, or trigger alarms</td><td>High</td></tr>
    <tr><td><code>malware</code></td><td>Detect backdoors and malware activity</td><td>Low</td></tr>
    <tr><td><code>external</code></td><td>Queries external databases (WHOIS, DNS blacklists, etc.)</td><td>Low (sends data out)</td></tr>
    <tr><td><code>fuzzer</code></td><td>Send malformed/random data to find crashes</td><td>High</td></tr>
    <tr><td><code>dos</code></td><td>Denial of service attacks</td><td>Very High</td></tr>
  </tbody>
</table>
</div>

<h2>Script Location &amp; Search</h2>
<pre><code><span class="cm"># Default script directory</span>
/usr/share/nmap/scripts/          <span class="cm"># Linux</span>
C:\Program Files (x86)\Nmap\scripts\  <span class="cm"># Windows</span>

<span class="cm"># List all scripts in a category</span>
ls /usr/share/nmap/scripts/ | grep -i vuln

<span class="cm"># Search script database (nmap --script-help)</span>
nmap --script-help "http-*"       <span class="cm"># all HTTP scripts</span>
nmap --script-help smb-vuln-ms17-010  <span class="cm"># specific script</span>

<span class="cm"># Search by keyword in script descriptions</span>
grep -r "categories.*vuln" /usr/share/nmap/scripts/*.nse | grep "http"

<span class="cm"># Update script database after adding custom scripts</span>
nmap --script-updatedb</code></pre>

<h2>Running Scripts — Syntax</h2>
<pre><code><span class="cm"># Run default category (same as -sC)</span>
nmap --script=default 192.168.1.10

<span class="cm"># Run specific script</span>
nmap --script=smb-vuln-ms17-010 -p 445 192.168.1.10

<span class="cm"># Run multiple scripts (comma-separated)</span>
nmap --script=http-title,http-server-header,http-methods -p 80 192.168.1.10

<span class="cm"># Run entire category</span>
nmap --script=vuln 192.168.1.10

<span class="cm"># Run multiple categories</span>
nmap --script="default,safe,vuln" 192.168.1.10

<span class="cm"># Wildcard — run all http scripts</span>
nmap --script="http-*" -p 80,443,8080 192.168.1.10

<span class="cm"># Logical expressions</span>
nmap --script="not intrusive and not brute" 192.168.1.10
nmap --script="vuln or exploit" 192.168.1.10</code></pre>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Core Concepts</summary>
  <div class="tier-body">
    <ul>
      <li>Know that NSE scripts live in <code>/usr/share/nmap/scripts/</code> and run Lua code against discovered hosts</li>
      <li>Understand the 13 script categories — especially <code>default</code>, <code>safe</code>, <code>vuln</code>, <code>brute</code>, and why <code>intrusive</code> / <code>dos</code> are dangerous</li>
      <li>Run <code>--script=default</code> (same as <code>-sC</code>) against a lab target: <code>nmap -sV --script=default 192.168.56.30</code></li>
      <li>Use <code>--script-help=&lt;name&gt;</code> to read what any script does before running it</li>
      <li>Run <code>nmap --script-updatedb</code> after adding a custom script</li>
    </ul>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — Deeper Skills</summary>
  <div class="tier-body">
    <ul>
      <li>Use category combinations: <code>--script="default,safe,vuln"</code> for broad non-intrusive coverage</li>
      <li>Apply logical filter expressions: <code>--script="not intrusive and not brute"</code> to stay safe on production</li>
      <li>Use wildcard script selectors: <code>--script="http-*"</code> or <code>--script="smb-vuln-*"</code></li>
      <li>Search scripts by keyword: <code>grep -r "categories.*vuln" /usr/share/nmap/scripts/*.nse</code></li>
      <li>Understand script lifecycle hooks — <code>prerule</code>, <code>portrule</code>, <code>hostrule</code>, <code>postrule</code> — to know when each script fires</li>
    </ul>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Expert Techniques</summary>
  <div class="tier-body">
    <ul>
      <li>Write a custom NSE script in Lua: define categories, portrule condition, and action function</li>
      <li>Use <code>--script-trace</code> to debug packet-level NSE exchanges and diagnose failed scripts</li>
      <li>Chain category filters with boolean logic to build precise engagement-specific script sets</li>
      <li>Test against: <code>nmap --script="vuln or exploit" -sV -p 445,80,21,22 192.168.56.30</code></li>
      <li>Integrate custom scripts into a portable <code>--datadir</code> for repeatable assessment kits</li>
    </ul>
  </div>
</details>
</article>
</template>

<template id="tpl-default-scripts">
<article class="topic">
<h1>02 · Default Scripts (-sC)</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l4">L4 Transport</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">Default scripts establish L4 TCP connections to open ports, then exchange L7 application-layer messages — SSH handshakes, HTTP GET requests, SMB negotiation frames, and TLS ClientHellos.</span>
</div>
<hr class="divider">

<div class="callout"><code>-sC</code> is equivalent to <code>--script=default</code>. Default scripts are judged safe, useful, and not excessively intrusive. They run automatically when their target port/service is open.</div>

<h2>Command</h2>
<pre><code><span class="cm"># Run default scripts + version detection (most common combo)</span>
nmap -sV -sC 192.168.1.10

<span class="cm"># Equivalent to -A (minus OS detection and traceroute)</span>
nmap -sV -sC 192.168.1.10

<span class="cm"># Specific ports</span>
nmap -sC -p 22,80,443,3306 192.168.1.10</code></pre>

<h2>Key Default Scripts by Service</h2>
<div class="table-wrap">
<table>
  <thead><tr><th>Script</th><th>Service</th><th>What It Does</th></tr></thead>
  <tbody>
    <tr><td><code>ssh-hostkey</code></td><td>SSH (22)</td><td>Displays SSH host key fingerprints (RSA, ECDSA, Ed25519)</td></tr>
    <tr><td><code>ssh-auth-methods</code></td><td>SSH (22)</td><td>Lists accepted authentication methods (password, publickey, keyboard-interactive)</td></tr>
    <tr><td><code>http-title</code></td><td>HTTP (80,443)</td><td>Retrieves and displays the HTML page title</td></tr>
    <tr><td><code>http-server-header</code></td><td>HTTP</td><td>Shows Server: header from HTTP response</td></tr>
    <tr><td><code>http-auth</code></td><td>HTTP</td><td>Reports HTTP authentication realm if 401 returned</td></tr>
    <tr><td><code>ssl-cert</code></td><td>SSL/TLS</td><td>Displays SSL certificate details (CN, expiry, issuer, SANs)</td></tr>
    <tr><td><code>ssl-enum-ciphers</code></td><td>SSL/TLS</td><td>Lists supported cipher suites and grades them (A-F)</td></tr>
    <tr><td><code>ftp-anon</code></td><td>FTP (21)</td><td>Checks if anonymous FTP login is allowed</td></tr>
    <tr><td><code>ftp-syst</code></td><td>FTP (21)</td><td>Retrieves FTP server system type via SYST command</td></tr>
    <tr><td><code>smb-os-discovery</code></td><td>SMB (445)</td><td>OS, domain, computer name via SMB negotiation</td></tr>
    <tr><td><code>smb-security-mode</code></td><td>SMB (445)</td><td>SMB signing status and authentication level</td></tr>
    <tr><td><code>mysql-info</code></td><td>MySQL (3306)</td><td>Protocol version, error message, capabilities</td></tr>
    <tr><td><code>dns-zone-transfer</code></td><td>DNS (53)</td><td>Attempts AXFR zone transfer — succeeds if misconfigured</td></tr>
    <tr><td><code>snmp-info</code></td><td>SNMP (161)</td><td>Gets sysDescr and sysName via public community string</td></tr>
    <tr><td><code>rdp-enum-encryption</code></td><td>RDP (3389)</td><td>RDP encryption level and NLA requirement</td></tr>
  </tbody>
</table>
</div>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Core Concepts</summary>
  <div class="tier-body">
    <ul>
      <li>Run <code>nmap -sV -sC 192.168.56.30</code> and identify which script produced each output line</li>
      <li>Understand that <code>-sC</code> = <code>--script=default</code> — equivalent and interchangeable</li>
      <li>Recognize high-value default findings: <code>ftp-anon: Anonymous FTP login allowed</code>, weak SMB signing, expired SSL certs</li>
      <li>Read <code>ssh-hostkey</code> output and know the three key types: RSA, ECDSA, ED25519</li>
      <li>Note that <code>-A</code> includes <code>-sC</code> plus OS detection (<code>-O</code>) and traceroute</li>
    </ul>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — Deeper Skills</summary>
  <div class="tier-body">
    <ul>
      <li>Target specific services with default scripts: <code>nmap -sV -sC -p 22,80,443,445 192.168.56.30</code></li>
      <li>Interpret <code>ssl-enum-ciphers</code> cipher grades (A–F) and flag weak suites (RC4, DES, EXPORT)</li>
      <li>Recognize <code>smb-security-mode: message_signing: disabled</code> as a relay attack risk</li>
      <li>Use <code>dns-zone-transfer</code> output to map internal DNS topology</li>
      <li>Correlate <code>http-server-header</code> and <code>http-title</code> to fingerprint web application stacks</li>
    </ul>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Expert Techniques</summary>
  <div class="tier-body">
    <ul>
      <li>Map default script findings to MITRE ATT&CK: <code>ftp-anon</code> → T1083 (File Discovery), <code>smb-enum-shares</code> → T1135</li>
      <li>Cross-reference <code>ssl-cert</code> expiry dates against internal PKI rotation schedules</li>
      <li>Use <code>-sC</code> output as recon intelligence — identify outdated versions for targeted vuln script follow-up</li>
      <li>Parse default script output with <code>-oX</code> XML and extract structured results via XSLT or Python</li>
      <li>Build a baseline: run <code>-sV -sC</code> against Security Onion (<code>192.168.56.20</code>) and Windows 10 (<code>192.168.56.30</code>), compare outputs</li>
    </ul>
  </div>
</details>
</article>
</template>

<template id="tpl-vuln-scripts">
<article class="topic">
<h1>03 · Vulnerability Scripts</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l4">L4 Transport</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">Vuln scripts send crafted L7 application-layer payloads — malformed SMB headers, oversized TLS heartbeat records, Bash environment strings — over L4 TCP connections to probe for known vulnerabilities.</span>
</div>
<hr class="divider">

<div class="callout warn"><strong>Vuln scripts probe for specific vulnerabilities</strong> — they may send unusual payloads or trigger error responses, but generally do not exploit vulnerabilities. Always obtain authorization before running.</div>

<h2>Running Vulnerability Scripts</h2>
<pre><code><span class="cm"># Run all vuln-category scripts</span>
nmap --script=vuln 192.168.1.10

<span class="cm"># Run with version detection (recommended)</span>
nmap -sV --script=vuln 192.168.1.10

<span class="cm"># Combine with default scripts</span>
nmap -sV -sC --script=vuln 192.168.1.10

<span class="cm"># Target specific service vuln checks</span>
nmap --script="smb-vuln-*" -p 445 192.168.1.10
nmap --script="http-vuln-*" -p 80,443,8080 192.168.1.10</code></pre>

<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Core Concepts</summary>
  <div class="tier-body">
    <ul>
      <li>Know that vuln scripts <em>detect</em> vulnerabilities but do not exploit them — <code>exploit</code> category does that</li>
      <li>Run <code>nmap -sV --script=vuln 192.168.56.30</code> and read the <code>VULNERABLE</code> / <code>NOT VULNERABLE</code> state lines</li>
      <li>Recognize <code>smb-vuln-ms17-010</code> (EternalBlue / WannaCry) as the highest-priority SMB vuln check</li>
      <li>Understand that you need explicit authorization before running vuln scripts on any system</li>
      <li>Match CVE numbers from script output to CVSS severity scores on NVD</li>
    </ul>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — Deeper Skills</summary>
  <div class="tier-body">
    <ul>
      <li>Run targeted service checks: <code>nmap --script="smb-vuln-*" -p 445 192.168.56.30</code></li>
      <li>Combine version detection with vuln scripts: <code>nmap -sV --script=vuln 192.168.56.30</code></li>
      <li>Test Heartbleed: <code>nmap -sV --script=ssl-heartbleed -p 443 192.168.56.20</code></li>
      <li>Correlate vuln script hits to known threat actor TTPs (EternalBlue → ransomware, Shellshock → botnets)</li>
      <li>Understand why <code>ssl-poodle</code> and <code>ssl-dh-params</code> flag protocol downgrade / weak key risks</li>
    </ul>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Expert Techniques</summary>
  <div class="tier-body">
    <ul>
      <li>Chain vuln scan output into automated triage: <code>nmap -oX - --script=vuln | xsltproc nmap.xsl -</code></li>
      <li>Scan an entire subnet for EternalBlue exposure: <code>nmap --script=smb-vuln-ms17-010 -p 445 192.168.56.0/24</code></li>
      <li>Map vuln findings to MITRE ATT&CK exploit techniques for prioritized remediation reporting</li>
      <li>Use <code>http-shellshock --script-args uri=</code> to iterate over multiple CGI paths systematically</li>
      <li>Integrate vuln script results into vulnerability management platforms (OpenVAS, Tenable) as corroborating evidence</li>
    </ul>
  </div>
</details>
</article>

<template id="tpl-auth-discovery">
<article class="topic">
<h1>04 · Auth &amp; Discovery Scripts</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">Auth and discovery scripts operate entirely at L7, speaking application protocols — FTP anonymous login, HTTP header fetching, SMB share enumeration, DNS AXFR zone transfer, SNMP sysDescr queries — to map services and access controls.</span>
</div>
<hr class="divider">

<h2>Authentication Scripts</h2>
<div class="table-wrap">
<table>
  <thead><tr><th>Script</th><th>Port</th><th>Description</th></tr></thead>
  <tbody>
    <tr><td><code>http-default-accounts</code></td><td>80/443</td><td>Tests common default credentials for web applications (routers, printers, cameras, CMS)</td></tr>
    <tr><td><code>ftp-anon</code></td><td>21</td><td>Tests for anonymous FTP login; lists accessible files if successful</td></tr>
    <tr><td><code>http-auth-finder</code></td><td>80/443</td><td>Finds HTTP authentication type (Basic, Digest, NTLM, Form-based)</td></tr>
    <tr><td><code>smb-enum-shares</code></td><td>445</td><td>Lists SMB shares with access permissions (guest/authenticated)</td></tr>
    <tr><td><code>smb-enum-users</code></td><td>445</td><td>Enumerates users via SMB (SAMR/LSA methods)</td></tr>
    <tr><td><code>smb-enum-sessions</code></td><td>445</td><td>Lists active SMB sessions (requires elevated access)</td></tr>
    <tr><td><code>snmp-brute</code></td><td>161</td><td>Brute force SNMP community strings</td></tr>
    <tr><td><code>ms-sql-empty-password</code></td><td>1433</td><td>Check SQL Server sa account for empty password</td></tr>
    <tr><td><code>mysql-empty-password</code></td><td>3306</td><td>Check MySQL root for empty password</td></tr>
    <tr><td><code>vnc-info</code></td><td>5900</td><td>VNC security type and authentication requirements</td></tr>
    <tr><td><code>ldap-search</code></td><td>389</td><td>LDAP anonymous bind and base DN discovery</td></tr>
  </tbody>
</table>
</div>

<h2>Discovery Scripts</h2>
<div class="table-wrap">
<table>
  <thead><tr><th>Script</th><th>Port</th><th>Description</th></tr></thead>
  <tbody>
    <tr><td><code>http-robots.txt</code></td><td>80/443</td><td>Retrieves and displays robots.txt (often reveals hidden paths)</td></tr>
    <tr><td><code>http-enum</code></td><td>80/443</td><td>Enumerates common web application directories and files</td></tr>
    <tr><td><code>http-headers</code></td><td>80/443</td><td>Retrieves all HTTP response headers</td></tr>
    <tr><td><code>dns-zone-transfer</code></td><td>53</td><td>Attempts AXFR DNS zone transfer — reveals full DNS records</td></tr>
    <tr><td><code>dns-recursion</code></td><td>53</td><td>Checks if DNS server allows recursive queries (open resolver)</td></tr>

    <tr><td><code>snmp-interfaces</code></td><td>161</td><td>Lists network interfaces via SNMP (requires public community)</td></tr>
    <tr><td><code>nbstat</code></td><td>137</td><td>NetBIOS name table — hostname, domain, MAC address</td></tr>
    <tr><td><code>smb-os-discovery</code></td><td>445</td><td>OS, domain, FQDN via SMB negotiation</td></tr>
    <tr><td><code>ms-sql-info</code></td><td>1433</td><td>SQL Server instance name, version, named pipes</td></tr>
    <tr><td><code>banner</code></td><td>any</td><td>Read and display service banner on connection</td></tr>
    <tr><td><code>finger</code></td><td>79</td><td>Enumerate users via finger protocol (Unix systems)</td></tr>

<h2>Anonymous FTP Check</h2>

| ftp-anon: Anonymous FTP login allowed (FTP code 230)

| drwxr-xr-x  2 ftp ftp   4096 Jan 07  pub/
|_-rw-r--r--  1 ftp ftp 204800 Jan 07  backup_20240107.tar.gz
|_ftp-syst: 211 End (FTP server status):
     ProFTPD 1.3.5 Server

<span class="cm"># backup_20240107.tar.gz → high-value finding — retrieve and inspect</span></code></pre>

|   \\192.168.1.5\Public:  Access: READ, WRITE   ← world-writeable share!

|   CORP\Domain Admins (RID: 512)

<span class="cm"># READ,WRITE on Public share = data exfil risk</span>

<h2>DNS Zone Transfer</h2>
<pre><code>$ nmap --script=dns-zone-transfer --script-args dns-zone-transfer.domain=corp.local \
  -p 53 192.168.1.1

53/tcp open  domain

| dns-zone-transfer:

<span class="cm"># Zone transfer reveals full internal DNS map</span>
<span class="cm"># Fix: restrict AXFR to authorized secondary DNS servers only</span></code></pre>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Core Concepts</summary>
  <div class="tier-body">
    <ul>
      <li>Run <code>nmap --script=ftp-anon -p 21 192.168.56.30</code> — note whether anonymous login is allowed and what files are listed</li>
      <li>Understand what <code>smb-os-discovery</code> reveals: OS version, computer name, domain, FQDN</li>
      <li>Use <code>http-robots.txt</code> to discover hidden paths a web app tries to exclude from crawlers</li>
      <li>Know that DNS zone transfer (<code>dns-zone-transfer</code>) is a misconfiguration — AXFR should only work for secondary DNS servers</li>
      <li>Recognize SNMP community strings — <code>public</code> and <code>private</code> — as default credentials worth testing</li>
    </ul>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — Deeper Skills</summary>
  <div class="tier-body">
    <ul>
      <li>Combine share and user enumeration: <code>nmap --script=smb-enum-shares,smb-enum-users -p 445 192.168.56.30</code></li>
      <li>Flag world-writable shares (<code>Access: READ, WRITE</code>) as data exfiltration risks in pen test reports</li>
      <li>Execute zone transfer: <code>nmap --script=dns-zone-transfer --script-args dns-zone-transfer.domain=corp.local -p 53 &lt;dns-server&gt;</code></li>
      <li>Use <code>nbstat</code> on UDP 137 to resolve NetBIOS hostname and MAC address without touching TCP</li>
      <li>Correlate <code>smb-enum-users</code> output (RIDs 500, 1001, etc.) with known account naming conventions</li>
    </ul>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Expert Techniques</summary>
  <div class="tier-body">
    <ul>
      <li>Chain <code>smb-enum-users</code> output into a targeted username list for credential spray (Hydra / CrackMapExec)</li>
      <li>Use LDAP anonymous bind (<code>ldap-search</code>) to pull Active Directory base DN and enumerate OUs without credentials</li>
      <li>Map SNMP interface data (<code>snmp-interfaces</code>) to build a L2/L3 network topology diagram</li>
      <li>Correlate auth/discovery findings across multiple tools — Nmap + enum4linux + rpcclient — for comprehensive SMB recon</li>
      <li>Detect auth/discovery scans on the defender side: watch for rapid multi-script SMB probes in Security Onion alerts (<code>192.168.56.10</code> → <code>192.168.56.30</code>)</li>
    </ul>
  </div>
</details>
</article>

<template id="tpl-brute-scripts">
<article class="topic">
<h1>05 · Brute Force Scripts</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">Brute force scripts repeatedly submit L7 application-layer authentication attempts — SSH AUTH_PASSWORD, HTTP POST login forms, SMB NTLM challenges, FTP USER/PASS sequences — cycling through credential lists until a valid combination is found.</span>
</div>
<hr class="divider">

<div class="callout warn"><strong>Brute force scripts generate significant authentication log noise</strong> and may lock out accounts. Always check lockout policies before running. Only use with explicit authorization.</div>

<h2>Common Brute Force Scripts</h2>
<div class="table-wrap">
<table>
  <thead><tr><th>Script</th><th>Service</th><th>Port</th><th>Notes</th></tr></thead>
  <tbody>
    <tr><td><code>ssh-brute</code></td><td>SSH</td><td>22</td><td>Username + password brute force</td></tr>
    <tr><td><code>ftp-brute</code></td><td>FTP</td><td>21</td><td>Username + password</td></tr>
    <tr><td><code>http-brute</code></td><td>HTTP Basic/Digest</td><td>80/443</td><td>HTTP authentication brute force</td></tr>
    <tr><td><code>http-form-brute</code></td><td>HTTP Form</td><td>80/443</td><td>HTML login form brute force</td></tr>
    <tr><td><code>telnet-brute</code></td><td>Telnet</td><td>23</td><td>Telnet authentication</td></tr>
    <tr><td><code>smb-brute</code></td><td>SMB</td><td>445</td><td>Windows SMB authentication</td></tr>
    <tr><td><code>ms-sql-brute</code></td><td>SQL Server</td><td>1433</td><td>SQL Server login</td></tr>
    <tr><td><code>mysql-brute</code></td><td>MySQL</td><td>3306</td><td>MySQL login</td></tr>
    <tr><td><code>vnc-brute</code></td><td>VNC</td><td>5900</td><td>VNC password</td></tr>
    <tr><td><code>rdp-brute</code></td><td>RDP</td><td>3389</td><td>Windows Remote Desktop</td></tr>
    <tr><td><code>pop3-brute</code></td><td>POP3</td><td>110</td><td>POP3 email authentication</td></tr>
    <tr><td><code>imap-brute</code></td><td>IMAP</td><td>143</td><td>IMAP email authentication</td></tr>
    <tr><td><code>snmp-brute</code></td><td>SNMP</td><td>161</td><td>SNMP community string brute</td></tr>
    <tr><td><code>ldap-brute</code></td><td>LDAP</td><td>389</td><td>LDAP bind authentication</td></tr>
  </tbody>
</table>
</div>

<h2>Basic Brute Force Commands</h2>
<pre><code><span class="cm"># SSH brute force with default wordlists</span>
nmap -p 22 --script=ssh-brute 192.168.1.10

<span class="cm"># SSH brute force with custom wordlists</span>
nmap -p 22 --script=ssh-brute \
  --script-args userdb=/tmp/users.txt,passdb=/tmp/passwords.txt \
  192.168.1.10

<span class="cm"># FTP brute force</span>
nmap -p 21 --script=ftp-brute \
  --script-args userdb=users.txt,passdb=common_passwords.txt \
  192.168.1.10

<span class="cm"># HTTP form brute force (login page)</span>
nmap -p 80 --script=http-form-brute \
  --script-args http-form-brute.path=/login,http-form-brute.uservar=username,\
http-form-brute.passvar=password \
  192.168.1.10</code></pre>

<h2>SSH Brute Force Output</h2>
<pre><code>$ nmap -p 22 --script=ssh-brute \
  --script-args userdb=users.txt,passdb=passwords.txt 192.168.1.10

PORT   STATE SERVICE
22/tcp open  ssh

| ssh-brute:
|   Accounts:
|     admin:admin123 - Valid credentials   ← FOUND
|     root:toor - Valid credentials        ← FOUND
|   Statistics:
|_    Performed 1240 guesses in 120 seconds, average tps: 10

<span class="cm"># Found credentials can be used with --script-args credentials.txt</span></code></pre>

<h2>Brute Force Script Arguments</h2>
<div class="table-wrap">
<table>
  <thead><tr><th>Argument</th><th>Description</th><th>Default</th></tr></thead>
  <tbody>
    <tr><td><code>brute.mode</code></td><td>Mode: user (per-user), pass (per-pass), or user_pass</td><td>user</td></tr>
    <tr><td><code>brute.threads</code></td><td>Number of concurrent threads</td><td>5</td></tr>
    <tr><td><code>brute.delay</code></td><td>Seconds between attempts per thread</td><td>0</td></tr>
    <tr><td><code>brute.timeout</code></td><td>Connection timeout in seconds</td><td>5</td></tr>
    <tr><td><code>userdb</code></td><td>Path to username wordlist file</td><td>nmap usernames.lst</td></tr>
    <tr><td><code>passdb</code></td><td>Path to password wordlist file</td><td>nmap passwords.lst</td></tr>
    <tr><td><code>brute.firstonly</code></td><td>Stop after first valid credential found</td><td>false</td></tr>
  </tbody>
</table>
</div>

<pre><code><span class="cm"># Limit threads to avoid lockout</span>
nmap --script=ssh-brute --script-args brute.threads=2,brute.delay=3 -p 22 target

<span class="cm"># Stop after first success</span>
nmap --script=ssh-brute \
  --script-args brute.firstonly=true,userdb=users.txt,passdb=pass.txt \
  -p 22 target</code></pre>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Core Concepts</summary>
  <div class="tier-body">
    <ul>
      <li>Understand that brute force scripts generate <strong>heavy authentication log noise</strong> and can trigger account lockouts — never run without authorization</li>
      <li>Know the three core arguments: <code>userdb</code> (username list), <code>passdb</code> (password list), <code>brute.threads</code> (concurrency)</li>
      <li>Run a basic SSH brute attempt in the lab: <code>nmap -p 22 --script=ssh-brute 192.168.56.30</code></li>
      <li>Understand <code>brute.firstonly=true</code> — stops after finding the first valid credential to minimize noise</li>
      <li>Know that Nmap ships default wordlists at <code>/usr/share/nmap/nselib/data/</code></li>
    </ul>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — Deeper Skills</summary>
  <div class="tier-body">
    <ul>
      <li>Use custom wordlists: <code>--script-args userdb=/usr/share/seclists/Usernames/top-usernames-shortlist.txt,passdb=/usr/share/seclists/Passwords/Common-Credentials/10k-most-common.txt</code></li>
      <li>Limit concurrency to avoid lockout: <code>brute.threads=2,brute.delay=3</code> (2 threads, 3-second delay between attempts)</li>
      <li>Run FTP brute on lab target: <code>nmap -p 21 --script=ftp-brute --script-args userdb=u.txt,passdb=p.txt 192.168.56.30</code></li>
      <li>Check lockout policy before running — if AD has 5-attempt lockout, keep threads=1 and use targeted userdb</li>
      <li>Use <code>brute.mode=pass</code> for password spray — tries one password against all users before moving to next</li>
    </ul>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Expert Techniques</summary>
  <div class="tier-body">
    <ul>
      <li>Build a targeted userdb from <code>smb-enum-users</code> output — combine discovery and brute into a chained workflow</li>
      <li>Analyze lockout threshold vs. spray timing: if lockout is 5 attempts / 30 min, one attempt every 7 min per account is safe</li>
      <li>Defender perspective: detect brute attempts in Security Onion — watch for repeated auth failures from <code>192.168.56.10</code> to <code>192.168.56.30</code> in Windows Event ID 4625</li>
      <li>Use <code>http-form-brute</code> with precise form field args to target web login pages — requires inspecting form HTML for field names</li>
      <li>Compare Nmap brute results against Hydra / Medusa for the same target — cross-validate findings and speed differences</li>
    </ul>
  </div>
</details>
</article>
</template>

<template id="tpl-script-args">
<article class="topic">
<h1>06 · Script Args &amp; Management</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">Script args control how NSE interacts with L7 application targets — specifying URI paths, credential wordlists, protocol community strings, and thread timing. The management layer sits above the actual protocol exchanges.</span>
</div>
<hr class="divider">

<h2>Passing Script Arguments</h2>
<pre><code><span class="cm"># Single argument</span>
nmap --script=http-shellshock \
  --script-args uri=/cgi-bin/status.cgi 192.168.1.10

<span class="cm"># Multiple arguments (comma-separated)</span>
nmap --script=ssh-brute \
  --script-args userdb=/tmp/u.txt,passdb=/tmp/p.txt,brute.threads=3 \
  192.168.1.10

<span class="cm"># Arguments from file (one key=value per line)</span>
nmap --script=ssh-brute \
  --script-args-file /tmp/args.txt 192.168.1.10

<span class="cm"># args.txt contents:</span>
# userdb=/tmp/users.txt
# passdb=/tmp/passwords.txt
# brute.threads=2

<span class="cm"># Script-specific prefix (avoids conflicts)</span>
nmap --script=http-form-brute \
  --script-args "http-form-brute.path=/admin/login" 192.168.1.10</code></pre>

<h2>Getting Script Help</h2>
<pre><code><span class="cm"># Full documentation for a script</span>
nmap --script-help=smb-vuln-ms17-010

<span class="cm"># Help output includes:</span>
# - Description
# - Categories
# - Script arguments
# - Example usage
# - Author and license

<span class="cm"># Search for scripts by pattern</span>
nmap --script-help "smb-*"
nmap --script-help "http-vuln-*"

<span class="cm"># List all scripts with category</span>
ls /usr/share/nmap/scripts/*.nse | xargs grep -l "categories.*vuln"</code></pre>

<h2>Script Trace — Debug NSE</h2>
<pre><code><span class="cm"># See every packet and data exchange from NSE scripts</span>
nmap --script=http-title --script-trace -p 80 192.168.1.10 2>&amp;1

<span class="cm"># Sample trace:</span>
NSOCK INFO TCP connect to 192.168.1.10:80 completed successfully.
NSOCK INFO Write request for 72 bytes:
  GET / HTTP/1.0\r\nHost: 192.168.1.10\r\nConnection: close\r\n\r\n
NSOCK INFO Read response: HTTP/1.1 200 OK...&lt;title&gt;Login Portal&lt;/title&gt;</code></pre>

<h2>Custom Script Location</h2>
<pre><code><span class="cm"># Default script directory</span>
/usr/share/nmap/scripts/

<span class="cm"># Add custom scripts</span>
cp my_custom.nse /usr/share/nmap/scripts/
nmap --script-updatedb       <span class="cm"># update script index after adding</span>

<span class="cm"># Run from custom path</span>
nmap --script /path/to/my_custom.nse 192.168.1.10

<span class="cm"># Use custom data directory</span>
nmap --datadir /my/nmap/data 192.168.1.10</code></pre>

<h2>Common Script Argument Patterns</h2>
<div class="table-wrap">
<table>
  <thead><tr><th>Use Case</th><th>Script + Args</th></tr></thead>
  <tbody>
    <tr><td>HTTP path enumeration</td><td><code>--script=http-enum --script-args http-enum.basepath=/admin/</code></td></tr>
    <tr><td>Shellshock on specific CGI</td><td><code>--script=http-shellshock --script-args uri=/cgi-bin/test.cgi</code></td></tr>
    <tr><td>DNS zone transfer</td><td><code>--script=dns-zone-transfer --script-args dns-zone-transfer.domain=corp.local</code></td></tr>
    <tr><td>SNMP with community string</td><td><code>--script=snmp-interfaces --script-args snmp.community=public</code></td></tr>
    <tr><td>HTTP brute login form</td><td><code>--script=http-form-brute --script-args http-form-brute.path=/login,http-form-brute.uservar=user,http-form-brute.passvar=pass</code></td></tr>
    <tr><td>SMB with credentials</td><td><code>--script=smb-enum-shares --script-args smbuser=admin,smbpass=Password1</code></td></tr>
  </tbody>
</table>
</div>

<h2>Script Output Verbosity</h2>
<pre><code><span class="cm"># Standard script output</span>
nmap --script=smb-os-discovery -p 445 192.168.1.10

<span class="cm"># Verbose — more detail in script output</span>
nmap --script=smb-os-discovery -p 445 -v 192.168.1.10

<span class="cm"># Debug + trace — maximum detail</span>
nmap --script=smb-os-discovery -p 445 -d --script-trace 192.168.1.10 2>&amp;1

<span class="cm"># Suppress script output for faster scanning</span>
nmap --script=vuln --script-trace 0 192.168.1.10</code></pre>
