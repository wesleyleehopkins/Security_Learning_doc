<template id="tpl-nse-overview">
<article class="topic">
<h1>01 · NSE Overview &amp; Categories</h1>
<hr class="divider">

<p>The Nmap Scripting Engine (NSE) allows users to write and run Lua scripts against discovered hosts and services. Scripts extend Nmap's capabilities from simple port scanning into service enumeration, vulnerability detection, exploitation, and more. Scripts ship with Nmap in <code>/usr/share/nmap/scripts/</code>.</p>

<h2>Script Categories</h2>
<div class="table-wrap">
<table>
  <thead><tr><th>Category</th><th>Description</th><th>Risk Level</th></tr></thead>
  <tbody>
    <tr><td><code>default</code></td><td>Run with -sC; considered safe and useful for most users</td><td>Low</td></tr>
    <tr><td><code>safe</code></td><td>Safe to run — won't crash services or consume excessive resources</td><td>Low</td></tr>
    <tr><td><code>discovery</code></td><td>Enumerate services, users, directories, and other network info</td><td>Low</td></tr>
    <tr><td><code>auth</code></td><td>Check for default credentials or authentication bypass</td><td>Low-Medium</td></tr>
    <tr><td><code>version</code></td><td>Used automatically by -sV for enhanced version detection</td><td>Low</td></tr>
    <tr><td><code>vuln</code></td><td>Test for specific known vulnerabilities (non-exploiting)</td><td>Medium</td></tr>
    <tr><td><code>exploit</code></td><td>Attempt to exploit vulnerabilities</td><td>High</td></tr>
    <tr><td><code>brute</code></td><td>Brute force authentication on services</td><td>Medium-High</td></tr>
    <tr><td><code>intrusive</code></td><td>May crash services, consume excessive resources, or trigger alarms</td><td>High</td></tr>
    <tr><td><code>malware</code></td><td>Detect backdoors and malware activity</td><td>Low</td></tr>
    <tr><td><code>external</code></td><td>Queries external databases (WHOIS, DNS blacklists, etc.)</td><td>Low (sends data out)</td></tr>
    <tr><td><code>fuzzer</code></td><td>Send malformed/random data to find crashes</td><td>High</td></tr>
    <tr><td><code>dos</code></td><td>Denial of service attacks</td><td>Very High</td></tr>
  </tbody>
</table>
</div>

<h2>Script Location &amp; Search</h2>
<pre><code><span class="cm"># Default script directory</span>
/usr/share/nmap/scripts/          <span class="cm"># Linux</span>
C:\Program Files (x86)\Nmap\scripts\  <span class="cm"># Windows</span>

<span class="cm"># List all scripts in a category</span>
ls /usr/share/nmap/scripts/ | grep -i vuln

<span class="cm"># Search script database (nmap --script-help)</span>
nmap --script-help "http-*"       <span class="cm"># all HTTP scripts</span>
nmap --script-help smb-vuln-ms17-010  <span class="cm"># specific script</span>

<span class="cm"># Search by keyword in script descriptions</span>
grep -r "categories.*vuln" /usr/share/nmap/scripts/*.nse | grep "http"

<span class="cm"># Update script database after adding custom scripts</span>
nmap --script-updatedb</code></pre>

<h2>Running Scripts — Syntax</h2>
<pre><code><span class="cm"># Run default category (same as -sC)</span>
nmap --script=default 192.168.1.10

<span class="cm"># Run specific script</span>
nmap --script=smb-vuln-ms17-010 -p 445 192.168.1.10

<span class="cm"># Run multiple scripts (comma-separated)</span>
nmap --script=http-title,http-server-header,http-methods -p 80 192.168.1.10

<span class="cm"># Run entire category</span>
nmap --script=vuln 192.168.1.10

<span class="cm"># Run multiple categories</span>
nmap --script="default,safe,vuln" 192.168.1.10

<span class="cm"># Wildcard — run all http scripts</span>
nmap --script="http-*" -p 80,443,8080 192.168.1.10

<span class="cm"># Logical expressions</span>
nmap --script="not intrusive and not brute" 192.168.1.10
nmap --script="vuln or exploit" 192.168.1.10</code></pre>
</article>
</template>

<template id="tpl-default-scripts">
<article class="topic">
<h1>02 · Default Scripts (-sC)</h1>
<hr class="divider">

<div class="callout"><code>-sC</code> is equivalent to <code>--script=default</code>. Default scripts are judged safe, useful, and not excessively intrusive. They run automatically when their target port/service is open.</div>

<h2>Command</h2>
<pre><code><span class="cm"># Run default scripts + version detection (most common combo)</span>
nmap -sV -sC 192.168.1.10

<span class="cm"># Equivalent to -A (minus OS detection and traceroute)</span>
nmap -sV -sC 192.168.1.10

<span class="cm"># Specific ports</span>
nmap -sC -p 22,80,443,3306 192.168.1.10</code></pre>

<h2>Key Default Scripts by Service</h2>

<table>
  <thead><tr><th>Script</th><th>Service</th><th>What It Does</th></tr></thead>

    <tr><td><code>ssh-hostkey</code></td><td>SSH (22)</td><td>Displays SSH host key fingerprints (RSA, ECDSA, Ed25519)</td></tr>
    <tr><td><code>ssh-auth-methods</code></td><td>SSH (22)</td><td>Lists accepted authentication methods (password, publickey, keyboard-interactive)</td></tr>
    <tr><td><code>http-title</code></td><td>HTTP (80,443)</td><td>Retrieves and displays the HTML page title</td></tr>
    <tr><td><code>http-server-header</code></td><td>HTTP</td><td>Shows Server: header from HTTP response</td></tr>
    <tr><td><code>http-auth</code></td><td>HTTP</td><td>Reports HTTP authentication realm if 401 returned</td></tr>
    <tr><td><code>ssl-cert</code></td><td>SSL/TLS</td><td>Displays SSL certificate details (CN, expiry, issuer, SANs)</td></tr>
    <tr><td><code>ssl-enum-ciphers</code></td><td>SSL/TLS</td><td>Lists supported cipher suites and grades them (A-F)</td></tr>
    <tr><td><code>ftp-anon</code></td><td>FTP (21)</td><td>Checks if anonymous FTP login is allowed</td></tr>

    <tr><td><code>mysql-info</code></td><td>MySQL (3306)</td><td>Protocol version, error message, capabilities</td></tr>
    <tr><td><code>dns-zone-transfer</code></td><td>DNS (53)</td><td>Attempts AXFR zone transfer — succeeds if misconfigured</td></tr>

<template id="tpl-vuln-scripts">
<article class="topic">
<h1>03 · Vulnerability Scripts</h1>
<hr class="divider">

<div class="callout warn"><strong>Vuln scripts probe for specific vulnerabilities</strong> — they may send unusual payloads or trigger error responses, but generally do not exploit vulnerabilities. Always obtain authorization before running.</div>

<h2>Running Vulnerability Scripts</h2>
<pre><code><span class="cm"># Run all vuln-category scripts</span>
nmap --script=vuln 192.168.1.10

<span class="cm"># Run with version detection (recommended)</span>
nmap -sV --script=vuln 192.168.1.10

<span class="cm"># Combine with default scripts</span>
nmap -sV -sC --script=vuln 192.168.1.10

<span class="cm"># Target specific service vuln checks</span>
nmap --script="smb-vuln-*" -p 445 192.168.1.10
nmap --script="http-vuln-*" -p 80,443,8080 192.168.1.10</code></pre>

<template id="tpl-brute-scripts">
<article class="topic">
<h1>05 · Brute Force Scripts</h1>
<hr class="divider">

<div class="callout warn"><strong>Brute force scripts generate significant authentication log noise</strong> and may lock out accounts. Always check lockout policies before running. Only use with explicit authorization.</div>

<h2>Common Brute Force Scripts</h2>
<div class="table-wrap">
<table>
  <thead><tr><th>Script</th><th>Service</th><th>Port</th><th>Notes</th></tr></thead>
  <tbody>
    <tr><td><code>ssh-brute</code></td><td>SSH</td><td>22</td><td>Username + password brute force</td></tr>
    <tr><td><code>ftp-brute</code></td><td>FTP</td><td>21</td><td>Username + password</td></tr>
    <tr><td><code>http-brute</code></td><td>HTTP Basic/Digest</td><td>80/443</td><td>HTTP authentication brute force</td></tr>
    <tr><td><code>http-form-brute</code></td><td>HTTP Form</td><td>80/443</td><td>HTML login form brute force</td></tr>
    <tr><td><code>telnet-brute</code></td><td>Telnet</td><td>23</td><td>Telnet authentication</td></tr>
    <tr><td><code>smb-brute</code></td><td>SMB</td><td>445</td><td>Windows SMB authentication</td></tr>
    <tr><td><code>ms-sql-brute</code></td><td>SQL Server</td><td>1433</td><td>SQL Server login</td></tr>
    <tr><td><code>mysql-brute</code></td><td>MySQL</td><td>3306</td><td>MySQL login</td></tr>
    <tr><td><code>vnc-brute</code></td><td>VNC</td><td>5900</td><td>VNC password</td></tr>
    <tr><td><code>rdp-brute</code></td><td>RDP</td><td>3389</td><td>Windows Remote Desktop</td></tr>
    <tr><td><code>pop3-brute</code></td><td>POP3</td><td>110</td><td>POP3 email authentication</td></tr>
    <tr><td><code>imap-brute</code></td><td>IMAP</td><td>143</td><td>IMAP email authentication</td></tr>
    <tr><td><code>snmp-brute</code></td><td>SNMP</td><td>161</td><td>SNMP community string brute</td></tr>
    <tr><td><code>ldap-brute</code></td><td>LDAP</td><td>389</td><td>LDAP bind authentication</td></tr>
  </tbody>
</table>
</div>

<h2>Basic Brute Force Commands</h2>
<pre><code><span class="cm"># SSH brute force with default wordlists</span>
nmap -p 22 --script=ssh-brute 192.168.1.10

<span class="cm"># SSH brute force with custom wordlists</span>
nmap -p 22 --script=ssh-brute \
  --script-args userdb=/tmp/users.txt,passdb=/tmp/passwords.txt \
  192.168.1.10

<span class="cm"># FTP brute force</span>
nmap -p 21 --script=ftp-brute \
  --script-args userdb=users.txt,passdb=common_passwords.txt \
  192.168.1.10

<span class="cm"># HTTP form brute force (login page)</span>
nmap -p 80 --script=http-form-brute \
  --script-args http-form-brute.path=/login,http-form-brute.uservar=username,\
http-form-brute.passvar=password \
  192.168.1.10</code></pre>

<h2>SSH Brute Force Output</h2>
<pre><code>$ nmap -p 22 --script=ssh-brute \
  --script-args userdb=users.txt,passdb=passwords.txt 192.168.1.10

PORT   STATE SERVICE
22/tcp open  ssh

| ssh-brute:
|   Accounts:
|     admin:admin123 - Valid credentials   ← FOUND
|     root:toor - Valid credentials        ← FOUND
|   Statistics:
|_    Performed 1240 guesses in 120 seconds, average tps: 10

<span class="cm"># Found credentials can be used with --script-args credentials.txt</span></code></pre>

<h2>Brute Force Script Arguments</h2>
<div class="table-wrap">
<table>
  <thead><tr><th>Argument</th><th>Description</th><th>Default</th></tr></thead>
  <tbody>
    <tr><td><code>brute.mode</code></td><td>Mode: user (per-user), pass (per-pass), or user_pass</td><td>user</td></tr>
    <tr><td><code>brute.threads</code></td><td>Number of concurrent threads</td><td>5</td></tr>
    <tr><td><code>brute.delay</code></td><td>Seconds between attempts per thread</td><td>0</td></tr>
    <tr><td><code>brute.timeout</code></td><td>Connection timeout in seconds</td><td>5</td></tr>
    <tr><td><code>userdb</code></td><td>Path to username wordlist file</td><td>nmap usernames.lst</td></tr>
    <tr><td><code>passdb</code></td><td>Path to password wordlist file</td><td>nmap passwords.lst</td></tr>
    <tr><td><code>brute.firstonly</code></td><td>Stop after first valid credential found</td><td>false</td></tr>
  </tbody>
</table>
</div>

<pre><code><span class="cm"># Limit threads to avoid lockout</span>
nmap --script=ssh-brute --script-args brute.threads=2,brute.delay=3 -p 22 target

<span class="cm"># Stop after first success</span>
nmap --script=ssh-brute \
  --script-args brute.firstonly=true,userdb=users.txt,passdb=pass.txt \
  -p 22 target</code></pre>
</article>
</template>

<template id="tpl-script-args">
<article class="topic">
<h1>06 · Script Args &amp; Management</h1>
<hr class="divider">

<h2>Passing Script Arguments</h2>
<pre><code><span class="cm"># Single argument</span>
nmap --script=http-shellshock \
  --script-args uri=/cgi-bin/status.cgi 192.168.1.10

<span class="cm"># Multiple arguments (comma-separated)</span>
nmap --script=ssh-brute \
  --script-args userdb=/tmp/u.txt,passdb=/tmp/p.txt,brute.threads=3 \
  192.168.1.10

<span class="cm"># Arguments from file (one key=value per line)</span>
nmap --script=ssh-brute \
  --script-args-file /tmp/args.txt 192.168.1.10

<span class="cm"># args.txt contents:</span>
# userdb=/tmp/users.txt
# passdb=/tmp/passwords.txt
# brute.threads=2

<span class="cm"># Script-specific prefix (avoids conflicts)</span>
nmap --script=http-form-brute \
  --script-args "http-form-brute.path=/admin/login" 192.168.1.10</code></pre>

<h2>Getting Script Help</h2>
<pre><code><span class="cm"># Full documentation for a script</span>
nmap --script-help=smb-vuln-ms17-010

<span class="cm"># Help output includes:</span>
# - Description
# - Categories
# - Script arguments
# - Example usage
# - Author and license

<span class="cm"># Search for scripts by pattern</span>
nmap --script-help "smb-*"
nmap --script-help "http-vuln-*"

<span class="cm"># List all scripts with category</span>
ls /usr/share/nmap/scripts/*.nse | xargs grep -l "categories.*vuln"</code></pre>

<h2>Script Trace — Debug NSE</h2>
<pre><code><span class="cm"># See every packet and data exchange from NSE scripts</span>
nmap --script=http-title --script-trace -p 80 192.168.1.10 2>&amp;1

<span class="cm"># Sample trace:</span>
NSOCK INFO TCP connect to 192.168.1.10:80 completed successfully.
NSOCK INFO Write request for 72 bytes:
  GET / HTTP/1.0\r\nHost: 192.168.1.10\r\nConnection: close\r\n\r\n
NSOCK INFO Read response: HTTP/1.1 200 OK...&lt;title&gt;Login Portal&lt;/title&gt;</code></pre>

<h2>Custom Script Location</h2>
<pre><code><span class="cm"># Default script directory</span>
/usr/share/nmap/scripts/

<span class="cm"># Add custom scripts</span>
cp my_custom.nse /usr/share/nmap/scripts/
nmap --script-updatedb       <span class="cm"># update script index after adding</span>

<span class="cm"># Run from custom path</span>
nmap --script /path/to/my_custom.nse 192.168.1.10

<span class="cm"># Use custom data directory</span>
nmap --datadir /my/nmap/data 192.168.1.10</code></pre>

<h2>Common Script Argument Patterns</h2>
<div class="table-wrap">
<table>
  <thead><tr><th>Use Case</th><th>Script + Args</th></tr></thead>
  <tbody>
    <tr><td>HTTP path enumeration</td><td><code>--script=http-enum --script-args http-enum.basepath=/admin/</code></td></tr>
    <tr><td>Shellshock on specific CGI</td><td><code>--script=http-shellshock --script-args uri=/cgi-bin/test.cgi</code></td></tr>
    <tr><td>DNS zone transfer</td><td><code>--script=dns-zone-transfer --script-args dns-zone-transfer.domain=corp.local</code></td></tr>
    <tr><td>SNMP with community string</td><td><code>--script=snmp-interfaces --script-args snmp.community=public</code></td></tr>
    <tr><td>HTTP brute login form</td><td><code>--script=http-form-brute --script-args http-form-brute.path=/login,http-form-brute.uservar=user,http-form-brute.passvar=pass</code></td></tr>
    <tr><td>SMB with credentials</td><td><code>--script=smb-enum-shares --script-args smbuser=admin,smbpass=Password1</code></td></tr>
  </tbody>
</table>
</div>

<h2>Script Output Verbosity</h2>
<pre><code><span class="cm"># Standard script output</span>
nmap --script=smb-os-discovery -p 445 192.168.1.10

<span class="cm"># Verbose — more detail in script output</span>
nmap --script=smb-os-discovery -p 445 -v 192.168.1.10

<span class="cm"># Debug + trace — maximum detail</span>
nmap --script=smb-os-discovery -p 445 -d --script-trace 192.168.1.10 2>&amp;1

<span class="cm"># Suppress script output for faster scanning</span>
nmap --script=vuln --script-trace 0 192.168.1.10</code></pre>
