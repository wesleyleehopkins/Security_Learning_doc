<template id="tpl-scenario">
<article class="topic">
  <h2>Lab Scenario: SSH Brute Force Attack</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l3">L3 Network</span>
    <span class="osi-chip l4">L4 Transport</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">This lab spans all layers: attacker source IP (L3), TCP connections on port 22 (L4), SSH authentication events in auth.log (L7). Active response blocks at L3 via iptables.</span>
  </div>

  <div class="callout lab">
    <strong>Static Lab:</strong> This is a read-only lab using realistic simulated data. No live system is needed. Follow each step to understand how OSSEC/Wazuh decodes log lines, fires rules, generates alerts, and executes active response.
  </div>

  <h3>Environment</h3>
  <div class="table-wrap">
    <table>
      <thead><tr><th>System</th><th>IP</th><th>Role</th></tr></thead>
      <tbody>
        <tr><td>OSSEC Manager</td><td>10.0.0.5</td><td>IDS manager — receives agent logs, runs rules</td></tr>
        <tr><td>webserver01</td><td>10.0.1.50</td><td>Wazuh agent — Ubuntu 22.04 running Apache + SSH</td></tr>
        <tr><td>Attacker</td><td>198.51.100.77</td><td>External IP — running Hydra SSH brute force</td></tr>
      </tbody>
    </table>
  </div>

  <h3>Attack Timeline</h3>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Time</th><th>Event</th></tr></thead>
      <tbody>
        <tr><td>14:32:00</td><td>Attacker begins Hydra SSH brute force against webserver01 port 22</td></tr>
        <tr><td>14:32:00–14:32:08</td><td>12 failed login attempts in 8 seconds — rule 5712 fires</td></tr>
        <tr><td>14:32:09</td><td>OSSEC alert generated (level 10), active response triggered</td></tr>
        <tr><td>14:32:09</td><td>firewall-drop blocks 198.51.100.77 on webserver01</td></tr>
        <tr><td>14:32:10</td><td>Subsequent SSH attempts from attacker silently dropped by iptables</td></tr>
        <tr><td>14:42:09</td><td>10-minute timeout expires — iptables rule removed (auto-unblock)</td></tr>
      </tbody>
    </table>
  </div>

  <h3>Lab Objectives</h3>
  <ul>
    <li>Understand the raw auth.log lines generated by SSH brute force</li>
    <li>See how OSSEC decoders extract srcip and user fields</li>
    <li>Trace which rule fires and why</li>
    <li>Read and interpret the full OSSEC alert output</li>
    <li>See the active response iptables block take effect</li>

      <ul>
        <li>An attacker at 198.51.100.77 uses Hydra to brute-force SSH on webserver01 (10.0.1.50)</li>
        <li>12 failed logins in 8 seconds — fast enough to trigger OSSEC's brute-force detection (rule 5712)</li>
        <li>OSSEC automatically blocks the attacker's IP using iptables — within 1 second of the threshold being hit</li>
        <li>After 10 minutes the block auto-expires — attacker can try again (permanent block is a follow-up action)</li>
      </ul>
    </div>
  </details>

      </ul>
    </div>
  </details>

<!-- ══════════════════════════ Raw Auth.log ═══════════════════════════════════ -->
<template id="tpl-auth-log">
<article class="topic">
  <h2>Step 1 — Raw auth.log Lines</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l3">L3 Network</span>
    <span class="osi-chip l4">L4 Transport</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">Each auth.log line contains the attacker's source IP (L3 Network), source port showing parallel Hydra connections (L4 Transport), and SSH program name + auth event text (L7 Application).</span>
  </div>
  <p>These are the exact lines written to <code>/var/log/auth.log</code> on webserver01 during the brute force attack. Each failed attempt generates one line.</p>

  <h3>auth.log During Attack (14:32:00 – 14:32:08)</h3>
  <pre><code>Mar 19 14:32:00 webserver01 sshd[18901]: Failed password for invalid user admin from 198.51.100.77 port 47331 ssh2
Mar 19 14:32:01 webserver01 sshd[18902]: Failed password for invalid user root from 198.51.100.77 port 47332 ssh2
Mar 19 14:32:01 webserver01 sshd[18903]: Failed password for invalid user administrator from 198.51.100.77 port 47333 ssh2
Mar 19 14:32:02 webserver01 sshd[18904]: Failed password for invalid user test from 198.51.100.77 port 47334 ssh2
Mar 19 14:32:02 webserver01 sshd[18905]: Failed password for invalid user user from 198.51.100.77 port 47335 ssh2
Mar 19 14:32:03 webserver01 sshd[18906]: Failed password for invalid user ubuntu from 198.51.100.77 port 47336 ssh2
Mar 19 14:32:04 webserver01 sshd[18907]: Failed password for invalid user guest from 198.51.100.77 port 47337 ssh2
Mar 19 14:32:05 webserver01 sshd[18908]: Failed password for invalid user pi from 198.51.100.77 port 47338 ssh2
Mar 19 14:32:06 webserver01 sshd[18909]: Failed password for invalid user oracle from 198.51.100.77 port 47339 ssh2
Mar 19 14:32:06 webserver01 sshd[18910]: Failed password for invalid user deploy from 198.51.100.77 port 47340 ssh2
Mar 19 14:32:07 webserver01 sshd[18911]: Failed password for invalid user ec2-user from 198.51.100.77 port 47341 ssh2
Mar 19 14:32:08 webserver01 sshd[18912]: Failed password for invalid user vagrant from 198.51.100.77 port 47342 ssh2</code></pre>

  <h3>What Each Field Means</h3>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Field</th><th>Value</th><th>Notes</th></tr></thead>
      <tbody>
        <tr><td>Timestamp</td><td>Mar 19 14:32:00</td><td>Local system time on the agent</td></tr>
        <tr><td>Hostname</td><td>webserver01</td><td>Pre-decoded by OSSEC (syslog header)</td></tr>
        <tr><td>Program</td><td>sshd[18901]</td><td>Process name + PID — matches sshd decoder</td></tr>
        <tr><td>"Failed password"</td><td>—</td><td>prematch string for sshd-failed decoder</td></tr>
        <tr><td>"invalid user"</td><td>—</td><td>Username does not exist on this system</td></tr>
        <tr><td>Username</td><td>admin, root, test...</td><td>Extracted by decoder into <code>user</code> field</td></tr>
        <tr><td>Source IP</td><td>198.51.100.77</td><td>Extracted by decoder into <code>srcip</code> field</td></tr>
        <tr><td>Port</td><td>47331–47342</td><td>Different source port per attempt (Hydra parallel connections)</td></tr>
      </tbody>
    </table>
  </div>

  <div class="callout note">
    <strong>Key indicator:</strong> All 12 attempts share srcip <code>198.51.100.77</code>. The sequential ports (47331–47342) indicate automated tooling. Each attempt targets a different username — classic credential stuffing / dictionary attack pattern.
  </div>
  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Read the Log Lines</summary>
    <div class="tier-body">
      <h4>What to Look For in auth.log</h4>
      <ul>
        <li>Every "Failed password" line represents one failed login attempt</li>
        <li>Look for the same source IP repeated across many lines — that's the attacker</li>
        <li>The user names change each attempt (admin, root, test...) — that's a dictionary list</li>
        <li>The ports are sequential (47331, 47332...) — automated tool using multiple connections</li>
        <li>No "Accepted password" from 198.51.100.77 = no successful login</li>
      </ul>
    </div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Parse the Syslog Format</summary>
    <div class="tier-body">
      <h4>Syslog RFC 3164 Structure</h4>
      <ul>
        <li>Format: <code>TIMESTAMP HOSTNAME PROGRAM[PID]: MESSAGE</code></li>
        <li>OSSEC's pre-decoder handles the header (timestamp, hostname, program)</li>
        <li>The child decoder then processes only the MESSAGE portion starting from "Failed password"</li>
        <li>PID changes per attempt because sshd spawns a child process for each connection</li>
      </ul>
      <pre><code>Mar 19 14:32:00  webserver01  sshd[18901]:  Failed password for invalid user admin from 198.51.100.77 port 47331 ssh2
^timestamp^      ^hostname^   ^program^PID^  ^-------- message (decoder input) --------------------------------^</code></pre>
    </div>
  </details>
  <details class="tier advanced">
    <summary>🔴 Advanced — Detect With Log Analysis Tooling</summary>
    <div class="tier-body">
      <h4>Command-Line Analysis of auth.log</h4>
      <pre><code><span class="cm"># Count failures per source IP</span>
awk '/Failed password/{print $(NF-3)}' /var/log/auth.log | sort | uniq -c | sort -rn | head

<span class="cm"># List all usernames attempted from attacker IP</span>
grep "198.51.100.77" /var/log/auth.log | awk '/invalid user/{print $9}' | sort -u

<span class="cm"># Time range of attack (first and last attempt)</span>
grep "198.51.100.77" /var/log/auth.log | awk '{print $1,$2,$3}' | head -1
grep "198.51.100.77" /var/log/auth.log | awk '{print $1,$2,$3}' | tail -1</code></pre>
    </div>
  </details>
</article>
</template>

<!-- ══════════════════════════ Decoder Output ════════════════════════════════ -->
<template id="tpl-decoder-output">
<article class="topic">
  <h2>Step 2 — Decoder Processing</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l3">L3 Network</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">The decoder extracts structured fields from L7 application log text. The srcip field it produces represents the L3 attacker address. Log parsing and rule matching both operate entirely at L7.</span>
  </div>
  <p>OSSEC runs each auth.log line through its decoder chain. Here is the output of <code>ossec-logtest</code> for one of the brute force lines.</p>

  <h3>ossec-logtest Output for One Line</h3>
  <pre><code><span class="cm">## Input line to test:</span>
Mar 19 14:32:00 webserver01 sshd[18901]: Failed password for invalid user admin from 198.51.100.77 port 47331 ssh2

<span class="cm">## ossec-logtest output:</span>

**Phase 1: Completed pre-decoding.
       full event: 'Mar 19 14:32:00 webserver01 sshd[18901]: Failed password for invalid user admin from 198.51.100.77 port 47331 ssh2'
       hostname: 'webserver01'
       program_name: 'sshd'
       log: 'Failed password for invalid user admin from 198.51.100.77 port 47331 ssh2'

**Phase 2: Completed decoding.
       decoder: 'sshd'
       srcip:   '198.51.100.77'
       user:    'admin'

**Phase 3: Completed filtering (rules).
       Rule id: '5710'
       Level:   '5'
       Description: 'sshd: Attempt to login using a non-existent user'</code></pre>

  <h3>Decoder Chain Traced</h3>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Step</th><th>Decoder / Match</th><th>Output</th></tr></thead>
      <tbody>
        <tr><td>Pre-decode</td><td>Syslog header parser</td><td>hostname=webserver01, program=sshd, PID=18901</td></tr>
        <tr><td>Parent decode</td><td><code>&lt;program_name&gt;sshd&lt;/program_name&gt;</code></td><td>Activates sshd decoder tree</td></tr>
        <tr><td>Child decode</td><td><code>&lt;prematch&gt;Failed password&lt;/prematch&gt;</code></td><td>Matches — runs child regex</td></tr>
        <tr><td>Regex match</td><td><code>for \S+ user (\S+) from (\S+) port</code></td><td>Extracts user=admin, srcip=198.51.100.77</td></tr>
      </tbody>
    </table>
  </div>

  <h3>After 8 Failures — Rule 5712 Fires</h3>
  <pre><code><span class="cm">## Same test for the 8th failure from the same IP:</span>
Mar 19 14:32:05 webserver01 sshd[18908]: Failed password for invalid user pi from 198.51.100.77 port 47338 ssh2

**Phase 3: Completed filtering (rules).
       Rule id: '5712'
       Level:   '10'
       Description: 'sshd: brute force trying to get access to the system.'
       (Frequency: 8 events in 120 seconds from srcip 198.51.100.77)</code></pre>

  <div class="callout note">
    <strong>How rule 5712 works:</strong> It uses <code>&lt;if_matched_sid&gt;5710&lt;/if_matched_sid&gt;</code> with <code>&lt;frequency&gt;8&lt;/frequency&gt;</code> and <code>&lt;timeframe&gt;120&lt;/timeframe&gt;</code> and <code>&lt;same_source_ip/&gt;</code>. Once 8 rule-5710 events share the same srcip within 120 seconds, rule 5712 fires at level 10.
  </div>
  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Understand What ossec-logtest Does</summary>
    <div class="tier-body">
      <h4>ossec-logtest: Your Debug Tool</h4>
      <ul>
        <li>Run <code>/var/ossec/bin/ossec-logtest</code> and paste any log line to see how OSSEC processes it</li>
        <li>Phase 1 = pre-decoding (syslog header): extracts hostname, program name</li>
        <li>Phase 2 = decoding: regex extracts structured fields (srcip, user, etc.)</li>
        <li>Phase 3 = rule matching: shows which rule fires and at what level</li>
        <li>Use this to test new rules before deploying — no need to generate real traffic</li>
      </ul>
    </div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Trace the Decoder Chain</summary>
    <div class="tier-body">
      <h4>Parent → Child Decoder Hierarchy</h4>
      <ul>
        <li>Parent decoder matches <code>program_name=sshd</code> — activates the entire sshd decoder subtree</li>
        <li>Child decoder uses <code>&lt;prematch&gt;Failed password&lt;/prematch&gt;</code> to select only failure lines</li>
        <li>Regex: <code>for \S+ user (\S+) from (\S+) port</code> — captures user and srcip</li>
        <li>Each parent/child pair is in <code>/var/ossec/etc/decoders/</code> — view with <code>cat sshd_decoders.xml</code></li>
      </ul>
      <pre><code><span class="cm"># List all sshd decoder entries:</span>
grep -A5 "program_name.*sshd" /var/ossec/etc/decoders/sshd_decoders.xml | head -30</code></pre>
    </div>
  </details>
  <details class="tier advanced">
    <summary>🔴 Advanced — Write a Custom Decoder</summary>
    <div class="tier-body">
      <h4>Add a Decoder for a Custom Application</h4>
      <pre><code><span class="cm">&lt;!-- /var/ossec/etc/decoders/local_decoder.xml --&gt;</span>
&lt;decoder name="myapp"&gt;
  &lt;program_name&gt;myapp&lt;/program_name&gt;
&lt;/decoder&gt;

&lt;decoder name="myapp-login-fail"&gt;
  &lt;parent&gt;myapp&lt;/parent&gt;
  &lt;prematch&gt;LOGIN FAILED&lt;/prematch&gt;
  &lt;regex&gt;user=(\S+) ip=(\S+)&lt;/regex&gt;
  &lt;order&gt;user, srcip&lt;/order&gt;
&lt;/decoder&gt;</code></pre>
      <ul>
        <li>Test with: <code>echo "myapp[1234]: LOGIN FAILED user=bob ip=1.2.3.4" | /var/ossec/bin/ossec-logtest</code></li>
        <li>Verify Phase 2 shows <code>decoder: 'myapp-login-fail'</code> with correct fields</li>
      </ul>
    </div>
  </details>
</article>
</template>

  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Read an OSSEC Alert</summary>
    <div class="tier-body">
      <h4>Key Fields to Check in Any Alert</h4>
      <ul>
        <li><strong>Rule ID + Level:</strong> 5712 / level 10 — high priority, triggers active response and email</li>
        <li><strong>Description:</strong> Plain-English explanation of what fired</li>
        <li><strong>Src IP:</strong> The attacker — this is what gets blocked</li>
        <li><strong>Groups:</strong> authentication_failed — used to search and filter in your SIEM</li>
        <li><strong>Triggering event:</strong> The actual log line that crossed the threshold</li>
      </ul>
    </div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Use the Wazuh JSON Format</summary>
    <div class="tier-body">
      <h4>Why alerts.json Matters for SIEMs</h4>
      <ul>
        <li>alerts.json is newline-delimited JSON — each line is one complete alert object</li>
        <li>Ingest into Elasticsearch/Splunk with a file input pointing to <code>/var/ossec/logs/alerts/alerts.json</code></li>
        <li>The <code>rule.mitre.id</code> field (T1110) enables ATT&amp;CK-mapped dashboards in Elastic</li>
        <li>The <code>agent.name</code> field lets you filter alerts by which host was targeted</li>
      </ul>
      <pre><code><span class="cm"># Stream alerts live for a specific rule:</span>
tail -f /var/ossec/logs/alerts/alerts.json | \

<!-- ══════════════════════════ Active Response ════════════════════════════════ -->
<template id="tpl-active-response-lab">
<article class="topic">
  <h2>Step 4 — Active Response Execution</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l3">L3 Network</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">Active response is triggered by L7 log analysis (rule 5712 fires on SSH auth events), but enforcement happens at L3 Network — iptables drops all packets from the attacker's IP regardless of protocol or port.</span>
  </div>
  <p>Because rule 5712 fired at level 10 and active response is configured for that rule, OSSEC's <code>ossec-execd</code> automatically runs the <code>firewall-drop</code> script on webserver01.</p>

  <h3>Active Response ossec.conf Config (Reminder)</h3>
  <pre><code>&lt;command&gt;
  &lt;name&gt;firewall-drop&lt;/name&gt;
  &lt;executable&gt;firewall-drop&lt;/executable&gt;
  &lt;timeout_allowed&gt;yes&lt;/timeout_allowed&gt;
&lt;/command&gt;

&lt;active-response&gt;
  &lt;command&gt;firewall-drop&lt;/command&gt;
  &lt;location&gt;local&lt;/location&gt;
  &lt;rules_id&gt;5712&lt;/rules_id&gt;
  &lt;timeout&gt;600&lt;/timeout&gt;  <span class="cm">&lt;!-- 10-minute block --&gt;</span>
&lt;/active-response&gt;</code></pre>

  <h3>active-responses.log Entry</h3>
  <pre><code><span class="cm"># /var/ossec/logs/active-responses.log on webserver01</span>
Tue Mar 19 14:32:09 UTC 2024 /var/ossec/active-response/bin/firewall-drop add - 198.51.100.77 1710854729.98437 5712</code></pre>

  <div class="table-wrap">
    <table>
      <thead><tr><th>Argument</th><th>Value</th><th>Meaning</th></tr></thead>
      <tbody>
        <tr><td>action</td><td>add</td><td>Block the IP (vs "delete" to unblock)</td></tr>
        <tr><td>user</td><td>-</td><td>Not used for IP block (dash = N/A)</td></tr>
        <tr><td>srcip</td><td>198.51.100.77</td><td>IP to block — taken from rule's decoded srcip</td></tr>
        <tr><td>alert_id</td><td>1710854729.98437</td><td>Alert that triggered the response</td></tr>
        <tr><td>rule_id</td><td>5712</td><td>Rule that fired</td></tr>
      </tbody>
    </table>
  </div>

  <h3>What firewall-drop Does on the Agent</h3>
  <pre><code><span class="cm"># firewall-drop adds an iptables rule:</span>
iptables -I INPUT -s 198.51.100.77 -j DROP
iptables -I FORWARD -s 198.51.100.77 -j DROP

<span class="cm"># Verify the block is in place:</span>
sudo iptables -L INPUT -n | grep 198.51.100.77
<span class="cm"># Output: DROP  all  --  198.51.100.77  0.0.0.0/0</span>

<span class="cm"># After 600 seconds, ossec-execd auto-removes the rule:</span>
<span class="cm"># active-responses.log records:</span>
Tue Mar 19 14:42:09 UTC 2024 /var/ossec/active-response/bin/firewall-drop delete - 198.51.100.77 1710854729.98437 5712</code></pre>

  <h3>ossec.log Messages During AR</h3>
  <pre><code><span class="cm"># /var/ossec/logs/ossec.log on the MANAGER shows:</span>
2024/03/19 14:32:09 ossec-analysisd: INFO: Active response request for host '10.0.1.50' (rule: '5712') (action: 'firewall-drop') (ip: '198.51.100.77').

<span class="cm"># On the AGENT ossec.log:</span>
2024/03/19 14:32:09 ossec-execd: INFO: Active response command: /var/ossec/active-response/bin/firewall-drop add - 198.51.100.77 1710854729.98437 5712</code></pre>
  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Understand the Block Lifecycle</summary>
    <div class="tier-body">
      <h4>What Happens During Active Response</h4>
      <ul>
        <li>OSSEC manager sends a command to the agent: "block this IP with firewall-drop"</li>
        <li>The agent runs the <code>firewall-drop</code> script which adds an iptables DROP rule</li>
        <li>All traffic from 198.51.100.77 is now silently dropped — not just SSH</li>
        <li>After 600 seconds (10 minutes), ossec-execd automatically removes the block</li>
        <li>The active-responses.log records both the "add" (block) and "delete" (unblock) events</li>
      </ul>
    </div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Verify the Block Is Working</summary>
    <div class="tier-body">
      <h4>Check Commands After an Active Response Fires</h4>
      <pre><code><span class="cm"># Confirm iptables rule was added:</span>
sudo iptables -L INPUT -n --line-numbers | grep 198.51.100.77

<span class="cm"># Check active-responses.log on the agent:</span>
tail -f /var/ossec/logs/active-responses.log

<span class="cm"># Check ossec.log on the manager for the AR dispatch:</span>
grep "Active response" /var/ossec/logs/ossec.log | tail -5

<span class="cm"># After 600s, confirm rule was removed:</span>
sudo iptables -L INPUT -n | grep 198.51.100.77
<span class="cm"># Expected: no output (rule gone)</span></code></pre>
    </div>
  </details>
  <details class="tier advanced">
    <summary>🔴 Advanced — Make Blocks Permanent</summary>
    <div class="tier-body">
      <h4>Persist the Block Beyond the Timeout</h4>
      <pre><code><span class="cm"># Add IP to a persistent ipset (survives ossec timeout + reboots)</span>
sudo ipset create ossec-blocklist hash:ip timeout 0
sudo ipset add ossec-blocklist 198.51.100.77

<span class="cm"># Reference the ipset in iptables:</span>
sudo iptables -I INPUT -m set --match-set ossec-blocklist src -j DROP

<span class="cm"># Save iptables rules to persist after reboot:</span>
sudo iptables-save | sudo tee /etc/iptables/rules.v4

<span class="cm"># Custom AR script that adds to the ipset instead of (or in addition to) iptables:</span>
<span class="cm"># /var/ossec/active-response/bin/ipset-block</span>
#!/bin/bash
ACTION=$1; IP=$4
[ "$ACTION" = "add" ] && ipset add ossec-blocklist $IP
[ "$ACTION" = "delete" ] &amp;&amp; : <span class="cm"># Don't remove from persistent set</span></code></pre>
    </div>
  </details>
</article>
</template>

<template id="tpl-correlation">

  <h2>Step 5 — Log Correlation &amp; Follow-up</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l3">L3 Network</span>
    <span class="osi-chip l4">L4 Transport</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">Correlation spans all layers: blocking at L3 (iptables), checking TCP port 22 connections at L4, and cross-referencing SSH auth + web + FIM logs at L7. A full investigation requires evidence from every layer.</span>
  </div>

  <h3>Correlating the Alert with Other Evidence</h3>
  <pre><code><span class="cm"># 1. Check auth.log for the full extent of the attack</span>

<span class="cm"># No output = no successful login before the block fired</span>

<span class="cm"># 3. Check web server logs — did attacker access anything via HTTP?</span>

<span class="cm"># 4. Check current iptables block</span>
sudo iptables -L INPUT -n | grep DROP

<span class="cm"># 5. Check for any new files dropped during the window (FIM)</span>
grep "syscheck" /var/ossec/logs/alerts/alerts.log | \
  grep "14:3[0-9]"</code></pre>

  <h3>Custom Rule to Escalate: Brute-Force Then Success</h3>

  &lt;timeframe&gt;300&lt;/timeframe&gt;
  &lt;description&gt;CRITICAL: Brute force succeeded — attacker logged in!&lt;/description&gt;
  &lt;group&gt;authentication_success,attack,&lt;/group&gt;
  &lt;mitre&gt;&lt;id&gt;T1110&lt;/id&gt;&lt;/mitre&gt;
&lt;/rule&gt;</code></pre>
