<template id="tpl-overview">
<article class="topic">
  <h2>Overview &amp; Architecture</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">MISP is entirely an application-layer platform — the web UI, REST API, ZeroMQ publisher, and database all operate at L7. IoC values (IPs, ports) are stored as threat intelligence DATA within the application, not as active L3/L4 traffic.</span>
  </div>

  <p>MISP (Malware Information Sharing Platform) is the leading open-source threat intelligence platform. It provides a collaborative environment for collecting, sharing, storing, and correlating threat indicators (IOCs), threat actors, campaigns, and TTPs. MISP is widely adopted by CERTs, ISACs, law enforcement, and enterprise SOC teams globally.</p>

  <h3>Core Concepts</h3>
  <table>
    <thead><tr><th>Concept</th><th>Description</th></tr></thead>
    <tbody>
      <tr><td><strong>Event</strong></td><td>The core data container in MISP — represents an incident, campaign, or threat report. Contains attributes, objects, tags, and relationships.</td></tr>
      <tr><td><strong>Attribute</strong></td><td>An individual IOC or data point within an event: IP address, domain, hash, URL, email address, filename, etc.</td></tr>
      <tr><td><strong>Object</strong></td><td>A structured collection of related attributes (e.g., a "file" object groups filename + hash + size + path into one entity)</td></tr>
      <tr><td><strong>Tag</strong></td><td>Metadata label applied to events or attributes: TLP classification, threat actor, campaign name, MITRE ATT&amp;CK technique</td></tr>
      <tr><td><strong>Galaxy</strong></td><td>Structured knowledge bases: MITRE ATT&amp;CK, threat actors, ransomware families, sectors. Applied as tags to provide rich context.</td></tr>
      <tr><td><strong>Feed</strong></td><td>External threat intelligence source MISP subscribes to and automatically imports (CIRCL, Abuse.ch, AlienVault OTX, etc.)</td></tr>
      <tr><td><strong>Organisation</strong></td><td>Tenant in MISP — each org has its own users, sharing groups, and data access controls</td></tr>
      <tr><td><strong>Sharing Group</strong></td><td>Fine-grained sharing control — share events with specific organizations, not the entire community</td></tr>
    </tbody>
  </table>

  <h3>Traffic Light Protocol (TLP)</h3>
  <table>
    <thead><tr><th>TLP Level</th><th>Tag</th><th>Sharing Rule</th></tr></thead>
    <tbody>
      <tr><td style="color:#ff4444"><strong>TLP:RED</strong></td><td><code>tlp:red</code></td><td>Not for disclosure — restricted to named recipients only; do not share in MISP</td></tr>
      <tr><td style="color:#ff8800"><strong>TLP:AMBER</strong></td><td><code>tlp:amber</code></td><td>Limited disclosure to members of own org and clients on need-to-know</td></tr>
      <tr><td style="color:#ffcc00"><strong>TLP:AMBER+STRICT</strong></td><td><code>tlp:amber+strict</code></td><td>Recipients may not re-share; stays within original recipient organization</td></tr>
      <tr><td style="color:#88cc44"><strong>TLP:GREEN</strong></td><td><code>tlp:green</code></td><td>Limited to community (ISAC members, vetted sharing groups)</td></tr>
      <tr><td><strong>TLP:CLEAR</strong></td><td><code>tlp:clear</code></td><td>No restriction — can be shared publicly (formerly TLP:WHITE)</td></tr>
    </tbody>
  </table>

  <h3>MISP Architecture</h3>
  <pre><code># MISP stack:
# - Apache/Nginx web server → PHP application layer
# - MySQL/MariaDB → data storage
# - Redis → background jobs, pub/sub
# - MISP workers → background processing (feed sync, exports, ZeroMQ pub)
# - ZeroMQ (optional) → real-time feed to SIEM via pub/sub

# Ports:
# 443 = MISP web UI (HTTPS)
# 6666 = ZeroMQ pub/sub feed (for SIEM integration)

# Lab IP: 192.168.56.20 (Security Onion / MISP server)</code></pre>

  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Core Concepts</summary>
    <div class="tier-body">
      <h4>Understanding MISP's purpose and data model</h4>
      <ul>
        <li>MISP is a threat intelligence platform that centralizes and shares IOCs at L7 via HTTPS API and web UI</li>
        <li>The core data unit is the <strong>Event</strong> — a container holding attributes (IOCs), objects, and tags</li>
        <li>TLP levels control how far an event propagates: TLP:RED stays private; TLP:CLEAR can go public</li>
        <li>Access MISP via browser at https://192.168.56.20 using your organisation account</li>
      </ul>
      <pre><code><span class="cm"># Open MISP web interface</span>
firefox https://192.168.56.20
<span class="cm"># Default admin credentials on fresh install</span>
<span class="cm"># Username: admin@admin.test  Password: admin</span></code></pre>
    </div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Deeper Skills</summary>
    <div class="tier-body">
      <h4>Working with the MISP REST API and ZeroMQ</h4>
      <ul>
        <li>All API calls authenticate via the Authorization header — rotate keys regularly</li>
        <li>ZeroMQ (port 6666) enables real-time streaming of events to SIEM consumers at L7</li>
        <li>Configure Redis and MISP background workers for reliable feed processing</li>
      </ul>
      <pre><code><span class="cm"># Test API connectivity</span>
curl -s -H "Authorization: YOUR_KEY" \
     -H "Accept: application/json" \
     https://192.168.56.20/users/view/me | python3 -m json.tool
<span class="cm"># Verify ZeroMQ is publishing (port 6666)</span>
nc -zv 192.168.56.20 6666</code></pre>
    </div>
  </details>
  <details class="tier advanced">
    <summary>🔴 Advanced — Expert Techniques</summary>
    <div class="tier-body">
      <h4>Production MISP deployment and multi-instance federation</h4>
      <ul>
        <li>Deploy MISP behind nginx with TLS termination; configure separate worker processes for feed sync and ZeroMQ publishing</li>
        <li>Federate multiple MISP instances using sync server push/pull with filtered distribution rules</li>
        <li>Tune Redis pub/sub for low-latency SIEM alerting; monitor worker queue depth</li>
      </ul>
      <pre><code><span class="cm"># Check MISP worker health</span>
sudo -u www-data /var/www/MISP/app/Console/cake Admin workers
<span class="cm"># Tail ZeroMQ publisher log</span>
sudo journalctl -u misp-workers -f | grep ZeroMQ</code></pre>
    </div>
  </details>
</article>
</template>

<template id="tpl-events">
<article class="topic">
  <h2>Events &amp; Attributes</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">Event creation, attribute submission, and API calls all operate at L7 over HTTPS. The IoC values stored (ip-dst, ip-src, domain, url) are L3/L4 threat DATA recorded in the application — MISP itself communicates only at L7.</span>
  </div>
  <p>Events are the primary data unit in MISP. Every threat report, IOC set, or incident analysis is packaged as an event containing attributes.
    <a href="#" class="xref" onclick="loadTopic('objects'); return false;">MISP Objects ↗</a>
  </p>

  <h3>Creating an Event</h3>
  <pre><code># Via Web UI:
# Events → Add Event
# Fill in:
# - Date: incident date
# - Distribution: controls who can see the event
# - Threat Level: High/Medium/Low/Undefined
# - Analysis: Initial/Ongoing/Complete
# - Event Info: short description (acts as title)
# Click Create

# Via API:
curl -s -H "Authorization: YOUR_API_KEY" \
     -H "Content-Type: application/json" \
     -H "Accept: application/json" \
     -X POST https://misp.internal/events \
     -d '{
       "Event": {
         "date": "2024-03-15",
         "threat_level_id": "1",
         "info": "APT-X Phishing Campaign - Finance Sector",
         "analysis": "1",
         "distribution": "1"
       }
     }'</code></pre>

  <h3>Attribute Types Reference</h3>
  <table>
    <thead><tr><th>Category</th><th>Type</th><th>Example Value</th><th>Use Case</th></tr></thead>
    <tbody>
      <tr><td rowspan="4"><strong>Network</strong></td>
          <td><code>ip-dst</code></td><td>203.0.113.10</td><td>C2 server IP, exfil destination</td></tr>
      <tr><td><code>ip-src</code></td><td>192.168.56.10</td><td>Attacker source IP (internal pivot)</td></tr>
      <tr><td><code>domain</code></td><td>evil-c2.example.com</td><td>C2 domain, DGA domain, phishing domain</td></tr>
      <tr><td><code>url</code></td><td>http://evil.com/payload.exe</td><td>Malware download URL, phishing URL</td></tr>
      <tr><td rowspan="3"><strong>File</strong></td>
          <td><code>md5</code></td><td>44d88612fea8a8f36de82e1278abb02f</td><td>File hash for AV/EDR blocklist</td></tr>
      <tr><td><code>sha256</code></td><td>d41d8cd98f00b204e9800...</td><td>Preferred hash (collision-resistant)</td></tr>
      <tr><td><code>filename</code></td><td>invoice_2024.exe</td><td>Malware filename (weak IOC — easily changed)</td></tr>
      <tr><td rowspan="3"><strong>Email</strong></td>
          <td><code>email-src</code></td><td>phisher@spoofed.com</td><td>Phishing sender address</td></tr>
      <tr><td><code>email-subject</code></td><td>Urgent: Invoice Attached</td><td>Phishing email subject line</td></tr>
      <tr><td><code>email-attachment</code></td><td>invoice.xlsm</td><td>Malicious attachment filename</td></tr>
      <tr><td rowspan="2"><strong>Malware</strong></td>
          <td><code>malware-sample</code></td><td>(binary upload)</td><td>Upload actual sample — encrypted in MISP</td></tr>
      <tr><td><code>yara</code></td><td>(YARA rule text)</td><td>Store YARA detection rules as attributes</td></tr>
      <tr><td><strong>Registry</strong></td>
          <td><code>regkey</code></td><td>HKLM\SOFTWARE\Malware\Config</td><td>Persistence registry key (Windows)</td></tr>
      <tr><td><strong>Vulnerability</strong></td>
          <td><code>vulnerability</code></td><td>CVE-2021-44228</td><td>CVE being exploited (Log4Shell, etc.)</td></tr>
    </tbody>
  </table>

  <h3>Adding Attributes</h3>
  <pre><code># Web UI: Event View → Add Attribute
# Select: Category, Type, Value, IDS flag

# IDS flag = should this be exported to IDS/SIEM for blocking?
# Set to TRUE for actionable IOCs (C2 IPs, malware hashes)
# Set to FALSE for context-only info (email subjects, analyst notes)

# API:
curl -s -H "Authorization: YOUR_API_KEY" \
     -H "Content-Type: application/json" \
     -X POST https://misp.internal/attributes/add/EVENT_ID \
     -d '{
       "Attribute": {
         "category": "Network activity",
         "type": "ip-dst",
         "value": "203.0.113.10",
         "to_ids": true,
         "comment": "Cobalt Strike C2 server — active since 2024-03-10"
       }
     }'</code></pre>

  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Core Concepts</summary>
    <div class="tier-body">
      <h4>Creating events and adding basic attributes</h4>
      <ul>
        <li>Every threat report becomes an Event — set a clear Info description, Threat Level, and Analysis status</li>
        <li>Distribution level 0 (Your org only) is safest for new analysts — escalate sharing only after review</li>
        <li>The <code>to_ids</code> flag marks an attribute as actionable for IDS/SIEM — only set it on verified IOCs</li>
        <li>Network attribute types <code>ip-dst</code>, <code>domain</code>, <code>url</code> represent L3/L7 IOCs stored in the L7 MISP platform</li>
      </ul>
      <pre><code><span class="cm"># Add a C2 IP attribute via web UI</span>
<span class="cm"># Event View → Add Attribute</span>
<span class="cm"># Category: Network activity</span>
<span class="cm"># Type: ip-dst  Value: 203.0.113.10  to_ids: checked</span></code></pre>
    </div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Deeper Skills</summary>
    <div class="tier-body">
      <h4>Bulk attribute ingestion and attribute quality</h4>
      <ul>
        <li>Use the API to automate attribute creation from SIEM alerts or threat feeds at scale</li>
        <li>Disable correlation on free-text comment attributes to avoid meaningless correlation hits</li>
        <li>Combine ip-dst + domain-ip object to preserve the IP-to-domain mapping with evidence context</li>
      </ul>
      <pre><code><span class="cm"># Bulk add attributes from a text IOC list via API loop</span>
while IFS= read -r ip; do
  curl -s -H "Authorization: $MISP_KEY" \
       -H "Content-Type: application/json" \
       -X POST https://192.168.56.20/attributes/add/$EVENT_ID \
       -d "{\"Attribute\":{\"type\":\"ip-dst\",\"value\":\"$ip\",\"to_ids\":true}}"
done < c2_ips.txt</code></pre>
    </div>
  </details>
  <details class="tier advanced">
    <summary>🔴 Advanced — Expert Techniques</summary>
    <div class="tier-body">
      <h4>Attribute decay, scoring, and quality management</h4>
      <ul>
        <li>MISP's decay model automatically lowers attribute reliability scores as IOCs age — configure decay models per attribute type</li>
        <li>Combine sighting data with decay scores to surface freshly confirmed IOCs for active blocking</li>
        <li>Use <code>enforce_warninglist</code> in API calls to automatically filter known-good values from bulk imports</li>
      </ul>
      <pre><code><span class="cm"># Query attributes with decay score above threshold</span>
curl -s -H "Authorization: $MISP_KEY" \
     -X POST https://192.168.56.20/attributes/restSearch \
     -d '{"to_ids":1,"decayScore":{"score":30,"base_score":80},"type":"ip-dst"}'</code></pre>
    </div>
  </details>
</article>
</template>

<template id="tpl-objects">
<article class="topic">
  <h2>MISP Objects &amp; Templates</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">MISP Objects are structured data containers within the L7 application layer. The network-connection object stores L3/L4 data (src/dst IP, ports, protocol) as intelligence records — not as live traffic — while all MISP access itself is HTTPS at L7.</span>
  </div>
  <p>Objects group related attributes into structured entities. A "file" object is more informative than separate md5, sha256, and filename attributes — they're linked together with relationships.</p>

  <h3>Common MISP Object Templates</h3>
  <table>
    <thead><tr><th>Object</th><th>Key Fields</th><th>Use Case</th></tr></thead>
    <tbody>
      <tr>
        <td><strong>file</strong></td>
        <td>filename, md5, sha1, sha256, size, path, malware-sample</td>
        <td>Malware sample — all hashes and metadata in one object</td>
      </tr>
      <tr>
        <td><strong>domain-ip</strong></td>
        <td>domain, ip</td>
        <td>Link a domain to its resolved IP (C2 mapping)</td>
      </tr>
      <tr>
        <td><strong>email</strong></td>
        <td>from, to, subject, body, attachment, screenshot</td>
        <td>Phishing email — all components linked</td>
      </tr>
      <tr>
        <td><strong>network-connection</strong></td>
        <td>ip-src, ip-dst, src-port, dst-port, protocol, first-seen, last-seen</td>
        <td>C2 beacon traffic — full connection tuple</td>
      </tr>
      <tr>
        <td><strong>url</strong></td>
        <td>url, text, ip, domain, port, path, credentials</td>
        <td>Phishing URL with full breakdown</td>
      </tr>
      <tr>
        <td><strong>vulnerability</strong></td>
        <td>id (CVE), description, references, published</td>
        <td>Exploited vulnerability linked to campaign</td>
      </tr>
      <tr>
        <td><strong>process</strong></td>
        <td>pid, name, command-line, parent-pid, image</td>
        <td>Malicious process details from IR</td>
      </tr>
      <tr>
        <td><strong>credential</strong></td>
        <td>username, password, type, origin</td>
        <td>Compromised credentials (handle sensitively — TLP:RED)</td>
      </tr>
    </tbody>
  </table>

  <h3>Adding a File Object (Web UI)</h3>
  <pre><code># Event View → Add Object → search "file"
# Fill in:
# - filename: invoice_loader.exe
# - md5: 44d88612fea8a8f36de82e1278abb02f
# - sha256: d41d8cd98f00b204e9800998ecf8427e
# - size-in-bytes: 131072
# Click Submit

# MISP creates linked attributes for each field
# Add object relationships: "drops" → malware object, "related-to" → campaign object</code></pre>

  <h3>Object Relationships</h3>
  <pre><code"># Relationships model attacker behavior narratively:
# email → drops → file (malicious attachment)
# file → connects-to → network-connection (C2 beacon)
# network-connection → uses → ip (C2 server)
# vulnerability → used-by → threat-actor

# In Web UI: Object → Add Relationship → select target object + relationship type
# Common relationship types:
# drops, downloads, communicates-with, exploits, delivers,
# contains, related-to, attributed-to, uses, mitigates</code></pre>

  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Core Concepts</summary>
    <div class="tier-body">
      <h4>Understanding MISP Objects vs. flat attributes</h4>
      <ul>
        <li>Objects group related fields into a single structured entity — a <code>file</code> object keeps md5, sha256, filename, and size linked together</li>
        <li>Use the <code>network-connection</code> object to document C2 beacon tuples: src IP (L3), dst IP (L3), ports (L4), protocol (L4/L7)</li>
        <li>Object relationships model attacker behavior: <em>email → drops → file → connects-to → ip</em></li>
      </ul>
      <pre><code><span class="cm"># Add file object via web UI</span>
<span class="cm"># Event View → Add Object → search "file"</span>
<span class="cm"># Fill: filename, md5, sha256, size-in-bytes → Submit</span></code></pre>
    </div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Deeper Skills</summary>
    <div class="tier-body">
      <h4>Creating objects and relationships via API</h4>
      <ul>
        <li>Use the <code>/objects/add/EVENT_ID/TEMPLATE_NAME</code> endpoint to programmatically add objects</li>
        <li>Chain object relationships to build a full attack narrative: from phishing email to dropped payload to C2 connection</li>
      </ul>
      <pre><code><span class="cm"># Add network-connection object via API</span>
curl -s -H "Authorization: $MISP_KEY" \
     -H "Content-Type: application/json" \
     -X POST https://192.168.56.20/objects/add/$EVENT_ID/network-connection \
     -d '{"Object":{"name":"network-connection","Attribute":[
       {"type":"ip-src","object_relation":"ip-src","value":"192.168.56.30"},
       {"type":"ip-dst","object_relation":"ip-dst","value":"203.0.113.10"},
       {"type":"port","object_relation":"dst-port","value":"443"},
       {"type":"text","object_relation":"protocol","value":"tcp"}
     ]}}'</code></pre>
    </div>
  </details>
  <details class="tier advanced">
    <summary>🔴 Advanced — Expert Techniques</summary>
    <div class="tier-body">
      <h4>Custom object templates and automated object generation</h4>
      <ul>
        <li>Create custom object templates in <code>/var/www/MISP/app/files/misp-objects/objects/</code> to model organization-specific data structures</li>
        <li>Use PyMISP's <code>MISPObject</code> class to programmatically build and link objects from SIEM correlation results</li>
        <li>Export object relationship graphs to Neo4j for advanced threat actor infrastructure pivoting</li>
      </ul>
      <pre><code><span class="cm"># Build full attack chain object graph with PyMISP</span>
from pymisp import ExpandedPyMISP, MISPObject
misp = ExpandedPyMISP('https://192.168.56.20', KEY, ssl=False)
email_obj = MISPObject('email')
email_obj.add_attribute('from', value='phisher@bad.com')
email_obj.add_attribute('subject', value='Urgent Invoice')
file_obj = MISPObject('file')
file_obj.add_attribute('filename', value='invoice.xlsm')
file_obj.add_attribute('sha256', value='d41d8cd98f00...')
email_obj.add_reference(file_obj.uuid, 'drops')
misp.add_object(EVENT_ID, email_obj)
misp.add_object(EVENT_ID, file_obj)</code></pre>
    </div>
  </details>
</article>
</template>

<template id="tpl-tags">
<article class="topic">
  <h2>Tags, Galaxies &amp; MITRE ATT&amp;CK</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">Tags and Galaxies are metadata labels managed entirely within the MISP L7 application. MITRE ATT&amp;CK techniques describe adversary behavior across all OSI layers, but the tagging system itself is a pure L7 application feature accessed via HTTPS API.</span>
  </div>
  <p>Tags and galaxies enrich events with structured metadata — threat actor attribution, campaign names, sectors, and MITRE ATT&amp;CK techniques. This enables pivoting across events and generating contextual threat intelligence.
    <a href="#" class="xref" onclick="loadTopic('sharing'); return false;">Sharing &amp; distribution ↗</a>
  </p>

  <h3>Tag Taxonomies</h3>
  <table>
    <thead><tr><th>Taxonomy</th><th>Example Tags</th><th>Purpose</th></tr></thead>
    <tbody>
      <tr><td>TLP</td><td><code>tlp:green</code>, <code>tlp:amber</code></td><td>Data handling/sharing classification</td></tr>
      <tr><td>PAP</td><td><code>pap:white</code>, <code>pap:green</code></td><td>Permissible Actions Protocol — what can analysts do with this?</td></tr>

  <h3>Galaxies — MITRE ATT&amp;CK Integration</h3>
  <pre><code># Galaxies provide structured threat knowledge as taggable objects

     -H "Content-Type: application/json" \

<template id="tpl-api">

  <h2>API &amp; RestSearch</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">The MISP REST API is a pure L7 HTTPS interface. All restSearch queries, authentication, and data exchange travel as JSON over TLS. The API is the integration point between MISP and other security tools (SIEMs, SOAR, firewall orchestration).</span>
  </div>
  <p>MISP has a comprehensive REST API. The <code>restSearch</code> endpoint is the most powerful — it queries events, attributes, and objects with complex filters.</p>

  <h3>API Key &amp; Authentication</h3>
  <pre><code"># Get your API key:
# Profile icon → My Profile → Auth key (or Automation)

# All API calls require:
# -H "Authorization: YOUR_API_KEY"
# -H "Accept: application/json"
# -H "Content-Type: application/json" (for POST)

# Test connection
curl -s -H "Authorization: YOUR_KEY" \
     -H "Accept: application/json" \
     https://misp.internal/users/view/me | python3 -m json.tool</code></pre>

  <h3>restSearch — Core Query Interface</h3>
  <pre><code"># Search for events containing a specific IP
curl -s -H "Authorization: YOUR_KEY" \
     -H "Accept: application/json" \
     -X POST https://misp.internal/events/restSearch \
     -d '{"value": "203.0.113.10", "type": "ip-dst", "to_ids": 1}'

# Search attributes for hash
curl -s -H "Authorization: YOUR_KEY" \
     -X POST https://misp.internal/attributes/restSearch \
     -d '{"value": "44d88612fea8a8f36de82e1278abb02f", "type": "md5"}'

# Get all IDS-flagged attributes (for SIEM blocklist)
curl -s -H "Authorization: YOUR_KEY" \
     -X POST https://misp.internal/attributes/restSearch \
     -d '{
       "to_ids": 1,
       "published": 1,
       "returnFormat": "json",
       "limit": 1000
     }'

# Export in different formats
# returnFormat: json, xml, suricata, snort, text, csv, stix, stix2
curl -s -H "Authorization: YOUR_KEY" \
     -X POST https://misp.internal/attributes/restSearch \
     -d '{"to_ids": 1, "type": "ip-dst", "returnFormat": "text"}'
# Returns plain-text list of IPs — paste into firewall blocklist</code></pre>

  <h3>Python PyMISP</h3>
  <pre><code"># Install
pip3 install pymisp

# Basic usage
from pymisp import ExpandedPyMISP

misp = ExpandedPyMISP('https://misp.internal', 'YOUR_API_KEY', ssl=False)

# Get an event
event = misp.get_event(42, pythonify=True)
print(event.info)

# Search for events containing an IP
result = misp.search(value='203.0.113.10', type_attribute='ip-dst', pythonify=True)
for event in result:
    print(event.id, event.info, event.date)

# Create event with attribute
from pymisp import MISPEvent, MISPAttribute
event = MISPEvent()
event.info = 'Lab Test Event'
event.distribution = 0
event.threat_level_id = 2
event.analysis = 0

attr = MISPAttribute()
attr.type = 'ip-dst'
attr.value = '10.10.10.10'
attr.to_ids = True
attr.comment = 'C2 server'
event.add_attribute(**attr)

new_event = misp.add_event(event)
print(f"Created event: {new_event.id}")</code></pre>

  <h3>Generating Suricata Rules from MISP</h3>
  <pre><code"># Export via API

     -d '{"to_ids": 1, "returnFormat": "suricata", "published": 1}' \

#    threshold: type limit, track by_src, count 1, seconds 3600; \
#    sid:2712345; rev:1;)

# Copy to Suricata rules directory

sudo suricata-update  # or manually include in suricata.yaml</code></pre>

  <h3>MISP + Security Onion (ZeroMQ)</h3>
  <pre><code"># MISP ZeroMQ publishes events in real-time

     -X POST https://misp.internal/attributes/restSearch \
     -d '{"to_ids": 1, "returnFormat": "text", "type": ["ip-dst", "domain", "hostname"]}' \

            /^[a-z]/{print $0"\tIntel::DOMAIN\tMISP\tC2-IOC"}' \

  </div>
  <p>STIX (Structured Threat Information eXpression) and TAXII (Trusted Automated eXchange of Intelligence Information) are the industry standards for threat intelligence exchange. MISP supports both natively.</p>

      <tr><td>Threat Actor</td><td>Galaxy cluster</td><td>APT28 / Fancy Bear</td></tr>
      <tr><td>Campaign</td><td>Event with campaign tag</td><td>Operation Aurora</td></tr>
      <tr><td>Attack Pattern</td><td>ATT&amp;CK Galaxy tag</td><td>T1566.001 Spearphishing</td></tr>
      <tr><td>Observed Data</td><td>Event attributes</td><td>Network traffic, file hashes seen</td></tr>
      <tr><td>Relationship</td><td>Object references</td><td>"uses", "attributed-to", "targets"</td></tr>
    </tbody>
  </table>

  <h3>Exporting STIX from MISP</h3>

     -H "Content-Type: application/json" \
     -X POST https://misp.internal/events/upload_stix \
     --data-binary @external_threat_bundle.json</code></pre>
