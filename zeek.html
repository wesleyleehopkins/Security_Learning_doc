<template id="tpl-overview">
<article class="topic">
  <h2>Overview &amp; Architecture</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l2">L2 Data Link</span>
    <span class="osi-chip l3">L3 Network</span>
    <span class="osi-chip l4">L4 Transport</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">Zeek performs deep packet inspection from Ethernet frame capture (L2) through network routing (L3), TCP/UDP stream reassembly (L4), and full application-layer protocol parsing (L7) covering 50+ protocols.</span>
  </div>

  <p>Zeek (formerly Bro) is an open-source network security monitor and analysis framework. Unlike Snort/Suricata which match signatures against packets, Zeek reconstructs network <em>events</em> from traffic and writes them as structured logs. It operates at Layer 4–7, building connection summaries, protocol transcripts, and behavioral insights rather than just firing on byte patterns.</p>

  <h3>Zeek vs Suricata — Complementary Roles</h3>
  <table>
    <thead><tr><th>Capability</th><th>Zeek</th><th>Suricata</th></tr></thead>
    <tbody>
      <tr><td>Primary output</td><td>Rich structured logs (JSON/TSV) per protocol</td><td>Alerts with severity, rule ID, payload excerpts</td></tr>
      <tr><td>Detection method</td><td>Behavioral analysis + scripted logic</td><td>Signature-based + anomaly rules</td></tr>
      <tr><td>Protocol coverage</td><td>Deep application-layer parsing (50+ protocols)</td><td>Protocol detection + signature matching</td></tr>
      <tr><td>Connection tracking</td><td>Full conn.log with state machine details</td><td>Alert-centric; limited session context</td></tr>
      <tr><td>Scripting</td><td>Turing-complete Zeek scripting language</td><td>Lua scripting (limited vs Zeek)</td></tr>
      <tr><td>File extraction</td><td>Built-in file analysis framework (sha256 + MIME)</td><td>File extraction via filestore option</td></tr>
      <tr><td>Use together?</td><td colspan="2">Yes — Security Onion runs both: Zeek for logs, Suricata for alerts</td></tr>
    </tbody>
  </table>

  <h3>Processing Pipeline</h3>
  <pre><code># Zeek's packet processing flow:
# 1. Packet capture (via libpcap / AF_PACKET / PF_RING)
# 2. Packet reassembly and stream reconstruction (TCP)
# 3. Protocol detection and parsing (DPD — Dynamic Protocol Detection)
# 4. Event generation (connection_established, http_request, dns_query, etc.)
# 5. Script execution (Zeek scripts subscribe to events and produce log entries)
# 6. Log writing (JSON or TSV format files in /opt/zeek/logs/current/ or /nsm/zeek/)

# Run Zeek against a PCAP (offline analysis)
zeek -r capture.pcap
zeek -r capture.pcap /opt/zeek/share/zeek/site/local.zeek   # with custom scripts

# Run Zeek live on an interface
sudo zeek -i eth0

# Security Onion manages Zeek automatically via so-zeek service</code></pre>

  <h3>Lab Network Reference</h3>
  <table>
    <thead><tr><th>Host</th><th>IP</th><th>Role</th></tr></thead>
    <tbody>
      <tr><td>Kali Linux</td><td>192.168.56.10</td><td>Attacker — generates traffic Zeek analyzes</td></tr>
      <tr><td>Security Onion / Ubuntu</td><td>192.168.56.20</td><td>Zeek sensor — captures and logs all traffic</td></tr>
      <tr><td>Windows 10</td><td>192.168.56.30</td><td>Target — HTTP/DNS/SMB traffic source</td></tr>
    </tbody>
  </table>

  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Core Concepts</summary>
    <div class="tier-body">
      <h4>Understand what Zeek does and how to run it</h4>
      <ul>
        <li>Zeek captures packets at L2 and reconstructs streams up through L7 — it does not alert, it <em>logs</em></li>
        <li>Output is structured log files per protocol (conn.log, dns.log, http.log, etc.) written to <code>/opt/zeek/logs/current/</code></li>
        <li>Run offline against a PCAP or live on an interface; Security Onion manages Zeek automatically</li>
        <li>Zeek complements Suricata: Zeek provides logs and context, Suricata provides signature alerts</li>
      </ul>
      <pre><code><span class="cm"># Run Zeek offline against a PCAP</span>
zeek -r capture.pcap

<span class="cm"># Check what logs were generated</span>
ls /opt/zeek/logs/current/
<span class="cm"># conn.log  dns.log  http.log  ssl.log  files.log  ...</span></code></pre>
    </div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Deeper Skills</summary>
    <div class="tier-body">
      <h4>Leverage Zeek's pipeline and log structure for analysis</h4>
      <ul>
        <li>Understand the DPD (Dynamic Protocol Detection) phase that identifies L7 protocols from L4 ports and payload signatures</li>
        <li>Use <code>zeek-cut</code> to extract specific fields from TSV log files for quick analysis</li>
        <li>Correlate <code>uid</code> values across log files (conn.log, http.log, files.log) to trace a full session</li>
        <li>Load custom scripts at startup: <code>zeek -r pcap.pcap local.zeek myscript.zeek</code></li>
      </ul>
      <pre><code><span class="cm"># Extract source IP and destination port from conn.log</span>
zeek-cut id.orig_h id.resp_p < conn.log | sort | uniq -c | sort -rn | head -20

<span class="cm"># Run Zeek with the full local script package</span>
zeek -r capture.pcap /opt/zeek/share/zeek/site/local.zeek</code></pre>
    </div>
  </details>
  <details class="tier advanced">
    <summary>🔴 Advanced — Expert Techniques</summary>
    <div class="tier-body">
      <h4>Architect Zeek deployments and integrate with SIEM pipelines</h4>
      <ul>
        <li>Tune Zeek for high-throughput environments using PF_RING or AF_PACKET with CPU pinning and load balancing across workers</li>
        <li>Configure JSON log output and ship to Elasticsearch/Splunk via Filebeat or Logstash for real-time correlation</li>
        <li>Write custom Zeek scripts that generate new log streams, raise notices, or trigger external alerts</li>
        <li>Use the cluster framework (<code>zeekctl</code>) to distribute processing across manager/proxy/worker nodes</li>
      </ul>
      <pre><code><span class="cm"># Deploy Zeek cluster: configure node.cfg then deploy</span>
zeekctl deploy

<span class="cm"># Enable JSON output in local.zeek</span>
<span class="cm"># @load policy/tuning/json-logs.zeek</span>

<span class="cm"># Monitor cluster status</span>
zeekctl status
zeekctl top</code></pre>
    </div>
  </details>
</article>
</template>

<template id="tpl-logs">
<article class="topic">
  <h2>Log Types Reference</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l3">L3 Network</span>
    <span class="osi-chip l4">L4 Transport</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">conn.log captures L3/L4 connection metadata; protocol-specific logs (dns.log, http.log, ssl.log, smb_files.log, etc.) record L7 application-layer events parsed from reassembled streams.</span>
  </div>
  <p>Zeek generates one log file per protocol, each in TSV or JSON. The logs are the primary output and the foundation of all threat hunting.</p>

  <h3>Core Log Files</h3>
  <table>
    <thead><tr><th>Log File</th><th>Protocol Layer</th><th>What It Records</th></tr></thead>
    <tbody>
      <tr>
        <td><code>conn.log</code></td>
        <td>Layer 4 (TCP/UDP/ICMP)</td>
        <td>One record per network connection — endpoints, bytes, duration, connection state. The foundation log for all correlation. <a href="#" class="xref" onclick="loadTopic('conn'); return false;">Full conn.log fields ↗</a></td>
      </tr>
      <tr>
        <td><code>dns.log</code></td>
        <td>Layer 7 — DNS (UDP/TCP 53)</td>
        <td>Every DNS query/response — query, type, answers, TTL, rejection codes. Critical for C2 detection via DGA domains, DNS tunneling, fast-flux. <a href="#" class="xref" onclick="loadTopic('dns'); return false;">dns.log fields ↗</a></td>
      </tr>
      <tr>
        <td><code>http.log</code></td>
        <td>Layer 7 — HTTP (TCP 80)</td>
        <td>HTTP method, URI, host, referrer, user-agent, status code, request/response body size. Invaluable for web C2, malware downloads, lateral movement. <a href="#" class="xref" onclick="loadTopic('http'); return false;">http.log fields ↗</a></td>
      </tr>
      <tr>
        <td><code>ssl.log</code></td>
        <td>Layer 7 — TLS (TCP 443)</td>
        <td>TLS handshake metadata — version, cipher, SNI (server name), certificate subject, validation status. Use SNI for C2 detection even over encrypted traffic.</td>
      </tr>
      <tr>
        <td><code>files.log</code></td>
        <td>Layer 7 — File transfers</td>
        <td>Files seen across all protocols — sha256 hash, MIME type, size, source/dest IP, whether extracted. Link to conn.log via uid. <a href="#" class="xref" onclick="loadTopic('files'); return false;">files.log ↗</a></td>
      </tr>
      <tr>
        <td><code>smb_files.log</code></td>
        <td>Layer 7 — SMB (TCP 445)</td>
        <td>Files accessed over SMB — action (open/read/write/delete), path, size, timestamps. Detects lateral movement file staging.</td>
      </tr>
      <tr>
        <td><code>rdp.log</code></td>
        <td>Layer 7 — RDP (TCP 3389)</td>
        <td>RDP connection metadata — cookie, encryption level, client OS, cert subject. Does not capture session content.</td>
      </tr>
      <tr>
        <td><code>kerberos.log</code></td>
        <td>Layer 7 — Kerberos (TCP/UDP 88)</td>
        <td>AD authentication tickets — client principal, service, success/failure, cipher type. Golden/Silver ticket abuse visible here.</td>
      </tr>
      <tr>
        <td><code>x509.log</code></td>
        <td>TLS certificates</td>
        <td>Certificate details — subject, issuer, validity, serial, SAN. Self-signed C2 certificates flagged here.</td>
      </tr>
      <tr>
        <td><code>notice.log</code></td>
        <td>Zeek notices</td>
        <td>Zeek-generated alerts from built-in scripts — policy violations, scanning behavior, tunneling detected.</td>
      </tr>
      <tr>
        <td><code>weird.log</code></td>
        <td>Protocol anomalies</td>
        <td>Protocol violations and unexpected behavior — malformed packets, unexpected port usage, handshake anomalies.</td>
      </tr>
      <tr>
        <td><code>intel.log</code></td>
        <td>Threat intelligence hits</td>
        <td>When observed IPs/domains/hashes match loaded intelligence feeds. <a href="#" class="xref" onclick="loadTopic('intel'); return false;">Intel framework ↗</a></td>
      </tr>
    </tbody>
  </table>

  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Core Concepts</summary>
    <div class="tier-body">
      <h4>Know which log to open for each investigation type</h4>
      <ul>
        <li><code>conn.log</code> — start every investigation here; L4 connection facts for every session observed</li>
        <li><code>dns.log</code> — first stop for C2 hunting and suspicious domain lookups at L7</li>
        <li><code>http.log</code> — web traffic details including user-agent and URI at L7</li>
        <li><code>notice.log</code> — Zeek's built-in detections; review daily for quick wins</li>
      </ul>
      <pre><code><span class="cm"># List all log files generated from a PCAP</span>
zeek -r capture.pcap && ls *.log

<span class="cm"># Quick view of conn.log fields</span>
head -2 conn.log | zeek-cut ts uid id.orig_h id.resp_h id.resp_p proto</code></pre>
    </div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Deeper Skills</summary>
    <div class="tier-body">
      <h4>Cross-correlate logs using the uid field</h4>
      <ul>
        <li>Every Zeek log entry for the same L4 connection shares the same <code>uid</code> — use it to pivot from conn.log to http.log, files.log, etc.</li>
        <li>Use <code>weird.log</code> to find protocol violations that may indicate evasion or malformed C2 traffic</li>
        <li>Correlate <code>ssl.log</code> SNI fields with <code>x509.log</code> certificate subjects to spot self-signed C2 certificates</li>
      </ul>
      <pre><code><span class="cm"># Find the uid for a suspicious connection, then pivot to http.log</span>
zeek-cut ts uid id.orig_h id.resp_h id.resp_p < conn.log | grep "192.168.56.10"
zeek-cut uid method host uri < http.log | grep "C3f2a1..."</code></pre>
    </div>
  </details>
  <details class="tier advanced">
    <summary>🔴 Advanced — Expert Techniques</summary>
    <div class="tier-body">
      <h4>Build custom log streams and enrich with threat intel</h4>
      <ul>
        <li>Create custom Zeek log streams with <code>Log::create_stream</code> to capture domain-specific L7 event data</li>
        <li>Load intel feeds so <code>intel.log</code> fires automatically when observed IOCs match L3/L7 observables</li>
        <li>Ship JSON logs to Elasticsearch and build index patterns that cross-reference all log types on the <code>uid</code> field</li>
      </ul>
      <pre><code><span class="cm"># Enable all log types and JSON output</span>
<span class="cm"># In /opt/zeek/share/zeek/site/local.zeek:</span>
<span class="cm"># @load policy/tuning/json-logs.zeek</span>
<span class="cm"># @load frameworks/intel/seen</span>
<span class="cm"># @load frameworks/intel/do_notice</span>

<span class="cm"># Ingest Intel::DOMAIN feed</span>
zeek -r capture.pcap frameworks/intel/seen intel_feed.zeek</code></pre>
    </div>
  </details>
</article>
</template>

<template id="tpl-conn">
<article class="topic">
  <h2>conn.log — Full Field Reference</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l3">L3 Network</span>
    <span class="osi-chip l4">L4 Transport</span>
    <span class="osi-note">conn.log is a pure L3/L4 record — source/destination IPs (L3), transport protocol, ports, byte counts, and TCP state machine results (L4). It is protocol-agnostic and covers every TCP, UDP, and ICMP flow observed.</span>
  </div>
  <p>Every network connection Zeek observes creates one row in conn.log. This is the most-used log for threat hunting, baselining, and correlation.</p>

  <h3>conn.log Fields</h3>
  <table>
    <thead><tr><th>Field</th><th>Type</th><th>Meaning &amp; Values</th><th>Analyst Notes</th></tr></thead>
    <tbody>
      <tr>
        <td><code>ts</code></td><td>time</td>
        <td>Unix timestamp of connection start (epoch seconds)</td>
        <td>Convert: <code>date -d @1700000000</code> or zeek-cut normalizes automatically</td>
      </tr>
      <tr>
        <td><code>uid</code></td><td>string</td>
        <td>Unique connection ID (e.g., <code>CmXA1J3Bf2g6m7u1be</code>)</td>
        <td>The <strong>critical correlation key</strong> — appears in all protocol logs for the same connection (conn, http, files, ssl, etc.)</td>
      </tr>
      <tr>
        <td><code>id.orig_h</code></td><td>addr</td>
        <td>Originating IP (client/attacker)</td>
        <td>Filter: <code>zeek-cut id.orig_h</code></td>
      </tr>
      <tr>
        <td><code>id.orig_p</code></td><td>port</td>
        <td>Originating port (ephemeral, 49152–65535 typical)</td>
        <td>High ephemeral source port = normal client behavior</td>
      </tr>
      <tr>
        <td><code>id.resp_h</code></td><td>addr</td>
        <td>Responding IP (server/target)</td>
        <td>Pair with <code>id.resp_p</code> to identify services</td>
      </tr>
      <tr>
        <td><code>id.resp_p</code></td><td>port</td>
        <td>Responding port (well-known service port)</td>
        <td>80=HTTP, 443=HTTPS, 445=SMB, 22=SSH, 3389=RDP, 53=DNS</td>
      </tr>
      <tr>
        <td><code>proto</code></td><td>enum</td>
        <td>Transport: <code>tcp</code>, <code>udp</code>, <code>icmp</code>, <code>unknown_transport</code></td>
        <td>ICMP connections have type/code instead of ports</td>
      </tr>
      <tr>
        <td><code>service</code></td><td>string</td>
        <td>Application protocol detected by Zeek DPD: <code>http</code>, <code>dns</code>, <code>ssl</code>, <code>ssh</code>, <code>smb</code>, etc.</td>
        <td>Mismatch between <code>service</code> and <code>id.resp_p</code> = protocol-on-nonstandard-port (suspicious!)
          <a href="#" class="xref" onclick="loadTopic('hunting'); return false;">Hunt non-standard ports ↗</a></td>
      </tr>
      <tr>
        <td><code>duration</code></td><td>interval</td>
        <td>Connection duration in seconds</td>
        <td>Very long connections (hours) = C2 beaconing or exfiltration; very short = scanning</td>
      </tr>
      <tr>
        <td><code>orig_bytes</code></td><td>count</td>
        <td>Bytes sent by originator (client → server)</td>
        <td>Large orig_bytes = data upload / exploit payload</td>
      </tr>
      <tr>
        <td><code>resp_bytes</code></td><td>count</td>
        <td>Bytes sent by responder (server → client)</td>
        <td>Large resp_bytes = data download; tiny resp with large orig = exfiltration via DNS/HTTP POST</td>
      </tr>
      <tr>
        <td><code>conn_state</code></td><td>enum</td>
        <td>TCP state machine result at connection close</td>
        <td>Critical for understanding what happened — see conn_state table below <a href="#" class="xref" onclick="loadTopic('hunting'); return false;">Hunt queries ↗</a></td>
      </tr>
      <tr>
        <td><code>missed_bytes</code></td><td>count</td>
        <td>Bytes Zeek could not capture (packet loss)</td>
        <td>High missed_bytes = incomplete analysis; results may be unreliable</td>
      </tr>
      <tr>
        <td><code>history</code></td><td>string</td>
        <td>TCP handshake history string (S=SYN, A=ACK, D=data, F=FIN, R=RST, lowercase = responder)</td>
        <td><code>ShADadFf</code> = full bidirectional TCP session (normal). <code>S</code> = SYN only (closed port or firewall drop). <code>R</code> = RST (refused or spoofed)</td>
      </tr>
      <tr>
        <td><code>orig_pkts</code> / <code>resp_pkts</code></td><td>count</td>
        <td>Packet counts from each side</td>
        <td>Many packets, zero bytes = SYN flood or scanning</td>
      </tr>
    </tbody>
  </table>

  <h3>conn_state Values</h3>
  <table>
    <thead><tr><th>State</th><th>Meaning</th><th>TCP View</th><th>Analyst Interpretation</th></tr></thead>
    <tbody>
      <tr><td><code>S0</code></td><td>SYN seen, no reply</td><td>SYN → (nothing)</td><td>Port closed (firewall drop) or target unreachable. High volume = port scan. <a href="#" class="xref" onclick="loadTopic('hunting'); return false;">Hunt S0 scans ↗</a></td></tr>
      <tr><td><code>S1</code></td><td>SYN + SYN-ACK seen, no data</td><td>SYN → SYN-ACK → (nothing)</td><td>Handshake started but not completed; may indicate half-open scan (stealth Nmap -sS)</td></tr>
      <tr><td><code>SF</code></td><td>Normal TCP close</td><td>Full handshake + FIN/FIN-ACK</td><td>Completed connection — expected for successful legitimate sessions</td></tr>
      <tr><td><code>REJ</code></td><td>SYN + RST reply</td><td>SYN → RST-ACK</td><td>Port actively refused by target; TCP RESET from closed port. Normal for scanned closed ports.</td></tr>
      <tr><td><code>S2</code></td><td>Connection closed by originator, no ACK from responder</td><td>SYN-ACK → FIN (half-close)</td><td>Unusual — client closed before server acknowledged; may indicate tool behavior</td></tr>
      <tr><td><code>S3</code></td><td>Connection closed by responder, no ACK from originator</td><td>Half-close from server</td><td>Similar to S2 but server-side; possible abrupt disconnect</td></tr>
      <tr><td><code>RSTO</code></td><td>Connection reset by originator</td><td>RST from client</td><td>Client abruptly terminated; common in scanning tools or application crashes</td></tr>
      <tr><td><code>RSTR</code></td><td>Connection reset by responder</td><td>RST from server</td><td>Server terminated session abruptly; may indicate IDS inline blocking or service crash</td></tr>
      <tr><td><code>SH</code></td><td>SYN-ACK + FIN (no SYN)</td><td>Asymmetric capture</td><td>Zeek missed the SYN — partial capture, span port misconfiguration, or VLAN asymmetry</td></tr>
      <tr><td><code>OTH</code></td><td>Midstream traffic, no handshake</td><td>Data without SYN</td><td>Zeek joined traffic mid-stream; may be long-running connection predating capture start</td></tr>
    </tbody>
  </table>

  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Core Concepts</summary>
    <div class="tier-body">
      <h4>Read and filter conn.log L3/L4 fields</h4>
      <ul>
        <li><code>id.orig_h</code> / <code>id.resp_h</code> — L3 source and destination IP addresses</li>
        <li><code>id.resp_p</code> / <code>proto</code> — L4 destination port and transport protocol (tcp/udp/icmp)</li>
        <li><code>conn_state</code> — result of the L4 TCP state machine; SF=normal close, S0=no reply (scanning)</li>
        <li><code>uid</code> — unique key linking this L4 connection to L7 protocol logs (http, dns, ssl, files)</li>
      </ul>
      <pre><code><span class="cm"># Show source IP, dest IP, dest port, and state for all connections</span>
zeek-cut ts id.orig_h id.resp_h id.resp_p conn_state < conn.log | head -30

<span class="cm"># Find all S0 (SYN-no-reply) connections — possible port scan</span>
zeek-cut id.orig_h id.resp_h id.resp_p conn_state < conn.log | awk '$4=="S0"'</code></pre>
    </div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Deeper Skills</summary>
    <div class="tier-body">
      <h4>Detect scanning, beaconing, and exfiltration from L4 metadata</h4>
      <ul>
        <li>High conn_state=S0 volume from one source = port scan (stealth SYN scan leaves half-open L4 sessions)</li>
        <li>Long duration + periodic connections to one external IP = C2 beaconing</li>
        <li>Large <code>orig_bytes</code> with small <code>resp_bytes</code> on DNS/HTTP = data exfiltration</li>
        <li>L7 <code>service</code> field mismatch with <code>id.resp_p</code> = protocol on non-standard port (evasion)</li>
      </ul>
      <pre><code><span class="cm"># Find hosts with most unique destination IPs (potential scanner)</span>
zeek-cut id.orig_h id.resp_h < conn.log | sort -u | awk '{print $1}' | sort | uniq -c | sort -rn | head -10

<span class="cm"># Find service running on non-standard port (protocol evasion)</span>
zeek-cut id.resp_p service < conn.log | awk '$1!=53 && $2=="dns"'</code></pre>
    </div>
  </details>
  <details class="tier advanced">
    <summary>🔴 Advanced — Expert Techniques</summary>
    <div class="tier-body">
      <h4>Statistical baselining and automated correlation across log types</h4>
      <ul>
        <li>Build a baseline of normal conn.log volume, typical services, and connection durations — alert on statistical deviations</li>
        <li>Use the <code>history</code> string to fingerprint tool behavior: nmap leaves <code>S</code>, netcat leaves <code>ShADadFf</code></li>
        <li>Write a Zeek script to raise a <code>Notice::Weird_Activity</code> when large orig_bytes flows occur on uncommon ports</li>
        <li>Correlate conn.log <code>uid</code> with files.log sha256 hashes to identify exactly which L4 session delivered a malicious file</li>
      </ul>
      <pre><code><span class="cm"># Find connections with large upload (exfiltration candidates)</span>
zeek-cut ts uid id.orig_h id.resp_h id.resp_p orig_bytes resp_bytes < conn.log \
  | awk '$7 > 1000000 {print}' | sort -k7 -rn | head -20

<span class="cm"># Correlate conn.log uid with files.log to find delivered files</span>
zeek-cut uid conn_uids sha256 mime_type < files.log | grep "application/x-dosexec"</code></pre>
    </div>
  </details>
</article>
</template>

<template id="tpl-dns">
<article class="topic">
  <h2>dns.log — Field Reference</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l3">L3 Network</span>
    <span class="osi-chip l4">L4 Transport</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">DNS is an L7 application-layer protocol, transported over UDP or TCP (L4) on port 53. Zeek records the L3 client/resolver IPs alongside L7 query names, record types, and response codes — making it ideal for detecting C2 and exfiltration at the application layer.</span>
  </div>
  <p>DNS is the most valuable log for threat hunting — nearly every C2 framework, malware family, and exfiltration tool uses DNS in some way.
    <a href="#" class="xref" onclick="loadTopic('hunting'); return false;">DNS hunt queries ↗</a>
  </p>

  <h3>dns.log Fields</h3>
  <table>
    <thead><tr><th>Field</th><th>Values / Format</th><th>Analyst Notes</th></tr></thead>
    <tbody>
      <tr>
        <td><code>uid</code></td><td>Connection ID</td>
        <td>Correlates to conn.log entry for this DNS UDP/TCP flow</td>
      </tr>
      <tr>
        <td><code>id.orig_h</code> / <code>id.resp_h</code></td><td>IPs</td>
        <td>Client querying DNS → DNS resolver; resp_h is usually 8.8.8.8, 1.1.1.1, or internal resolver</td>
      </tr>
      <tr>
        <td><code>proto</code></td><td><code>udp</code> / <code>tcp</code></td>
        <td>UDP=normal; TCP=response too large for UDP (large DNSSEC, zone transfers) or DNS tunneling</td>
      </tr>
      <tr>
        <td><code>trans_id</code></td><td>Hex int</td>
        <td>16-bit transaction ID matching query to response; random per query in normal operation</td>
      </tr>
      <tr>
        <td><code>query</code></td><td>FQDN string</td>
        <td>The domain being queried — most important field. Long random subdomains = DGA or DNS tunneling (e.g., <code>a3b9f.evil.com</code>)</td>
      </tr>
      <tr>
        <td><code>qtype_name</code></td><td><code>A</code>, <code>AAAA</code>, <code>MX</code>, <code>TXT</code>, <code>PTR</code>, <code>NS</code>, <code>CNAME</code></td>
        <td>TXT queries with data in answers = DNS tunneling (iodine, dnscat2). Large TXT = exfiltration</td>
      </tr>
      <tr>
        <td><code>rcode_name</code></td><td><code>NOERROR</code>, <code>NXDOMAIN</code>, <code>SERVFAIL</code>, <code>REFUSED</code></td>
        <td>NXDOMAIN storm = DGA malware trying many non-existent domains. REFUSED = DNS query blocked by policy</td>
      </tr>
      <tr>
        <td><code>answers</code></td><td>List of IPs/strings</td>
        <td>Resolved IPs — pivot from here to conn.log to see if host connected to the resolved IP</td>
      </tr>
      <tr>
        <td><code>TTL</code></td><td>Seconds list</td>
        <td>Very low TTL (0–60 sec) + changing IPs = fast-flux DNS (botnet evasion technique)</td>
      </tr>
    </tbody>
  </table>

  <h3>DNS Threat Hunting Indicators</h3>
  <table>
    <thead><tr><th>Indicator</th><th>What to Look For</th><th>Hunting Query</th></tr></thead>
    <tbody>
      <tr>
        <td>DGA domains</td>
        <td>High-entropy random-looking domain names; many NXDOMAIN responses</td>
        <td><code>zeek-cut query rcode_name &lt; dns.log | grep NXDOMAIN | sort | uniq -c | sort -rn | head -20</code></td>
      </tr>
      <tr>
        <td>DNS tunneling</td>
        <td>Very long subdomains (60+ chars); TXT/NULL query type with large data; high query frequency to one domain</td>
        <td><code>zeek-cut query &lt; dns.log | awk 'length($0) > 60' | sort | uniq -c | sort -rn</code></td>
      </tr>
      <tr>
        <td>Fast-flux</td>
        <td>Same domain resolves to many different IPs; TTL &lt; 60 seconds</td>
        <td>Group queries by query field, count unique answers</td>
      </tr>
      <tr>
        <td>Internal DNS queries to external servers</td>
        <td>Host querying 8.8.8.8 or 1.1.1.1 directly (bypasses internal resolver/controls)</td>
        <td><code>zeek-cut id.orig_h id.resp_h &lt; dns.log | grep -v "10\.\|192\.168\." | head</code></td>
      </tr>
    </tbody>
  </table>

  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Core Concepts</summary>
    <div class="tier-body">
      <h4>Read dns.log to spot unusual L7 DNS activity</h4>
      <ul>
        <li>The <code>query</code> field is the L7 domain name being resolved — this is the primary hunt target</li>
        <li><code>rcode_name=NXDOMAIN</code> means the domain does not exist — high volumes may indicate DGA malware</li>
        <li><code>qtype_name=TXT</code> with long data in <code>answers</code> = possible DNS tunneling at L7</li>
        <li>Internal hosts querying external DNS servers directly (not the internal resolver) is suspicious</li>
      </ul>
      <pre><code><span class="cm"># Show all queries with NXDOMAIN responses</span>
zeek-cut query rcode_name < dns.log | awk '$2=="NXDOMAIN"' | sort | uniq -c | sort -rn

<span class="cm"># Show unique domains queried (good for baselining)</span>
zeek-cut query < dns.log | sort -u | wc -l</code></pre>
    </div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Deeper Skills</summary>
    <div class="tier-body">
      <h4>Hunt DGA, DNS tunneling, and fast-flux patterns in L7 data</h4>
      <ul>
        <li>DGA domains: NXDOMAIN storm + high-entropy subdomain names (random characters, long labels)</li>
        <li>DNS tunneling: subdomain length &gt; 60 chars, TXT/NULL query types, high query rate to one parent domain</li>
        <li>Fast-flux: same domain resolves to many IPs with TTL &lt; 60 — indicates bulletproof hosting or botnet infrastructure</li>
        <li>Pivot: take an answer IP from dns.log and search conn.log to see if the host actually connected to it</li>
      </ul>
      <pre><code><span class="cm"># Find very long subdomain queries (DNS tunneling indicator)</span>
zeek-cut query < dns.log | awk 'length($0) > 60' | sort | uniq -c | sort -rn | head -20

<span class="cm"># Find TXT queries (common tunneling type like dnscat2/iodine)</span>
zeek-cut query qtype_name answers < dns.log | awk '$2=="TXT"' | head -20</code></pre>
    </div>
  </details>
  <details class="tier advanced">
    <summary>🔴 Advanced — Expert Techniques</summary>
    <div class="tier-body">
      <h4>Automate DNS threat detection with Zeek scripts and intel feeds</h4>
      <ul>
        <li>Write a Zeek script that calculates domain entropy at L7 and raises a <code>Notice</code> when entropy exceeds a threshold (DGA detection)</li>
        <li>Load threat intel feeds of known malicious domains into the Intel framework — dns.log entries matching the feed auto-populate intel.log</li>
        <li>Integrate dns.log with passive DNS databases (PDNS) to track domain-to-IP mappings over time and detect infrastructure reuse</li>
        <li>Detect beaconing via DNS: count queries per domain per hour — periodic spikes to one domain = beaconing timer</li>
      </ul>
      <pre><code><span class="cm"># Count queries per parent domain (second-level domain) — detect beaconing</span>
zeek-cut query < dns.log \
  | awk -F. '{print $(NF-1)"."$NF}' \
  | sort | uniq -c | sort -rn | head -20

<span class="cm"># Load a domain blocklist into Zeek Intel framework</span>
<span class="cm"># In intel_feed.zeek:</span>
<span class="cm"># redef Intel::read_files += { "/opt/zeek/intel/domains.txt" };</span></code></pre>
    </div>
  </details>
</article>
</template>

<template id="tpl-http">
<article class="topic">
  <h2>http.log &amp; files.log</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">http.log and files.log are purely L7 Application-layer records. Zeek reassembles TCP streams (L4) and parses HTTP request/response headers and bodies, extracting URIs, user agents, MIME types, and file hashes from the application-layer content.</span>
  </div>
  <p>HTTP is the most common C2 channel and malware delivery vector. files.log captures all files observed across protocols — HTTP, SMB, SMTP.</p>

  <h3>http.log Fields</h3>
  <table>
    <thead><tr><th>Field</th><th>Values</th><th>Analyst Notes</th></tr></thead>
    <tbody>
      <tr>
        <td><code>uid</code></td><td>Connection ID</td>
        <td>Correlates to conn.log — get bytes/duration from conn.log for the same uid</td>
      </tr>
      <tr>
        <td><code>method</code></td><td><code>GET</code>, <code>POST</code>, <code>PUT</code>, <code>CONNECT</code>, <code>HEAD</code></td>
        <td>CONNECT = tunneling through proxy. POST with large body = upload / C2 check-in. PUT = file upload to web server</td>
      </tr>
      <tr>
        <td><code>host</code></td><td>Domain/IP</td>
        <td>HTTP Host header — actual domain requested (not necessarily dest IP)</td>
      </tr>
      <tr>
        <td><code>uri</code></td><td>Path string</td>
        <td>Look for: encoded paths (%xx), suspiciously long URIs, known C2 gate names (/gate.php, /panel, /admin)</td>
      </tr>
      <tr>
        <td><code>user_agent</code></td><td>Browser/tool string</td>
        <td>Default tool user agents (python-requests, curl, Wget, Go-http-client) = scripted/malware activity. Empty = suspicious.</td>
      </tr>
      <tr>
        <td><code>status_code</code></td><td>200, 301, 403, 404, 500</td>
        <td>404 storm on one host = directory brute force (Gobuster, DirBuster). 200 after many 404s = found something</td>
      </tr>
      <tr>
        <td><code>referrer</code></td><td>URL string</td>
        <td>Empty referrer on executable download = suspicious (legitimate downloads usually have referrer)</td>
      </tr>
      <tr>
        <td><code>resp_mime_types</code></td><td>MIME string</td>
        <td>application/x-dosexec (PE file), application/zip, application/java-archive = potential malware delivery</td>
      </tr>
      <tr>
        <td><code>request_body_len</code> / <code>response_body_len</code></td><td>Bytes</td>
        <td>Large request body = data exfiltration via POST. Large response = file download</td>
      </tr>
    </tbody>
  </table>

  <h3>files.log Key Fields</h3>
  <table>
    <thead><tr><th>Field</th><th>What It Shows</th></tr></thead>
    <tbody>
      <tr><td><code>sha256</code></td><td>Hash of the file — submit to VT or match against threat intel</td></tr>
      <tr><td><code>mime_type</code></td><td>Actual file type detected by magic bytes (not file extension)</td></tr>
      <tr><td><code>total_bytes</code></td><td>File size in bytes</td></tr>
      <tr><td><code>conn_uids</code></td><td>List of connection UIDs that carried this file — pivot to conn.log and http.log</td></tr>
      <tr><td><code>extracted</code></td><td>Path if file was extracted by Zeek (requires extract-all-files.zeek or similar policy)</td></tr>
      <tr><td><code>source</code></td><td>Protocol that delivered the file: HTTP, SMTP, FTP, SMB</td></tr>
    </tbody>
  </table>

  <h3>Correlating http.log → files.log → conn.log</h3>
  <pre><code"># Scenario: Find all executables downloaded over HTTP today

# Step 1: Find PE downloads in files.log
zeek-cut sha256 mime_type source conn_uids < files.log | \
    grep "application/x-dosexec"

# Step 2: Note the conn_uid and look up in http.log
zeek-cut uid host uri user_agent resp_mime_types < http.log | \
    grep "CmXA1J3Bf2g6m7u1be"   # the conn_uid from files.log

# Step 3: Correlate bytes and duration from conn.log
zeek-cut uid id.orig_h id.resp_h id.resp_p orig_bytes resp_bytes duration < conn.log | \
    grep "CmXA1J3Bf2g6m7u1be"

# One-liner: combine all three
join -1 1 -2 1 \
    <(sort -k1,1 <(zeek-cut uid sha256 mime_type < files.log)) \
    <(sort -k1,1 <(zeek-cut uid host uri user_agent < http.log))</code></pre>

  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Core Concepts</summary>
    <div class="tier-body">
      <h4>Read http.log to find suspicious L7 web traffic</h4>
      <ul>
        <li><code>host</code> + <code>uri</code> together form the full URL of the L7 HTTP request</li>
        <li><code>user_agent</code> identifies the client — scripting tool user-agents (curl, python-requests) or empty strings are suspicious</li>
        <li><code>resp_mime_types=application/x-dosexec</code> means a Windows PE executable was delivered over HTTP</li>
        <li>Use <code>files.log</code> to get the sha256 hash of any delivered file and check it against VirusTotal</li>
      </ul>
      <pre><code><span class="cm"># Show all HTTP requests with their user-agent</span>
zeek-cut ts id.orig_h host uri user_agent status_code < http.log | head -30

<span class="cm"># Find all PE executables delivered over HTTP</span>
zeek-cut sha256 mime_type source conn_uids < files.log | grep "x-dosexec"</code></pre>
    </div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Deeper Skills</summary>
    <div class="tier-body">
      <h4>Detect C2 and exfiltration patterns in L7 HTTP traffic</h4>
      <ul>
        <li>C2 check-in patterns: periodic POST requests to the same URI with fixed-size bodies and empty referrer</li>
        <li>Directory brute force: 404 storm from one source IP to many URIs on the same host</li>
        <li>Data exfiltration: large <code>request_body_len</code> on POST requests to external hosts</li>
        <li>CONNECT method to non-standard ports = proxy tunneling for C2 or exfil over HTTPS</li>
      </ul>
      <pre><code><span class="cm"># Find large POST bodies (potential exfiltration)</span>
zeek-cut ts id.orig_h host uri method request_body_len < http.log \
  | awk '$6=="POST" && $7 > 100000' | sort -k7 -rn

<span class="cm"># Find 404 storms (directory brute force)</span>
zeek-cut id.orig_h host status_code < http.log \
  | awk '$3=="404"' | sort | uniq -c | sort -rn | head -20</code></pre>
    </div>
  </details>
  <details class="tier advanced">
    <summary>🔴 Advanced — Expert Techniques</summary>
    <div class="tier-body">
      <h4>Profile C2 frameworks and automate file triage via http.log + files.log</h4>
      <ul>
        <li>Fingerprint C2 frameworks by user-agent patterns, URI structures, and beacon interval timing (Cobalt Strike, Metasploit, Empire all have distinct L7 signatures)</li>
        <li>Configure Zeek to auto-extract files: load <code>extract-all-files.zeek</code> and run submitted sha256s through ClamAV or YARA</li>
        <li>Write Zeek scripts that detect C2 beaconing: track request intervals per source-dest-URI triple and alert on periodic activity</li>
        <li>Integrate JA3/JA3S TLS fingerprinting from ssl.log with http.log via uid to catch C2 over HTTPS</li>
      </ul>
      <pre><code><span class="cm"># Enable file extraction in local.zeek</span>
<span class="cm"># @load frameworks/files/extract-all-files</span>
<span class="cm"># redef FileExtract::prefix = "/opt/zeek/extracted/";</span>

<span class="cm"># Scan extracted files with ClamAV</span>
clamscan -r /opt/zeek/extracted/ --log=/var/log/clamav/zeek-extracted.log

<span class="cm"># Find all suspicious non-browser user agents</span>
zeek-cut user_agent < http.log | sort | uniq -c | sort -rn \
  | grep -v -E "Mozilla|Chrome|Safari|Firefox" | head -20</code></pre>
    </div>
  </details>
</article>
</template>

<template id="tpl-zeekcut">
<article class="topic">
  <h2>zeek-cut Command Reference</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l3">L3 Network</span>
    <span class="osi-chip l4">L4 Transport</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">zeek-cut works against all Zeek log files — L3/L4 fields in conn.log (IPs, ports, state) and L7 fields in protocol logs (dns.log, http.log, ssl.log). It is the primary command-line tool for slicing and analyzing Zeek's TSV output across all OSI layers.</span>
  </div>
  <p>zeek-cut is the built-in TSV parsing utility for Zeek logs. It reads headers, extracts selected columns, and handles Zeek's special timestamp/type formatting.</p>

  <h3>Basic Syntax</h3>
  <pre><code"># zeek-cut [options] field1 field2 ... < logfile

# Extract specific columns from conn.log
zeek-cut ts id.orig_h id.resp_h id.resp_p proto conn_state < conn.log

# Multiple files
cat conn.log conn-old.log | zeek-cut id.orig_h id.resp_h

# Compressed logs (Security Onion rotates/compresses hourly)
zcat conn.*.gz | zeek-cut ts id.orig_h id.resp_h

# Convert timestamps to human-readable
zeek-cut -d ts id.orig_h id.resp_p < conn.log   # -d = UTC datetime format
zeek-cut -D "%Y-%m-%d %H:%M:%S" ts < conn.log    # custom format</code></pre>

  <h3>Power One-Liners</h3>
  <pre><code"># Top talkers (by bytes out)
zeek-cut id.orig_h orig_bytes < conn.log | \
    awk '{sum[$1]+=$2} END {for (h in sum) print sum[h], h}' | \
    sort -rn | head -20

# Unique destination IPs on port 445 (SMB)
zeek-cut id.orig_h id.resp_h id.resp_p < conn.log | \
    awk '$3 == 445' | sort -u

# Count connections by destination port
zeek-cut id.resp_p < conn.log | sort | uniq -c | sort -rn | head -20

# Find connections to unusual ports (not 80, 443, 22, 53)
zeek-cut id.orig_h id.resp_h id.resp_p service < conn.log | \
    awk '$3 != 80 && $3 != 443 && $3 != 22 && $3 != 53'

# S0 connections (SYN with no reply = scan or firewall drop)
zeek-cut id.orig_h id.resp_h id.resp_p conn_state < conn.log | \
    awk '$4 == "S0"' | sort | uniq -c | sort -rn | head -20

# All domains queried by a specific host
zeek-cut id.orig_h query < dns.log | \
    grep "^192.168.56.30" | sort -u

# User-agents seen in HTTP traffic
zeek-cut user_agent < http.log | sort | uniq -c | sort -rn | head -20

# Files with PE MIME type (exe downloads)
zeek-cut sha256 mime_type source < files.log | \
    grep "application/x-dosexec"

# Long-duration connections (potential C2 beaconing)
zeek-cut ts id.orig_h id.resp_h id.resp_p duration < conn.log | \
    awk '$5 > 3600' | sort -t$'\t' -k5 -rn | head -20

# Large DNS queries (potential tunneling)
zeek-cut query < dns.log | awk 'length($0) > 50' | sort | uniq -c | sort -rn</code></pre>

  <h3>Combining zeek-cut with Sort/Awk/Grep</h3>
  <pre><code"># Pattern: extract → filter → aggregate → sort → limit
#
# extract columns with zeek-cut
# → filter rows with grep or awk
# → aggregate with uniq -c or awk sum
# → sort by count with sort -rn
# → limit with head

# Example: Most active external IPs connecting on port 443
zeek-cut id.orig_h id.resp_h id.resp_p < conn.log | \
    grep -v "192\.168\." | \
    awk '$3 == 443 {print $1, $2}' | \
    sort | uniq -c | sort -rn | head -20

# Example: Summarize HTTP methods per destination
zeek-cut method host < http.log | \
    sort | uniq -c | sort -rn | head -30</code></pre>

  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Core Concepts</summary>
    <div class="tier-body">
      <h4>Extract fields from Zeek TSV logs with zeek-cut</h4>
      <ul>
        <li>zeek-cut reads the #fields header line and extracts the named columns — no need to count column positions</li>
        <li>Always pipe input using <code>&lt; logfile</code> or <code>cat logfile | zeek-cut</code></li>
        <li>Use <code>-d</code> flag to convert epoch timestamps to human-readable UTC datetime strings</li>
        <li>Works on compressed logs when piped through <code>zcat</code></li>
      </ul>
      <pre><code><span class="cm"># Extract source IP, dest IP, port from conn.log</span>
zeek-cut id.orig_h id.resp_h id.resp_p < conn.log | head -20

<span class="cm"># Human-readable timestamps</span>
zeek-cut -d ts id.orig_h id.resp_h < conn.log | head -10

<span class="cm"># Read compressed rotated logs</span>
zcat /opt/zeek/logs/2024-01-15/conn*.gz | zeek-cut ts id.orig_h id.resp_h</code></pre>
    </div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Deeper Skills</summary>
    <div class="tier-body">
      <h4>Build analysis pipelines with zeek-cut + awk + sort</h4>
      <ul>
        <li>Combine zeek-cut (field extraction) with awk (filtering/aggregation), sort (ordering), uniq -c (counting), and head (limiting)</li>
        <li>Standard pattern: <code>zeek-cut fields &lt; log | awk 'filter' | sort | uniq -c | sort -rn | head</code></li>
        <li>Use awk to calculate per-host byte sums from orig_bytes/resp_bytes in conn.log</li>
        <li>Cross-reference L7 fields (user_agent, query) against L3/L4 context (id.orig_h, id.resp_p)</li>
      </ul>
      <pre><code><span class="cm"># Top 10 source IPs by total bytes sent (L3+L4 from conn.log)</span>
zeek-cut id.orig_h orig_bytes < conn.log \
  | awk '{sum[$1]+=$2} END {for (h in sum) print sum[h], h}' \
  | sort -rn | head -10

<span class="cm"># Count DNS queries per source host (L7 dns.log)</span>
zeek-cut id.orig_h query < dns.log | awk '{print $1}' | sort | uniq -c | sort -rn | head</code></pre>
    </div>
  </details>
  <details class="tier advanced">
    <summary>🔴 Advanced — Expert Techniques</summary>

        <li>Pipe zeek-cut output into Python for statistical analysis (standard deviation of beacon intervals, entropy calculations)</li>
        <li>Use <code>join</code> to cross-correlate conn.log and http.log on the uid field without loading logs into a SIEM</li>

      <pre><code><span class="cm"># Join conn.log and http.log on uid field (lightweight correlation)</span>
join -1 1 -2 1 \
  <(zeek-cut uid orig_bytes resp_bytes duration < conn.log | sort -k1) \

  | awk '$4 > 500000'  <span class="cm"># large response bodies</span>

<span class="cm"># JSON log mode: use jq instead of zeek-cut</span>
jq -r '[.ts, .["id.orig_h"], .["id.resp_h"], .["id.resp_p"]] | @tsv' conn.log \
  | awk '$4 == 4444'  <span class="cm"># uncommon port 4444 (Metasploit default)</span></code></pre>

<template id="tpl-hunting">
<article class="topic">
  <h2>Threat Hunting Queries</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l3">L3 Network</span>
    <span class="osi-chip l4">L4 Transport</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">Threat hunting with Zeek spans all layers: L3/L4 for scanning (S0 conn_state, port sweeps, byte volumes) and L7 for behavioral detection (DNS tunneling queries, HTTP C2 user-agents, TLS certificate anomalies, and SMB lateral movement).</span>
  </div>
  <p>Structured hunting queries to find attacker behavior in Zeek logs. Use these as starting points and refine based on your environment's baseline.</p>

  <h3>Network Scanning Detection</h3>
  <pre><code"># Port scan: one source IP → many dest IPs on same port (S0 = no reply = closed)
zeek-cut id.orig_h id.resp_h id.resp_p conn_state < conn.log | \
    awk '$4 == "S0"' | \
    awk '{print $1, $3}' | sort | uniq -c | sort -rn | head

# Vertical scan: one source → many ports on one dest
zeek-cut id.orig_h id.resp_h id.resp_p conn_state < conn.log | \
    awk '$4 == "S0" {print $1, $2, $3}' | \
    awk '{count[$1" "$2]++; ports[$1" "$2]=ports[$1" "$2]","$3} END \
         {for (k in count) if (count[k] > 20) print count[k], k, ports[k]}' | \
    sort -rn | head</code></pre>

  <h3>C2 Beaconing Detection</h3>
  <pre><code"># Regular interval connections to same IP:port (beaconing pattern)
zeek-cut ts id.orig_h id.resp_h id.resp_p < conn.log | \
    awk '{print $2, $3, $4}' | sort | uniq -c | sort -rn | \
    awk '$1 > 100'   # more than 100 connections to same pair = potential beacon

# Long-running connections (C2 persistent channel)
zeek-cut id.orig_h id.resp_h id.resp_p duration conn_state < conn.log | \
    awk '$4 > 1800 && $5 == "SF"' | sort -t$'\t' -k4 -rn | head -20

# DNS beaconing: many queries to same domain with identical intervals
zeek-cut ts id.orig_h query < dns.log | \
    awk '{print $2, $3}' | sort | uniq -c | sort -rn | \
    awk '$1 > 50'</code></pre>

  <h3>Lateral Movement Detection</h3>
  <pre><code"># SMB connections between internal hosts (lateral movement vector)
zeek-cut id.orig_h id.resp_h id.resp_p < conn.log | \
    awk '$3 == 445 && $1 ~ /^192\.168\. && $2 ~ /^192\.168\./' | \
    sort | uniq -c | sort -rn

# RDP connections from unusual sources
zeek-cut id.orig_h id.resp_h id.resp_p < conn.log | \
    awk '$3 == 3389' | sort -u

# WinRM (5985/5986) lateral movement
zeek-cut id.orig_h id.resp_h id.resp_p < conn.log | \
    awk '$3 == 5985 || $3 == 5986' | sort | uniq -c | sort -rn</code></pre>

  <h3>Data Exfiltration Detection</h3>
  <pre><code"># Large data transfers outbound (possible exfiltration)
zeek-cut id.orig_h id.resp_h id.resp_p orig_bytes < conn.log | \
    awk '$4 > 10000000' | sort -k4 -rn | head -20   # 10MB threshold

# DNS tunneling: unusually large DNS queries
zeek-cut id.orig_h query qtype_name < dns.log | \
    awk 'length($2) > 50 || $3 == "TXT"' | head -30

# HTTP POST with large body (form submit / data upload)
zeek-cut id.orig_h host uri method request_body_len < http.log | \
    awk '$4 == "POST" && $5 > 500000' | sort -k5 -rn | head -20</code></pre>

  <h3>Malware &amp; C2 HTTP Patterns</h3>
  <pre><code"># Suspicious User-Agents (known malware/tool defaults)
zeek-cut id.orig_h host uri user_agent < http.log | \
    grep -iE "python-requests|curl|wget|go-http-client|nmap|masscan|nikto|sqlmap"

# Empty user-agents (scripted tools, malware)
zeek-cut id.orig_h host uri user_agent < http.log | \
    awk '$4 == "-"'

# Executable downloads (PE file from HTTP)
zeek-cut id.orig_h host uri resp_mime_types < http.log | \
    grep "application/x-dosexec\|application/x-executable"

# TLS connections with self-signed/unusual certificates
zeek-cut id.orig_h id.resp_h validation_status < ssl.log | \
    awk '$3 != "ok"' | sort | uniq -c | sort -rn | head</code></pre>

  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Core Concepts</summary>
    <div class="tier-body">
      <h4>Run basic hunt queries against common attacker behaviors</h4>
      <ul>
        <li>Start with conn.log: look for S0 conn_state (L4 SYN with no reply) to detect port scanning</li>
        <li>Check http.log for non-browser user-agents (L7) — scripted tools and malware rarely mimic browsers</li>
        <li>Look for DNS queries with NXDOMAIN responses — high volume = DGA or C2 pre-infection beacon</li>
        <li>Review notice.log daily — Zeek's built-in scripts already fire on many suspicious L3-L7 patterns</li>
      </ul>
      <pre><code><span class="cm"># Quick hunt: find all S0 scan sources at L4</span>
zeek-cut id.orig_h id.resp_p conn_state < conn.log | awk '$3=="S0"' | sort | uniq -c | sort -rn | head

<span class="cm"># Quick hunt: suspicious L7 user-agents</span>

        <li>Lateral movement: SMB (port 445) and RDP (port 3389) between internal RFC1918 hosts (L3+L4)</li>
        <li>Exfiltration: large orig_bytes on outbound connections (L4) OR long DNS subdomain queries (L7)</li>
        <li>C2 over TLS: ssl.log with validation_status != "ok" + self-signed certificate subject (L7)</li>
      </ul>

zeek-cut id.orig_h id.resp_h id.resp_p < conn.log \

<template id="tpl-scripting">
<article class="topic">
  <h2>Zeek Scripting Language</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">Zeek scripts respond to application-layer events (http_request, dns_request, ssl_established, file_new) and can also hook into L4 events (connection_established, connection_state_remove). Scripts operate primarily at L7 where semantic meaning is extracted from reconstructed protocol streams.</span>
  </div>
  <p>The Zeek scripting language provides full event-driven customization. Scripts subscribe to network events and can generate notices, create custom logs, or enrich data.</p>

  <h3>Script Structure</h3>
  <pre><code"># Zeek script structure
module MyDetection;    # optional module namespace

export {
    redef enum Notice::Type += { Suspicious_Activity };
}

# Events Zeek can trigger scripts on:
# - connection_established(c: connection)
# - connection_state_remove(c: connection)
# - http_request(c: connection, method: string, original_URI: string, ...)
# - dns_request(c: connection, msg: dns_msg, query: string, ...)
# - new_connection(c: connection)
# - file_new(f: fa_file)
# - ssl_established(c: connection)

# Simple connection logger
event connection_established(c: connection) {
    if (c$id$resp_p == 4444/tcp) {  # suspicious port
        NOTICE([
            $note = Suspicious_Activity,
            $conn = c,
            $msg = fmt("Suspicious connection to port 4444 from %s", c$id$orig_h),
            $sub = "Possible Meterpreter",
            $identifier = cat(c$id$orig_h)
        ]);
    }
}</code></pre>

  <h3>Custom Log Stream</h3>
  <pre><code"># Create a custom log file
module SuspiciousPorts;

export {
    redef enum Log::ID += { LOG };
    type Info: record {
        ts:       time       &log;
        src_ip:   addr       &log;
        dst_ip:   addr       &log;
        dst_port: port       &log;
        service:  string     &log &optional;
    };
}

event zeek_init() {
    Log::create_stream(SuspiciousPorts::LOG, [$columns=Info, $path="suspicious_ports"]);
}

event connection_established(c: connection) {
    local suspicious_ports = set(4444/tcp, 1234/tcp, 8888/tcp, 31337/tcp);
    if (c$id$resp_p in suspicious_ports) {
        Log::write(SuspiciousPorts::LOG, Info($ts=network_time(),
                                              $src_ip=c$id$orig_h,
                                              $dst_ip=c$id$resp_h,
                                              $dst_port=c$id$resp_p));
    }
}

# Output: suspicious_ports.log with custom columns</code></pre>

  <h3>Loading Scripts</h3>
  <pre><code"># Load in zeek command line
zeek -r capture.pcap my_script.zeek

# Add to site/local.zeek (permanent — loads on every run)
echo "@load my_script" >> /opt/zeek/share/zeek/site/local.zeek

# Load bundled policy scripts
@load policy/protocols/conn/known-hosts
@load policy/protocols/http/detect-MHR          # malware hash registry
@load policy/frameworks/intel/seen              # intel framework
@load policy/protocols/dns/detect-external-names</code></pre>

      <ul>
        <li>Zeek scripts are event-driven — they subscribe to L4/L7 network events and execute logic when those events fire</li>
        <li>Common events: <code>connection_established</code> (L4), <code>http_request</code> (L7), <code>dns_request</code> (L7), <code>file_new</code> (L7)</li>
        <li>Scripts can raise <code>NOTICE</code> entries (appear in notice.log) and write custom log streams</li>
        <li>Load scripts with <code>zeek -r pcap.pcap script.zeek</code> or permanently in <code>local.zeek</code></li>

<span class="cm"># Check if notice.log was generated</span>

      <ul>
        <li>Use the <code>connection</code> record (<code>c$id$orig_h</code>, <code>c$id$resp_p</code>) to access L3/L4 metadata in any event handler</li>
        <li>Create custom log streams with <code>Log::create_stream</code> to capture domain-specific L7 observables</li>
        <li>Load bundled policy scripts like <code>policy/protocols/http/detect-MHR</code> for malware hash registry lookups</li>

<article class="topic">
  <h2>Deployment &amp; Management</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l2">L2 Data Link</span>
    <span class="osi-chip l3">L3 Network</span>
    <span class="osi-chip l4">L4 Transport</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">Zeek deployment operates at all layers: it captures frames at L2 via libpcap/AF_PACKET, processes IP routing at L3, reassembles TCP/UDP streams at L4, and parses 50+ application protocols at L7. Cluster configuration and JSON output enable SIEM integration across all layers.</span>
  </div>
  <p>Zeek management covers installation, interface configuration, log rotation, and cluster deployment for high-throughput environments.</p>

  <h3>Installation (Ubuntu/Debian)</h3>
  <pre><code"># Install from binary (recommended)
echo 'deb http://download.opensuse.org/repositories/security:/zeek/xUbuntu_22.04/ /' \
    > /etc/apt/sources.list.d/zeek.list
curl -fsSL https://download.opensuse.org/repositories/security:zeek/xUbuntu_22.04/Release.key \
    | gpg --dearmor > /etc/apt/trusted.gpg.d/zeek.gpg
sudo apt update && sudo apt install -y zeek

# Add zeek to PATH
export PATH=/opt/zeek/bin:$PATH
echo 'export PATH=/opt/zeek/bin:$PATH' >> ~/.bashrc

# Verify installation
zeek --version</code></pre>

  <h3>ZeekControl (zeekctl)</h3>
  <pre><code"># Manage Zeek with zeekctl
zeekctl status     # show running status
zeekctl start      # start Zeek
zeekctl stop       # stop Zeek
zeekctl restart    # restart (picks up config changes)
zeekctl deploy     # install + restart (use after config changes)
zeekctl check      # check configuration for errors

# Configuration file
cat /opt/zeek/etc/zeekctl.cfg
# Key settings:
# LogDir = /opt/zeek/logs
# SpoolDir = /opt/zeek/spool
# MailTo = soc@company.com (for crit alerts)

# Node configuration (what interfaces to monitor)
cat /opt/zeek/etc/node.cfg
# [zeek]
# type=standalone
# host=localhost
# interface=eth0</code></pre>

  <h3>Log Rotation &amp; Retention</h3>
  <pre><code"># Zeek rotates logs hourly by default to dated directories
ls /opt/zeek/logs/
# 2024-03-15/  (archived logs)
# current/     (active logs)

# Rotation interval (in zeekctl.cfg)
LogRotationInterval = 3600   # seconds (1 hour)

# Compressed archive path pattern:
# /opt/zeek/logs/2024-03-15/conn.22:00:00-23:00:00.log.gz

# Access archived logs
zcat /opt/zeek/logs/2024-03-15/conn.22:00:00-23:00:00.log.gz | \
    zeek-cut id.orig_h id.resp_h id.resp_p

# Search across multiple rotated logs
zcat /opt/zeek/logs/*/conn.*.log.gz | zeek-cut id.orig_h id.resp_p | \
    awk '$2 == 4444' | sort -u</code></pre>

  <h3>JSON Output (for SIEM Ingestion)</h3>
  <pre><code"># Enable JSON format in local.zeek
# Add to /opt/zeek/share/zeek/site/local.zeek:
@load policy/tuning/json-logs

# Or in zeekctl.cfg:
# JSON=1

# JSON conn.log entry example:
{
  "ts": 1700000000.123456,
  "uid": "CmXA1J3Bf2g6m7u1be",
  "id.orig_h": "192.168.56.10",
  "id.orig_p": 54321,
  "id.resp_h": "192.168.56.30",
  "id.resp_p": 445,
  "proto": "tcp",
  "service": "smb",
  "duration": 2.345,
  "orig_bytes": 48523,
  "resp_bytes": 1234,
  "conn_state": "SF",
  "history": "ShADadFf"
}

# Filebeat ships JSON logs to ELK/Security Onion automatically</code></pre>

  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Core Concepts</summary>
    <div class="tier-body">
      <h4>Install Zeek and run it on a network interface</h4>
      <ul>
        <li>Install from the openSUSE binary repository — do NOT use <code>apt install zeek</code> which installs an outdated version</li>
        <li>Configure <code>/opt/zeek/etc/node.cfg</code> to specify which L2 interface to capture on</li>
        <li>Use <code>zeekctl deploy</code> after any configuration change — this installs and restarts Zeek cleanly</li>
        <li>Check <code>zeekctl status</code> — all workers and manager should show "running"</li>
      </ul>
      <pre><code><span class="cm"># Quick start after installation</span>
zeekctl check    <span class="cm"># validate config</span>
zeekctl deploy   <span class="cm"># start Zeek</span>
zeekctl status   <span class="cm"># verify running</span>

<span class="cm"># Check live logs</span>
tail -f /opt/zeek/logs/current/conn.log</code></pre>
    </div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Deeper Skills</summary>
    <div class="tier-body">
      <h4>Enable JSON logging and ship logs to a SIEM</h4>
      <ul>
        <li>Enable JSON output by adding <code>@load policy/tuning/json-logs</code> to <code>local.zeek</code> — Zeek then writes newline-delimited JSON instead of TSV</li>
        <li>Configure Filebeat with Zeek module to ship logs to Elasticsearch or a Security Onion pipeline</li>
        <li>Manage log retention: increase <code>LogRotationInterval</code> and set up cron-based archival/deletion policies</li>
        <li>Monitor for packet drops: check <code>zeekctl netstats</code> and tune capture buffers if drops exceed 1%</li>
      </ul>
      <pre><code><span class="cm"># Check for packet loss at the capture interface</span>
zeekctl netstats

<span class="cm"># Search across all hourly rotated conn.log archives</span>
zcat /opt/zeek/logs/*/conn.*.log.gz | zeek-cut id.orig_h id.resp_p | awk '$2==4444'</code></pre>
    </div>
  </details>
  <details class="tier advanced">
    <summary>🔴 Advanced — Expert Techniques</summary>
    <div class="tier-body">
      <h4>Deploy Zeek clusters for high-throughput environments</h4>
      <ul>
        <li>Cluster mode: one manager node + proxy nodes + worker nodes with CPU-pinned capture using AF_PACKET or PF_RING</li>
        <li>Workers use BPF filters to load-balance traffic across CPUs — critical at 10Gbps+ environments to avoid L2/L3 packet loss</li>
        <li>Configure <code>node.cfg</code> with multiple <code>[worker-*]</code> entries, each pinned to a CPU core and interface VLAN</li>
        <li>Monitor cluster health with <code>zeekctl top</code> and alert on worker process failures automatically</li>
      </ul>
      <pre><code><span class="cm"># Example cluster node.cfg for multi-worker deployment</span>
<span class="cm"># [manager]</span>
<span class="cm"># type=manager</span>
<span class="cm"># host=localhost</span>
<span class="cm">#</span>
<span class="cm"># [worker-1]</span>
<span class="cm"># type=worker</span>
<span class="cm"># host=localhost</span>
<span class="cm"># interface=eth1</span>
<span class="cm"># lb_method=pf_ring</span>
<span class="cm"># lb_procs=4</span>

zeekctl top    <span class="cm"># live worker resource usage</span></code></pre>
    </div>
  </details>
</article>

<article class="topic">
  <h2>Investigation Lab — PCAP Analysis with Zeek</h2>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l2">L2 Data Link</span>
    <span class="osi-chip l3">L3 Network</span>
    <span class="osi-chip l4">L4 Transport</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">This lab exercises all OSI layers: Zeek captures L2 frames from tcpdump, produces L3/L4 connection records in conn.log (scanning, beaconing), and generates L7 protocol evidence in dns.log, http.log, and files.log — then a custom script detects scan behavior at the L4 conn_state level.</span>
  </div>
  <div class="callout lab">
    <strong>Offline lab — no live network required.</strong> This lab runs Zeek against a PCAP file to demonstrate all core analysis techniques.
  </div>

  <h3>Lab Setup</h3>
  <table>
    <thead><tr><th>VM</th><th>IP</th><th>Role</th></tr></thead>
    <tbody>
      <tr><td>Kali Linux</td><td>192.168.56.10</td><td>Run Zeek, analyze PCAP offline</td></tr>
      <tr><td>Security Onion</td><td>192.168.56.20</td><td>Live Zeek sensor (alternative — use Hunt dashboard)</td></tr>
    </tbody>
  </table>

  <h3>Step 1 — Generate Lab PCAP</h3>
  <pre><code"># On Kali, capture while running an attack
sudo tcpdump -i eth0 -w lab_capture.pcap &

# Simulate malicious traffic (from Kali against Windows 10 target):
# Nmap scan:
nmap -sS 192.168.56.30 -p 1-1000

# HTTP malware download simulation (safe — using Eicar):
curl -o /dev/null http://192.168.56.30/eicar.com

# DNS queries:
dig evil-domain.com @8.8.8.8

# Kill tcpdump
sudo pkill tcpdump</code></pre>

  <h3>Step 2 — Run Zeek Against the PCAP</h3>
  <pre><code"># Run Zeek on the PCAP (creates log files in current directory)
cd /tmp/zeek_lab/
zeek -r /path/to/lab_capture.pcap /opt/zeek/share/zeek/site/local.zeek

# Files created:
ls -la *.log
# conn.log  dns.log  http.log  files.log  ssl.log  weird.log  notice.log  ...</code></pre>

  <h3>Step 3 — Analyze conn.log for Scanning</h3>
  <pre><code"># Count S0 connections (scan/closed ports)
zeek-cut id.orig_h id.resp_h id.resp_p conn_state < conn.log | \
    awk '$4 == "S0"' | wc -l

# Which ports were scanned?
zeek-cut id.resp_p conn_state < conn.log | \
    awk '$2 == "S0"' | sort -n | uniq -c | sort -rn | head -10

# What connected successfully?
zeek-cut id.orig_h id.resp_h id.resp_p service conn_state < conn.log | \
    awk '$5 == "SF"' | sort -u</code></pre>

  <h3>Step 4 — Analyze DNS Log</h3>
  <pre><code"># All queries
zeek-cut id.orig_h query rcode_name < dns.log | sort

# NXDOMAIN responses (domains not found)
zeek-cut query rcode_name < dns.log | grep NXDOMAIN | sort | uniq -c | sort -rn

# Long subdomains (potential tunneling)
zeek-cut query < dns.log | awk 'length($0) > 40' | sort -u</code></pre>

  <h3>Step 5 — Analyze HTTP Log</h3>
  <pre><code"># All HTTP requests
zeek-cut id.orig_h method host uri user_agent status_code < http.log

# Suspicious user agents
zeek-cut user_agent < http.log | sort | uniq -c | sort -rn

# File downloads
zeek-cut host uri resp_mime_types < http.log | \
    grep -v "text/html\|image/\|text/css\|application/javascript"</code></pre>

  <h3>Step 6 — Write a Custom Detection Script</h3>
  <pre><code"># Script: detect_nmap_scan.zeek
cat > detect_nmap_scan.zeek << 'EOF'
@load base/frameworks/notice

module ScanDetect;

export {
    redef enum Notice::Type += { Nmap_Scan };
    global scan_counts: table[addr] of count = {} &default=0;
}

event connection_state_remove(c: connection) {
    if (c$conn$conn_state == "S0") {
        scan_counts[c$id$orig_h] += 1;
        if (scan_counts[c$id$orig_h] == 20) {   # threshold: 20 S0 connections
            NOTICE([$note=ScanDetect::Nmap_Scan,
                    $src=c$id$orig_h,
                    $msg=fmt("Port scan detected from %s (%d ports)",
                             c$id$orig_h, scan_counts[c$id$orig_h]),
                    $identifier=cat(c$id$orig_h)]);
        }
    }
}
EOF

# Run with custom script
zeek -r lab_capture.pcap detect_nmap_scan.zeek

# Check notice.log for generated alerts
zeek-cut ts note msg src < notice.log</code></pre>
