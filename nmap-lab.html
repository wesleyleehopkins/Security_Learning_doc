<article class="topic">
<h1>00 · Scenario &amp; Setup</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l3">L3 Network</span>
  <span class="osi-chip l4">L4 Transport</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">This five-phase recon lab spans all three active layers: L3 (host discovery via ICMP, OS fingerprinting), L4 (SYN port scanning, TCP reason codes), and L7 (version detection, NSE script output, service banner analysis).</span>
</div>
<hr class="divider">

<div class="callout lab"><strong>Lab Scenario</strong> — This walkthrough simulates a penetration testing engagement against a single target host. The goal is to map all open ports, identify running services and versions, and check for known vulnerabilities using NSE scripts. Follow each step in order.</div>

<h2>Engagement Details</h2>
<div class="table-wrap">
<table>
  <thead><tr><th>Parameter</th><th>Value</th></tr></thead>
  <tbody>
    <tr><td>Target IP</td><td>10.10.10.5</td></tr>
    <tr><td>Scope</td><td>Single host — all ports</td></tr>
    <tr><td>Environment</td><td>HackTheBox-style CTF / pentest lab</td></tr>
    <tr><td>Attacker IP</td><td>10.10.14.20 (your VM)</td></tr>
    <tr><td>OS</td><td>Kali Linux / Parrot OS</td></tr>
    <tr><td>Nmap version</td><td>7.94+</td></tr>
    <tr><td>Permissions</td><td>Root — raw sockets available</td></tr>
  </tbody>
</table>
</div>

<h2>Recon Methodology</h2>
<pre><code><span class="cm">Phase 1 — Host Discovery</span>
  Confirm target is alive: ping, -sn, -Pn if needed

<span class="cm">Phase 2 — Port Scan</span>
  Find all open TCP ports: -sS -p- (fast, root)
  Optional: UDP top ports for DNS/SNMP/TFTP exposure

<span class="cm">Phase 3 — Service &amp; Version Detection</span>
  -sV on discovered open ports only (faster)
  Banner grab with --script=banner

<span class="cm">Phase 4 — NSE Vulnerability Scan</span>
  --script=vuln on all open ports
  Targeted scripts for specific services (smb-vuln-ms17-010, etc.)

<span class="cm">Phase 5 — OS Detection + Aggressive</span>
  -O for TCP/IP fingerprint
  -A for comprehensive single-host enumeration

<span class="cm">Output: save all formats with -oA for documentation</span></code></pre>

<h2>Output Directory Setup</h2>
<pre><code><span class="cm"># Create organized output directory</span>
mkdir -p ~/scans/10.10.10.5

<span class="cm"># All scan files will be saved here</span>
<span class="cm"># Convention: ~/scans/&lt;target-ip&gt;/&lt;phase&gt;</span>
<span class="cm"># e.g. ~/scans/10.10.10.5/discovery.gnmap</span>
<span class="cm">#      ~/scans/10.10.10.5/fullports.xml</span>
<span class="cm">#      ~/scans/10.10.10.5/services.nmap</span></code></pre>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Core Concepts</summary>
  <div class="tier-body">
    <ul>
      <li>Read through the 5-phase methodology and understand why the phases are ordered: discovery → ports → services → vulns → OS</li>
      <li>Create the output directory before starting: <code>mkdir -p ~/scans/10.10.10.5</code></li>
      <li>Understand that saving output (<code>-oA</code>) at every phase means you never lose results if a scan is interrupted</li>
      <li>Know the convention: one subdirectory per target IP, one basename per phase</li>
      <li>Apply this same setup to the home lab: <code>mkdir -p ~/scans/192.168.56.30</code></li>
    </ul>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — Deeper Skills</summary>
  <div class="tier-body">
    <ul>
      <li>Understand why phases are sequential — running <code>-sV</code> on all 65535 ports wastes time; do port scan first, then version on discovered ports only</li>
      <li>Know when to skip or modify phases: skip discovery (-Pn) if the host blocks ICMP, skip UDP if scope is TCP-only</li>
      <li>Recognize that the 5-phase structure matches real penetration testing methodologies (PTES, OWASP)</li>
      <li>Add a pre-scan step: run <code>whois</code> and <code>dig</code> against the target before touching Nmap</li>
      <li>Document which commands produced which findings — embed phase notes in the output directory as a README</li>
    </ul>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Expert Techniques</summary>
  <div class="tier-body">
    <ul>
      <li>Script the full phase sequence into a bash recon automation: accepts a target IP, runs all 5 phases, saves timestamped output</li>
      <li>Adapt the methodology for internal network assessments vs. external perimeter vs. single-host CTF — each requires different timing, exclusions, and UDP depth</li>
      <li>Integrate Nmap phases with other tools: Masscan for speed on large ranges, then Nmap for depth on discovered hosts</li>
      <li>Build a findings aggregator: parse all phase XML outputs and merge into a single structured report</li>
      <li>Practice the full lab against the home lab Windows 10 target: <code>sudo nmap -sS -p- -T4 192.168.56.30 -oA ~/scans/192.168.56.30/fullports</code></li>
    </ul>
  </div>
</details>
</article>

<template id="tpl-step1">
<article class="topic">
<h1>01 · Step 1 — Host Discovery</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l3">L3 Network</span>
  <span class="osi-chip l4">L4 Transport</span>
  <span class="osi-note">Host discovery uses L3 ICMP echo request/reply (ping, -PE) and L4 TCP SYN probes (-PS) to confirm a target is reachable before committing to a full port scan.</span>
</div>
<hr class="divider">

<div class="callout note">Before spending time on a full port scan, confirm the target is reachable. A routed lab target may not respond to ICMP — use -Pn if all probes time out.</div>

<h2>Command</h2>
<pre><code><span class="cm"># Quick ping check (works if ICMP not blocked)</span>
ping -c 3 10.10.10.5

<span class="cm"># Nmap ping sweep (more thorough — uses ICMP + TCP probes)</span>
sudo nmap -sn 10.10.10.5

<span class="cm"># If ICMP is blocked, probe common ports</span>
sudo nmap -sn -PS22,80,443,8080 10.10.10.5

<span class="cm"># Last resort: skip discovery, assume host is up</span>
sudo nmap -Pn 10.10.10.5</code></pre>

<h2>Expected Output</h2>
<pre><code>$ sudo nmap -sn 10.10.10.5

Starting Nmap 7.94 ( https://nmap.org ) at 2024-03-07 09:15 EDT

Nmap scan report for 10.10.10.5
Host is up (0.034s latency).
MAC Address: 00:50:56:B0:12:34 (VMware)

Nmap done: 1 IP address (1 host up) scanned in 0.28 seconds

<span class="cm"># Host is up — confirmed. Latency 34ms suggests routed VPN connection.</span>
<span class="cm"># VMware OUI = target is a VM (expected for lab).</span>
<span class="cm"># Proceed to port scan.</span></code></pre>

<h2>Interpretation</h2>
<div class="table-wrap">
<table>
  <thead><tr><th>Output</th><th>Meaning</th><th>Action</th></tr></thead>
  <tbody>
    <tr><td>Host is up (Xms latency)</td><td>Target responds to ping probes</td><td>Proceed to Step 2</td></tr>
    <tr><td>"Host seems down"</td><td>All probes timed out — host may block ICMP</td><td>Re-run with -Pn</td></tr>
    <tr><td>0 hosts up (0 hosts scanned)</td><td>Wrong target IP or routing issue</td><td>Check IP and routing</td></tr>
  </tbody>
</table>
</div>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Core Concepts</summary>
  <div class="tier-body">
    <ul>
      <li>Run <code>sudo nmap -sn 10.10.10.5</code> and confirm the host is up before proceeding</li>
      <li>If you see "Host seems down", re-run with <code>-Pn</code> to skip discovery — the host may block ICMP</li>
      <li>Understand what the MAC OUI tells you: VMware = virtual machine, Dell/Cisco = physical hardware</li>
      <li>Practice on lab: <code>sudo nmap -sn 192.168.56.30</code> — confirm Windows 10 responds before port scanning</li>
      <li>Note the latency: low ms = same LAN, higher ms = routed/VPN connection</li>
    </ul>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — Deeper Skills</summary>
  <div class="tier-body">
    <ul>
      <li>Use TCP probes when ICMP is blocked: <code>sudo nmap -sn -PS22,80,443 10.10.10.5</code> — sends SYN to specific ports</li>
      <li>Sweep the full lab subnet: <code>sudo nmap -sn 192.168.56.0/24</code> — see all 3 VMs respond (Kali, Security Onion, Windows 10)</li>
      <li>Add UDP probe for hosts that block TCP too: <code>sudo nmap -sn -PU53,161 10.10.10.5</code></li>
      <li>Understand that -Pn skips discovery entirely and assumes the host is up — wastes time on dead IPs but works for stealthy hosts</li>
      <li>Know ARP discovery works only on the same L2 segment — routed hosts require ICMP or TCP probes</li>
    </ul>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Expert Techniques</summary>
  <div class="tier-body">
    <ul>
      <li>Correlate MAC OUI (first 3 octets) with vendor database to identify device type before scanning a single port</li>
      <li>Use discovery timing: <code>sudo nmap -sn --min-rtt-timeout 50ms --max-retries 1 192.168.56.0/24</code> for fast sweeps on local LAN</li>
      <li>Build a host inventory script: discovery sweep → extract live IPs → resolve hostnames → save to target list</li>
      <li>Detect discovery scans on the defender side: watch for ICMP type 8 bursts + TCP SYN probes to common ports in Security Onion alerts from <code>192.168.56.10</code></li>
      <li>Understand passive host discovery alternatives (ARP monitoring, DNS query logs, NetFlow) for stealthier reconnaissance</li>
    </ul>
  </div>
</details>
</article>
</template>

<template id="tpl-step2">
<article class="topic">
<h1>02 · Step 2 — Full Port Scan</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l4">L4 Transport</span>
  <span class="osi-note">-sS -p- probes all 65,535 L4 TCP ports with half-open SYN packets. Each response (SYN-ACK, RST, or silence) maps to an open/closed/filtered port state without completing a full three-way handshake.</span>
</div>
<hr class="divider">

<div class="callout note">Always scan all 65535 ports on a single target — services on non-standard ports are commonly missed by default top-1000 scans and are a major source of initial access in CTFs and real engagements.</div>

<h2>Command</h2>
<pre><code><span class="cm"># Full TCP port scan — SYN scan, all 65535 ports, save all formats</span>
sudo nmap -sS -p- --open -T4 10.10.10.5 -oA ~/scans/10.10.10.5/fullports

<span class="cm"># Breakdown:</span>
<span class="cm"># -sS      = SYN scan (fast, requires root)</span>
<span class="cm"># -p-      = scan all 65535 ports (not just top 1000)</span>
<span class="cm"># --open   = only show open ports in output</span>
<span class="cm"># -T4      = aggressive timing (lab network)</span>
<span class="cm"># -oA      = save normal + XML + grepable output</span>

<span class="cm"># Optional: add UDP top 20 for common services</span>
sudo nmap -sU --top-ports 20 10.10.10.5 -oA ~/scans/10.10.10.5/udp_top20</code></pre>

<h2>Expected Output</h2>
<pre><code>$ sudo nmap -sS -p- --open -T4 10.10.10.5 -oA ~/scans/10.10.10.5/fullports

Starting Nmap 7.94 ( https://nmap.org ) at 2024-03-07 09:16 EDT
Nmap scan report for 10.10.10.5
Host is up (0.034s latency).
Not shown: 65529 closed tcp ports (reset)

PORT     STATE SERVICE
22/tcp   open  ssh
80/tcp   open  http
139/tcp  open  netbios-ssn
445/tcp  open  microsoft-ds
8080/tcp open  http-proxy
8443/tcp open  https-alt

Nmap done: 1 IP address (1 host up) scanned in 89.43 seconds

<span class="cm"># 6 open ports found:</span>
<span class="cm"># 22   = SSH (likely Linux)</span>
<span class="cm"># 80   = HTTP web server</span>
<span class="cm"># 139  = NetBIOS (SMB stack — Windows or Samba)</span>
<span class="cm"># 445  = SMB (major attack surface)</span>
<span class="cm"># 8080 = HTTP alternate (Tomcat? Jenkins? Squid?)</span>
<span class="cm"># 8443 = HTTPS alternate (admin panel? VPN?)</span></code></pre>

<h2>Extract Port List for Next Step</h2>
<pre><code><span class="cm"># Extract comma-separated port list from grepable output</span>
grep "/open" ~/scans/10.10.10.5/fullports.gnmap | \
  grep -oP '\d+/open' | \
  awk -F/ '{printf "%s,", $1}' | \
  sed 's/,$/\n/'

<span class="cm"># Output: 22,80,139,445,8080,8443</span>
<span class="cm"># Use this list in Step 3 with -p for targeted version detection</span></code></pre>

<hr class="tier-divider">
<div class="tier-heading">Skill Tiers</div>
<details class="tier beginner" open>
  <summary>🟢 Beginner — Core Concepts</summary>
  <div class="tier-body">
    <ul>
      <li>Run the full-port SYN scan: <code>sudo nmap -sS -p- --open -T4 10.10.10.5 -oA ~/scans/10.10.10.5/fullports</code></li>
      <li>Understand <code>-p-</code> = all 65,535 ports vs default top 1000 — services on non-standard ports are frequently missed</li>
      <li>Note the 6 open ports found and what each likely represents: 22=SSH, 80=HTTP, 139/445=SMB, 8080/8443=Tomcat</li>
      <li>Practice on lab: <code>sudo nmap -sS -p- --open -T4 192.168.56.30 -oA ~/scans/192.168.56.30/fullports</code></li>
      <li>Understand why <code>--open</code> is used: cleaner output showing only relevant ports on large subnet scans</li>
    </ul>
  </div>
</details>
<details class="tier intermediate">
  <summary>🟡 Intermediate — Deeper Skills</summary>
  <div class="tier-body">
    <ul>
      <li>Run the port-list extraction pipeline and verify the output matches expected ports before moving to Step 3</li>
      <li>Understand T4 timing: aggressive but appropriate for LAN/VPN lab — use T3 for production to reduce impact</li>
      <li>Add UDP scan for common services: <code>sudo nmap -sU --top-ports 20 10.10.10.5</code> — catches DNS (53), SNMP (161), TFTP (69)</li>
      <li>Know when to use <code>-sT</code> (TCP connect) instead of <code>-sS</code>: if you don't have root access, or need full connections for accurate state</li>
      <li>Add <code>--min-rate 1000</code> to speed up <code>-p-</code> scans on reliable lab networks without risking dropped packets</li>
    </ul>
  </div>
</details>
<details class="tier advanced">
  <summary>🔴 Advanced — Expert Techniques</summary>
  <div class="tier-body">
    <ul>
      <li>Use Masscan for the initial <code>-p-</code> sweep (10x faster), then pass discovered ports to Nmap for accurate state verification</li>
      <li>Detect port scan traffic in Security Onion: SYN scan from <code>192.168.56.10</code> to <code>192.168.56.30</code> generates distinctive half-open connection bursts</li>
      <li>Tune <code>--scan-delay</code> to evade IDS rate-based detection: 100ms between probes slips under most threshold rules</li>
      <li>Use <code>--source-port 53</code> or <code>--source-port 443</code> to probe through stateless ACLs that allow DNS/HTTPS source ports</li>
      <li>Compare <code>-sS</code> vs <code>-sF</code> (FIN scan) vs <code>-sN</code> (NULL scan) results — differences reveal firewall ruleset behavior</li>
    </ul>
  </div>
</details>
</article>
</template>

<template id="tpl-step3">
<article class="topic">
<h1>03 · Step 3 — Service &amp; Version Detection</h1>
<div class="osi-bar">
  <span class="osi-label">OSI Layers</span>
  <span class="osi-chip l4">L4 Transport</span>
  <span class="osi-chip l7">L7 Application</span>
  <span class="osi-note">-sV completes a full L4 TCP connection then sends L7 application-layer probe strings and reads version banners. -sC then runs default NSE scripts — SSH hostkey, HTTP title, SMB OS discovery — all at L7.</span>
</div>
<hr class="divider">

<div class="callout note">Run version detection only against known open ports — much faster than rescanning all 65535. Use the port list extracted from Step 2.</div>

<h2>Command</h2>
<pre><code><span class="cm"># Version detection + default scripts on open ports only</span>
sudo nmap -sV -sC -p 22,80,139,445,8080,8443 10.10.10.5 \
  -oA ~/scans/10.10.10.5/services

<span class="cm"># Breakdown:</span>
<span class="cm"># -sV   = service version detection (intensity 7)</span>
<span class="cm"># -sC   = run default NSE scripts</span>
<span class="cm"># -p    = only scan the ports found in Step 2</span>

<span class="cm"># Also grab banners explicitly</span>
nmap --script=banner -p 22,80,8080,8443 10.10.10.5</code></pre>
